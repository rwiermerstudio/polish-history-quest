  chapter-3-companion.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="An in-depth, source-led companion to the Polish History Quest chapter on the repeatedly negotiated Polish–Lithuanian union, 1385–1569.">
      <title>A Union Made and Remade — Chapter 3 Companion</title>
      <link rel="stylesheet" href="./history-companion.css">
    </head>
    <body id="top" class="chapter-3-reader">
    <a class="skip-link" href="#content">Skip to the companion text</a>
    <header class="reader-bar">
      <a href="./">← Polish History Quest</a><span>Chapter 3 companion · 1385–1569</span>
      <nav class="reader-actions" aria-label="Companion navigation"><a href="#contents">Contents</a><a href="#sources">Sources &amp; reading</a><span>Print: Ctrl/⌘ + P</span></nav>
    </header>
    <main class="companion" id="content">
      <header class="cover chapter-3-cover">
        <p class="eyebrow">Polish History Quest · In-depth companion</p>
        <h1>A union made and remade</h1>
        <p class="subtitle">Poland, Lithuania and their neighbours in a Baltic–Black Sea world, 1385–1569</p>
        <div class="cover-meta"><span>Source-led survey</span><span>Eight original excerpts with new English translations</span><span>Print edition · 2026</span></div>
      </header>

      <section class="companion-section" id="contents">
        <p class="section-number">Reader guide</p><h2>How to study a union that was never finished</h2>
        <p class="lede dropcap">The Polish–Lithuanian connection did not unfold from a single plan written at Krewo in 1385. Rulers and political communities repeatedly reconstructed it because marriage, succession, warfare, faith, taxation and regional interests kept changing. At several moments the crowns were held by different people; at others one ruler governed two states through separate offices. The Union of Lublin in 1569 was a consequential settlement, not the inevitable destination of everything before it.</p>
        <p>This companion asks a recurring question: <strong>union for whom, and on what terms?</strong> “Poland” meant the Crown of the Kingdom of Poland, itself a collection of provinces, towns, churches and estates. The Grand Duchy of Lithuania was not a small ethnic Lithuanian state. Its rulers governed Lithuanian and Žemaitijan lands and extensive Orthodox Ruthenian territories inhabited by communities ancestral to modern Belarusians and Ukrainians. The administrative language often called Ruthenian belonged to this polity. Neither present borders nor exclusive modern nationality can be projected backward without distortion.</p>
        <p>The partnership helped rulers confront the Teutonic Order, Muscovy and succession crises. It also created hierarchies. Catholic nobles gained privileges from which Orthodox nobles could be excluded. Noble political participation expanded while peasants, most townspeople and women remained outside the enfranchised estate. Prussian towns, Jewish communities, Armenians, Tatars and different Christian churches pursued their own rights through overlapping jurisdictions. Comparative pluralism did not amount to modern equality or uninterrupted tolerance.</p>
        <p>Every displayed excerpt comes from one named edition text. The companion does not combine parallel acts, normalize historical spelling or replace an editor’s main text with an apparatus variant. Event and composition dates are kept distinct from the edition and its transmission evidence; where an edition’s original-and-copy inventory was not independently collated, the citation says so rather than claiming witness-level certainty. Translation is deliberately conservative: political metaphors remain metaphors, offensive confessional classifications remain marked as the issuing charter’s language, and uncertain terms are not made falsely precise. Images are classified as primary objects, later reconstructions, retrospective paintings or modern photographs.</p>
        <nav aria-label="Companion contents"><ol class="toc">
          <li><a href="#chronology"><span>Chronology and political geography</span><span>01</span></a></li><li><a href="#krewo"><span>Krewo: a marriage bargain</span><span>02</span></a></li>
          <li><a href="#christianities"><span>Baptism and unequal Christianities</span><span>03</span></a></li><li><a href="#vytautas"><span>Cooperation through rivalry</span><span>04</span></a></li>
          <li><a href="#grunwald"><span>Crusade, Grunwald and memory</span><span>05</span></a></li><li><a href="#horodlo"><span>Horodło and contested hierarchy</span><span>06</span></a></li>
          <li><a href="#varna"><span>Varna, interregnum and Casimir</span><span>07</span></a></li><li><a href="#prussia"><span>Prussian towns and long war</span><span>08</span></a></li>
          <li><a href="#dynasty"><span>A Jagiellonian Central Europe</span><span>09</span></a></li><li><a href="#frontiers"><span>East and south</span><span>10</span></a></li>
          <li><a href="#composite"><span>How the composite monarchy worked</span><span>11</span></a></li><li><a href="#sejm"><span>Privilege, consent and the Sejm</span><span>12</span></a></li>
          <li><a href="#towns"><span>Towns and multilingual trade</span><span>13</span></a></li><li><a href="#countryside"><span>Folwark and unequal grain</span><span>14</span></a></li>
          <li><a href="#households"><span>Estate, household and gender</span><span>15</span></a></li><li><a href="#religions"><span>Plurality without a fairy tale</span><span>16</span></a></li>
          <li><a href="#renaissance"><span>Renaissance court and Bona</span><span>17</span></a></li><li><a href="#learning"><span>Print and Copernicus</span><span>18</span></a></li>
          <li><a href="#reformation"><span>Reformation and royal caution</span><span>19</span></a></li><li><a href="#lublin"><span>Livonia and Lublin</span><span>20</span></a></li>
          <li><a href="#sources"><span>Conclusion, workshop and sources</span><span>21</span></a></li>
        </ol></nav>
        <div class="caution"><strong>Translation and terminology.</strong> “Crown,” “Commonwealth,” “state,” “people” and “nation” translate historically situated words, not modern constitutional categories. “Schismatics” and “unbelievers” appear only where no. 51 of the Horodło acts uses those polemical classifications.</div>
      </section>

      <section class="companion-section print-break" id="chronology"><p class="section-number">01 · Orientation</p><h2>Two realms, many political communities</h2>
        <p class="lede">In 1385 neither partner was a nation-state. The marriage negotiation joined a crowned Polish ruler to a Lithuanian grand duke, but it did not erase the regional, legal, linguistic or confessional communities over which they ruled.</p>
        <table class="timeline-table"><caption>Selected chronology, 1385–1569</caption><tbody>
          <tr><th scope="row">1385–1386</th><td>Jogaila issues promises at Krewo, is baptized as Władysław, marries Jadwiga and is crowned king.</td></tr><tr><th scope="row">1392–1401</th><td>Ostrów and Vilnius–Radom recognize Vytautas’s authority while renegotiating his relationship to Władysław.</td></tr>
          <tr><th scope="row">1410–1413</th><td>Victory at Grunwald is followed by a limited peace and the confessional, heraldic and institutional settlement at Horodło.</td></tr><tr><th scope="row">1440–1447</th><td>Casimir governs Lithuania before accepting the Polish crown after an interregnum.</td></tr>
          <tr><th scope="row">1454–1466</th><td>The Prussian Confederation’s revolt produces the costly Thirteen Years’ War and Royal Prussia.</td></tr><tr><th scope="row">1501–1505</th><td>Mielnik fails as a durable union formula; parliamentary consent develops through practice and <em>Nihil Novi</em>.</td></tr>
          <tr><th scope="row">1525–1526</th><td>Prussia becomes a secular Lutheran duchy held as a Polish fief; Mohács ends Jagiellonian rule in Bohemia and Hungary.</td></tr><tr><th scope="row">1529–1566</th><td>Lithuanian Statutes codify a distinct legal order while Muscovite and Livonian pressures intensify.</td></tr>
          <tr><th scope="row">1569</th><td>Territorial incorporations and negotiation at the Lublin Sejm culminate in a new common political structure.</td></tr>
        </tbody></table>
        <p>Poland faced a succession problem after Louis of Hungary’s death and tension with the Teutonic Order. Jadwiga had been crowned <em>rex</em>, “king,” in 1384: the title marked possession of the office rather than a claim that she was male. Her proposed Habsburg marriage was not the only possible future. Polish lords could have renewed Hungarian dependence, supported a different marriage or failed to agree. Their choice of Jogaila reflected strategy, but strategy did not guarantee implementation.</p>
        <p>Lithuania faced crusading pressure from the Order, rivalry within the Gediminid dynasty, competition with Moscow and unstable authority over broad Ruthenian lands. Most inhabitants of those eastern and southern lands were already Orthodox Christians. A map showing one Lithuanian colour therefore represents rule, not ethnic sameness or pagan uniformity. Vilnius, Kyiv, Navahrudak, Kraków and Marienburg each supply a different starting point.</p>
        <figure data-kind="map"><img loading="lazy" width="726" height="950" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Polish-Lithuania_map_%281450-1600%29.svg?width=1400" alt="Modern color-coded map of Poland and Lithuania showing borders and territorial changes from 1450 to 1600"><figcaption><strong>Changing territories, reconstructed later</strong><p>A modern historical map showing Polish–Lithuanian territories, border changes and conflicts from about 1450 to 1600. It is a scholarly reconstruction, not a contemporary boundary survey.</p><p class="figure-meta">Grandiose, adapted from <em>Lietuvos istorijos atlasas</em>, 18 April 2011 · modern historical map · CC BY-SA 3.0 · <a href="https://commons.wikimedia.org/wiki/File:Polish-Lithuania_map_%281450-1600%29.svg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>What kind of union?</h3><ul><li><strong>Dynastic lens:</strong> marriage and shared rulers created recurring obligations.</li><li><strong>Institutional lens:</strong> separate councils, laws, treasuries and armies limit any claim of immediate incorporation.</li><li><strong>Social lens:</strong> elite bargains redistributed privilege without consulting most inhabitants.</li></ul><p>All three are needed. “Union” names a changing relationship, not one stable constitutional form.</p></div>
        <div class="question-box"><strong>Negotiating briefs</strong> Rank the pressures faced by Jadwiga’s lords, Jogaila, Orthodox Ruthenian elites and the Teutonic Order. Which interests overlap, and which remain incompatible?</div>
      </section>

      <section class="companion-section" id="krewo"><p class="section-number">02 · Bargain</p><h2>Krewo was not a finished constitution</h2>
        <p class="lede dropcap">On 14 August 1385 Jogaila issued an act at Krewo setting out promises connected to marriage with Jadwiga. Baptism, compensation for the rejected Habsburg match, release of captives and recovery of lands appeared alongside the famous undertaking concerning Lithuania and Rus. The surviving parchment is a diplomatic act produced in negotiation, not minutes of a constituent assembly.</p>
        <p>The label “Union of Krewo” was developed by later historians. It encourages readers to see everything after 1385 as the execution of one constitutional decision. Yet the act does not establish shared ministries, courts or taxation. Its disputed verb <em>applicare</em> has been translated as attach, apply, join or incorporate. Polish incorporationist traditions used it to claim a completed legal absorption; Lithuanian scholarship emphasized the Grand Duchy’s continuing political existence. Subsequent settlements mattered precisely because the relationship was unresolved.</p>
        <blockquote class="source-excerpt" id="excerpt-krewo"><p class="source-label">Primary source 1 · Krewo act, one titulature</p>
          <p class="source-original" lang="la">Nos Jagalo, virtute Dei dux magnus Litwanorum Rusiaeque dominus et haeres naturalis, notum facimus quibus expedit universis, praesentium tenorem inspecturis, […]</p>
          <p class="source-translation">We, Jagiełło, by the power of God grand duke of the Lithuanians and lord and natural heir of Rus’, make known to all whom it concerns who shall inspect the tenor of the present [letters], […]</p>
          <p class="source-citation"><strong>Event and composition:</strong> act issued at Krewo, 14 August 1385. <strong>Witness:</strong> the editors report a parchment original in the Kraków cathedral chapter archive, document no. 186, plus later copies. Stanisław Kutrzeba and Władysław Semkowicz, eds., <em>Akta unji Polski z Litwą, 1385–1791</em> (Kraków: PAU, 1932), no. 1, printed p. 1 (scan PDF leaf 58). The original wording is taken from this edition witness; translation is independent. <a href="https://pbc.biaman.pl/dlibra/publication/1419/edition/1545/content">Public-domain edition scan</a>.</p>
        </blockquote>
        <p>The titulature can prove how the issued act presents Jogaila: grand duke “of the Lithuanians” and hereditary lord of Rus’. It cannot establish modern ethnic sovereignty, exact borders or the practical legal effect of every promise. Even <em>virtute Dei</em>, literally “by the power of God,” should not be silently replaced by the more familiar “by the grace of God.” A small formula contains choices but not a complete constitution.</p>
        <p>Jogaila was baptized as Władysław in February 1386, married Jadwiga and was crowned. These acts implemented central conditions while creating new questions. Who would rule Lithuania in his absence? What would happen after either spouse died? Which elites would gain from Catholic privilege? Marriage opened a process whose durability came from repeated repair, not original completeness.</p>
        <div class="interpretation"><h3>Four labels, four blind spots</h3><ul><li><strong>Marriage contract</strong> captures the immediate setting but understates geopolitical effects.</li><li><strong>Royal promise</strong> identifies the issuer but can hide other negotiators.</li><li><strong>Treaty</strong> suggests reciprocal states more clearly than the document’s form warrants.</li><li><strong>Constitutional union</strong> projects later institutions backward.</li></ul></div>
        <div class="question-box"><strong>Source prompt</strong> Which obligations are explicit, which depend on marriage and baptism, and whose assent is absent from the parchment?</div>
      </section>

      <section class="companion-section" id="christianities"><p class="section-number">03 · Conversion</p><h2>Baptism, institutions and unequal Christianities</h2>
        <p class="lede">Władysław’s baptism changed diplomatic possibilities. It weakened the Teutonic Order’s claim that war against Lithuania remained a mission to convert a pagan ruler. It did not transform every household at once, and it did not introduce Christianity to a polity whose Ruthenian majority included long-established Orthodox churches.</p>
        <p>Latin ecclesiastical institutions expanded around Vilnius after 1387. Royal privileges strengthened Catholic boyars’ property and political position. Clergy, churches and ritual connected Lithuania to papal and Central European networks, while Jadwiga’s patronage supported learning and worship. Žemaitija followed a different chronology: control remained contested and institutional conversion extended into the early fifteenth century. “Europe’s last pagan state converted in 1387” compresses ruler, region, institution and local practice into one misleading event.</p>
        <p>Conversion had material and social dimensions. Endowing a church redirected land and dues. A parish required clergy and repeated local presence. Baptism changed marriage and burial norms unevenly. Sacred places could be adapted, condemned or remembered. The sources privilege royal ceremonies and clerical success; they reveal much less about village negotiation, women’s transmission of household practice or coexistence between rites.</p>
        <p>Orthodox Christians occupied a difficult position in a polity whose rulers sought Latin legitimacy. They were not pagan remnants awaiting conversion. Ruthenian nobles served the grand duke and governed regions, but Catholic privilege created exclusions that later union acts made explicit. Muscovite rulers could use Orthodox protection as political language, yet common confession did not erase rivalry among Ruthenian elites or ensure loyalty to Moscow.</p>
        <div class="caution"><strong>Four meanings of conversion.</strong> Keep separate a ruler’s baptism, an official cult, a territorial church organization and household practice. They have different dates and require different evidence.</div>
        <div class="interpretation"><h3>Diplomatic success or confessional hierarchy?</h3><p>Latin baptism improved the dynasty’s position within western Christendom and supplied institutions used by Lithuanian elites. The same process privileged one Christianity over another. Those propositions are not mutually exclusive; an account that celebrates recognition without tracing inequality is incomplete.</p></div>
        <div class="question-box"><strong>Perspective exercise</strong> Write four reports on the baptism from papal, Teutonic, Orthodox Ruthenian and Žemaitijan positions. Which facts would each select, and what political purpose might selection serve?</div>
      </section>

      <section class="companion-section" id="vytautas"><p class="section-number">04 · Rivalry</p><h2>Vytautas and Władysław: cooperation made through conflict</h2>
        <p class="lede dropcap">Dynastic rivalry did not end when Jogaila became a Christian king. Vytautas, son of Kęstutis and Władysław’s cousin, pursued authority in Lithuania, at times cooperating with the Teutonic Order. Calling every alliance switch “betrayal” replaces analysis with a loyalty test. The actors sought survival and leverage in a field where kinship generated claims as readily as solidarity.</p>
        <p>The settlement at Ostrów in 1392 made Vytautas effective ruler of Lithuania while preserving Władysław’s superior dynastic claim. Vytautas consolidated power and campaigned east. His defeat by steppe forces at the Vorskla River in 1399 killed allies and constrained expansion. Jadwiga’s death that year also altered Władysław’s title in Poland. These shocks encouraged another settlement rather than mechanically producing it.</p>
        <blockquote class="source-excerpt" id="excerpt-vilnius"><p class="source-label">Primary source 2 · Vytautas’s Vilnius act</p>
          <p class="source-original" lang="la">quae etiam bona post mortem eiusdem nostrae consortis ad ipsum dominum Wladislaum regem et ad eius successores ac ad coronam regni Poloniae sine diminutione integraliter devolventur.</p>
          <p class="source-translation">Those goods, after the death of that same, our consort, shall pass in their entirety, without diminution, to the lord Władysław the king, to his successors, and to the Crown of the Kingdom of Poland.</p>
          <p class="source-citation"><strong>Event and composition:</strong> Vilnius, 18 January 1401, an act issued by Alexander/Vytautas in the Vilnius–Radom settlement. <strong>Edition and transmission limit:</strong> this quotation follows the printed main text, not a blended reconstruction; the edition’s preceding original-and-copy inventory was not independently collated for this reader. Kutrzeba and Semkowicz, eds., <em>Akta unji</em>, no. 38, printed p. 36 (scan PDF leaf 93), final paragraph before no. 39. <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain direct scan</a>.</p>
        </blockquote>
        <p>The grammatical subject of <em>devolventur</em> is the previously described dower lands or goods, not Lithuania as a whole. The passage can establish the intended destination of specified property after Anna’s death. It cannot prove that the Grand Duchy became Władysław’s private inheritance, that Lithuanian institutions vanished or how royal successors would be chosen. Reading the antecedent is constitutional history at the scale of grammar.</p>
        <p>The Lithuanian political community also issued a companion act. Separate instruments matter: no single voice represented every party. Vilnius–Radom recognized Vytautas for life and tied Polish and Lithuanian elites to future consultation. The arrangement gave each side tools but settled neither succession nor hierarchy forever.</p>
        <div class="interpretation"><h3>Subordinate, partner or co-ruler?</h3><p>Each term catches part of Vytautas’s changing position. He acknowledged Władysław while exercising broad grand-ducal authority and pursuing policies sometimes opposed to the king’s. The relationship is best treated chronologically, not reduced to one permanent rank.</p></div>
        <div class="question-box"><strong>Source prompt</strong> Identify the antecedent of every pronoun and verb in the excerpt. How does the resulting claim differ from “Lithuania passed to Poland”?</div>
      </section>

      <section class="companion-section print-break" id="grunwald"><p class="section-number">05 · War and memory</p><h2>Crusade, Grunwald and the limits of victory</h2>
        <p class="lede">The Teutonic Order was a religious corporation, territorial government, military power and participant in European crusading culture. Conflict arose from Žemaitija’s status, trade routes, ducal legitimacy and the Order’s strategic need to connect its territories. It cannot be reduced to “Poles and Lithuanians versus Germans.”</p>
        <p>A Žemaitijan uprising in 1409 and competing diplomatic claims led to general war. Armies included royal and ducal retinues, regional levies, mercenaries, Ruthenian contingents, Tatars, the Order’s subjects and western crusading guests. Language, allegiance and later nationality did not align. On 15 July 1410 the allied army defeated the Order near Grunwald/Tannenberg/Žalgiris and killed Grand Master Ulrich von Jungingen.</p>
        <p>Precise tactical reconstruction remains disputed. The Lithuanian withdrawal has been interpreted as collapse, planned manoeuvre, regrouping or a sequence containing more than one of these. Later narratives and battlefield archaeology help but do not permit a confident minute-by-minute script. The allies did not take Marienburg. The First Peace of Thorn in 1411 produced limited territorial change, although indemnities, casualties and lost prestige burdened the Order.</p>
        <figure><img loading="lazy" width="753" height="1109" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Banderia_Prutenorum_10r.jpg?width=1200" alt="Parchment manuscript folio with a painted black-and-white banner and a column of medieval Latin text"><figcaption><strong>Battle memory in a near-contemporary manuscript</strong><p>Folio 10r of the <em>Banderia Prutenorum</em>, compiled in 1448, depicts and describes the banner associated with Tuchola. It records memory of the 1410 campaign, not the battle as it occurred.</p><p class="figure-meta">Jan Długosz and Stanisław Durink, 1448 · late-medieval manuscript witness · public domain · <a href="https://commons.wikimedia.org/wiki/File:Banderia_Prutenorum_10r.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <p>Victory changed diplomatic credibility but did not make the Order cease to be a power overnight. Fiscal pressure and internal opposition in Prussian towns and estates mattered over decades. A spectacular battle becomes causally misleading when used to erase debt, governance, later wars and negotiated settlements.</p>
        <div class="interpretation"><h3>Evidence or commemoration?</h3><ul><li><strong>A chronicle</strong> supplies selected narrative shaped by author and patron.</li><li><strong>A peace treaty</strong> records agreed obligations, not every battlefield consequence.</li><li><strong>A modern battle map</strong> reconstructs movement from incomplete evidence.</li><li><strong>A nineteenth-century painting</strong> reveals later national memory.</li></ul></div>
        <div class="question-box"><strong>Workshop</strong> Classify claims in pre-battle diplomacy as religious, territorial, dynastic, commercial or propagandistic. Why do the strongest claims fit more than one category?</div>
      </section>

      <section class="companion-section" id="horodlo"><p class="section-number">06 · Inclusion and exclusion</p><h2>Horodło’s contested political hierarchy</h2>
        <p class="lede dropcap">The Horodło settlement of 1413 reaffirmed political connection while preserving distinct Lithuanian offices. Its famous heraldic adoption linked selected Catholic Lithuanian nobles with Polish heraldic clans. “Adoption of the Lithuanian nobility” is too broad: the acts identified beneficiaries and exclusions.</p>
        <blockquote class="source-excerpt" id="excerpt-horodlo"><p class="source-label">Primary source 3 · royal and ducal Horodło act, section 13</p>
          <p class="source-original" lang="la">Praeterea praedictis libertatibus, privilegiis et gratiis tantummodo illi barones et nobiles terrae Littwaniae debent uti et gaudere, quibus arma et clenodia nobilium regni Poloniae sunt concessa, et cultores Christianae religionis, Romanae Ecclesiae subiecti, et non scismatici vel alii infideles.</p>
          <p class="source-translation">Moreover, only those barons and nobles of the land of Lithuania ought to use and enjoy the aforesaid liberties, privileges and favours to whom the arms and heraldic emblems of the nobles of the Kingdom of Poland have been granted, and [who are] worshippers of the Christian religion subject to the Roman Church, and not “schismatics” or other “unbelievers.”</p>
          <p class="source-citation"><strong>Event and composition:</strong> Horodło, 2 October 1413; privilege/union act of Władysław Jagiełło and Vytautas. <strong>Edition and transmission limit:</strong> this is the printed main text of one named act, no. 51, not language blended from companion nos. 49–50; its surviving-witness inventory was not independently collated for this reader. Kutrzeba and Semkowicz, eds., <em>Akta unji</em>, no. 51, section 13, printed p. 68 (scan PDF page 125). The polemical classifications are the charter’s voice and are marked in translation. <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain edition scan</a>.</p>
        </blockquote>
        <p>This replaces the tempting fraternity clause from no. 49 with the manually confirmed main text of no. 51. The distinction is substantive. The issuers and purpose differ; combining them would manufacture a source no medieval participant issued. <em>Arma</em> and <em>clenodia</em> concern arms and heraldic emblems, while the final classifications make confessional hierarchy unmistakable.</p>
        <p>The clause can prove that enumerated liberties were restricted to heraldically admitted nobles subject to Rome. It cannot show equal incorporation of all Lithuanian or Ruthenian nobles, universal enforcement or the complete social identity of every beneficiary. Privilege describes a normative order and a political programme. Orthodox nobles remained essential actors, and later grants partially expanded rights, especially amid conflict after Vytautas’s death.</p>
        <p>Vytautas’s attempted coronation as king and his death in 1430 reopened succession. Švitrigaila and Sigismund Kęstutaitis drew support through intersecting dynasty, region, patronage and faith. A simple Catholic-Lithuanian versus Orthodox-Ruthenian national civil war misrepresents shifting coalitions.</p>
        <div class="interpretation"><h3>Integration and inequality together</h3><p>Horodło imported political forms, made elite fraternity performative and strengthened selected Lithuanian nobles. It also formalized Catholic preference. Whether termed integration, cultural expansion or elite strategy depends on the question; exclusion is not optional context.</p></div>
        <div class="question-box"><strong>Source prompt</strong> Make a benefits-and-exclusions table for king, grand duke, admitted Catholic nobles, Orthodox Ruthenian nobles and lesser landholders. What does no. 51 establish, and what evidence would test practice?</div>
      </section>
      <section class="companion-section" id="varna"><p class="section-number">07 · Succession</p><h2>Varna, interregnum and Casimir’s terms</h2>
        <p class="lede">Władysław III inherited the Polish crown in 1434 and became king of Hungary in 1440. His short reign placed the dynasty within Balkan conflict, papal crusading projects and Ottoman expansion. “Europe against the Turks” is a poor frame: Christian powers competed, Balkan communities pursued different strategies, and the Ottoman polity included Christian subjects and allies.</p>
        <p>The campaign of 1444 ended at Varna with Władysław’s death. Later heroic memory could turn a dynastic and military catastrophe into sacrifice for Christendom. For contemporaries, the missing body and uncertain reports also produced an interregnum. The political effect mattered beyond commemoration: there was no adult king in Poland, while his brother Casimir had already been installed as grand duke of Lithuania in 1440.</p>
        <p>Casimir did not simply obey a summons to Kraków. Lithuanian elites had interests in a ruler present in their polity and feared that accepting the Polish crown on Polish terms might diminish their institutions or territory. Negotiations continued until 1447. When Casimir accepted, personal union returned, but Lithuania retained its council, chancellery, treasury, army, offices and law. One person could hold two titles without creating one administration.</p>
        <p>Casimir’s long reign required travel, patronage and bargaining. Appointments connected regional elites to court. Family strategy eventually placed sons on several thrones, but this outcome was not a master plan already visible in 1447. Mortality, rival claimants and the willingness of estates to elect or accept a ruler shaped every succession.</p>
        <div class="interpretation"><h3>Interregnum as evidence</h3><p>A gap in kingship reveals who could negotiate. Polish lords could not compel Casimir instantly; Lithuanian councillors could not determine the Polish succession alone. The resumed union emerged from mutual need and unequal leverage, not automatic hereditary law.</p></div>
        <div class="question-box"><strong>Counterfactual memorandum</strong> Advise Casimir in 1445. What guarantees should he demand before accepting the Polish crown, and what costs would refusal impose on Lithuania?</div>
      </section>

      <section class="companion-section" id="prussia"><p class="section-number">08 · Money and war</p><h2>Prussian towns, confederation and the Thirteen Years’ War</h2>
        <p class="lede dropcap">The Teutonic Order’s subjects did not form a silent background to Polish–Order conflict. Prussian towns and territorial elites organized the Prussian Confederation in 1440 against taxation, judicial practice and the government of the Order. Their appeal to Casimir in 1454 made them political agents choosing among dangerous options.</p>
        <p>Casimir proclaimed incorporation, and rebellion became the Thirteen Years’ War. Early reliance on a noble levy exposed military limitations. The conflict increasingly depended on mercenaries, loans, taxes and fortified towns. When troops expected wages, finance could decide possession. The Nieszawa statutes of 1454 connected wartime need to provincial noble consent, though their texts and regional forms caution against one neat constitutional birthday.</p>
        <p>The Second Peace of Thorn in 1466 placed Gdańsk, Toruń, Elbląg, Chełmno and Warmia within Royal Prussia under the Crown. The Order retained eastern Prussia and owed a contested relationship to the Polish king. Royal Prussian communities maintained substantial privileges, legal practices and a strong regional identity. German language did not dictate loyalty to the Order, just as Crown allegiance did not erase local autonomy.</p>
        <p>Gdańsk’s port connected the Vistula basin to North Sea markets. Its council defended commercial advantage against king, nobles and competitors. The war’s political map therefore resulted from urban organization, elite revolt, royal claims and purchased military labour. Saying that Poland simply “recovered” Prussia repeats the Crown’s legal language while concealing Prussian choice and coercion.</p>
        <figure><img loading="lazy" width="1195" height="593" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Prussian_Homage.jpg?width=1400" alt="Crowded ceremonial history painting showing Albert of Prussia kneeling before King Sigismund I in Kraków"><figcaption><strong>The later endpoint imagined in 1882</strong><p>Jan Matejko’s historical reconstruction of the Prussian Homage of 1525 is not eyewitness evidence. It is used here to ask how nineteenth-century painting converted a negotiated fief settlement into a national ceremonial triumph.</p><p class="figure-meta">Jan Matejko, 1882 · nineteenth-century history painting / retrospective memory · public domain · <a href="https://commons.wikimedia.org/wiki/File:Prussian_Homage.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Recovered province or negotiated allegiance?</h3><p>Crown documents asserted incorporation and historical title. Confederates sought protection and privileges. The peace gave the Crown sovereignty but preserved regional institutions. Each statement is true at a different political scale.</p></div>
        <div class="question-box"><strong>Council simulation</strong> A Prussian town must support the Order, the Confederation or Casimir. Compare taxes, trade, military risk and promised jurisdiction; then identify what cannot be guaranteed.</div>
      </section>

      <section class="companion-section" id="dynasty"><p class="section-number">09 · Central Europe</p><h2>A Jagiellonian Europe, not a centralized empire</h2>
        <p class="lede">Casimir’s son Vladislaus became king of Bohemia in 1471 and Hungary in 1490. Other sons competed for offices and crowns. For a time Jagiellonian courts stretched from the Baltic toward the Adriatic, but a dynastic map easily invents an empire that had no shared treasury, diet, law or central government.</p>
        <p>Bohemian estates chose a ruler amid confessional division after the Hussite wars. Hungarian magnates, towns and counties possessed their own political field. Poland and Lithuania continued to negotiate their relationship. A family member’s accession changed diplomatic access and marriage options without making the realms provinces of Kraków. Even the king’s effective resources depended on local revenue and consent.</p>
        <p>Competition with Matthias Corvinus, the Habsburgs and Ottoman rulers exposed the dynasty’s limits. The Vienna meeting of 1515 arranged marriages between Jagiellonian and Habsburg children and clarified succession expectations. It can look like foresighted Habsburg strategy only because later deaths made its clauses consequential. The actors did not know the future.</p>
        <p>At Mohács in 1526, King Louis II died as Ottoman forces defeated the Hungarian army. The event did not mark a simple end of Hungary. Rival kings and estates, Habsburg claims, Ottoman occupation and the Transylvanian polity produced competing Hungarian futures. Jagiellonian dynastic reach contracted, while Poland-Lithuania remained outside direct Ottoman conquest.</p>
        <figure data-kind="map"><img loading="lazy" width="5008" height="3499" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Polen_und_Litauen_unter_den_Jagiellonen_1386_-_1572.jpg?width=1400" alt="Nineteenth-century German atlas map of Poland and Lithuania under the Jagiellonian dynasty"><figcaption><strong>A nineteenth-century atlas organizes the dynasty</strong><p>Karl von Spruner’s 1854 reconstruction covers Poland and Lithuania under the Jagiellonians, 1386–1572. Its lines and categories belong to later historical cartography, not to a uniform Jagiellonian administration.</p><p class="figure-meta">Karl von Spruner, <em>Historisch-Geographischer Handatlas</em>, second edition, 1854 · nineteenth-century historical atlas map · public domain · <a href="https://commons.wikimedia.org/wiki/File:Polen_und_Litauen_unter_den_Jagiellonen_1386_-_1572.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="caution"><strong>Anti-teleological test.</strong> A marriage is not proof of a coherent century-long strategy. Ask what succession outcome participants expected, what alternatives remained and which deaths made the agreement operate differently.</div>
        <div class="question-box"><strong>Institution chart</strong> Draw Poland, Lithuania, Bohemia and Hungary. Connect shared rulers and marriages, then list the institutions they did not share. Is “empire” clarifying or misleading?</div>
      </section>

      <section class="companion-section" id="frontiers"><p class="section-number">10 · Neighbours</p><h2>East and south: no stable blocs</h2>
        <p class="lede dropcap">The Grand Duchy’s eastern frontier was also an internal question about Rus lands, Orthodox institutions and the loyalty of regional elites. Muscovite rulers increasingly claimed authority over Rus and used Orthodox language in expansion. Such claims should be attributed, not repeated as neutral “reunification.”</p>
        <p>Wars from the late fifteenth century brought serious Lithuanian losses. Smolensk fell to Muscovy in 1514. Later that year a Polish–Lithuanian army won at Orsha, but battlefield victory did not recover the city. The contrast warns against allowing a celebrated battle to substitute for territorial outcome, logistics and long war. Lithuanian demand for Crown assistance increased, while Polish nobles debated who should pay and under what constitutional terms.</p>
        <p>Crimean Tatars raided for captives and goods, but the khanate was not merely a timeless “Tatar menace.” It traded, negotiated tribute and shifted alliances among the Ottomans, Lithuania, Poland and Muscovy. Lithuanian Tatars served as landholding soldiers within the Grand Duchy. Confessional labels did not produce two fixed camps.</p>
        <p>The failed Moldavian expedition of 1497 showed the limits of royal mobilization and supply. Moldavian rulers balanced Polish-Lithuanian, Hungarian, Ottoman and boyar interests. The Ottoman Empire could be adversary, diplomatic partner or overlord of a neighbouring prince. Frontier communities experienced policy through requisition, fortification, captives, migration and disrupted harvests rather than through court strategy alone.</p>
        <p>Ruthenian regions differed. Kyiv, Volhynia, Podlasie and Belarusian lands had distinct offices, noble networks and exposure to warfare. Treating all as an eastern periphery of a Polish story repeats the perspective of later incorporation claims. They were central to the Grand Duchy’s population, administration and military resources.</p>
        <div class="interpretation"><h3>Words that belong in quotation marks</h3><ul><li>“Gathering the Rus lands” expressed Muscovite legitimacy.</li><li>“Defence of Christendom” could legitimize royal taxation or papal campaigns.</li><li>“Tatar menace” flattens diplomacy, settlement and service into raiding alone.</li></ul><p>Attribution turns slogans into evidence instead of accepting them as analysis.</p></div>
        <div class="question-box"><strong>Alliance matrix</strong> For Muscovy, Crimea, Lithuania, Poland, Moldavia and the Ottomans, mark conflict, trade, tribute and temporary alliance. Why does a two-bloc diagram fail?</div>
      </section>

      <section class="companion-section" id="composite"><p class="section-number">11 · Institutions</p><h2>One ruler, distinct states</h2>
        <p class="lede">A composite monarchy joins territories beneath a ruler while preserving different institutions. The phrase is more accurate than either “two fully sovereign modern states” or “one centralized country.” Poland and Lithuania shared dynastic politics intermittently, but government moved through separate documentary and legal systems.</p>
        <p>The Crown had a royal council that developed into the Senate, a chancery, treasury, provincial offices, courts, local assemblies and a general Sejm. Lithuania had a grand-ducal council, chancery and seals, its own treasury, army, offices and assemblies. Polish officials did not automatically exercise Lithuanian office. Revenues raised in one polity did not simply become a common budget. Cooperation required messages, diets, envoys and personal negotiation.</p>
        <p>Administrative language reveals composition. The Lithuanian chancery used Ruthenian extensively; Latin also had diplomatic and ecclesiastical domains, while Polish gained influence. In the Crown, Latin and Polish operated beside German in towns, Ruthenian in eastern regions, Hebrew and Yiddish in Jewish communities, Armenian, Church Slavonic and other languages. Calling one a modern exclusive “official language” obscures function and jurisdiction.</p>
        <p>The First Lithuanian Statute of 1529 and Second Statute of 1566 codified the Grand Duchy’s law. Their existence is not a midway stage toward Crown law. They show legal development inside Lithuania and an estate society trying to define procedure, property, service and rank. Manuscript versions and later editions require source criticism, but their institutional message is unmistakable: union and legal distinctness coexisted.</p>
        <p>Archives embodied that distinction. A seal authenticated an issuer; a chancellery chose formulas and kept books; a court determined admissible claims. If a noble held land on both sides, jurisdiction could become a practical constitutional problem. The union was experienced not only in royal ceremony but in where a litigant travelled and which language a clerk wrote.</p>
        <div class="interpretation"><h3>Federation before 1569?</h3><p>“Federation” usefully highlights distinct members and some shared purposes, but it suggests a designed allocation of powers more regular than late-medieval practice. “Personal union” captures shared rulership but understates elite agreements. Composite monarchy keeps the institutional unevenness visible.</p></div>
        <div class="question-box"><strong>Jurisdiction workshop</strong> Assign five hypothetical disputes—Lithuanian noble inheritance, Gdańsk toll, Orthodox church land, royal tax and cross-border debt—to likely law, court, language and archive. Where is the answer uncertain?</div>
      </section>

      <section class="companion-section" id="sejm"><p class="section-number">12 · Consent</p><h2>Privilege, political nation and the emerging Sejm</h2>
        <p class="lede dropcap">Noble privilege grew through repeated bargains over succession, tax, war and royal policy. There was no single day on which a parliamentary constitution replaced monarchy. Local assemblies, provincial negotiation, the royal council and envoys developed practices that eventually formed a bicameral general Sejm.</p>
        <p>The Nieszawa arrangements tied important levies and decisions to provincial consent. The convention of 1493 is a useful landmark for the chamber of deputies, not an uncontested birthday. The Mielnik settlement of 1501 proposed a stronger role for senators and another union formula during Alexander’s succession. It was not durably implemented. Failure is historically valuable: it demonstrates that elite agreement on paper did not guarantee operation.</p>
        <blockquote class="source-excerpt" id="excerpt-mielnik"><p class="source-label">Primary source 4 · Mielnik’s organic metaphor</p>
          <p class="source-original" lang="la">Terrestrium regnorum et principatuum ordinem a summo illo universi opifice Deo ita institutum esse constat, ut nisi ex capite et membris isdemque concordibus quodlibet eorum compactum existat, salvum et incolume diu permanere non possit, […]</p>
          <p class="source-translation">It is established that the order of earthly kingdoms and principalities was so instituted by God, the supreme maker of the universe, that unless each of them exists as something joined from a head and members—and those in concord—it cannot long remain safe and unimpaired, […]</p>
          <p class="source-citation"><strong>Event and composition:</strong> Mielnik, 23 October 1501; Crown estates’ union act during a succession settlement. <strong>Witness:</strong> the editors used a surviving original as base text and a Crown Register copy as a variant witness. Kutrzeba and Semkowicz, eds., <em>Akta unji</em>, no. 79, printed p. 135 (scan PDF leaf 192). <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain edition scan</a>.</p>
        </blockquote>
        <p><em>Caput et membra</em>, head and members, is an organic political metaphor, not “executive and legislature.” <em>Compactum</em> means joined or put together, not necessarily a modern contractual compact. The preamble can prove how authors represented durable rule: concord among differentiated parts. It cannot prove equal power, implementation or a functioning constitution.</p>
        <p><em>Nihil Novi</em> in 1505 required consent of councillors and land envoys for new general law. It did not transfer all power from king to modern parliament. The monarch retained patronage, courts, administration and initiative. Nor was this democracy of the whole population. The political nation comprised nobles, internally unequal but legally privileged; peasants, women and most townspeople lacked seats.</p>
        <figure><img loading="lazy" width="2000" height="1632" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Johann_Haller%2C_Commune_Incliti_Poloniae_regni_privilegium_constitutionum_et_indultuum_publicitus_decretorum_approbatorumque_%281506%29.jpg?width=1200" alt="Early printed legal page with a large woodcut of the enthroned king facing assembled senators beneath heraldic shields"><figcaption><strong>Political order made printable</strong><p>A page from the 1506 Łaski Statutes, produced by Jan Haller in Kraków, represents king and Senate. The woodcut is contemporary political imagery, not a transcript of debate or a complete picture of representation.</p><p class="figure-meta">Jan Haller, printer; associated with Jan Łaski, 1506 · early printed legal book / contemporary woodcut · public domain · <a href="https://commons.wikimedia.org/wiki/File:Johann_Haller%2C_Commune_Incliti_Poloniae_regni_privilegium_constitutionum_et_indultuum_publicitus_decretorum_approbatorumque_%281506%29.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>“Noble democracy”?</h3><p>The phrase identifies unusually broad participation within the noble estate. It conceals exclusions and wealth inequalities if “democracy” is heard in its modern universal sense. Use it only with the constituency named.</p></div>
        <div class="question-box"><strong>Source prompt</strong> What work does the body metaphor perform? Which social groups can be imagined as “members,” and which disappear from the preamble?</div>
      </section>

      <section class="companion-section" id="towns"><p class="section-number">13 · Urban worlds</p><h2>Towns, jurisdictions and multilingual trade</h2>
        <p class="lede">Kraków, Gdańsk, Vilnius and Lviv offer four different urban histories. None was a miniature nation. Each assembled jurisdictions, languages, confessions and commercial networks that overlapped without producing equal status.</p>
        <p>Kraków and neighbouring Kazimierz combined court, university, crafts, print and major Jewish settlement. Gdańsk’s council defended Royal Prussian liberties while merchants exported grain and timber through Baltic and North Sea networks. Vilnius contained grand-ducal, Catholic and Orthodox institutions and increasingly Jewish settlement. Lviv/Lwów/Lviv brought Latin, Ruthenian, Armenian and Jewish courts and communities into close commercial space.</p>
        <p>Magdeburg-derived law did not make a town ethnically German. German-speaking urban cultures were important, especially in Royal Prussia, but legal models crossed languages. Guilds regulated access to craft and office; women worked in households, markets and workshops while facing restrictions; servants, migrants and suburban residents held different status. Separate Jewish or Armenian jurisdiction might protect communal practice and mark political inequality at once.</p>
        <p>Trade moved salt, cloth, wax, furs, timber and grain. Credit connected producers, merchants, shippers and rulers. A commodity’s path distributed risk unevenly: peasants faced harvest uncertainty, carriers paid tolls, merchants used information and finance, and councils defended port privileges. “Prosperous trade” should prompt the question of who captured profit.</p>
        <figure><img loading="lazy" width="1995" height="1006" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Nuremberg_chronicles_-_CRACOVIA.png?width=1400" alt="Hand-colored woodcut panorama of walled Kraków with towers, churches, houses, hills and foreground figures"><figcaption><strong>Kraków in the medium of early print</strong><p>The woodcut labelled “Cracovia” in the 1493 <em>Nuremberg Chronicle</em> is a late-medieval printed representation, not a measured street plan. Reused visual conventions may matter as much as topographic observation.</p><p class="figure-meta">Michel Wolgemut and Wilhelm Pleydenwurff; text by Hartmann Schedel, 1493 · contemporary printed city view / woodcut · public domain · <a href="https://commons.wikimedia.org/wiki/File:Nuremberg_chronicles_-_CRACOVIA.png">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Contact is not integration</h3><p>Shared streets and markets encouraged multilingual exchange. Distinct courts, worship, guild rules and residence patterns preserved boundaries. Urban plurality can therefore be evidence of both interaction and institutional separation.</p></div>
        <div class="question-box"><strong>Commodity chain</strong> Trace one grain shipment from estate to Gdańsk exporter. Identify labour, toll, credit, storage and shipping. Who can delay the transaction, and who bears loss?</div>
      </section>
      <section class="companion-section" id="countryside"><p class="section-number">14 · Rural economy</p><h2>Folwark, labour and the unequal grain economy</h2>
        <p class="lede dropcap">The Baltic grain trade linked rural households to distant consumers, but demand alone did not determine social relations. From the later fifteenth century, landlords in some regions expanded demesne farms, or <em>folwarks</em>, cultivated partly through dependent peasant labour. Access to land, noble jurisdiction, transport, demography and local bargaining shaped the change.</p>
        <p>Regional variation is essential. Estates near navigable rivers and Gdańsk’s route faced different opportunities from inland Lithuania or southeastern Ruthenia. Royal Prussia, Mazovia, Greater Poland and Volhynia had different settlement patterns and lordly powers. Even within a village, holdings and obligations varied. A national average can conceal the chronology historians are trying to explain.</p>
        <p>Piotrków legislation of 1496 restricted mobility but did not create uniform serfdom in one stroke. Laws required enforcement; lords competed for labour; people fled, negotiated, married and used custom. Over time, estate jurisdiction and labour dues intensified in many areas. Peasant households retained plots, markets and village offices while carrying heavier coercive obligations. Agency does not cancel domination.</p>
        <p>The older “second serfdom” model connected western demand directly to eastern coercion. It identifies an important international market but can make local power automatic. Later studies stress demography, land abundance, jurisdiction, state capacity and regional access to markets. A combined explanation asks how price incentives became labour obligations through institutions.</p>
        <p>Environmental risk belonged in the calculation. Harvest failure affected subsistence before export; river levels and winter storage altered transport; expanded cultivation changed woodland and soil. Noble accounts record sale and dues more readily than hunger, women’s work or conflict inside peasant households. Quantitative claims must name place, decade and source base.</p>
        <div class="interpretation"><h3>Two causal diagrams</h3><ul><li><strong>Market-led:</strong> western demand → higher grain price → demesne expansion → greater labour need.</li><li><strong>Power-led:</strong> noble jurisdiction → restricted mobility and compulsory labour → marketable surplus.</li></ul><p>The mechanisms reinforced each other; neither diagram alone explains why coercion varied geographically.</p></div>
        <div class="question-box"><strong>Evidence question</strong> If a port register shows more exported grain, what additional records are needed to establish who produced it, how many labour days were imposed and whether peasant consumption declined?</div>
      </section>

      <section class="companion-section" id="households"><p class="section-number">15 · Social position</p><h2>Estate, household and gender: who possessed agency?</h2>
        <p class="lede">Political privilege was structured by estate, property, confession, legitimacy, age, urban status and gender. “Nobles gained power” is true but socially incomplete. Magnates and modest landholders did not command equal resources, and noble liberty rested beside the dependence of rural labourers.</p>
        <p>Elite women held dowers, inherited under specific rules, litigated, managed estates and organized patronage. Queens such as Jadwiga, Sophia of Halshany, Elizabeth of Austria, Bona Sforza and Barbara Radziwiłł shaped dynastic outcomes, but exceptional biographies cannot stand for all women. Their authority often operated through household, marriage, motherhood and widowhood—the same structures that constrained them.</p>
        <p>Urban widows could continue businesses, recover debts or defend property, depending on municipal and guild law. Domestic service and workshop production relied on women and girls whose work appears indirectly in accounts or litigation. Peasant women planted, harvested, processed food, cared for animals and sustained households; elite sources underrecord that labour unless dues or disputes brought it into court.</p>
        <p>A dower charter is not a diary. It identifies property intended to support a wife and can reveal political alliance, but not affection or ordinary management. A will records selected obligations at death. A municipal suit captures conflict rather than a representative day. An inventory lists objects filtered through valuation. Reading forms against one another is more reliable than forcing one genre to answer every question.</p>
        <p>Agency should not be romanticized. The ability to litigate may reveal both capacity and vulnerability; successful estate management does not establish gender equality. Conversely, formal exclusion from the Sejm does not make women absent from politics. Household patronage, information, intercession and property could influence appointments and alliances without a parliamentary seat.</p>
        <div class="interpretation"><h3>Biography and structure</h3><p>A queen’s actions show what was possible at a particular rank and moment. Law and account books show constraints and routine. A responsible social history moves between them and marks where poorer lives remain unrecoverable.</p></div>
        <div class="question-box"><strong>Workshop</strong> Compare a marriage agreement, dower record, municipal suit, estate account and portrait. For each, identify the action it records and the life it leaves outside the frame.</div>
      </section>

      <section class="companion-section" id="religions"><p class="section-number">16 · Religious life</p><h2>Plurality without a tolerance fairy tale</h2>
        <p class="lede dropcap">Latin Catholics, Orthodox Christians, Jews, Armenian Christians, Muslims, Karaites, Hussites and later Protestant communities lived under overlapping regimes. Their presence makes Poland-Lithuania comparatively plural. It does not justify describing the period as an “oasis of tolerance” without testing law, worship, office and security separately.</p>
        <p>A privilege could protect a community and define it as separate. Jewish communities developed worship, learning, trade, credit and self-government while facing ecclesiastical hostility, accusations, local violence and special fiscal demands. Royal protection mattered, but its enforcement varied. It is as misleading to infer uninterrupted safety from a charter as to infer constant persecution from hostile preaching.</p>
        <p>Armenian merchants in Ruthenian towns connected long-distance commerce to their own church and judicial institutions. Lithuanian Tatars served as soldiers and landholders while maintaining Islamic practice. Karaites formed small communities with distinct traditions. None fits a simple Catholic-versus-Orthodox diagram, and none possessed rights identical across time and place.</p>
        <p>Orthodox nobles gained some political protections, especially through later privileges, but Catholic preference persisted and was explicit at Horodło. The church union attempted at Florence and local negotiations did not dissolve institutional difference. Confession interacted with language and region without determining a single political allegiance.</p>
        <p>By the sixteenth century, Protestant preaching and noble patronage added new configurations. Comparative restraint in capital persecution had multiple causes: jurisdictional fragmentation, estate privilege, urban autonomy, royal calculation and uncertainty as well as ideals of peace. The Warsaw Confederation of 1573 belongs to the next chapter and must not be used as if it governed the fifteenth century.</p>
        <div class="interpretation"><h3>Replace one word with four tests</h3><ul><li><strong>Legal protection:</strong> can a court recognize injury?</li><li><strong>Worship:</strong> may institutions and rituals operate?</li><li><strong>Civic equality:</strong> can members hold the same offices?</li><li><strong>Everyday security:</strong> is protection effective locally?</li></ul><p>A society may score differently on each test.</p></div>
        <div class="question-box"><strong>Comparison</strong> Apply the four tests to Catholic nobles, Orthodox nobles, a Jewish town community and Lithuanian Tatars. Where does the surviving evidence describe norms rather than outcomes?</div>
      </section>

      <section class="companion-section" id="renaissance"><p class="section-number">17 · Court culture</p><h2>Renaissance Wawel and Bona Sforza’s political household</h2>
        <p class="lede">After a fire in 1499, rebuilding at Wawel connected Italianate forms with local materials, Central European networks and royal representation. “The Renaissance arrived from Italy” is too simple. Patrons, architects, stonemasons and craftspeople adapted forms within an existing court and castle.</p>
        <p>Sigismund I and Bona Sforza used architecture, ceremony, music, education, marriage and officeholding as political instruments. The arcaded courtyard staged access to the monarch. Tapestries and imported objects advertised resources and connections. Workshops included migrants and local makers whose names survive unevenly. Court culture was produced by labour, not simply possessed by rulers.</p>
        <p>Bona’s household and land policy sought revenue and influence. She managed royal domains, patronized clients and entered factional conflict. Opposition depicted her as greedy, dominating and dangerously foreign; later stories associated her with poison. These charges need individual evaluation, but their gendered pattern is itself evidence. A politically active queen could be condemned for exercising forms of power accepted more readily in male councillors.</p>
        <p>The familiar claim that Bona “brought vegetables to Poland” trivializes policy into cuisine and is difficult to sustain as literal diffusion. Food plants and culinary exchange had longer routes. The story survives because it domesticates a contentious foreign queen into a harmless cultural benefactor.</p>
        <figure><img loading="lazy" width="6000" height="4000" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Arcaded_Courtyard_at_Wawel_Castle%2C_Krakow.jpg?width=1400" alt="Sunlit interior courtyard of Wawel Castle with three levels of pale Renaissance arcades and red tiled roofs"><figcaption><strong>A surviving political stage</strong><p>This modern photograph shows the arcaded Renaissance courtyard created during the sixteenth-century rebuilding of the Jagiellonian residence. The architecture is historical evidence; the photograph is not a period view.</p><p class="figure-meta">Lloyd Tudor, photograph dated 19 March 2026 · modern architectural photograph · CC BY-SA 4.0 · <a href="https://commons.wikimedia.org/wiki/File:Arcaded_Courtyard_at_Wawel_Castle%2C_Krakow.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Read court culture politically</h3><p>An account identifies payment; a plan organizes space; a portrait constructs rank; a hostile story polices gender and foreignness. Together they reveal patronage more fully than a list of artistic styles.</p></div>
        <div class="question-box"><strong>Exhibition task</strong> Label four Wawel objects by patron, maker, material, audience and political message. Include one uncertainty about production or reception on every label.</div>
      </section>

      <section class="companion-section" id="learning"><p class="section-number">18 · Knowledge</p><h2>Learning, print and Copernicus in overlapping worlds</h2>
        <p class="lede dropcap">Universities, cathedral schools, foreign study, printing houses and ecclesiastical careers connected the region to European humanism. Latin remained central to scholarship and diplomacy while print expanded in Polish, German and Ruthenian or Church Slavonic forms. Literacy and publication grew unevenly; print supplemented manuscripts rather than instantly replacing them.</p>
        <p>Nicolaus Copernicus was born in Toruń in Royal Prussia, studied in Kraków and Italy, served the Warmian cathedral chapter, practised administration and medicine, and published <em>De revolutionibus</em> in 1543. These affiliations do not collapse into one modern passport. Arguments that he was exclusively “Polish” or “German” ask an early modern subject to resolve later national rivalry.</p>
        <p>His astronomical model emerged from inherited Ptolemaic problems, mathematical work, textual recovery, observation, patronage and institutional time. It placed the sun near the centre of planetary arrangement but retained circles and epicyclic machinery. Publication did not immediately prove a modern heliocentric universe or compel consensus. The lone-genius story erases correspondents, printers and intellectual traditions.</p>
        <blockquote class="source-excerpt" id="excerpt-copernicus"><p class="source-label">Primary source 5 · Copernicus on monetary decline</p>
          <p class="source-original" lang="la">Quamquam innumere pestes sunt, quibus regna, principatus et respublice decrescere solent, hec tamen quatuor (meo iudicio) potissime sunt, discordia, mortalitas, terre sterilitas et monete vilitas: Tria prima adeo evidentia sunt, vt nemo ita esse nesciat, sed quartum quod ad monetam attinet a paucis et non nisi cordatissimis consideratur: quia non vno impetu simul, sed paulatim et occulta quadam ratione respublicas evertit.</p>
          <p class="source-translation">Although the afflictions by which kingdoms, principalities and commonwealths commonly decline are innumerable, these four nevertheless are, in my judgment, the chief ones: discord, mortality, barrenness of the land and the debasement of money. The first three are so evident that no one is unaware that this is so; but the fourth, which concerns money, is considered by few and only by the most prudent, because it overthrows commonwealths not all at once in a single assault but gradually, by a certain hidden process.</p>
          <p class="source-citation"><strong>Subject/composition:</strong> monetary reform in Royal and Ducal Prussia; mature memorandum composed in 1526 after earlier versions. <strong>Edition witness:</strong> Leopold Prowe, <em>Nicolaus Coppernicus</em>, vol. 2: <em>Urkunden</em> (Berlin, 1884), “Die Denkschriften über die Münze,” printed p. 33. Prowe states that he retained the manuscript’s orthography and punctuation while expanding abbreviations and supplying omitted sentence-ending periods; this is an edited manuscript-based text, not an autograph facsimile. Forms including <em>hec</em>, <em>vt</em>, <em>vno</em> and the colon punctuation follow its printed main text. <a href="https://commons.wikimedia.org/wiki/File:Coppernicus-monete.djvu">Public-domain scan and file record</a>.</p>
        </blockquote>
        <p><em>Pestes</em> is stronger than “factors”; <em>monetae vilitas</em> concerns debasement or cheapness, not simply modern inflation. The passage proves that Copernicus represented debasement as gradual and hard to perceive. It does not prove that he single-handedly invented every later monetary law or that his advice was adopted.</p>
        <div class="figure-grid"><figure><img loading="lazy" width="870" height="1270" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/De_Revolutionibus_manuscript_p9b.jpg?width=1000" alt="Browned manuscript page in Copernicus’s hand with a circular diagram of the heliocentric heavenly spheres"><figcaption><strong>Knowledge before print</strong><p>Page 9 verso of Copernicus’s autograph manuscript shows his diagram of the heavenly spheres before the work’s publication.</p><p class="figure-meta">Nicolaus Copernicus, c. 1520–1541 · authorial manuscript / primary intellectual object · public domain · <a href="https://commons.wikimedia.org/wiki/File:De_Revolutionibus_manuscript_p9b.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure><figure><img loading="lazy" width="1709" height="2457" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/De_revolutionibus_orbium_coelestium_%28Nuremberg_Johann_Petreius_1543%29_title_page.jpg?width=1000" alt="Cream-colored 1543 Latin title page with large red and black type framed by an ornamental woodcut border"><figcaption><strong>Knowledge enters print</strong><p>Title page of the first edition, printed by Johann Petreius at Nuremberg in 1543. It records production and circulation, not immediate acceptance.</p><p class="figure-meta">Johann Petreius, printer, 1543 · first-edition printed book / primary object · public domain · <a href="https://commons.wikimedia.org/wiki/File:De_revolutionibus_orbium_coelestium_%28Nuremberg_Johann_Petreius_1543%29_title_page.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure></div>
        <div class="question-box"><strong>Source prompt</strong> Which words signal judgment rather than measurement? Why is this administrative memorandum useful for understanding Copernicus beyond astronomy?</div>
      </section>

      <section class="companion-section" id="reformation"><p class="section-number">19 · Confessional change</p><h2>Reformation, Prussian settlement and royal caution</h2>
        <p class="lede">Lutheran texts travelled through trade, universities and print, especially in German-speaking Royal Prussian towns. Reformation was not a one-directional march away from Rome. Preachers, councils, nobles, bishops and rulers made choices under changing local conditions, while Catholic institutions adapted.</p>
        <p>In 1525 Grand Master Albert secularized the Order’s Prussian territory, adopted Lutheranism and received the duchy as a hereditary fief from Sigismund I. The Prussian Homage settled an immediate conflict but created a dynastic future no participant could fully know. Later union with Brandenburg made the arrangement look like an obvious mistake; that judgment uses consequences unavailable in 1525.</p>
        <p>Royal policy combined anti-heresy edicts, selective enforcement, negotiation and concern for urban order. Gdańsk’s religious conflict in the 1520s elicited intervention, but sustained government required accommodation with strong municipal institutions. Noble jurisdiction later provided spaces for Lutheran, Reformed, Bohemian Brethren and anti-Trinitarian communities.</p>
        <p>Conversion motives varied: conviction, education, family, patronage and political alliance all mattered. Confessional labels themselves evolved. A noble’s patronage could protect a congregation without producing equality for dependants. Catholic continuity did not mean intellectual stasis, and Protestant expansion did not abolish older religious boundaries.</p>
        <p>Limited large-scale persecution before 1569 cannot be explained by an eternal Polish national tolerance. Royal power, dispersed jurisdiction, noble privilege, urban autonomy, international strategy and uncertainty interacted. The same structure that permitted plural worship could make local protection uneven.</p>
        <div class="interpretation"><h3>Why was coercion selective?</h3><ul><li><strong>Ideational answer:</strong> some actors valued concord or persuasion.</li><li><strong>Institutional answer:</strong> no authority could enforce one policy everywhere.</li><li><strong>Political answer:</strong> rulers balanced cities, nobles, bishops and foreign relations.</li></ul><p>The explanations reinforce rather than exclude one another.</p></div>
        <div class="question-box"><strong>Royal council</strong> After a city adopts Lutheran preaching, choose repression, negotiation, jurisdictional compromise or selective toleration. State the likely unintended consequence of your choice.</div>
      </section>

      <section class="companion-section" id="lublin"><p class="section-number">20 · Settlement under pressure</p><h2>Livonia and Lublin: a union negotiated through crisis</h2>
        <p class="lede dropcap">By the 1560s Lithuania faced severe Muscovite pressure in the Livonian War. Sigismund II Augustus had no surviving legitimate child, making succession urgent. Polish advocates of a closer union pursued common institutions; Lithuanian magnates feared loss of office and autonomy; lesser nobles could see opportunities for privileges comparable to those of Crown nobles.</p>
        <p>Negotiation at the Lublin Sejm stalled, and leading Lithuanian delegates withdrew. The king then initiated incorporation of Podlasie, Volhynia, the Kyiv region and Bratslav into the Crown, requiring local elites to swear allegiance. These transfers changed leverage and cannot be treated as consensual preliminaries hidden beneath the final ceremony.</p>
        <blockquote class="source-excerpt" id="excerpt-podlasie"><p class="source-label">Primary source 6 · royal incorporation of Podlasie</p>
          <p class="source-original" lang="la">[…] praesentibus litteris nostris iam exnunc iure et proprietate haereditaria restituimus et in ius, sortem et proprietatem ac titulum coronae regni Poloniae reintegramus atque ad unum corpus individuum reducimus, inserimus et invisceramus temporibus perpetuis, […]</p>
          <p class="source-translation">[…] by these present letters, from this time forward, we restore [it] by hereditary right and ownership, reintegrate [it] into the right, portion, ownership and title of the Crown of the Kingdom of Poland, and for perpetual times bring, insert and incorporate [it] into one indivisible body, […]</p>
          <p class="source-citation"><strong>Event and composition:</strong> royal incorporation act issued during the Lublin Sejm, 5 March 1569. <strong>Edition and transmission limit:</strong> this is the printed main text for the named Podlasian act; its prefatory witness inventory was not independently collated for this reader. The omitted object is the territory already named, not language supplied from another act. Kutrzeba and Semkowicz, eds., <em>Akta unji</em>, no. 97, printed p. 199 (scan PDF leaf 256). <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain edition scan</a>.</p>
        </blockquote>
        <p><em>Restituimus</em> and <em>reintegramus</em> assert restoration; they do not independently prove an ancient title. <em>Invisceramus</em> is a visceral body metaphor for making something an internal part. The act proves the Crown’s legal rhetoric, not unanimous local consent or ethnic homogeneity.</p>
        <blockquote class="source-excerpt" id="excerpt-volhynia"><p class="source-label">Primary source 7 · Volhynia and Bratslav</p>
          <p class="source-original" lang="pl">A już tę przerzeczoną Ziemię wołyńską, to jest wojewostwo wołyńskie i bracławskie, […] ku Królestwu polskiemu jako rownych do rownych, wolnych do wolnych ludzi, a jako własny a prawdziwy członek ku pirwszemu i własnemu ciału a głowie […]</p>
          <p class="source-translation">And now the aforesaid land of Volhynia, that is, the palatinates of Volhynia and Bratslav, […] [we join] to the Kingdom of Poland as equals to equals, free people to free people, and as its own and true member to its former and proper body and head […]</p>
          <p class="source-citation"><strong>Event and composition:</strong> royal act issued during the Lublin Sejm, 26 May 1569. <strong>Edition and transmission limit:</strong> this is the historical Polish main text in the named edition, not modernized or combined with the Podlasie act; the edition’s precise original-and-copy inventory was not independently collated for this reader. Kutrzeba and Semkowicz, eds., <em>Akta unji</em>, no. 136, printed p. 302 (scan PDF leaf 359). <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain edition scan</a>.</p>
        </blockquote>
        <p>“Equals to equals” and “free people to free people” are normative formulas for privileged estates, not universal liberty. <em>Pirwszemu</em> embeds the contested claim of former attachment to the Crown. The wording can prove the public justification used; it cannot establish social equality or the assent of peasants, townspeople and every regional noble.</p>
        <p>The final settlement provided a common elected monarch and Sejm and common foreign policy while Lithuania retained administration, law, army, treasury and offices. Even “common” institutions required later practice. The Commonwealth was more integrated than the earlier dynastic connection and remained a composite polity.</p>
        <blockquote class="source-excerpt" id="excerpt-lublin"><p class="source-label">Primary source 8 · Crown act of the Union of Lublin, article 3</p>
          <p class="source-original" lang="pl">Iż już Królestwo polskie i Wielkie Księstwo litewskie jest jedno nierozdzielne i nieróżne ciało, a także nieróżna ale jedna spolna Rzeczpospolita, która się ze dwu państw i narodow w jeden lud zniosła i spoiła.</p>
          <p class="source-translation">That now the Kingdom of Poland and the Grand Duchy of Lithuania are one indivisible and undifferentiated body, and likewise not distinct but one common Commonwealth, which from two states and peoples has come together and been joined into one people.</p>
          <p class="source-citation"><strong>Event:</strong> conclusion of the Union of Lublin, 1 July 1569. <strong>Composition:</strong> Crown estates’ act produced and sworn during the Sejm. <strong>Edition and transmission limit:</strong> this is the printed main text of no. 148, not the separate Lithuanian counterpart no. 149; the edition’s preceding original-and-copy inventory was not independently collated for this reader. Kutrzeba and Semkowicz, eds., <em>Akta unji</em>, no. 148, article 3, printed p. 343 (scan PDF leaf 400). The scan’s visible main text ends <em>spoiła</em>; an erroneous longer OCR form is not reproduced. <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain edition scan</a>.</p>
        </blockquote>
        <figure><img loading="lazy" width="9704" height="7716" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Unia_Lubelska_1569_r..jpg?width=1400" alt="Large parchment union document densely written in ink with numerous pendant seals attached along its lower edge"><figcaption><strong>The legal instrument as a material object</strong><p>Archival image of a 1569 Union of Lublin act. Parchment, writing and many pendant seals show authentication and collective participation, but the object alone does not establish equal bargaining power.</p><p class="figure-meta">Institutional document supplied by the Polish Central Archives of Historical Records; individual scribe and photographer not specified in Commons metadata, 1 July 1569 · primary document / archival scan · public domain · <a href="https://commons.wikimedia.org/wiki/File:Unia_Lubelska_1569_r..jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Union, coercion or both?</h3><ul><li><strong>Constitutional reading:</strong> the act created durable common institutions by agreement.</li><li><strong>Crisis reading:</strong> war and succession made compromise urgent.</li><li><strong>Coercion reading:</strong> territorial incorporation after withdrawal transformed bargaining power.</li></ul><p>A full interpretation must account for the signed settlement and the coercive sequence that preceded it.</p></div>
        <div class="question-box"><strong>Source prompt</strong> Compare <em>corpus</em>, “member,” “equals” and “one people.” Which are juridical metaphors, and which later national conclusions do they not prove?</div>
      </section>
      <section class="companion-section" id="sources"><p class="section-number">21 · Conclusion and documentation</p><h2>What the union made—and what it did not settle</h2>
        <p class="lede dropcap">Between Krewo and Lublin, rulers and political communities created a durable connection without following a straight road. Marriage offered a solution to immediate dynastic and geopolitical problems. Rivalry forced the relationship to be renegotiated. War against the Teutonic Order encouraged cooperation without eliminating separate interests. Privileges widened participation for nobles while drawing confessional and estate boundaries. The settlement of 1569 joined common institutions under pressure and retained major Lithuanian distinctness.</p>
        <p>The strongest conclusion is therefore neither that Poland annexed Lithuania in 1385 nor that two unchanged sovereign nation-states freely federated in 1569. Both descriptions impose later categories. The Grand Duchy was a composite polity in its own right, with Lithuanian and Žemaitijan cores and extensive Ruthenian lands. The Crown also contained provinces and privileged communities. Their union was made by unequal actors whose access to documentary voice and political decision varied sharply.</p>
        <p>Contingency matters. Vorskla altered Vytautas’s options; failure to take Marienburg limited the consequences of Grunwald; death at Varna opened an interregnum; urban revolt and mercenary finance shaped Prussia; Mohács redirected dynastic succession; Muscovite pressure and Sigismund Augustus’s lack of an heir made Lublin urgent. None of these outcomes was guaranteed by Krewo. Anti-teleological history does not deny long processes; it explains how each process depended on choices and events whose conclusions remained open.</p>
        <h3>Interpretation workshop</h3>
        <p><strong>1. One document, one witness.</strong> Select one of the eight excerpts. Identify issuer, event, composition and immediate textual witness. Rewrite the claim it can prove in one sentence, then write a second sentence beginning “It cannot prove…”. If your conclusion needs words from a companion act, cite that act separately rather than making a composite quotation.</p>
        <p><strong>2. Union for whom?</strong> Compare the position of a Catholic Lithuanian noble, an Orthodox Volhynian noble, a Gdańsk councillor, a Jewish merchant, a Lithuanian Tatar landholder, an urban widow and a peasant household in 1413 and 1569. Do not rank them on one scale. Test political voice, property, jurisdiction, worship, mobility and security.</p>
        <p><strong>3. A causal map without destiny.</strong> Connect Muscovite war, noble privilege, royal succession, Livonia and the withdrawal of Lithuanian delegates. Mark necessary conditions separately from accelerants. Then identify one plausible alternative outcome at the start of 1569. A counterfactual is useful only when constrained by contemporary resources.</p>
        <p><strong>4. Image criticism.</strong> Compare the <em>Banderia Prutenorum</em>, Matejko’s Prussian Homage, Spruner’s map and the archival Lublin act. Classify maker, date, intended audience and relation to the represented event. State one claim each image supports and one attractive claim it does not.</p>
        <p><strong>5. Final synthesis.</strong> Answer in 250 words: “Was the Polish–Lithuanian union a partnership, hierarchy or process?” Use two exact excerpts, one social group without a Sejm voice and one neighbouring polity. The best answer may use all three nouns, but it must define when and for whom each applies.</p>
