          <section class="hero"><div><span class="badge">Interactive static learning game</span><h1>Learn Poland’s history by playing through its turning points.</h1><p class="lead">A concise, adult-friendly journey from early statehood through the Polish-Lithuanian Commonwealth, partitions, war, communism, Solidarity and European integration.</p><div class="cta-row"><button class="btn btn-primary" data-scroll="eras">Start the path</button><button class="btn btn-secondary" data-scroll="games">Try a mini-game</button></div></div><div class="hero-card map-card">${P()}<div class="float-stat"><div class="stat"><b>${n.length}</b><span>timeline events</span></div><div class="stat"><b>${t.length}</b><span>learning chapters</span></div><div class="stat"><b id="heroPct">${m()}%</b><span>complete</span></div></div></div></section>
