    elections alone.`}],quiz:[i(`Why is 1989 described as a negotiated revolution?`,[`Institutions
    changed fundamentally through bargaining, elections and later reform rather than
    a single violent overthrow.`,`The constitutional order remained socialist while
    only selected market regulations were adjusted.`,`The communist leadership collapsed
    before negotiations and transferred power without elections.`,`The western border
    returned to the 1939 line while Soviet troops remained permanently.`],0,`The Round
    Table preserved some guarantees for the old regime while opening a process that
    moved faster than participants expected. Continuity and transformation existed
