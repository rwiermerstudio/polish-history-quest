          <li class="bibliography-entry">Richard Butterwick, ed., <em>The Polish-Lithuanian Monarchy in European Context, c. 1500–1795</em> (Basingstoke: Palgrave Macmillan, 2001).</li>
          <li class="bibliography-entry">Maria Bogucka, <em>The Lost World of the “Sarmatians”: Custom as the Regulator of Polish Social Life in Early Modern Times</em> (Warsaw: Polish Academy of Sciences, 1996).</li>
          <li class="bibliography-entry">F. W. Carter, <em>Trade and Urban Development in Poland: An Economic Geography of Cracow, from Its Origins to 1795</em> (Cambridge University Press, 1994).</li>
          <li class="bibliography-entry">Maria Bogucka, <em>Women in Early Modern Polish Society, Against the European Background</em> (Ashgate, 2004), used with attention to class and uneven archives.</li>
          <li class="bibliography-entry">Natalia Nowakowska, <em>King Sigismund of Poland and Martin Luther: The Reformation before Confessionalization</em> (Oxford University Press, 2007), on royal policy, communication and early Reformation.</li>
          <li class="bibliography-entry">Magda Teter, <em>Jews and Heretics in Catholic Poland</em> (Cambridge University Press, 2006), principally later but important for the institutional histories emerging in this period.</li>
          <li class="bibliography-entry">Gershon David Hundert, <em>Jews in Poland-Lithuania in the Eighteenth Century</em> (University of California Press, 2004), a later corrective against projecting one timeless communal model backward.</li>
          <li class="bibliography-entry">David Frick, <em>Kith, Kin, and Neighbors</em> (Cornell University Press, 2013), later Vilnius evidence useful methodologically, not a direct description of the fifteenth century.</li>
          <li class="bibliography-entry">Jerzy Kłoczowski, <em>A History of Polish Christianity</em> (Cambridge University Press, 2000), for ecclesiastical structures and their broad chronology.</li>
          <li class="bibliography-entry">Patrice M. Dabrowski, <em>Poland: The First Thousand Years</em> (Northern Illinois University Press, 2014), attentive to later historical memory.</li>
          <li class="bibliography-entry">Noel M. Swerdlow and Otto Neugebauer, <em>Mathematical Astronomy in Copernicus’s De Revolutionibus</em> (Springer, 1984), for the mathematical model beyond hero narrative.</li>
          <li class="bibliography-entry">André Goddu, <em>Copernicus and the Aristotelian Tradition</em> (Brill, 2010), placing innovation inside inherited learning.</li>
        </ol>
        <div class="caution"><strong>Publication boundary.</strong> The seven documentary acts and Prowe’s 1884 Copernicus text are public domain; all English translations are new. Each citation names its edition text and states when the diplomatic witness inventory was not separately collated. Repository or reproduction rights do not transfer to unrelated translations.</div>
        <p><strong>Return to the course:</strong> continue with the interactive chapter to test these distinctions, or proceed to Chapter 4 to examine how the 1569 settlement operated after the last Jagiellonian.</p>
