rsor:pointer;background:#fff;border-radius:16px;min-height:76px;padding:.85rem}.choice.selected{border-color:var(--crimson);outline:3px solid #c1121f40}.memory-card{border:1px solid var(--line);cursor:pointer;text-align:center;background:#fff;border-radius:16px;place-items:center;min-height:92px;padding:.65rem;font-weight:800;display:grid}.memory-card.matched{border-color:var(--green);color:#14532d;background:#ecfdf3}.memory-card.flipped{border-color:var(--gold);background:#fff7ed}.chapter-modal{z-index:100;background:#14213d94;place-items:center;padding:1rem;display:none;position:fixed;inset:0}.chapter-modal.open{display:grid}.modal-panel{background:var(--paper);border:1px solid var(--line);border-radius:28px;max-width:860px;max-height:88vh;padding:1.3rem;overflow:auto;box-shadow:0 30px 90px #00000040}.modal-head{justify-content:space-between;align-items:start;gap:1rem;display:flex}.close{cursor:pointer;border:0;border-radius:999px;width:40px;height:40px;font-weight:900}.achievement-list{flex-wrap:wrap;gap:.6rem;display:flex}.achievement{border:1px solid var(--line);color:var(--muted);background:#fff;border-radius:999px;padding:.45rem .7rem;font-weight:800}.achievement.unlocked{color:#3f2400;background:#fff7d6;border-color:#e5c66a}.footer{color:var(--muted);text-align:center;padding:2rem 1rem}@media (width<=860px){.hero,.game-layout{grid-template-columns:1fr}.nav{flex-direction:column;align-items:flex-start}h1{letter-spacing:-.055em}}

