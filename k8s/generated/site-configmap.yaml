    n(e){if(e.ep)return;e.ep=!0;let n=t(e);fetch(e.href,n)}})();var e=(e,t,n,r,i,a,o=`Public
    domain`,s=`Wikimedia Commons source record`,c={})=>{let l=encodeURIComponent(r);return{id:e,type:t,title:n,src:`https://commons.wikimedia.org/wiki/Special:Redirect/file/${l}${t===`image`||t===`map`?`?width=1200`:``}`,source:`https://commons.wikimedia.org/wiki/File:${l}`,license:o,attribution:s,caption:i,alt:a,...c}},t={\"lands-before-poland\":{deepDive:{kind:`interpretation`,title:`How
    a dynasty became a realm`,body:`The year 966 is memorable, but it is better understood
    as a strategic turning point than as the birthday of a modern nation. Mieszko
    I ruled through a dynasty, fortified centres and personal alliances. By accepting
    baptism in the Latin rite, he connected his court to Latin Christian institutions:
    clergy could write and administer, marriage diplomacy became easier, and the ruler
    gained a religious language of legitimacy. The decision did not instantly standardize
    belief, language or borders. Older practices persisted, and the people under Piast
    power did not all imagine themselves as members of one nation.\n\nPower spread
    unevenly through forts, tribute, warfare and negotiation. Archaeology reveals
    strongholds, burials, imported objects and changing settlement patterns, while
    written accounts mostly come from outsiders or from later court authors. At the
    Congress of Gniezno in 1000, Emperor Otto III met Bolesław Chrobry at the shrine
    of the missionary Saint Adalbert. The meeting joined diplomacy, sacred memory
    and plans for an archbishopric that reduced dependence on German church structures.
    It demonstrated the Piast ruler’s importance without making him equal to the emperor
    in every respect.\n\nSources shape what can be said. Gallus Anonymus wrote in
    the early twelfth century to praise Bolesław III and instruct an elite audience.
    His dramatic stories preserve traditions, but they are not transparent recordings
    of tenth-century events. Historians therefore compare chronicles with archaeology,
    coins, charters and foreign testimony. This combination explains why early Poland
    is best seen as a changing political project: a Piast monarchy was assembled and
    defended over generations, while identities remained local, dynastic and Christian
    as well as increasingly connected to the name of Poland.`},coverage:[{section:`How
    a dynasty became a realm`,evidence:`Latin Christian institutions`},{section:`How
    a dynasty became a realm`,evidence:`Congress of Gniezno in 1000`},{section:`How
    a dynasty became a realm`,evidence:`forts, tribute, warfare and negotiation`},{section:`How
    a dynasty became a realm`,evidence:`Gallus Anonymus`}],media:[e(`gniezno-doors`,`image`,`The
    Gniezno Doors as visual argument`,`Gniezno Cathedral detail 02.jpg`,`A bronze
    panel from the twelfth-century doors narrates the life of Saint Adalbert. Read
    it not as a photograph of events but as a later statement about sacred authority,
    mission and Piast memory.`,`Detail of a bronze relief on the Gniezno Cathedral
    doors showing figures in a medieval narrative scene.`),e(`piast-map`,`map`,`The
    Piast realm under Mieszko I`,`Poland historical map AD 960 - 992.png`,`The shaded
    borders are a modern reconstruction, not a precise medieval survey. Use the map
    to ask where historians disagree and why frontiers were zones of influence rather
    than fixed lines.`,`Historical map reconstructing the changing Piast realm between
    about 960 and 992.`,`CC BY-SA 3.0`,`Poznaniak; modified by Bede`)]},\"fragmentation-reunification\":{deepDive:{kind:`interpretation`,title:`Fragmentation
    could also generate change`,body:`Calling the period after 1138 an age of “division”
    is accurate politically but misleading if it suggests that everything declined.
    Rival Piast duchies competed for people, revenue and prestige. That competition
    could be destructive, yet it also encouraged rulers and bishops to found towns,
    invite settlers, grant markets and clarify law. Town charters influenced by Magdeburg
    law created defined courts, offices and obligations within a feudal order. They
    did not make towns democratic in a modern sense, but they gave merchants and craftspeople
    a more predictable institutional setting.\n\nThe Mongol invasion of 1241 exposed
    the vulnerability of fragmented defence and devastated parts of the south. At
    the same time, a territorial crusading state grew on the Baltic. The Teutonic
    Order had been invited to fight non-Christian Prussians, but it built its own
    durable state and later seized Pomerelia, contesting routes between the kingdom
    and the sea. These developments show why political geography mattered as much
    as dynastic genealogy.\n\nReunification was a long process rather than one triumphant
    event. Władysław Łokietek’s coronation in 1320 restored a royal title, but not
    every historically Polish-ruled territory returned to the crown. Casimir III then
    strengthened the monarchy through legal codification, castles, royal administration
    and a university foundation. His policies toward towns and Jewish communities
    also served a state-building economy, even as society remained hierarchical. Historians
    therefore pair the language of restoration with evidence of novelty: the kingdom
    reunited in the fourteenth century was more urban, legally articulated and institutionally
    ambitious than the monarchy divided two centuries earlier. Fragmentation and development
    happened together.`},coverage:[{section:`Fragmentation could also generate change`,evidence:`Fragmentation
    and development happened together`},{section:`Fragmentation could also generate
    change`,evidence:`defined courts, offices and obligations`},{section:`Fragmentation
    could also generate change`,evidence:`territorial crusading state`},{section:`Fragmentation
    could also generate change`,evidence:`legal codification, castles, royal administration
    and a university foundation`}],media:[e(`casimir-portrait`,`image`,`Casimir III
    remembered as a lawgiver`,`Casimir III the Great.PNG`,`This later portrait helped
    turn Casimir into the model of a prudent builder-king. Compare the visual ideal
    with the concrete institutions—courts, castles, towns and university—used to support
    that reputation.`,`Later painted portrait of Casimir III wearing a crown and royal
    robes.`),e(`casimir-assembly`,`image`,`A later artist imagines royal consultation`,`Wiec
    Kazimierz Wielki.jpg`,`This nineteenth-century image imagines an assembly under
    Casimir III. It is evidence for later ideals of a consulting lawgiver, not a direct
    record of a medieval meeting.`,`Historical illustration imagining Casimir III
    presiding over an outdoor political assembly.`)]},\"jagiellonian-union\":{deepDive:{kind:`interpretation`,title:`A
    union made by bargaining, not destiny`,body:`The Polish-Lithuanian connection
    begun at Krewo in 1385 was a negotiated dynastic alliance, not an instant unitary
    nation-state. Jadwiga’s court sought a ruler and security; Jogaila needed allies
    against the Teutonic Order and rivals within Lithuania. His baptism and marriage
    linked two political communities whose elites continued to defend different laws,
    offices and interests. The arrangement survived because it could be renegotiated,
    not because all conflict disappeared.\n\nThe victory at Grunwald in 1410 weakened
    the Teutonic Order’s prestige but did not remove it from Baltic politics. In 1525
    the Order’s Prussian branch was secularized, and the Prussian Homage made its
    duke a Polish fief-holder. The settlement looked favourable to the crown; its
    long-term danger emerged when dynastic inheritance joined ducal Prussia to Brandenburg,
    creating the base of a powerful future rival. Contingent choices can therefore
    acquire consequences that participants did not foresee.\n\nInside the kingdom,
    privileges and assemblies expanded noble influence. Nihil Novi in 1505 strengthened
    parliamentary consent among nobles, yet most peasants, townspeople and many other
    inhabitants lacked political rights. It was constitutional development without
    modern democracy. Nicolaus Copernicus likewise resists simple national labels.
    He served institutions in Royal Prussia, wrote in Latin and participated in a
    European scholarly world while remaining connected to the Polish crown. His life
    crossed local, Prussian, Polish, Latin-Christian and European identities. Seen
    together, union, parliament and scholarship reveal a region knitted by overlapping
    loyalties. The useful question is not “Which modern nation owned this past?” but
    “Which institutions and communities did historical actors serve, and how did those
    connections change?”`},coverage:[{section:`A union made by bargaining, not destiny`,evidence:`negotiated
    dynastic alliance`},{section:`A union made by bargaining, not destiny`,evidence:`parliamentary
    consent among nobles`},{section:`A union made by bargaining, not destiny`,evidence:`joined
    ducal Prussia to Brandenburg`},{section:`A union made by bargaining, not destiny`,evidence:`local,
    Prussian, Polish, Latin-Christian and European identities`}],media:[e(`lublin-map`,`map`,`The
    Commonwealth after the Union of Lublin`,`Map of Poland and Lithuania after the
    Union of Lublin (1569).jpg`,`This historical map makes the scale of the union
    visible—from the Baltic toward the Black Sea borderlands. Borders conceal internal
    jurisdictions, so compare territorial extent with the text’s emphasis on separate
    institutions.`,`Historical map of Poland and Lithuania after the Union of Lublin
    in 1569.`),e(`copernicus`,`image`,`Copernicus in a world of overlapping identities`,`Nikolaus
    Kopernikus.jpg`,`The famous portrait is later than Copernicus himself. Use it
    to consider how European science, Royal Prussian institutions and later national
    canons all claimed his memory.`,`Painted half-length portrait of Nicolaus Copernicus
    holding a small plant.`)]},commonwealth:{deepDive:{kind:`interpretation`,title:`Liberty
    depended on who counted as political`,body:`The Commonwealth called itself a republic
    because the political nation of nobles elected kings, sent representatives to
    the Sejm and defended law against arbitrary monarchy. Golden Liberty protected
    extensive noble participation, but the word “liberty” had boundaries: most peasants,
    townspeople and minorities lacked equal political power. A small noble estate
    included magnates with private armies as well as modest landholders, so formal
    equality among nobles coexisted with enormous inequality of resources.\n\nReligious
    diversity was unusually broad for early modern Europe. The Warsaw Confederation
    of 1573 offered an important elite guarantee of religious peace after the Jagiellonian
    dynasty ended. It did not create complete modern equality, and later Counter-Reformation
    pressures narrowed space for some Protestants. Jewish self-government, Orthodox
    institutions, Armenian and Muslim communities and many languages made the Commonwealth
    a shared but unequal political world.\n\nIts economy linked local coercion to
    international trade. Western demand for grain made the Vistula and Gdańsk commercially
    important. Estate owners expanded folwark production and heavier peasant labour
    duties, so prosperity at the port could intensify unfreedom in the countryside.
    On the southeastern frontier, registered and unregistered Cossacks sought recognition,
    pay and autonomy while magnate expansion and state policy constrained them. These
    tensions were political, social and religious at once.\n\nThe Commonwealth’s achievement
    and vulnerability came from the same negotiated structure. Consent could restrain
    royal power and permit plural institutions; it could also make collective action
    difficult when powerful actors blocked taxation or reform. Understanding the system
    requires holding both sides together rather than celebrating tolerance without
    inequality or explaining later crisis as inevitable failure.`},coverage:[{section:`Liberty
    depended on who counted as political`,evidence:`most peasants, townspeople and
    minorities lacked equal political power`},{section:`Liberty depended on who counted
    as political`,evidence:`elite guarantee of religious peace`},{section:`Liberty
    depended on who counted as political`,evidence:`folwark production and heavier
    peasant labour duties`},{section:`Liberty depended on who counted as political`,evidence:`Cossacks
    sought recognition, pay and autonomy`}],media:[e(`commonwealth-map`,`map`,`A federated
    state on a continental scale`,`C. 1795 Poland and Lithuania (1569-1795).jpg`,`A
    nineteenth-century historical map reconstructs the Commonwealth’s territorial
    reach. Notice the distance between the Baltic and the southeastern frontier—and
    remember that the map cannot show estate, faith or language boundaries.`,`Historical
    map showing the territories of Poland and Lithuania during the Commonwealth era.`),e(`skarga-sermon`,`image`,`Matejko
    imagines political warning`,`Kazanie Skargi.jpg`,`Jan Matejko painted Piotr Skarga
    addressing the royal court centuries after the supposed scene. It is valuable
    evidence for nineteenth-century memory of Commonwealth politics, not a literal
    record of a sermon.`,`Jan Matejko painting of Piotr Skarga preaching before a
    crowded royal court.`)]},\"crisis-reform\":{deepDive:{kind:`interpretation`,title:`Why
    crisis did not make partition inevitable`,body:`The mid-seventeenth-century wars
    were a compound catastrophe. The Khmelnytsky uprising combined Cossack autonomy,
    Orthodox grievances, social conflict, great-power politics and violence against
    several civilian groups, including Jews and Polish nobles. Muscovite and Swedish
    invasions followed. Population loss, destroyed towns and farms, military costs
    and distrust weakened the Commonwealth, but recovery and reform remained possible.
    Later partition was not pre-written in 1648.\n\nEighteenth-century weakness came
    from interaction. The liberum veto and magnate rivalry obstructed taxation and
    military coordination, while social inequality narrowed the constituency for reform.
    At the same time, Russia, Prussia and Austria intervened repeatedly to keep their
    neighbour dependent. An explanation focused only on “Polish disorder” excuses
    imperial aggression; one focused only on foreign conspiracy misses institutional
    problems that outsiders exploited.\n\nThe Great Sejm and Constitution of 3 May
    1791 tried to create more effective constitutional government, limit some noble
    abuses and strengthen urban rights without establishing universal democracy. Reformers
    abolished the liberum veto and made executive authority more coherent, while retaining
    monarchy and an estate society. Their opponents formed the Targowica Confederation
    and sought Russian aid. Neighbouring empires then used military power before the
    new order could consolidate.\n\nThe partitions therefore followed choices, interests
    and force, not a natural death. They occurred despite a vigorous Enlightenment
    reform movement—schools, theatre, print, economic debate and constitutional experimentation.
    Asking why reform failed requires two scales at once: internal institutions determined
    what the state could mobilize; the European balance of power determined how much
    time reformers were allowed.`},coverage:[{section:`Why crisis did not make partition
    inevitable`,evidence:`Cossack autonomy, Orthodox grievances, social conflict,
    great-power politics`},{section:`Why crisis did not make partition inevitable`,evidence:`institutional
    problems that outsiders exploited`},{section:`Why crisis did not make partition
    inevitable`,evidence:`more effective constitutional government`},{section:`Why
    crisis did not make partition inevitable`,evidence:`used military power before
    the new order could consolidate`}],media:[e(`may-constitution`,`image`,`The Constitution
    of 3 May as remembered`,`Jan Matejko - Konstytucja 3 maja 1791.jpg`,`Matejko’s
    1891 canvas turns reform into a crowded national drama. Identify who is celebrated,
    who is marginal and how a painting made a century later shaped constitutional
    memory.`,`Jan Matejko painting showing supporters of the Constitution of 3 May
    moving through Warsaw.`),e(`partition-map`,`map`,`A map made between the second
    and third partitions`,`1794 Laurie and Whittle Map of Poland and Lithuania after
    Second Partition - Geographicus - Poland-lauriewhittle-1794.jpg`,`Published in
    1794, this map captures a political geography already transformed by seizure and
    on the eve of further destruction. It is both geographic evidence and a snapshot
    of uncertainty.`,`A coloured 1794 map of Poland and Lithuania after the second
    partition.`)]},\"partitions-napoleon\":{deepDive:{kind:`interpretation`,title:`Living
    without a state did not mean living outside politics`,body:`After 1795, inhabitants
    of the former Commonwealth entered three different imperial systems. Russian,
    Prussian and Austrian authorities imposed different laws, schools, taxes, military
    duties and economic connections. The partitions therefore transformed daily life
    beyond the loss of sovereignty. They also ensured that later Polish political
    movements developed under unequal conditions rather than following one common
    path.\n\nNapoleon reopened possibility. Polish Legions fought beside France, and
    the Duchy of Warsaw created a reforming but dependent Napoleonic state. Its constitution,
    administration and legal code weakened estate privilege and ended personal serfdom.
    Yet peasants did not automatically receive land or full economic independence;
    military demands were heavy; and the duchy’s survival depended on French power.
    Reform and dependency were not opposites—they were features of the same experiment.\n\nThe
    Congress of Vienna preserved a reduced Kingdom of Poland linked to the Russian
    emperor, while Prussia and Austria retained other territories. This settlement
    frustrated hopes for sovereignty but also created institutions that later became
    sites of conflict. Political actors now debated whether liberation required foreign
    war, constitutional work, insurrection or social reform.\n\nJózef Wybicki’s legion
    song captured a new solution to statelessness. The future anthem defines national
    persistence through collective action even without an existing state: “Poland
    has not yet perished, so long as we still live.” Its confidence should not erase
    disagreement over who belonged or what restored Poland should look like. The song
    is exciting precisely because it transformed political defeat into a promise of
    agency—one that later generations repeatedly reinterpreted.`},coverage:[{section:`Living
    without a state did not mean living outside politics`,evidence:`three different
    imperial systems`},{section:`Living without a state did not mean living outside
    politics`,evidence:`reforming but dependent Napoleonic state`},{section:`Living
    without a state did not mean living outside politics`,evidence:`did not automatically
    receive land or full economic independence`},{section:`Living without a state
    did not mean living outside politics`,evidence:`national persistence through collective
    action even without an existing state`}],media:[e(`duchy-map`,`map`,`The Duchy
    of Warsaw in Napoleon’s Europe`,`AGAD Duchy of Warsaw map 1812.png`,`This contemporary
    administrative map makes the duchy tangible as a governed territory, not merely
    a patriotic symbol. Its borders also reveal dependence on Napoleon’s changing
    military order.`,`Historical 1812 map of the Duchy of Warsaw with coloured administrative
    divisions.`),e(`anthem-1901`,`audio`,`Hear an early recording of the national
    anthem`,`Mazurek Dąbrowskiego (1901).ogg`,`A 1901 recording lets you hear how
    a legion song carried the idea of political survival during partition. Audio technology
    itself helped standardize national culture across imperial borders.`,`Audio recording
    of Mazurek Dąbrowskiego made in 1901.`,`Public domain`,`Wikimedia Commons source
    record`,{mediaLabel:`Listen · historical recording`,textAlternative:`A solo male
    voice sings in Polish through the hiss and narrow frequency range of an early
    recording. The first stanza and refrain mean, in English: “Poland has not yet
    perished while we remain alive. What foreign force has taken from us, we shall
    regain with the sword. March, march, Dąbrowski, from the Italian land to Poland;
    under your command we shall reunite with the nation.” The brisk mazurka rhythm
    turns political survival into a collective march.`})]},\"long-nineteenth-century\":{deepDive:{kind:`interpretation`,title:`From
    noble insurrection to mass politics`,body:`The failed November and January uprisings
    created a strategic argument that lasted for generations: did national goals require
    repeated armed revolt, or long-term social, educational and economic organization?
    Insurrection could internationalize the Polish cause and produce underground institutions,
    but defeat brought executions, exile, confiscation and tighter imperial control.
    “Organic work” sought strength through schools, cooperatives, business and civic
    associations. In practice many people combined the two traditions rather than
    choosing one forever.\n\nPeasant emancipation weakened noble control and made
    the inclusion of peasants essential to any mass national movement. Industrial
    cities such as Łódź created new working classes and fortunes, while migration
    moved millions across empires and oceans. Socialists, nationalists, conservatives,
    feminists and religious activists offered competing answers to inequality and
    belonging. The revolution of 1905 in Russian Poland made these conflicts visible
    in strikes, street fighting and demands for schools and rights.\n\nPlans to restore
    the old Commonwealth encountered peoples developing distinct modern identities
    and political claims. Lithuanian, Ukrainian, Belarusian and Jewish movements did
    not simply wait to join a Polish project; they developed languages, institutions
    and territorial visions of their own. Any future state would have to negotiate
    these claims or try to dominate them.\n\nCulture reveals dimensions that a list
    of uprisings cannot. Chopin’s cosmopolitan music, Mickiewicz’s exile poetry, Matejko’s
    history painting and novels about industrial capitalism shaped lived experience
    and national imagination. Eliza Orzeszkowa’s novel Marta, for example, connected
    a widow’s struggle for survival to gendered limits on education and paid work.
    Such works carried memory and social criticism across censorship and borders,
    but they also elevated some stories over others. The nineteenth century therefore
    made “the nation” more socially broad and emotionally powerful while making agreement
    about its boundaries more difficult.`},coverage:[{section:`From noble insurrection
    to mass politics`,evidence:`repeated armed revolt, or long-term social, educational
    and economic organization`},{section:`From noble insurrection to mass politics`,evidence:`inclusion
    of peasants essential to any mass national movement`},{section:`From noble insurrection
    to mass politics`,evidence:`distinct modern identities and political claims`},{section:`From
    noble insurrection to mass politics`,evidence:`gendered limits on education and
    paid work`}],media:[e(`ostroleka`,`image`,`Battle painting and the romance of
    insurrection`,`Bitwa pod Ostroleka.jpg`,`A battle image can make uprising appear
    unified and heroic. Set that emotional power beside evidence about divided strategy,
    civilian costs, repression and exile.`,`Nineteenth-century battle painting of
    mounted and infantry forces at Ostrołęka.`),e(`chopin-polonaise`,`audio`,`Chopin’s
    Polonaise in A major`,`Chopin - Polonaise op. 40 no 1.ogg`,`The polonaise carried
    an elite dance form into concert culture. Its forceful rhythm, contrasts and returns
    help explain why later audiences heard dignity, memory and political feeling in
    instrumental music without literal words.`,`Audio performance of Frédéric Chopin’s
    Polonaise in A major, Opus 40 number 1.`,`CC0`,`Musopen performance; Commons source
    record`,{mediaLabel:`Listen · modern performance`,textAlternative:`This is a modern
    solo-piano interpretation, not a nineteenth-century recording. It opens with forceful
    chords and a strongly accented polonaise rhythm, moves through contrasting quieter
    and more martial passages, and repeatedly returns to its commanding main idea.
    There is no speech. The listening point is how rhythm, repetition and dynamic
    contrast can invite associations with ceremony, resolve and memory even though
    the composition does not narrate a political event.`})]},\"war-and-independence\":{deepDive:{kind:`interpretation`,title:`Independence
    emerged from collapse and conflict`,body:`Polish soldiers fought on opposing sides
    during the First World War because Polish lands were divided among empires whose
    armies fought one another. Civilians faced occupation, requisition, displacement
    and destroyed infrastructure. Activists could not know which empire would collapse,
    so they pursued rival strategies: Piłsudski built armed formations and imagined
    a federation in the east; Dmowski sought Entente support for a more centralized
    nation-state; socialists, conservatives and local councils prepared institutions
    on the ground.\n\n11 November 1918 is a useful symbol, not a single moment of
    creation. Authority passed through local committees, soldiers’ councils, the Regency
    Council and Piłsudski’s new government while diplomats sought recognition abroad.
    Borders remained unsettled. Fighting with Ukrainians over Eastern Galicia, uprisings
    and plebiscites in the west, conflict with Czechoslovakia and war with Soviet
    Russia made independence a longer process of institutional transfer, diplomacy
    and border wars.\n\nSelf-determination was difficult to apply because populations
    were intermingled, historical borders overlapped and groups claimed the same cities
    and regions. A map could not make every village part of the preferred state of
    all its inhabitants. Piłsudski’s federation and Dmowski’s centralized model were
    different responses to that problem, not merely a personal rivalry.\n\nThe 1920
    Battle of Warsaw became a powerful story of miraculous rescue. Military planning,
    intelligence, logistics, Soviet mistakes and popular mobilization are more useful
    explanations than miracle alone. The victory protected the new state, but the
    peace did not resolve minority politics or competing memories of the borderlands.
    Independence was real and extraordinary; it was also created amid violence whose
    consequences entered the Second Republic.`},coverage:[{section:`Independence emerged
    from collapse and conflict`,evidence:`lands were divided among empires whose armies
    fought one another`},{section:`Independence emerged from collapse and conflict`,evidence:`useful
    symbol, not a single moment of creation`},{section:`Independence emerged from
    collapse and conflict`,evidence:`federation in the east`},{section:`Independence
    emerged from collapse and conflict`,evidence:`populations were intermingled, historical
    borders overlapped`}],media:[e(`pilsudski-portrait`,`image`,`Piłsudski before
    the imperial collapse`,`Józef Piłsudski, 1916.jpg`,`The portrait shows a political-military
    leader before independence was assured. Avoid reading later success backward:
    his federal strategy competed with other Polish and non-Polish projects.`,`Black-and-white
    1916 portrait of Józef Piłsudski in military uniform.`),e(`border-map-1921`,`map`,`Territorial
    change and contested borders`,`Territorial changes of Poland 1921.jpg`,`This map
    summarizes warfare, plebiscites and settlements after 1918. Treat its clean lines
    as outcomes of conflict, not as self-evident national borders.`,`Map showing territorial
    changes and borders of Poland around 1921.`)]},\"second-republic\":{deepDive:{kind:`interpretation`,title:`Modernization
    without a settled political community`,body:`The Second Republic had to combine
    territories governed for generations by three different empires. Rail gauges,
    laws, currencies, bureaucracies and school systems did not fit together automatically.
    War damage and inflation made integration harder, yet the state created national
    institutions, a common currency and major infrastructure. Gdynia’s rapid growth
    symbolized the ambition to build an independent maritime economy.\n\nPolitical
    inclusion remained unsettled. Roughly one-third of citizens belonged to minorities
    with distinct languages, religions and political goals. Ukrainians, Jews, Belarusians,
    Germans and others built parties, schools, associations and cultural movements.
    Constitutional equality existed alongside discrimination, administrative coercion
    and outbreaks of violence. Describing interwar Poland as ethnically homogeneous
    erases both the republic’s diversity and the conflicts its institutions failed
    to resolve.\n\nThe May Coup of 1926 grew from frustration with parliamentary instability
    but replaced electoral competition with an increasingly authoritarian Sanacja
    system. Opposition and some institutions survived, yet censorship, administrative
    pressure, manipulated elections and the detention of opponents narrowed fair democratic
    competition. The regime was neither a totalitarian dictatorship nor a healthy
    parliamentary democracy.\n\nModern expertise could flourish within these tensions.
    Polish mathematicians Marian Rejewski, Jerzy Różycki and Henryk Zygalski broke
    crucial versions of the Enigma cipher before the Second World War and shared their
    methods with British and French allies in 1939. Their achievement demonstrates
    that scientific intelligence was collaborative and began before Bletchley Park.
    The republic’s history is therefore best held together as achievement and exclusion:
    rapid institution-building and creativity occurred alongside authoritarianism,
    poverty and unresolved minority relations.`},coverage:[{section:`Modernization
    without a settled political community`,evidence:`three different empires`},{section:`Modernization
    without a settled political community`,evidence:`increasingly authoritarian Sanacja
    system`},{section:`Modernization without a settled political community`,evidence:`Roughly
    one-third of citizens belonged to minorities`},{section:`Modernization without
    a settled political community`,evidence:`scientific intelligence was collaborative
    and began before Bletchley Park`}],media:[e(`gdynia`,`image`,`Gdynia and the performance
    of modernity`,`Gdynia, Komisarjat Rzadu 1930-1939 (39491858).jpg`,`The new port
    city represented administrative ambition, maritime access and modern architecture.
    Ask what this carefully framed architectural photograph reveals—and what rural
    poverty or minority conflict it leaves outside the frame.`,`Black-and-white interwar
    photograph of the modern government administration building in Gdynia.`),e(`rejewski`,`image`,`Marian
    Rejewski and collaborative intelligence`,`Marian Rejewski 1932 small.jpg`,`Rejewski’s
    portrait personalizes a mathematical achievement built by a Polish team and later
    shared with allies. It challenges stories that begin Enigma codebreaking only
    in wartime Britain.`,`Black-and-white portrait of mathematician and cryptanalyst
    Marian Rejewski in 1932.`,`CC BY-SA 2.5`,`Unknown photographer; Rejewski family
    archive`)]},\"world-war-two\":{deepDive:{kind:`interpretation`,title:`Occupation
    created different dangers, choices and memories`,body:`Poland was invaded by Nazi
    Germany and the Soviet Union in September 1939; there was no collaborating Polish
    state government. Nazi Germany designed and operated killing centres in occupied
    Poland, so geographic location does not imply Polish state responsibility. German
    occupation pursued racial transformation through terror, forced labour, expulsions
    and murder. Soviet occupation deported civilians, suppressed institutions and
    included the Katyń massacres of Polish officers and officials.\n\nThe Holocaust
    targeted Jews for total destruction. Ghettos, deportations and killing centres
    formed a German system implemented by occupying authorities and their auxiliaries.
    Individual behaviour around persecuted Jews must be studied through specific evidence
    recognizing rescue, indifference, coercion, blackmail and collaboration rather
    than a single national stereotype. German terror made aid dangerous; antisemitism
    and material incentives also shaped choices. Neither collective guilt nor blanket
    innocence explains local history.\n\nTwo Warsaw uprisings must remain distinct.
    The 1943 Warsaw Ghetto Uprising was Jewish resistance within the ghetto against
    deportation and annihilation. The 1944 Warsaw Uprising was led mainly by the Home
    Army across the city as Soviet forces approached. Both were fought against German
    occupation, but their organizations, immediate aims and historical situations
    differed.\n\nPoland’s exile government expected restored sovereignty and pre-war
    eastern borders. Instead, the Red Army occupied the region and the Allied great
    powers accepted Soviet strategic dominance. Borders shifted west and a Soviet-backed
    government took power. Wartime decisions therefore cannot be separated from the
    asymmetry between a stateless underground, genocidal occupation and great powers
    deciding Europe’s post-war order. Sources—including perpetrator photographs—must
    be contextualized so that documentation does not reproduce the perpetrators’ viewpoint
    as spectacle.`},coverage:[{section:`Occupation created different dangers, choices
    and memories`,evidence:`Nazi Germany designed and operated killing centres in
    occupied Poland`},{section:`Occupation created different dangers, choices and
    memories`,evidence:`1943 Warsaw Ghetto Uprising was Jewish resistance`},{section:`Occupation
    created different dangers, choices and memories`,evidence:`rescue, indifference,
    coercion, blackmail and collaboration`},{section:`Occupation created different
    dangers, choices and memories`,evidence:`Allied great powers accepted Soviet strategic
    dominance`}],media:[e(`stroop-source`,`image`,`A perpetrator-produced photograph
    as evidence`,`Stroop Collection - Warsaw Ghetto Uprising - Ghetto - 02.jpg`,`German
    forces made the Stroop Report to celebrate suppression of the 1943 uprising. This
    frame looks from the so-called “Aryan” side across the ghetto wall toward a burning
    factory. Study it as evidence of destruction and perpetrator self-presentation,
    not as a neutral view.`,`Black-and-white perpetrator photograph from the Stroop
    Report showing a factory burning behind the Warsaw Ghetto wall, viewed from the
    non-ghetto side.`),e(`nara-film`,`video`,`Liberation footage entered into evidence`,`Nazi
    Concentration Camps.webm`,`This 1945 US government documentary assembled Allied
    footage from concentration camps in Germany and Belgium, Mauthausen in Austria,
    and Hadamar, a Nazi “euthanasia” killing facility in Germany, for the Nuremberg
    trials. It does not show the German killing centres in occupied Poland; these
    institutions and camp categories must not be conflated. Content warning: disturbing
    images of camps, bodies and survivors; playback never starts automatically.`,`Public-domain
    1945 documentary containing disturbing Allied footage from concentration camps
    in Germany and Belgium, Mauthausen concentration camp in Austria, and Hadamar,
    a Nazi “euthanasia” killing facility in Germany. These sites are distinct from
    German killing centres in occupied Poland.`,`Public domain`,`US government / National
    Archives`,{mediaLabel:`Watch · historical evidence film`,textAlternative:`The
    narrated film moves among concentration camps in Germany and Belgium, Mauthausen
    in Austria, and Hadamar, a Nazi “euthanasia” killing facility in Germany. It shows
    camp entrances and barracks, severely weakened survivors, piles of bodies, burial
    work and officials or local residents confronted with evidence. The editing and
    formal narration organize these graphic scenes as proof for a war-crimes court.
    The institutions shown differ from the German killing centres built in occupied
    Poland; the chapter text explains that distinction.`})]},\"stalinism-peoples-poland\":{deepDive:{kind:`interpretation`,title:`A
    transformed society under constrained sovereignty`,body:`Post-war Poland was geographically
    and demographically remade. It lost eastern territories to the Soviet Union and
    gained former German lands in the west and north. Genocide, flight, expulsion
    and forced resettlement made the country far more ethnically homogeneous. These
    processes were not one interchangeable migration: Jewish communities had been
    destroyed through genocide; Germans fled and were expelled; Poles and Ukrainians
    were forced across new borders under different authorities and conditions.\n\nA
    Soviet-backed party-state eliminated independent political competition through
    manipulated elections, police violence and show trials. Stalinist rule was a dictatorship,
    yet its social history cannot be reduced to fear alone. Communist industrialization
    offered education, urban jobs and social mobility to some citizens while also
    imposing coercion, shortages and harsh labour discipline. People could benefit
    from one policy, resent another and adapt without endorsing the regime as a whole.\n\nIn
    1956 worker protest in Poznań and conflict inside the party brought Gomułka to
    power. The harshest Stalinist practices eased and Poland gained limited room within
    the Soviet bloc, but one-party rule continued. Periodic bargaining over farms,
    church life and culture distinguished Poland from some neighbours without making
    it sovereign or democratic.\n\nNowa Huta captures these contradictions. Planned
    as a showcase socialist industrial city, it embodied steel, migration and the
    promise of a new working class. Residents then fought for a church, and its workers
    later joined opposition. The same place could represent state modernization, environmental
    and social costs, religious conflict and worker resistance. That layered meaning
    is more useful than treating every institution as either pure propaganda or pure
    opposition.`},coverage:[{section:`A transformed society under constrained sovereignty`,evidence:`far
    more ethnically homogeneous`},{section:`A transformed society under constrained
    sovereignty`,evidence:`education, urban jobs and social mobility`},{section:`A
    transformed society under constrained sovereignty`,evidence:`harshest Stalinist
    practices eased`},{section:`A transformed society under constrained sovereignty`,evidence:`showcase
    socialist industrial city`}],media:[e(`new-border`,`image`,`Marking the new western
    border in 1945`,`Marking Polish-German Border in 1945.jpg`,`A border-post photograph
    turns a great-power territorial decision into a visible fact on the ground. The
    new line accompanied flight, expulsion, resettlement and the difficult incorporation
    of former German regions.`,`Black-and-white photograph of Polish soldiers marking
    the new Polish-German border beside the Oder in 1945.`),e(`nowa-huta`,`image`,`Nowa
    Huta’s monumental administrative centre`,`CENTRUM ADMINISTRACYJNE MITTAL STEEL
    POLAND ODDZIAŁ W KRAKOWIE, fot. M. Klag (MIK, 2005) (3531291059).jpg`,`The planned
    ensemble shows how architecture staged order and industrial confidence. Its later
    history—as heritage, workplace and opposition landscape—complicates the original
    socialist-realist message.`,`Photograph of the monumental socialist-realist administrative
    buildings at the Nowa Huta steelworks.`,`CC BY-SA 2.0`,`Maciej Klag / Małopolska
    Institute of Culture`)]},\"protest-solidarity\":{deepDive:{kind:`interpretation`,title:`How
    separate protests became a civic movement`,body:`The road to Solidarity was not
    a simple rise of one heroic organization. In March 1968 the state repressed students
    and used antisemitic “anti-Zionist” rhetoric to purge institutions and force emigration,
    devastating the remaining Jewish community. In December 1970 security forces shot
    workers protesting price rises on the Baltic coast. Later opposition groups learned
    to connect intellectual, worker, religious and legal networks rather than allowing
    the regime to isolate them.\n\nThe election of John Paul II and his 1979 visit
    expanded a language of dignity and public assembly outside party control. When
    strikes spread in 1980, activists demanded more than wages. Solidarity’s mass
    membership and broad networks made it a forum for civic, political and moral demands
    across society. Ten million members did not hold one ideology; the movement included
    workers, experts, Catholics, secular dissidents and local activists linked by
    insistence on independent organization.\n\nJaruzelski imposed martial law in December
    1981, interned activists and broke open organization. His claim that this was
    a “lesser evil” preventing Soviet intervention remains contested and requires
    evidence about Soviet intentions as well as the regime’s own interest in preserving
    power. Underground print, foreign broadcasting, church spaces and informal networks
    kept opposition alive, but repression changed lives and strategies.\n\nBy 1989,
    economic crisis, resilient opposition, changing Soviet policy and mutual uncertainty
    made compromise less risky than continued deadlock. Round Table negotiation was
    not a gift from rulers or a complete opposition victory. Each side accepted risk
    because it could not confidently impose its preferred future. This explains how
    a labour conflict became a civic movement and then one participant in negotiated
    systemic change.`},coverage:[{section:`How separate protests became a civic movement`,evidence:`antisemitic
    “anti-Zionist” rhetoric`},{section:`How separate protests became a civic movement`,evidence:`forum
    for civic, political and moral demands`},{section:`How separate protests became
    a civic movement`,evidence:`requires evidence about Soviet intentions`},{section:`How
    separate protests became a civic movement`,evidence:`economic crisis, resilient
    opposition, changing Soviet policy and mutual uncertainty`}],media:[e(`shipyard-gate`,`image`,`The
    Gdańsk Shipyard gate during the August strike`,`Solidarity August 1980 gate of
    Gdańsk Shipyard.jpg`,`Religious images, flowers, handwritten notices and crowds
    turned an industrial gate into a public forum. Look for the many social languages
    gathered around a workers’ strike.`,`Colour photograph of the Gdańsk Shipyard
    gate decorated with flowers, portraits and Solidarity strike notices in August
    1980.`),e(`shipyard-strike`,`image`,`Support gathered at Gate No. 2`,`Strajk sierpniowy
    w Stoczni Gdańskiej im. Lenina 04.jpg`,`Decorations at Gate No. 2 and Gdańsk residents
    supporting the strikers show how an industrial dispute became a public civic event.
    Compare this street-facing solidarity with the symbols concentrated on the gate
    itself.`,`Documentary photograph of decorated Gate No. 2 at the Gdańsk Lenin Shipyard,
    with city residents supporting the strikers in August 1980.`,`CC BY-SA 3.0 pl`,`Zygmunt
    Błażek / European Solidarity Centre`)]},\"third-republic\":{deepDive:{kind:`interpretation`,title:`Democratic
    success did not end historical argument`,body:`1989 is often called a negotiated
    revolution because institutions changed fundamentally through bargaining, elections
    and later reform rather than a single violent overthrow. The Round Table initially
    reserved power for the communist establishment, but opposition victories accelerated
    change beyond the settlement’s cautious design. A democratic constitution, competitive
    parties, local government and civic organizations developed over the following
    years rather than appearing fully formed on election night.\n\nRapid market reform
    stabilized inflation, expanded private enterprise and helped modernize the economy.
    It also imposed unemployment, insecurity and unequal regional costs. Long-run
    national growth did not make every factory closure or household loss imaginary.
    The geography of winners and losers shaped later distrust and political competition.\n\nPoland
    joined NATO in 1999 and the European Union in 2004. Membership expanded mobility,
    investment and shared regulation while generating real debates over sovereignty
    and standards. These institutions constrain governments because members choose
    common rules; conflict over those rules is part of membership, not proof that
    membership has no value. Russia’s full-scale invasion of Ukraine in 2022 reinforced
    security concerns, while refugee reception and military support made Poland a
    central regional actor.\n\nHistorical analogy can highlight risks, but different
    institutions, actors and conditions make exact repetition unlikely. Memories of
    partitions, occupation and Soviet dominance influence threat perception; they
    should prompt questions rather than replace present evidence. The politics of
    museums, monuments, judicial reform and minority belonging shows that democracy
    does not settle memory once and for all. The Third Republic’s strongest interpretation
    combines measurable transformation with open conflict over who benefited, which
    institutions deserve trust and what kind of European Poland should become.`},coverage:[{section:`Democratic
    success did not end historical argument`,evidence:`institutions changed fundamentally
    through bargaining, elections and later reform`},{section:`Democratic success
    did not end historical argument`,evidence:`unemployment, insecurity and unequal
    regional costs`},{section:`Democratic success did not end historical argument`,evidence:`mobility,
    investment and shared regulation`},{section:`Democratic success did not end historical
    argument`,evidence:`different institutions, actors and conditions make exact repetition
    unlikely`}],media:[e(`eu-enlargement-map`,`map`,`Poland in the 2004 European Union
    enlargement`,`EU25-2004 European Union map enlargement.svg`,`The enlargement map
    shows institutional geography rather than cultural destiny. Membership connected
    Poland to shared law and markets while leaving national democratic conflict active.`,`Map
    highlighting the ten states, including Poland, that joined the European Union
    in 2004.`,`CC BY-SA 2.5`,`Júlio Reis; derivative map by Kolja21`),e(`nato-poland-video`,`video`,`A
    NATO transfer-of-authority ceremony in Poland`,`NATO Multinational Battle Group
    Poland Holds Transfer of Authority Ceremony (951607).webm`,`US military footage
    from 29 January 2025 documents one visible expression of NATO integration. Read
    the transfer-of-authority ceremony as institutional self-presentation as well
    as evidence of multinational presence. This modern alliance ritual is not a replay
    of 1939 or the Cold War.`,`Public-domain US military video showing a NATO multinational
    battle group transfer-of-authority ceremony in Poland on 29 January 2025.`,`Public
    domain`,`US Army / DVIDS`,{mediaLabel:`Watch · institutional self-presentation`,textAlternative:`The
    video records a formal military transfer-of-authority ceremony in Poland. Soldiers
    stand in formation with national and NATO symbols while officers mark a change
    of command through speeches and ritual handover. The images demonstrate a multinational
    military presence; the ceremony also presents the alliance in the orderly, cohesive
    terms preferred by its own institution. No quiz answer depends on hearing the
    speeches, and the chapter uses the scene to examine NATO membership rather than
    to treat military public relations as neutral documentation.`})]}},n=(e,t,n)=>({kind:e,title:t,body:n}),r=0,i=(e,t,n,i)=>{let
    a=r++%t.length,o=(n-a+t.length)%t.length;return{prompt:e,options:t.slice(o).concat(t.slice(0,o)),answer:a,explanation:i}},a=[{id:`lands-before-poland`,startYear:500,endYear:1138,years:`c.
    500–1138`,title:`Before Poland and the Piast monarchy`,key:`State formation joined
    local societies to Latin Christian Europe.`,summary:`Slavic settlement, Piast
    expansion, Christianization and the first monarchy created a durable political
    centre, but not yet a modern nation-state.`,sections:[n(`context`,`Land, settlement
    and early power`,`The Vistula and Oder basins connected the Baltic coast with
    Central European trade routes. West Slavic communities farmed, traded amber, salt,
    furs and enslaved people, and organized around fortified settlements known as
    grody. Archaeology reveals regional networks rather than a single timeless Polish
    tribe. During the tenth century the Piast dynasty expanded from Greater Poland,
    absorbing or subordinating neighbouring communities and building a stronger military-fiscal
    court.`),n(`events`,`Baptism, crown and political survival`,`Mieszko I accepted
    Latin Christianity in 966, probably through his marriage to the Bohemian princess
    Dobrawa. The decision brought clergy, writing, diplomatic recognition and protection
    against claims that pagan lands could simply be conquered for conversion. Bolesław
    I Chrobry hosted Emperor Otto III at Gniezno in 1000 and was crowned king in 1025.
    Rebellions and dynastic crises followed; the monarchy was repeatedly rebuilt,
    showing both its fragility and its institutional value.`),n(`international`,`Between
    empire, papacy, Bohemia and Rus`,`Early Piast rulers operated in a competitive
    zone between the Holy Roman Empire, Bohemia, Kievan Rus and Baltic peoples. They
    alternated warfare, tribute and marriage diplomacy rather than pursuing permanent
    national alliances. The Congress of Gniezno linked the cult of the murdered missionary
    Adalbert with an independent church structure. Poland belonged to Latin Christianity,
    while nearby Rus followed Byzantine Christianity; that civilizational distinction
    mattered, but frontier societies remained connected by trade and family ties.`),n(`culture`,`Artifacts:
    Gniezno doors and the Gallus chronicle`,`The bronze Gniezno Doors, made in the
    twelfth century, narrate the life of Saint Adalbert like a visual storyboard and
    show how rulers used sacred art to legitimize power. The anonymous chronicler
    called Gallus Anonymus celebrated the Piast dynasty while offering moral lessons
    about good rule. Modern images of Mieszko and Bolesław—on banknotes, monuments
    and school walls—are later reconstructions, useful reminders that medieval statehood
    is remembered through objects and narratives created long after the events.`)],actors:[{name:`Mieszko
    I`,role:`Piast ruler who consolidated a regional state and adopted Latin Christianity,
    using marriage, warfare and diplomacy to secure his position.`},{name:`Bolesław
    I Chrobry`,role:`Mieszko’s son, an ambitious warrior and diplomat whose coronation
    in 1025 made royal status a recurring Polish political aspiration.`},{name:`Saint
    Adalbert (Wojciech)`,role:`Missionary killed in Prussia whose relics and cult
    strengthened Gniezno as a religious and political centre.`}],quiz:[i(`Why do historians
    treat the baptism of Mieszko I in 966 as politically important without calling
    it the birth of a modern nation?`,[`It integrated a Piast realm into Latin Christian
    institutions while identities and borders remained fluid.`,`It immediately extended
    literacy and equal political rights to every inhabitant.`,`It placed the Piast
    realm permanently under imperial military protection.`,`It fixed the realm’s borders
    in the form they retained through the Middle Ages.`],0,`Christianization brought
    clergy, writing and diplomatic legitimacy to a developing Piast polity. Medieval
    dynastic rule, however, was not the same as modern national sovereignty or citizenship.`),i(`What
    does the Congress of Gniezno in 1000 best illustrate about Bolesław Chrobry’s
    position?`,[`He relied on military conquest and avoided ecclesiastical diplomacy.`,`He
    combined the cult of Saint Adalbert with diplomacy toward Emperor Otto III and
    an independent church structure.`,`He accepted permanent political subordination
    to Emperor Otto III.`,`He replaced dynastic succession with regular election by
    the nobility.`],1,`The meeting connected sacred prestige, imperial diplomacy and
    ecclesiastical organization. It elevated Bolesław without turning Poland into
    a modern independent state in the present-day sense.`),i(`Which statement most
    accurately describes the population of the early Piast realm?`,[`A culturally
    uniform nation with fixed borders.`,`A network of communities gradually brought
    under a dynasty through forts, tribute, warfare and negotiation.`,`A unified tribal
    federation already governed from Kraków before the Piasts.`,`A society cut off
    from Baltic and Central European exchange.`],1,`Archaeology points to diverse
    regional communities and active exchange. Piast state formation was an uneven
    process of consolidation, not the expression of an already unified modern nation.`),i(`Why
    should chronicles such as Gallus Anonymus be read critically?`,[`They should be
    treated as literal boundary surveys rather than evidence about elite memory and
    political ambition.`,`They were written to praise rulers and teach political morality,
    so evidence and literary purpose must be considered together.`,`They were neutral
    administrative records produced without dynastic patronage.`,`They report only
    archaeological measurements.`],1,`Medieval chronicles are indispensable but purposeful
    narratives. Their authors selected and shaped events to legitimize dynasties and
    present models of good and bad rulership.`)]},{id:`fragmentation-reunification`,startYear:1138,endYear:1385,years:`1138–1385`,title:`Fragmentation,
    towns and a reunited kingdom`,key:`Political division coincided with economic
    and institutional growth.`,summary:`Competing Piast duchies, German-law towns,
    Mongol invasion and reunification under late Piast kings reshaped medieval Poland.`,sections:[n(`context`,`The
    seniorate and regional duchies`,`Bolesław III Krzywousty’s 1138 succession arrangement
    divided rule among his sons while reserving senior authority in Kraków. Instead
    of preventing conflict, it encouraged rival Piast duchies in Silesia, Mazovia,
    Greater Poland and elsewhere. Political fragmentation did not mean social collapse.
    Dukes founded towns, attracted settlers, endowed monasteries and competed for
    revenue. Regional differences deepened, and some Piast branches became closely
    tied to Bohemia and the German-speaking world.`),n(`events`,`Mongol shock, urban
    growth and reunification`,`Mongol forces defeated a regional army at Legnica in
    1241 and devastated parts of southern Poland, though they did not establish permanent
    rule. During the same centuries, towns received charters based on Magdeburg law,
    giving burghers defined courts and obligations. German-speaking migration was
    significant but mixed with local populations and other groups. Władysław Łokietek
    reunited a core kingdom and was crowned in 1320; Casimir III then strengthened
    law, castles, administration and Kraków University.`),n(`international`,`Bohemia,
    Hungary, the Teutonic Order and Lithuania`,`Polish rulers faced a strong Bohemian
    crown, negotiated with Hungary and contested Pomerelia with the Teutonic Order,
    a crusading military order that built its own Baltic state. To the east, Lithuania
    expanded over many Rus lands and remained a major non-Christian power until the
    late fourteenth century. The extinction of the main Piast royal line in 1370 led
    to Angevin rule from Hungary, illustrating how dynastic succession linked kingdoms
    across Central Europe.`),n(`culture`,`Artifacts: Kraków, Kazimierz and the university`,`Casimir
    III is remembered by the saying that he “found Poland wooden and left it stone,”
    an exaggeration that captures his reputation for construction and state-building.
    He founded Kazimierz beside Kraków and issued protections for Jewish communities,
    while Jewish migration created centres of learning and commerce. Kraków University,
    founded in 1364 and later renewed by Jadwiga, became a durable institution. Gothic
    churches, town squares and castle networks still make this period visible in the
    contemporary landscape.`)],actors:[{name:`Casimir III the Great`,role:`The last
    main-line Piast king, remembered for legal, administrative, educational and defensive
    consolidation rather than spectacular conquest.`},{name:`Władysław Łokietek`,role:`Piast
    duke who rebuilt a core Polish kingdom after fragmentation and restored royal
    coronation in Kraków in 1320.`},{name:`Urban settlers and Jewish communities`,role:`Diverse
    newcomers and local inhabitants whose law, trade, crafts and scholarship transformed
    medieval towns and royal revenues.`}],quiz:[i(`How can the era after 1138 be described
    without reducing it to simple decline?`,[`Political fragmentation accompanied
    urban, legal and economic development in competing duchies.`,`Fragmentation halted
    most urban growth because competing dukes could not issue charters or collect
    tolls.`,`The senior prince retained enough authority to prevent durable regional
    duchies from emerging.`,`Fragmentation preserved a strong senior monarchy while
    granting only limited administrative autonomy to regional dukes.`],0,`Rival Piast
    rulers weakened unity but also competed to found towns, monasteries and markets.
    Political division and institutional development occurred at the same time.`),i(`What
    was one major effect of town charters based on Magdeburg law?`,[`They gave towns
    defined courts, offices and obligations within a feudal order.`,`They made chartered
    towns politically sovereign from surrounding dukes and lords.`,`They replaced
    local custom with one ethnically German administration in every chartered town.`,`They
    subjected chartered towns directly to royal courts rather than separate municipal
    law.`],0,`Charters organized urban self-government and legal relations. They travelled
    across linguistic boundaries and did not make every town ethnically or politically
    identical.`),i(`Why was the Teutonic Order a lasting geopolitical challenge?`,[`It
    formed a territorial crusading state on the Baltic and contested access to Pomerelia.`,`It
    depended on Polish kings for territory and never developed independent fiscal
    or military power.`,`Its main territorial power lay south of the Carpathians rather
    than on the Baltic.`,`It remained only a missionary body and never built a territorial
    state.`],0,`The Order combined religious mission with state-building and military
    power. Conflict over Baltic territories became central to Polish and Lithuanian
    diplomacy.`),i(`What makes Casimir III’s reputation as a state-builder plausible?`,[`His
    reign combined legal codification, castles, royal administration and a university
    foundation.`,`His reputation rests mainly on ceremonial kingship rather than legal
    and administrative consolidation.`,`His reputation rests chiefly on territorial
    conquest rather than law, castles or administration.`,`He ruled after the partitions
    of the eighteenth century.`],0,`The familiar proverb about wood and stone is not
    literal, but it reflects a reign associated with durable administrative, legal,
    educational and architectural projects.`)]},{id:`jagiellonian-union`,startYear:1385,endYear:1569,years:`1385–1569`,title:`The
    Jagiellonian union and a Baltic–Black Sea world`,key:`Dynastic union created a
    vast, plural political space.`,summary:`The Polish-Lithuanian connection, conflict
    with the Teutonic Order, Renaissance culture and noble power produced a major
    European monarchy.`,sections:[n(`context`,`Why Poland and Lithuania joined`,`The
    1385 agreement at Krewo linked Jadwiga—crowned rex, or king, of Poland—with Jogaila,
    grand duke of Lithuania, who was baptized as Władysław Jagiełło. Poland gained
    a powerful partner against the Teutonic Order; Lithuania gained a route to Christian
    recognition while resisting pressure from the Order and Moscow. The union was
    not a Polish annexation of a single nation. Lithuania retained institutions and
    ruled large Orthodox Rus territories populated by ancestors of modern Belarusians
    and Ukrainians.`),n(`events`,`Grunwald, privileges and parliamentary politics`,`Polish-Lithuanian
    forces defeated the Teutonic Order at Grunwald/Tannenberg in 1410, although the
    subsequent peace did not destroy the Order. Jagiellonian rulers also governed
    Bohemia and Hungary for a time. At home, kings granted privileges to the szlachta,
    the legally defined nobility, in exchange for taxation and military cooperation.
    The Nihil Novi act of 1505 strengthened the principle that major legislation required
    agreement of the Sejm, creating a broad noble political nation while excluding
    most inhabitants.`),n(`international`,`Ottomans, Habsburgs, Muscovy and the Baltic`,`The
    Jagiellonian sphere sat between the rising Habsburg and Ottoman empires, Muscovy’s
    expansion, Baltic commerce and the steppe frontier. The 1525 Prussian Homage secularized
    the Teutonic state in Prussia as a hereditary duchy held as a Polish fief—an arrangement
    with major later consequences when Brandenburg and Prussia united. Muscovite-Lithuanian
    wars shifted eastern borders, while Crimean Tatar raids and Ottoman power shaped
    the southern frontier.`),n(`culture`,`Artifacts: Wawel Renaissance and Copernicus`,`Royal
    patronage transformed Wawel Castle into a Renaissance residence, and Queen Bona
    Sforza brought Italian court connections as well as a formidable political reputation.
    Nicolaus Copernicus, a canon in Royal Prussia, published a heliocentric model
    that belonged to a European republic of letters rather than a narrow national
    story. The Jagiellonian University, printed books and multilingual cities such
    as Kraków, Lviv and Vilnius show a world where Latin, Polish, Ruthenian, German,
    Yiddish and other languages overlapped.`)],actors:[{name:`Jadwiga and Władysław
    Jagiełło`,role:`Royal partners whose marriage and conversion created a durable
    Polish-Lithuanian dynastic union with distinct institutions and shared strategic
    interests.`},{name:`Nicolaus Copernicus`,role:`Astronomer and church administrator
    from Royal Prussia whose heliocentric work connected the region to Europe’s scientific
    transformation.`},{name:`The szlachta`,role:`A numerous and internally unequal
    nobility that won political privileges and built parliamentary institutions while
    keeping peasants and townspeople outside its full citizenship.`}],quiz:[i(`Which
    interpretation best explains the Polish-Lithuanian union begun in 1385?`,[`A negotiated
    dynastic alliance serving different Polish and Lithuanian interests, not an instant
    unitary nation-state.`,`A simple Polish conquest that abolished Lithuania immediately.`,`A
    papal settlement imposed on both realms without dynastic or military motives.`,`A
    cultural alliance centred on Kraków University rather than dynastic and military
    interests.`],0,`The partners had overlapping but distinct interests. Lithuania
    retained laws, offices and territory, while the relationship evolved through negotiation
    and conflict over generations.`),i(`Why is the 1505 Nihil Novi act important but
    not equivalent to modern democracy?`,[`It strengthened parliamentary consent among
    nobles while most inhabitants lacked political rights.`,`It extended Sejm representation
    to peasants while preserving noble privileges.`,`It transferred lawmaking entirely
    from the king to urban guild representatives.`,`It gave royal towns the same voting
    rights as noble envoys in the Sejm.`],0,`Nihil Novi constrained unilateral royal
    legislation and empowered the Sejm, but the political nation was the nobility,
    not the entire population.`),i(`What long-term issue was embedded in the Prussian
    Homage of 1525?`,[`A secular Prussian duchy became a Polish fief but later joined
    Brandenburg and grew into a powerful rival.`,`The Prussian duchy passed directly
    to the Habsburg monarchy.`,`Lithuania became a Catholic kingdom directly governed
    from Kraków.`,`The victory placed the Order under immediate Polish sovereignty
    and dissolved its political institutions.`],0,`The settlement appeared to secure
    Polish overlordship, yet dynastic developments helped create Brandenburg-Prussia,
    one of the states that later partitioned Poland.`),i(`Why is Copernicus a useful
    figure for understanding the period’s identity?`,[`His life crossed local, Prussian,
    Polish, Latin-Christian and European scholarly worlds that do not map neatly onto
    modern nationality.`,`He wrote exclusively as a twentieth-century Polish nationalist.`,`He
    worked chiefly at the royal court in Kraków rather than in Royal Prussia.`,`He
    had no connection to institutions in Royal Prussia.`],0,`Early modern identities
    were layered. Copernicus can be situated in several political, linguistic and
    intellectual contexts without forcing him into one modern category.`)]},{id:`commonwealth`,startYear:1569,endYear:1648,years:`1569–1648`,title:`The
    Commonwealth: liberty, diversity and inequality`,key:`A federated republic of
    nobles combined pluralism with deep social hierarchy.`,summary:`The Union of Lublin,
    elected kings, religious diversity, eastward colonization and serfdom defined
    the Commonwealth’s “golden age” and its contradictions.`,sections:[n(`context`,`A
    republic under an elected king`,`The Union of Lublin in 1569 created the Polish-Lithuanian
    Commonwealth, with a shared elected monarch and parliament but separate armies,
    treasuries and offices. The szlachta celebrated “Golden Liberty”: legal equality
    within their estate, free royal elections and resistance to absolute monarchy.
    Noble citizens could debate policy across a huge territory. Yet burghers had limited
    influence, peasants faced expanding labour obligations, and political equality
    among nobles coexisted with enormous differences in wealth and power.`),n(`society`,`Faiths,
    languages, estates and serfdom`,`The Commonwealth included Catholics, Orthodox
    Christians, Protestants, Jews, Muslims and Armenians, as well as Polish, Lithuanian,
    Ruthenian, German, Yiddish and Tatar speakers. The Warsaw Confederation of 1573
    offered an important guarantee of religious peace among nobles, although toleration
    was incomplete and later narrowed. Grain exports through Gdańsk enriched landowners
    and tied the economy to western markets, while folwark estates increased serfdom
    and labour burdens on peasants.`),n(`international`,`Elections, dynastic wars
    and frontier politics`,`Foreign dynasties competed in royal elections. Under the
    Vasa kings, conflicts with Sweden, Muscovy and the Ottoman sphere intertwined
    with ambitions around the Baltic and succession. The Commonwealth briefly occupied
    Moscow during Russia’s Time of Troubles but could not turn military opportunity
    into stable domination. On the southeastern border, Cossack communities defended
    and raided the steppe frontier while seeking status and autonomy, creating tensions
    with magnates and the state.`),n(`culture`,`Artifacts: Sarmatism, printing and
    the synagogue world`,`Noble culture developed the idea of Sarmatism, imagining
    the szlachta as descendants of ancient warriors. Distinctive kontusz clothing
    and coffin portraits projected honour and lineage, while political speeches celebrated
    liberty. Jewish self-government and yeshivas made the Commonwealth a major centre
    of Jewish life. Baroque churches, Orthodox brotherhoods, mosques of the Lipka
    Tatars and printed polemics reveal both plural creativity and competition. Contemporary
    historical festivals often revive noble costume but can obscure peasant labour
    and non-noble lives.`)],actors:[{name:`Anna Jagiellon and elected monarchs`,role:`Figures
    through whom dynastic continuity gave way to a system in which nobles elected
    kings and imposed contractual conditions on royal power.`},{name:`Jan Zamoyski`,role:`Chancellor,
    military commander and magnate who embodied both republican rhetoric and the extraordinary
    private power of elite noble families.`},{name:`Peasants, burghers and religious
    minorities`,role:`The majority whose labour, trade and institutions sustained
    the Commonwealth but whose rights differed sharply from noble political liberty.`}],quiz:[i(`What
    was the central contradiction of “Golden Liberty” in the Commonwealth?`,[`It protected
    extensive noble participation while most peasants, townspeople and minorities
    lacked equal political power.`,`It was a system of universal voting with no social
    hierarchy.`,`It restricted private estates to office-holding nobles while excluding
    most of the szlachta.`,`It shifted executive and legislative control from nobles
    to a hereditary monarch.`],0,`The Commonwealth offered unusual constitutional
    participation to a large noble estate, but this freedom rested within a hierarchical
    society and an economy increasingly dependent on serf labour.`),i(`How should
    the Warsaw Confederation of 1573 be understood?`,[`As an important elite guarantee
    of religious peace that did not produce complete modern equality or permanent
    tolerance.`,`As a permanent guarantee of equal access to public office for every
    religious group.`,`As a ban on all Protestant and Orthodox worship.`,`As a royal
    decree imposing one official confession throughout the Commonwealth.`],0,`The
    Confederation was significant in a Europe of religious warfare, but its scope,
    enforcement and beneficiaries were limited by estate and changing political conditions.`),i(`Why
    did Gdańsk and Baltic grain exports matter for social relations?`,[`Western demand
    enriched estate owners and encouraged folwark production and heavier peasant labour
    duties.`,`They allowed grain exports to expand without increasing labour obligations
    on estate peasants.`,`They ended connections with Amsterdam and other western
    ports.`,`They shifted most estate land from nobles to royal towns and merchant
    corporations.`],0,`The export economy connected the Commonwealth to western markets.
    Its benefits were uneven and helped entrench a manorial system based on serf labour.`),i(`What
    did Cossack tensions reveal before 1648?`,[`Frontier military communities sought
    recognition and autonomy while magnate expansion and state policy constrained
    them.`,`Its eastern border was stable and insulated from steppe warfare and Muscovite
    expansion.`,`Registered Cossacks already possessed secure noble status and representation
    in Commonwealth institutions.`,`All Cossacks already held equal seats in the Polish
    Senate.`],0,`Cossacks were vital frontier actors but their political and social
    status remained contested. Those tensions contributed to the great uprising beginning
    in 1648.`)]},{id:`crisis-reform`,startYear:1648,endYear:1795,years:`1648–1795`,title:`Wars,
    political paralysis and the reform struggle`,key:`Seventeenth-century devastation
    and eighteenth-century dependency produced reform—too late to prevent partition.`,summary:`Cossack
    revolt, Swedish invasion, Ottoman wars, magnate politics, Enlightenment reform
    and neighbouring empires transformed and finally destroyed the Commonwealth.`,sections:[n(`events`,`The
    uprising, Deluge and demographic disaster`,`Bohdan Khmelnytsky’s 1648 Cossack
    uprising, supported by Crimean Tatars and fuelled by social, religious and political
    grievances, shattered Commonwealth authority in Ukraine. It became a civil, social
    and confessional war involving Cossacks, Ruthenian peasants and clergy, Commonwealth
    armies and townspeople; Polish nobles and Jewish communities suffered massacres,
    while reprisals and campaigning harmed wider civilian populations. War with Muscovy
    followed. The Swedish invasion of 1655–1660, remembered as the Deluge, brought
    occupation, looting and destruction. Later wars with the Ottoman Empire and internal
    conflicts compounded demographic and economic loss, although Jan III Sobieski’s
    victory at Vienna in 1683 became an enduring heroic image.`),n(`context`,`Liberum
    veto and the magnate republic`,`The Sejm’s unanimity principle and liberum veto
    were intended to protect political consent, but repeated disruption made taxation,
    military reform and administration difficult. Powerful magnate networks used clients
    and private resources, while foreign powers learned to influence elections and
    parliamentary sessions. The system did not collapse because Poles were uniquely
    incapable of government; institutions designed for negotiated consensus faced
    social inequality, elite obstruction and neighbours developing larger standing
    armies and centralized fiscal states.`),n(`international`,`Russia, Prussia and
    Austria reshape the region`,`By the eighteenth century Russia treated the Commonwealth
    as a protectorate, while Prussia and Austria pursued territorial interests. The
    Great Northern War devastated Polish lands even though the Commonwealth was not
    a main belligerent. The First Partition in 1772 removed territory but also energized
    reformers. The Four-Year Sejm and Constitution of 3 May 1791 attempted a stronger
    constitutional monarchy, broader urban rights and more effective government. Russia
    backed the Targowica Confederation; defeat led to further partitions and Kościuszko’s
    1794 uprising.`),n(`culture`,`Artifacts: Constitution, Enlightenment theatre and
    contested memory`,`The 3 May Constitution is celebrated as a pioneering modern
    constitution, but it was also a pragmatic reform of an existing estate society,
    not universal democracy. Stanisław August Poniatowski sponsored Thursday Dinners,
    art, education and the National Theatre while remaining politically dependent
    on Catherine II. Jan Matejko’s later paintings turned constitutional and military
    scenes into a national visual canon. Today 3 May is a public holiday, and debates
    continue over whether the Commonwealth fell mainly through internal dysfunction
    or aggressive neighbours—the strongest explanations combine both.`)],actors:[{name:`Bohdan
    Khmelnytsky`,role:`Cossack leader whose uprising joined demands for status and
    Orthodox rights with social violence and a geopolitical turn toward Muscovy.`},{name:`Stanisław
    August Poniatowski`,role:`Last king, Enlightenment patron and reform supporter
    whose dependence on Russia and choices during partition remain contested.`},{name:`Tadeusz
    Kościuszko`,role:`Veteran of the American Revolution who led the 1794 uprising
    and tried to connect national resistance with limited relief for peasants.`}],quiz:[i(`Why
    is the Khmelnytsky uprising difficult to fit into a single national story?`,[`It
    combined Cossack autonomy, Orthodox grievances, social conflict, great-power politics
    and violence against several civilian groups.`,`It was principally a dynastic
    succession dispute without a social or confessional dimension.`,`It was confined
    to a short military revolt around Warsaw.`,`It was mainly a Swedish-Danish dynastic
    conflict with little eastern or confessional dimension.`],0,`The uprising can
    be remembered as liberation, civil war, social revolt and catastrophe depending
    on community and perspective. A responsible account keeps those dimensions together.`),i(`What
    is the most balanced explanation of the Commonwealth’s eighteenth-century weakness?`,[`Institutional
    obstruction and social inequality interacted with sustained intervention by stronger
    neighbouring states.`,`One defective parliamentary rule alone explains everything.`,`Foreign
    aggression alone mattered and domestic institutions were irrelevant.`,`The population
    lost interest in all political reform.`],0,`Internal and external causes reinforced
    each other. Weak fiscal and military capacity invited intervention, while intervention
    protected arrangements that blocked effective reform.`),i(`What did the Constitution
    of 3 May 1791 attempt to do?`,[`Create more effective constitutional government,
    limit some noble abuses and strengthen urban rights without establishing universal
    democracy.`,`Restore the pre-1772 political system without changing royal or urban
    powers.`,`Replace the Commonwealth with a centralized republic modelled directly
    on revolutionary France.`,`Abolish every social estate and grant immediate equal
    suffrage.`],0,`The constitution was ambitious and innovative but still rooted
    in eighteenth-century monarchy and social hierarchy. Its historical importance
    should not be confused with full modern democracy.`),i(`Why did the partitions
    occur despite the reform movement?`,[`Neighbouring empires used military power
    and allied with opponents of reform before the new system could consolidate.`,`The
    constitution was imposed by Russia and therefore could not mobilize any domestic
    support.`,`Kościuszko sought Prussian military protection while accepting the
    existing partition boundaries.`,`Neighbouring monarchies relied mainly on temporary
    levies, reducing strategic pressure on the Commonwealth.`],0,`Reform threatened
    the influence of Russia and some domestic elites. Military defeat, not a peaceful
    legal expiration, enabled the second and third partitions.`)]},{id:`partitions-napoleon`,startYear:1772,endYear:1815,years:`1772–1815`,title:`Partitions,
    revolution and the Napoleonic experiment`,key:`Statehood vanished, but political
    projects multiplied across empires and exile.`,summary:`The partitioning empires
    absorbed Polish lands while reformers, soldiers and peasants confronted revolution,
    Napoleon and competing meanings of national freedom.`,sections:[n(`context`,`Three
    empires, three administrative worlds`,`Russia, Prussia and Austria did not simply
    erase a map; they integrated millions of inhabitants into different legal, fiscal,
    military and educational systems. Former Commonwealth elites tried accommodation,
    conspiracy or cultural work. Jewish communities, peasants and townspeople experienced
    the transition differently from nobles. The concept of a Polish nation increasingly
    shifted from the institutions of the Commonwealth toward language, memory and
    political aspiration, but it remained contested whether the nation meant nobles
    alone or a broader society.`),n(`events`,`Legions and the Duchy of Warsaw`,`Polish
    Legions fought alongside revolutionary and Napoleonic France, inspiring the song
    that became today’s national anthem: “Poland Is Not Yet Lost.” Napoleon created
    the Duchy of Warsaw in 1807 from Prussian partition lands and expanded it in 1809.
    Its constitution introduced legal equality and the Napoleonic Code, while formally
    ending personal serfdom; economic dependence and land relations still limited
    peasant freedom. Polish troops followed Napoleon to disastrous campaigns, including
    Spain and Russia.`),n(`international`,`Revolutionary Europe and the Congress of
    Vienna`,`The French Revolution and Napoleonic wars transformed ideas of citizenship,
    law and mass armies across Europe. Polish hopes depended on a French emperor pursuing
    his own strategic goals, not a promise of unconditional restoration. Napoleon’s
    defeat allowed Russia, Prussia and Austria to redesign Europe at Vienna in 1815.
    A reduced Kingdom of Poland was linked to the Russian tsar, Kraków became a free
    city, and Prussia and Austria retained large Polish-speaking populations.`),n(`culture`,`Artifact:
    the anthem and the memory of lost statehood`,`Józef Wybicki’s 1797 legion song,
    later the national anthem, expressed a striking idea: political community could
    survive even when the state did not. The opening line is often mistranslated as
    “Poland is not yet lost”; more literally, Poland “has not yet perished” as long
    as people live and act. Napoleon became a romantic symbol in Polish culture, including
    in Adam Mickiewicz’s later epic Pan Tadeusz, but the human cost of fighting for
    imperial France complicates that legend.`)],actors:[{name:`Józef Wybicki and the
    Polish Legions`,role:`Political activists and soldiers who linked national survival
    to armed service in revolutionary Europe and produced the future anthem.`},{name:`Napoleon
    Bonaparte`,role:`French emperor who created a limited Polish state for strategic
    purposes, enabling reform while demanding troops and resources.`},{name:`Peasants
    under reform`,role:`The majority whose formal legal status changed under the Napoleonic
    Code but whose access to land and practical autonomy remained constrained.`}],quiz:[i(`What
    made the partitions transformative beyond the loss of sovereignty?`,[`People entered
    three different imperial systems, reshaping law, education, economy and political
    identity.`,`Imperial rule changed sovereignty but left legal, educational and
    economic institutions largely uniform.`,`The same administration continued unchanged
    everywhere.`,`Imperial authorities generally preserved Polish-language institutions
    while restricting only political sovereignty.`],0,`The three empires governed
    differently. Those divergent experiences later influenced regional development
    and strategies of resistance or accommodation.`),i(`How should the Duchy of Warsaw
    be assessed?`,[`As a reforming but dependent Napoleonic state that revived institutions
    without full sovereign freedom.`,`As the complete restoration of the 1772 Commonwealth.`,`As
    a Russian-sponsored successor to Congress Poland established after Napoleon’s
    defeat.`,`As a restoration of pre-partition noble institutions under French military
    protection.`],0,`The Duchy introduced significant legal change and Polish administration,
    but its borders, diplomacy, military burden and survival depended on Napoleon.`),i(`What
    did the Napoleonic end of personal serfdom fail to guarantee?`,[`That peasants
    would receive land and full economic independence.`,`That feudal landholding would
    return without legal equality or peasant obligations.`,`That French institutions
    would coexist with hereditary privilege throughout public life.`,`That military
    conscription would apply only to noble volunteers and leave rural society untouched.`],0,`Legal
    personal freedom did not automatically redistribute land or remove material dependence.
    Social emancipation was a longer and uneven process.`),i(`Why is the national
    anthem a key cultural artifact of the partition era?`,[`It defines national persistence
    through collective action even without an existing state.`,`It treats partition
    as a stable modernization accepted across Polish political society.`,`It was composed
    for the medieval battle of Grunwald.`,`It rejects every connection to European
    politics.`],0,`The anthem captures a modernizing idea of nationhood: political
    identity and hope could outlive institutions and territorial sovereignty.`)]},{id:`long-nineteenth-century`,startYear:1815,endYear:1914,years:`1815–1914`,title:`Uprisings,
    organic work and modern society`,key:`National resistance shifted between insurrection,
    culture, economic development and mass politics.`,summary:`The November and January
    Uprisings, imperial repression, emancipation, industrialization and new political
    movements turned a noble cause into competing mass national projects.`,sections:[n(`context`,`Insurrection
    and repression`,`The November Uprising of 1830–1831 began among officer cadets
    in Warsaw and became a war against Russia, but divided leadership and military
    defeat ended the constitutional autonomy of Congress Poland. The January Uprising
    of 1863–1864 relied on guerrilla warfare and an underground state; Russia responded
    with executions, exile and intensified integration. Romantic memory honoured sacrifice,
    yet critics asked whether repeated uprisings wasted lives without preparing society,
    a debate that still shapes Polish political language.`),n(`society`,`Emancipation,
    cities and “organic work”`,`The partitioning states abolished serfdom at different
    times, and the 1863 uprising pushed Russia to emancipate peasants in Congress
    Poland on terms designed to weaken noble leadership. Łódź became a textile metropolis
    with Polish, Jewish, German and Russian inhabitants; Upper Silesia developed heavy
    industry; Galicia remained poor but gained political autonomy under Austria. Positivists
    promoted education, cooperatives, science and economic organization—“organic work”—as
    a way to strengthen society without immediate insurrection.`),n(`international`,`Nationalism
    in an age of empires`,`Polish activists belonged to a Europe of liberal revolution,
    imperial rivalry and new national movements. Exiles in the Great Emigration debated
    aristocratic, democratic and socialist futures from Paris and elsewhere. Prussian
    Germanization, Russian Russification and Austrian autonomy produced distinct strategies.
    Modern Lithuanian, Ukrainian, Belarusian and Jewish movements also grew on former
    Commonwealth lands, challenging the assumption that restoration of a historical
    Poland would automatically satisfy all peoples who lived there.`),n(`culture`,`Artifacts:
    Mickiewicz, Chopin, Matejko and industrial fiction`,`Adam Mickiewicz’s poetry
    turned exile and failed uprising into a powerful national mythology; Frédéric
    Chopin’s music connected cosmopolitan forms with Polish dances; Jan Matejko painted
    monumental historical scenes that many people now “remember” as if they were photographs.
    Later, Bolesław Prus and Eliza Orzeszkowa explored urban capitalism, social reform
    and Jewish-Polish relations. Władysław Reymont’s The Promised Land portrays industrial
    Łódź as creative, brutal and multinational—far from a purely rural national story.`)],actors:[{name:`Adam
    Mickiewicz`,role:`Exiled Romantic poet whose works made suffering, mission and
    cultural survival central to nineteenth-century Polish identity.`},{name:`Aleksander
    Wielopolski`,role:`Conservative reformer who sought limited modernization under
    Russian rule; his conscription policy helped trigger the January Uprising.`},{name:`Industrial
    workers and peasants`,role:`Newly politicized social groups whose economic interests
    helped generate socialist, peasant, nationalist and religious movements beyond
    noble patriotism.`}],quiz:[i(`What strategic debate followed the failed nineteenth-century
    uprisings?`,[`Whether national goals required repeated armed revolt or long-term
    social, educational and economic organization.`,`Whether diplomatic reliance on
    France could substitute for organization inside the partitioned lands.`,`Whether
    romantic commemoration of medieval monarchy could substitute for modern political
    organization.`,`Whether industrialization alone could integrate peasants into
    national politics without education or reform.`],0,`Romantic insurrection and
    positivist “organic work” became competing but sometimes overlapping traditions
    of political action.`),i(`How did peasant emancipation affect national politics?`,[`It
    weakened noble control and made the inclusion of peasants essential to any mass
    national movement.`,`It prioritized noble estate autonomy over industrial labour
    and political reform.`,`It had no effect because peasants were already equal voters.`,`It
    restored noble control by reversing emancipation throughout the partitioning empires.`],0,`Emancipation
    changed legal and economic relations unevenly. Political movements increasingly
    had to address land, education, religion and peasant interests.`),i(`Why did competing
    Lithuanian, Ukrainian and Jewish movements complicate restoration plans?`,[`Former
    Commonwealth lands contained peoples developing distinct modern identities and
    political claims.`,`They all supported identical borders and institutions.`,`They
    circulated mainly among émigrés and had little influence within the partitioned
    lands.`,`They rejected literacy and political organization.`],0,`The Commonwealth’s
    historical pluralism did not translate automatically into agreement on a new state.
    Modern national projects often claimed the same territories differently.`),i(`What
    can cultural works reveal that a list of uprisings cannot?`,[`How exile, industrialization,
    class, gender and memory shaped lived experience and national imagination.`,`Only
    the exact number of soldiers in each battle.`,`That industrialization altered
    cities but left class and national identities largely unchanged.`,`That all writers
    held the same political views.`],0,`Literature, music and painting helped create
    emotional communities while also exposing tensions that political chronologies
    can miss.`)]},{id:`war-and-independence`,startYear:1914,endYear:1921,years:`1914–1921`,title:`World
    war, revolution and recovered independence`,key:`Imperial collapse opened a state-building
    opportunity that required diplomacy, mobilization and war.`,summary:`Poles fought
    in opposing imperial armies, rival leaders pursued different strategies, and the
    new republic struggled to define borders and citizenship.`,sections:[n(`context`,`A
    war fought through Polish lands`,`In 1914 Polish territories belonged to Russia,
    Germany and Austria-Hungary, so Poles were conscripted into opposing armies. Occupation,
    requisition, refugees and destruction transformed daily life. Józef Piłsudski
    formed Legions aligned initially with Austria-Hungary, hoping war among the partitioning
    powers would create an opening. Roman Dmowski pursued the Entente and diplomatic
    recognition. Their rivalry represented different visions of nation and strategy
    rather than a simple division between patriot and traitor.`),n(`events`,`November
    1918 and the struggle for borders`,`Imperial collapse allowed Polish institutions
    to take power in late 1918, with Piłsudski becoming chief of state. Independence
    was a process, not a single ceremonial moment. Fighting occurred over Greater
    Poland, eastern Galicia, Silesia, Vilnius and the former imperial borderlands.
    In October 1920 General Lucjan Żeligowski, acting with Piłsudski’s covert approval,
    seized Vilnius/Wilno from Lithuanian control; its later incorporation into Poland
    ruptured Polish-Lithuanian relations and remains central to Lithuanian memory.
    The Polish-Soviet War culminated in the 1920 Battle of Warsaw and ended with the
    Treaty of Riga in 1921, which divided Belarusian and Ukrainian lands between Poland
    and Soviet republics.`),n(`international`,`Versailles, self-determination and
    rival maps`,`US President Woodrow Wilson endorsed an independent Poland with access
    to the sea, but “self-determination” was difficult in ethnically mixed regions.
    The Versailles system created new states while leaving large minorities on all
    sides of borders. Piłsudski imagined a federation of eastern peoples that could
    resist Russia; Dmowski preferred a more centralized nation-state with an assimilable
    non-Polish population. Neither vision fully matched local preferences, especially
    among Ukrainians and Lithuanians.`),n(`culture`,`Artifacts: independence symbols
    and the “Miracle on the Vistula”`,`The white eagle, anthem and 11 November holiday
    condensed a complicated process into shared symbols. The phrase “Miracle on the
    Vistula” framed the Battle of Warsaw as providential rescue, while military historians
    emphasize intelligence, logistics, command and Soviet errors. Independence posters
    depict soldiers, mothers and allegorical Poland; they reveal how gender and sacrifice
    were mobilized. Contemporary annual marches on 11 November show that the meaning
    of patriotism and the ownership of national symbols remain politically contested.`)],actors:[{name:`Józef
    Piłsudski`,role:`Legion leader and chief of state who favoured a multiethnic federal
    strategy in the east and built authority through military and revolutionary networks.`},{name:`Roman
    Dmowski`,role:`National Democratic leader and diplomat at Versailles who promoted
    an ethnically more homogeneous, centralized Polish nation-state.`},{name:`Ignacy
    Jan Paderewski`,role:`World-famous pianist and statesman whose international prestige
    helped advocate Polish independence and bridge diplomacy with domestic politics.`}],quiz:[i(`Why
    did Polish soldiers fight on opposing sides during the First World War?`,[`Polish
    lands were divided among empires whose armies fought one another.`,`Rival Polish
    governments formally declared war on one another at the beginning of the conflict.`,`The
    partitioning empires permitted autonomous Polish national armies but assigned
    them to opposing fronts.`,`Voluntary legion service, rather than imperial conscription,
    accounted for nearly all Polish soldiers.`],0,`The partitions placed inhabitants
    under Russian, German and Austro-Hungarian rule. Wartime loyalties and strategies
    were shaped by those imperial structures.`),i(`What is the best way to understand
    11 November 1918?`,[`As a useful symbol within a longer process of institutional
    transfer, diplomacy and border wars.`,`As the date every border was peacefully
    settled.`,`As the moment the Versailles settlement fixed all of Poland’s borders.`,`As
    the date the Treaty of Riga established the eastern frontier.`],0,`The date marks
    Piłsudski’s assumption of authority and the wider collapse of empires, but state
    formation continued through political negotiation and armed conflict.`),i(`How
    did Piłsudski and Dmowski differ most clearly?`,[`They promoted different geopolitical
    and national models: federation versus a more centralized nation-state.`,`One
    supported independence and the other supported permanent partition.`,`They differed
    mainly over tactics while sharing the same centralized ethnic model.`,`Both regarded
    federation with Lithuania and Ukraine as the only viable eastern policy.`],0,`Both
    sought independence, but their ideas about eastern neighbours, ethnicity, citizenship
    and foreign alignment differed substantially.`),i(`Why was self-determination
    difficult to apply in Central and Eastern Europe?`,[`Populations were intermingled,
    historical borders overlapped and groups claimed the same cities and regions.`,`Language
    boundaries aligned closely enough with settlement to make borders straightforward.`,`The
    new borders closely followed settlement patterns and therefore removed most local
    disputes.`,`The peace conference consistently prioritized local plebiscites over
    strategic considerations.`],0,`New borders could not place every national group
    inside a homogeneous state. Minority questions and competing historical claims
    remained central.`)]},{id:`second-republic`,startYear:1921,endYear:1939,years:`1921–1939`,title:`The
    Second Republic: democracy, modernization and division`,key:`Reunification and
    modernization coexisted with authoritarian rule, inequality and minority conflict.`,summary:`A
    new state integrated three imperial legacies, built institutions and culture,
    and struggled with economic crisis, political violence and a diverse population.`,sections:[n(`context`,`Building
    one state from three partitions`,`The republic inherited different currencies,
    rail gauges, laws, school systems and bureaucratic traditions. It also faced war
    damage, inflation and sharp regional inequality. The 1921 constitution created
    parliamentary government and broad suffrage, including women’s voting rights granted
    in 1918. Political parties represented social class, religion, region and competing
    national visions. The state expanded schooling and administration, but poverty
    and limited capacity made integration slow.`),n(`events`,`May Coup and Sanacja
    rule`,`Unstable coalitions, the assassination of President Gabriel Narutowicz
    in 1922 and social conflict weakened trust in parliamentary politics. In May 1926
    Piłsudski led a military coup, promising moral “sanation” of public life. Elections
    and opposition continued but under increasing pressure; opponents were imprisoned
    at Brest, and the 1935 constitution strengthened the presidency. The regime was
    authoritarian rather than fully totalitarian, a distinction that should not hide
    political repression.`),n(`society`,`Minorities, economy and modernization`,`About
    one-third of citizens belonged to minorities, including Ukrainians, Jews, Belarusians
    and Germans. Policies ranged from accommodation to assimilation and discrimination.
    The state’s 1930 “pacification” in eastern Galicia used searches, arrests and
    collective penalties after sabotage by the Organization of Ukrainian Nationalists;
    OUN militants also committed political assassinations. Ukrainian institutions
    faced restrictions, while Belarusian political representation remained weak and
    Belarusian schooling and organizations were curtailed. The Great Depression hit
    rural areas severely. Eugeniusz Kwiatkowski promoted the port of Gdynia and the
    Central Industrial Region, symbols of modernization. Jewish Warsaw, Ukrainian
    Lviv, Polish Kraków and mixed small towns produced vibrant cultures alongside
    growing antisemitism and national polarization.`),n(`international`,`Between revisionist
    neighbours and fragile alliances`,`The Versailles settlement gave Poland alliances
    with France and Romania but left difficult relations with both Germany and the
    Soviet Union. The 1932 non-aggression pact with Moscow and the 1934 declaration
    with Berlin were attempts to gain time rather than ideological alignment. Poland
    rejected Soviet transit proposals and German demands over Gdańsk and an extraterritorial
    route in 1939. British and French guarantees strengthened resolve but could not
    provide immediate military relief when Germany attacked.`),n(`culture`,`Artifacts:
    Gdynia, radio, film and interwar literature`,`Modernist Gdynia presented a young
    state facing the Baltic, while radio connected citizens to national ceremonies,
    music and news. Writers such as Bruno Schulz, Witold Gombrowicz and Zofia Nałkowska
    experimented with identity, psychology and social convention; Jewish theatres
    and Yiddish publishing flourished. The mathematicians Marian Rejewski, Jerzy Różycki
    and Henryk Zygalski broke early Enigma systems before the war and shared their
    work with allies, an international scientific contribution often overshadowed
    by later British codebreaking.`)],actors:[{name:`Józef Piłsudski`,role:`Marshal
    whose authority helped stabilize and then constrain the republic; his 1926 coup
    remains central to debates over security and democracy.`},{name:`Eugeniusz Kwiatkowski`,role:`Economic
    planner associated with Gdynia and the Central Industrial Region, both showcases
    of state-led modernization.`},{name:`Minority citizens and parties`,role:`Ukrainian,
    Jewish, Belarusian, German and other communities who were integral to the republic
    yet often confronted unequal policies and competing national projects.`}],quiz:[i(`What
    made administrative integration unusually difficult after independence?`,[`The
    new state combined territories governed for generations by three different empires.`,`The
    partitioning empires had administered all three regions through identical institutions.`,`Partition-era
    institutions had already produced uniform law, currency, railways and taxation.`,`Leaders
    prioritized constitutional debate and delayed fiscal and monetary unification.`],0,`Legal
    codes, infrastructure, education and economies differed across the former partitions.
    Creating common institutions was a major achievement and a persistent challenge.`),i(`How
    should Sanacja rule after 1926 be characterized?`,[`An increasingly authoritarian
    system that retained some institutions and opposition but restricted fair democratic
    competition.`,`An uninterrupted liberal democracy with no coercion.`,`A Soviet-style
    one-party communist state.`,`A fully fascist one-party state that abolished elections
    immediately in 1926.`],0,`The regime was not identical to totalitarian dictatorships,
    yet the coup, manipulated elections, imprisonment and the 1935 constitution substantially
    weakened parliamentary democracy.`),i(`Why is describing interwar Poland as ethnically
    homogeneous misleading?`,[`Roughly one-third of citizens belonged to minorities
    with distinct languages, religions and political goals.`,`Minorities were present
    mainly as recent immigrants without established regional communities.`,`Postwar
    border settlements had already transferred nearly all minority communities outside
    Poland.`,`The constitution retained estate-based political rights and excluded
    most civilian voters.`],0,`The Second Republic was plural, especially in its eastern
    cities and countryside. That diversity enriched society but also generated conflicts
    over language, land and state loyalty.`),i(`What does the Polish contribution
    to Enigma codebreaking demonstrate?`,[`Scientific intelligence was collaborative
    and began before wartime work at Bletchley Park.`,`British cryptanalysis developed
    independently because Polish methods were too preliminary to transfer.`,`The decisive
    mathematical solution was produced independently at Bletchley Park after the war.`,`The
    breakthrough depended on captured machines rather than mathematical reconstruction.`],0,`Polish
    mathematicians reconstructed Enigma methods and transferred crucial knowledge
    to French and British allies in 1939, enabling later wartime advances.`)]},{id:`world-war-two`,startYear:1939,endYear:1945,years:`1939–1945`,title:`Occupation,
    Holocaust and total war`,key:`Two invasions, genocidal occupation and mass resistance
    destroyed the society of the Second Republic.`,summary:`Nazi Germany and the Soviet
    Union invaded Poland, while occupation, collaboration, resistance, the Holocaust
    and border change produced losses that remain central to public memory.`,sections:[n(`context`,`Invasion
    from west and east`,`Germany attacked on 1 September 1939; the Soviet Union invaded
    from the east on 17 September under the secret protocol of the Molotov–Ribbentrop
    Pact. Poland’s allies Britain and France declared war on Germany but did not relieve
    the campaign. The government continued in exile, first in France and then London.
    Germany annexed western territories and created the General Government; the USSR
    annexed the east, deported civilians and murdered thousands of Polish officers
    and officials at Katyń and other sites.`),n(`society`,`Occupation systems, Holocaust
    and ethnic violence`,`German policy sought racial transformation: terror against
    elites, forced labour, expulsions and mass murder. Jews were confined in ghettos
    and then deported to killing centres built and operated by Nazi Germany in occupied
    Poland. Around three million Polish Jews were murdered. The United States Holocaust
    Memorial Museum estimates that German occupation forces also killed about 1.8–1.9
    million non-Jewish Polish civilians; broader Polish losses, including military
    deaths and victims of Soviet repression, are higher and estimates vary. Responses
    ranged from rescue to indifference, blackmail and participation in violence; the
    1941 murder of Jews at Jedwabne by Polish neighbours under German occupation is
    a named, intensively studied case that resists both collective guilt and collective
    exoneration. In Volhynia and Eastern Galicia in 1943–1944, OUN-UPA forces carried
    out massacres and ethnic cleansing of Polish civilians; Polish formations committed
    retaliatory killings of Ukrainian civilians. These interlocking atrocities, shaped
    by occupation and radical nationalism but involving local agency, remain central
    to Polish-Ukrainian memory disputes.`),n(`international`,`Resistance, allies and
    abandoned sovereignty`,`The Polish Underground State and Home Army maintained
    clandestine education, courts and armed resistance; communist partisans and Jewish
    organizations pursued different strategies. Polish forces fought with the Western
    Allies, and an army formed in the USSR later fought alongside the Red Army. Allied
    decisions at Tehran and Yalta accepted Soviet dominance and moved Poland’s borders
    west. The discovery of the Katyń graves deepened the break between the exile government
    and Stalin, while the Western alliance prioritized defeating Germany.`),n(`culture`,`Artifacts
    and distinct uprisings`,`The 1943 Warsaw Ghetto Uprising was a Jewish revolt against
    deportation and annihilation; the 1944 Warsaw Uprising was launched by the Home
    Army to liberate the capital before full Soviet occupation. They are different
    events with different contexts. Emanuel Ringelblum’s Oyneg Shabes archive preserved
    Jewish testimony from the ghetto. The anchor-shaped “PW” symbol represents Fighting
    Poland, while ruined and rebuilt Warsaw embodies both destruction and later memory
    politics. Films, museums and family stories continue to debate heroism, civilian
    cost and Polish-Jewish relations.`)],actors:[{name:`Emanuel Ringelblum and Oyneg
    Shabes`,role:`Historian and clandestine archivists who documented Jewish life,
    persecution and resistance from inside the Warsaw Ghetto.`},{name:`The Polish
    Underground State`,role:`A network loyal to the government-in-exile that organized
    administration, education, justice, intelligence and the Home Army under occupation.`},{name:`Irena
    Sendler and diverse rescuers`,role:`People who aided Jews despite lethal danger;
    their courage must be remembered without using rescue stories to obscure widespread
    vulnerability or hostility.`}],quiz:[i(`Why is the term “Polish death camps” historically
    misleading?`,[`Nazi Germany designed and operated killing centres in occupied
    Poland; location does not imply Polish state responsibility.`,`All German killing
    centres were located inside Germany’s pre-war borders.`,`The term is accurate
    because geographical location determines state responsibility.`,`Soviet authorities
    designed the German killing-centre system before the occupation of Poland.`],0,`The
    accurate formulation is German Nazi camps in occupied Poland. The Polish state
    was destroyed and its citizens were subjected to occupation, though individual
    behaviour still ranged widely.`),i(`What distinguishes the Warsaw Ghetto Uprising
    from the Warsaw Uprising?`,[`The 1943 revolt was Jewish resistance within the
    ghetto; the 1944 uprising was led mainly by the Home Army across Warsaw.`,`The
    later revolt was a direct continuation of Jewish armed resistance under one command.`,`Both
    occurred during the final Soviet assault on Berlin in 1945.`,`The 1943 revolt
    was directed by the Soviet government.`],0,`The events share a city and extraordinary
    courage but had distinct participants, goals, timing and circumstances. Conflating
    them erases important history.`),i(`How should individual behaviour toward persecuted
    Jews be studied?`,[`Through specific evidence recognizing rescue, indifference,
    coercion, blackmail and collaboration rather than a single national stereotype.`,`By
    treating rescue as representative while excluding collaboration and indifference
    from the analysis.`,`By ignoring occupation terror and antisemitism alike.`,`By
    privileging official post-war investigations while excluding wartime testimony
    and material evidence.`],0,`Occupation created extreme danger but did not eliminate
    individual choices. Responsible history examines institutions, local contexts
    and testimony without collective exoneration or collective guilt.`),i(`Why did
    Poland’s post-war borders and government not reflect the exile government’s goals?`,[`The
    Red Army occupied the region and the Allied great powers accepted Soviet strategic
    dominance.`,`The London exile government accepted Soviet-backed rule as the price
    of restoring Poland’s pre-war eastern frontier.`,`The Western Allies restored
    the pre-1939 eastern border but chose a communist cabinet.`,`The Treaty of Riga
    remained unchanged by agreement of all parties.`],0,`Military power shaped diplomacy.
    Britain and the United States prioritized Allied unity and accepted a Soviet-backed
    government and westward border shift.`)]},{id:`stalinism-peoples-poland`,startYear:1945,endYear:1970,years:`1945–1970`,title:`Borders
    moved west: Stalinism and state socialism`,key:`A nearly homogeneous society was
    rebuilt under Soviet-backed authoritarian rule.`,summary:`Border shifts, population
    transfers, communist consolidation, Stalinist terror, industrialization and the
    1956 thaw remade Poland after catastrophe.`,sections:[n(`context`,`A different
    country on a shifted map`,`Poland lost eastern territories to the Soviet Union
    and received former German lands in the west and north. German civilians first
    fled the advancing Red Army and were then expelled under the post-war Allied settlement;
    the process caused civilian suffering but followed Nazi Germany’s occupation and
    genocidal war, contexts that must be held together. Poles were resettled from
    the east. In Operation Vistula in 1947, the communist state collectively and forcibly
    dispersed about 140,000 Ukrainians, Lemkos and Boykos to the western and northern
    territories while fighting the UPA insurgency. The 1946 Kielce pogrom, in which
    a mob including Polish soldiers, police officers and civilians killed at least
    forty-two Jews, accelerated post-Holocaust Jewish flight and exposed persistent
    antisemitism amid post-war disorder. Holocaust, border change and forced migration
    ended much of the pre-war plural society. Warsaw was rebuilt, while “Recovered
    Territories” propaganda presented the western lands as an ancient return rather
    than a radical transfer.`),n(`events`,`Communist consolidation and Stalinist terror`,`A
    Soviet-backed coalition marginalized and destroyed independent opposition through
    police violence, manipulated elections and show trials. The Polish United Workers’
    Party dominated the state from 1948. Security forces persecuted former underground
    fighters, political opponents and clergy; collectivization was attempted but most
    farmland remained private. Central planning accelerated heavy industry and urbanization,
    bringing education and jobs to many rural families while producing coercion, shortages,
    environmental damage and political conformity.`),n(`international`,`Soviet bloc,
    1956 and limited autonomy`,`Poland joined Soviet-led institutions and had little
    foreign-policy autonomy. Stalin’s death and worker protests in Poznań in June
    1956 opened a crisis. Władysław Gomułka returned to power promising a “Polish
    road to socialism,” reduced some terror and halted full collectivization while
    accepting one-party rule and Warsaw Pact membership. The Catholic Church retained
    unusual social strength, producing recurring negotiation and confrontation with
    the state.`),n(`culture`,`Artifacts: socialist realism, the Polish School and
    Nowa Huta`,`Nowa Huta, a planned steel city beside Kraków, symbolized industrial
    modernity and the effort to create a socialist working class; later it became
    a centre of Catholic and Solidarity resistance. Socialist realism briefly prescribed
    heroic workers and optimistic production, but the 1956 thaw enabled the Polish
    Film School. Directors such as Andrzej Wajda examined wartime tragedy and moral
    ambiguity. Posters used inventive metaphor to escape literal censorship, creating
    a globally admired Polish school of graphic design.`)],actors:[{name:`Bolesław
    Bierut`,role:`Stalinist leader under whom the party-state consolidated power,
    security repression intensified and Soviet political models were imposed.`},{name:`Władysław
    Gomułka`,role:`Communist politician imprisoned during Stalinism who returned in
    1956 as a symbol of limited autonomy but later defended authoritarian rule.`},{name:`Post-war
    migrants and industrial workers`,role:`Millions who rebuilt cities, populated
    new western territories and moved from villages to factories, transforming class
    and regional identities.`}],quiz:[i(`What was the demographic effect of post-war
    border changes and violence?`,[`Poland became far more ethnically homogeneous
    through genocide, flight, expulsion and forced resettlement.`,`The country regained
    exactly its 1938 population and borders.`,`Border changes were implemented mainly
    through citizenship law without large population transfers.`,`German and Jewish
    populations both increased dramatically.`],0,`The Holocaust, westward border shift
    and population transfers transformed a historically diverse state. Homogeneity
    was produced by catastrophe and coercive policy, not an ancient constant.`),i(`Why
    did communist industrialization attract support from some citizens despite dictatorship?`,[`It
    offered education, urban jobs and social mobility while also imposing coercion
    and shortages.`,`Industrial policy reduced working hours and consumer prices enough
    to outweigh political restrictions.`,`It returned confiscated estates to pre-war
    owners while expanding factory employment.`,`It allowed free multi-party elections.`],0,`Social
    transformation had real beneficiaries and real costs. Recognizing mobility and
    welfare does not excuse police repression or lack of political freedom.`),i(`What
    changed in 1956 under Gomułka?`,[`The harshest Stalinist practices eased and Poland
    gained limited room within the Soviet bloc, but one-party rule continued.`,`Poland
    left the Warsaw Pact and adopted competitive elections in 1956.`,`A coalition
    government ended the communist party’s monopoly on power.`,`The thaw abolished
    preventive censorship even though one-party elections continued.`],0,`The “thaw”
