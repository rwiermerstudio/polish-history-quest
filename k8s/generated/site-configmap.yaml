        <style>
    :root{--bg:#fffdf8;--paper:#fff;--paper-warm:#f7f1e8;--ink:#161513f5;--muted:#6f675d;--line:#37302824;--crimson:#c1121f;--crimson-dark:#8f0d18;--navy:#14213d;--gold:#d6a545;--green:#15803d;--shadow:#0000000a 0 4px 18px, #00000006 0 2px 8px, #00000004 0 1px 3px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}*{box-sizing:border-box}html{scroll-behavior:smooth}body{background:radial-gradient(circle at 15% 0%, #c1121f21, transparent 28%), radial-gradient(circle at 88% 8%, #d6a54529, transparent 26%), var(--bg);color:var(--ink);margin:0}button,input,select{font:inherit}.app{min-height:100vh}.header{z-index:20;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);background:#fffdf8d1;position:sticky;top:0}.nav{justify-content:space-between;align-items:center;gap:1rem;max-width:1180px;margin:0 auto;padding:.8rem 1rem;display:flex}.brand{letter-spacing:-.03em;align-items:center;gap:.7rem;font-weight:800;display:flex}.eagle{color:#fff;background:linear-gradient(135deg, var(--crimson), #e5383b);width:38px;height:38px;box-shadow:var(--shadow);border-radius:11px;place-items:center;display:grid}.navlinks{flex-wrap:wrap;justify-content:flex-end;gap:.55rem;display:flex}.navlinks a,.small-btn{color:var(--ink);cursor:pointer;background:0 0;border:1px solid #0000;border-radius:999px;padding:.45rem .62rem;font-size:.92rem;font-weight:650;text-decoration:none}.navlinks a:hover,.small-btn:hover{border-color:var(--line);box-shadow:var(--shadow);background:#fff}.hero{grid-template-columns:1.05fr .95fr;align-items:center;gap:2rem;max-width:1180px;margin:0 auto;padding:clamp(2rem,6vw,5.8rem) 1rem 2.5rem;display:grid}.badge{color:var(--crimson-dark);letter-spacing:.02em;text-transform:uppercase;background:#fff0f1;border:1px solid #c1121f2e;border-radius:999px;align-items:center;gap:.4rem;padding:.35rem .7rem;font-size:.78rem;font-weight:800;display:inline-flex}h1{letter-spacing:-.075em;margin:1rem 0;font-size:clamp(2.6rem,7vw,5.7rem);line-height:.92}.lead{color:var(--muted);max-width:63ch;font-size:clamp(1.05rem,2vw,1.28rem);line-height:1.65}.cta-row{flex-wrap:wrap;gap:.8rem;margin-top:1.4rem;display:flex}.btn{cursor:pointer;border:0;border-radius:12px;padding:.82rem 1.05rem;font-weight:800;transition:transform .12s,box-shadow .12s,background .12s}.btn:hover{box-shadow:var(--shadow);transform:translateY(-1px)}.btn-primary{background:var(--crimson);color:#fff}.btn-primary:hover{background:var(--crimson-dark)}.btn-secondary{color:var(--ink);border:1px solid var(--line);background:#fff}.hero-card{border:1px solid var(--line);box-shadow:var(--shadow);background:#ffffffd1;border-radius:28px;padding:1.2rem}.map-card{background:linear-gradient(160deg,#fff,#f6efe2);min-height:390px;position:relative;overflow:hidden}.map-svg{width:100%;height:260px;display:block}.float-stat{grid-template-columns:repeat(3,1fr);gap:.8rem;margin-top:1rem;display:grid}.stat{border:1px solid var(--line);background:#fff;border-radius:16px;padding:.8rem}.stat b{color:var(--crimson);font-size:1.35rem;display:block}.section{max-width:1180px;margin:0 auto;padding:2.5rem 1rem}.section.alt{border-block:1px solid var(--line);background:#f7f1e8b3;max-width:none}.section.alt>.inner{max-width:1180px;margin:auto}.section-title{justify-content:space-between;align-items:end;gap:1rem;margin-bottom:1rem;display:flex}h2{letter-spacing:-.055em;margin:.2rem 0;font-size:clamp(1.85rem,4vw,3.2rem);line-height:1}.kicker{color:var(--crimson);text-transform:uppercase;letter-spacing:.08em;font-size:.78rem;font-weight:850}.grid{gap:1rem;display:grid}.grid.eras{grid-template-columns:repeat(auto-fit,minmax(245px,1fr))}.card{background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:1rem}.era-card{cursor:pointer;position:relative;overflow:hidden}.era-card.done:after{content:"✓";background:var(--green);color:#fff;border-radius:999px;place-items:center;width:28px;height:28px