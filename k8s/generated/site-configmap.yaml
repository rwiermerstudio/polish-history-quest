    <main class="companion" id="content">
      <header class="cover chapter-4-cover">
        <p class="eyebrow">Polish History Quest · In-depth companion</p>
        <h1>Liberty for whom?</h1>
        <p class="subtitle">The Commonwealth between Lublin and 1648: noble participation, confessional plurality, coerced labour and an open ending</p>
        <div class="cover-meta"><span>Source-led survey</span><span>Eight original excerpts with new English translations</span><span>Print edition · 2026</span></div>
      </header>

      <section class="companion-section" id="contents">
        <p class="section-number">Reader guide</p><h2>How to study a republic built on exclusion</h2>
        <p class="lede dropcap">Between the Union of Lublin in 1569 and the uprising of 1648, the Commonwealth sustained one of Europe's broadest systems of political participation—inside a single legally defined estate. Noble voters elected kings, negotiated taxation in local dietines, filled offices and argued in print. The same decades saw urban power contained, peasant labour intensified, Orthodox and Cossack claims refused settlement, and a multi-confessional society managed rather than resolved. Both statements belong to the same history.</p>
        <p>This companion asks a recurring question: <strong>whose liberty, secured by which institutions, at whose expense?</strong> "Golden Liberty" translates the enfranchised estate's self-description, not a modern democratic condition. Nor was the Commonwealth a unitary nation-state: after 1569 the Crown of the Kingdom of Poland and the Grand Duchy of Lithuania kept separate laws, offices, treasuries, armies and chanceries under a shared elected monarch and a common Sejm, while Royal Prussia held a distinct provincial position. Ruthenian lands—home to communities ancestral to modern Ukrainians and Belarusians—moved from the Grand Duchy to the Crown in 1569 and contained the Commonwealth's largest Orthodox population. Jewish, Armenian, Lipka Tatar, Karaite, Scots, Italian and German-speaking communities lived under overlapping jurisdictions that could protect and subordinate at once.</p>
        <p>The period ends in 1648, but 1648 must not be read backwards as fate. The Khmelnytsky uprising had a prehistory in registration disputes, magnate expansion, Orthodox grievance and fiscal failure, and a conjuncture in the decisions of 1646–1648. This chapter ends by showing an open door rather than a collapsing house.</p>
        <p>Every displayed excerpt comes from one named edition text. Six come from the 1859 St Petersburg reprint of the <em>Volumina legum</em>, manually collated against downloaded page images; one from the 1573 election order on the facing leaves; one reuses the Union of Lublin Crown act collated for the Chapter 3 companion from the 1932 <em>Akta unji</em>. The companion does not combine parallel acts, normalize historical spelling or substitute apparatus variants. Translations are conservative: estate vocabulary stays estate vocabulary and confessional polemic stays marked as the issuing document's voice. Images are classified as contemporary objects, modern reconstructions, retrospective paintings or modern photographs.</p>
        <nav aria-label="Companion contents"><ol class="toc">
          <li><a href="#settlement"><span>One Sejm, two states</span><span>01</span></a></li><li><a href="#machinery"><span>How the federation worked</span><span>02</span></a></li>
          <li><a href="#nobles"><span>A republic of nobles</span><span>03</span></a></li><li><a href="#interregnum"><span>1572–1576: inventing elective routine</span><span>04</span></a></li>
          <li><a href="#confederation"><span>The Warsaw Confederation</span><span>05</span></a></li><li><a href="#bathory"><span>Stephen Báthory: reform through war</span><span>06</span></a></li>
          <li><a href="#orders"><span>Social orders and unequal lives</span><span>07</span></a></li><li><a href="#grain"><span>Land, labour and the Baltic grain route</span><span>08</span></a></li>
          <li><a href="#gdansk"><span>Royal Prussia and Gdańsk</span><span>09</span></a></li><li><a href="#communities"><span>Plural communities, plural law</span><span>10</span></a></li>
          <li><a href="#brest"><span>Reformation, Catholic renewal, Brest</span><span>11</span></a></li><li><a href="#neighbourhood"><span>Living difference: Vilnius and Lviv</span><span>12</span></a></li>
          <li><a href="#vasa"><span>Sigismund III: dynasty and conflict</span><span>13</span></a></li><li><a href="#north"><span>Sweden, Livonia and Muscovy</span><span>14</span></a></li>
          <li><a href="#southeast"><span>The Ottoman frontier</span><span>15</span></a></li><li><a href="#fiscal"><span>The fiscal-military bargain</span><span>16</span></a></li>
          <li><a href="#magnates"><span>Magnates, clients and local power</span><span>17</span></a></li><li><a href="#culture"><span>Schools, print and Sarmatism</span><span>18</span></a></li>
          <li><a href="#cossacks"><span>The Cossack question</span><span>19</span></a></li><li><a href="#golden-peace"><span>Władysław IV and the 1630s</span><span>20</span></a></li>
          <li><a href="#sources"><span>1648 and the sources</span><span>21</span></a></li>
        </ol></nav>
        <div class="caution"><strong>Translation and terminology.</strong> "Commonwealth" translates <em>Rzeczpospolita</em>, the res publica claimed by the noble political nation. "Noble," "estate," "knighthood" and "citizen" translate historically bounded categories, not modern civic ones. "Rus'," "Ruthenian" and "Greek faith" are kept as period terms and never silently converted into modern national labels.</div>
      </section>

      <section class="companion-section print-break" id="settlement"><p class="section-number">01 · Orientation</p><h2>One Sejm, two states, many political worlds</h2>
        <p class="lede">The Commonwealth began as a settlement, not a founding moment of a nation. In the summer of 1569 the Lublin Sejm joined the Crown of the Kingdom of Poland and the Grand Duchy of Lithuania into one indivisible body with a common elected monarch and a common Sejm—while Lithuanian law, offices, treasury, army and chancery continued. Understanding the next eighty years means holding those two facts together.</p>
        <table class="timeline-table"><caption>Selected chronology, 1569–1648</caption><tbody>
          <tr><th scope="row">1569</th><td>Union of Lublin concluded; Podlasie, Volhynia, Kyiv and Bratslav palatinates transferred from the Grand Duchy to the Crown during the Sejm.</td></tr>
          <tr><th scope="row">1572–1573</th><td>Sigismund II Augustus dies childless; the first interregnum produces the Warsaw Confederation, the election order, and Henry of Valois's election on negotiated articles.</td></tr>
          <tr><th scope="row">1574–1576</th><td>Henry abandons the throne for France; Anna Jagiellon and Stephen Báthory are elected; Gdańsk resists and is defeated at the gates before a negotiated settlement.</td></tr>
          <tr><th scope="row">1578–1582</th><td>Crown and Lithuanian tribunals established; Báthory's Livonian campaigns recover Polotsk and Velizh from Muscovy; truce at Yam Zapolsky.</td></tr>
          <tr><th scope="row">1587–1588</th><td>Sigismund III Vasa elected against Habsburg competition; Third Lithuanian Statute promulgated.</td></tr>
          <tr><th scope="row">1595–1596</th><td>Union of Brest creates a Uniate church in communion with Rome; an Orthodox opposition organizes across nobles, brotherhoods and clergy.</td></tr>
          <tr><th scope="row">1600–1611</th><td>War with Sweden over Livonia; Kircholm 1605; Zebrzydowski's rokosz 1606–1609; Smolensk taken in the Time of Troubles.</td></tr>
          <tr><th scope="row">1618–1621</th><td>Truce of Deulino marks the Commonwealth's widest eastern reach; Cecora 1620; Khotyn 1621 holds the Ottoman army.</td></tr>
          <tr><th scope="row">1632–1635</th><td>Władysław IV elected; Smolensk war ended at Polyanovka; twenty-six-year truce with the Ottomans in 1633–1635.</td></tr>
          <tr><th scope="row">1637–1638</th><td>Cossack uprisings suppressed; the Ordinance of the Registered Host abolishes Cossack self-government and narrows the register.</td></tr>
          <tr><th scope="row">1648</th><td>Khmelnytsky's alliance with the Crimean khan, victories at Zhovti Vody and Korsun, and Władysław IV's death open a new and unwritten chapter.</td></tr>
        </tbody></table>
        <p>The settlement was negotiated under pressure. Lithuania faced the Livonian War and Sigismund II Augustus had no heir; when Lithuanian magnates walked out of the Lublin negotiations, the king incorporated Podlasie, Volhynia, the Kyiv region and Bratslav into the Crown, transforming the bargaining table before the final act. The Commonwealth began with both a signed constitutional text and a coercive sequence; neither should be edited out of the story.</p>
        <blockquote class="source-excerpt" id="excerpt-lublin"><p class="source-label">Primary source 1 · the Union of Lublin, Crown act, article 3</p>
          <p class="source-original" lang="pl">I już Królestwo polskie i Wielkie Księstwo litewskie jest jedno nierozdzielne i nieróżne ciało, a także nieróżna ale jedna spólna Rzeczpospolita, która się ze dwu państw i narodów w jeden lud zniosła i spoiła.</p>
          <p class="source-translation">And now the Kingdom of Poland and the Grand Duchy of Lithuania are one indivisible and undifferentiated body, and likewise not distinct but one common Commonwealth, which from two states and peoples has come together and been joined into one people.</p>
          <p class="source-citation"><strong>Event:</strong> conclusion of the Union of Lublin, 1 July 1569. <strong>Composition:</strong> Crown estates' act produced and sworn during the Sejm. <strong>Witness:</strong> this is no. 148, not the separate Lithuanian counterpart no. 149. Stanisław Kutrzeba and Władysław Semkowicz, eds., <em>Akta unji Polski z Litwą, 1385–1791</em> (Kraków: PAU, 1932), no. 148, article 3, printed p. 343 (scan PDF leaf 400). The scan's visible main text ends <em>spoiła</em>; the erroneous OCR form <em>spoiliła</em> is not reproduced. <a href="https://pbc.biaman.pl/Content/1545/PDF/99002.pdf">Public-domain edition scan</a>.</p>
        </blockquote>
        <p>"One people" (<em>w jeden lud</em>) is juridical language about the union of two political nations, not a claim about ethnicity, language or administration—the same act and its companions preserve Lithuanian offices, law and seal. The body metaphor asserts indivisibility precisely because division had just been demonstrated as a live possibility.</p>
        <figure data-kind="map"><img loading="lazy" width="726" height="550" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Grodecki_Poloniae_finitimarumque.jpg?width=1400" alt="Hand-coloured early modern map filled with Latin place names, rivers, coastlines, and decorative cartographic lettering across Poland and neighbouring regions"><figcaption><strong>The region as a contemporary mapped it</strong><p>Wacław Grodziecki's 1573 copperplate map of Poland and neighbouring lands. A contemporary printed representation, not modern surveyed borders.</p><p class="figure-meta">Wacław Grodziecki, <em>Poloniae finitimarumque locorum descriptio</em>, 1573, BN ZZK 3201 · contemporary map · public domain · <a href="https://commons.wikimedia.org/wiki/File:Grodecki_Poloniae_finitimarumque.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Federation, composite monarchy or republic?</h3><ul><li><strong>Federation</strong> captures common institutions built from distinct states but suggests a modern constitutional design.</li><li><strong>Composite monarchy</strong> fits the shared ruler over separate administrations but understates the elective and parliamentary reality.</li><li><strong>Republic</strong> (<em>rzeczpospolita</em>) is the actors' own word, but it named a republic of nobles, not of inhabitants.</li></ul><p>Each vocabulary illuminates one layer; any single one conceals the others.</p></div>
        <div class="question-box"><strong>Institutional sort</strong> Take twenty offices and bodies—the Lithuanian Tribunal, the Crown treasurer, the Gdańsk council, the king as grand duke, the registered Cossacks, a Jewish kahal, a sejmik—and place them under Crown, Grand Duchy, common, local or "depends." Defend each placement in one sentence; the justification matters more than the bin.</div>
      </section>

      <section class="companion-section" id="machinery"><p class="section-number">02 · Institutions</p><h2>How the federation actually worked</h2>
        <p class="lede dropcap">The Commonwealth's constitution was a machine with one bridge and two engines. The common monarch, elected by the assembled nobility, and the common Sejm connected the two states. Below that bridge, Crown and Grand Duchy each ran its own chancery, treasury, army, offices and—after 1578 and 1581—its own highest appellate tribunal. Royal Prussia participated through its own provincial institutions and a famously guarded sense of liberty.</p>
        <p>The Sejm joined senators and elected envoys from both nations; sejmiks—local noble dietines—elected and instructed envoys and handled local assessments. This gave taxation a genuinely negotiated character: no Sejm consent, no tax. The famous liberum veto belongs mostly to the following century; in this period the norm of unanimity worked more often as pressure toward accommodation than as mechanical paralysis.</p>
        <p>Separate machinery mattered daily. A Ruthenian noble in the Grand Duchy sued under the Lithuanian Statute—the third version promulgated in 1588, printed in Ruthenian—while a Crown noble used Polish statutes and customs. Hetmans commanded separate armies, treasurers ran separate debts, chanceries issued in Polish and Latin in the Crown, Ruthenian and Latin in the Grand Duchy. The "one body" of Lublin was real at the level of monarch, Sejm and foreign policy, deliberately incomplete everywhere else.</p>
        <figure><img loading="lazy" width="777" height="1265" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Statut-1588.jpg?width=1000" alt="Tall early printed title page with a large central mounted-knight coat of arms, smaller heraldic shields, Cyrillic text, and an ornate architectural border"><figcaption><strong>A separate legal order, in print</strong><p>Title page of the Third Lithuanian Statute (1588). The heraldic design foregrounds the Grand Duchy's legal identity; this is evidence for the statute's printed form, not for how every provision operated in practice.</p><p class="figure-meta">Unknown printer, after 1588, Vilnius University Library · contemporary printed legal text · public domain · <a href="https://commons.wikimedia.org/wiki/File:Statut-1588.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>This reader does not quote the 1588 Statute: its Ruthenian Cyrillic text could not be collated against a page image to this series' standard. The statute's importance is not in doubt, but what a clause proves depends on witness, language and edition, and an unverifiable quotation must not be printed as one.</p>
        <div class="interpretation"><h3>Efficient anomaly or normal state?</h3><p>Early-modern Europe was full of composite polities—Spain, Britain after 1603, the Habsburg lands. The Commonwealth's unusual features were the breadth of noble participation and the durability of its dual structure, not composite government as such. Asking "why did it not centralize?" imports a later expectation that states converge on one administration.</p></div>
        <div class="question-box"><strong>Source prompt</strong> The Lublin act proclaims "one indivisible body"; the 1588 Statute's title page proclaims a distinct Grand-Ducal legal identity. Write the single sentence each artefact can support, then the single sentence each cannot.</div>
      </section>

      <section class="companion-section" id="nobles"><p class="section-number">03 · The political nation</p><h2>A republic of nobles, mass participation inside an exclusive estate</h2>
        <p class="lede">The szlachta made up perhaps 7–10 per cent of the population—an extraordinarily broad enfranchised class by European standards—ranging from magnates with private armies to landless nobles voting at a neighbour's sejmik. All were equal in constitutional theory; none in social reality.</p>
        <p>Participation was concrete: nobles elected kings by acclamation, met in sejmiks to instruct envoys, staffed courts and read political print. Anna Grześkowiak-Krwawicz and Dorota Pietrzyk-Reeves show this was a functioning republican discourse—<em>wolność</em>, <em>prawa</em>, <em>rzecz pospolita</em>—not decorative classicism.</p>
        <p>The estate's boundary was the constitution's shadow. Peasants owed labour and dues under their lords' jurisdiction; most townspeople were excluded from landholding offices; women of every estate exercised property, credit and patronage without political voice; Jewish, Armenian and Tatar communities held corporate privileges that protected and separated them. The political nation defined itself partly by who was outside it.</p>
        <blockquote class="source-excerpt" id="excerpt-titles"><p class="source-label">Primary source 2 · the Sejm legislates noble equality, 1638</p>
          <p class="source-original" lang="pl">… deklaruiemy, że iako paritate juris in hoc liberrimo Regno wszysey equestris ordinis ludzie rowni są sobie, tak ta varietas titulorum, aequalitatem nobilitatis znosić nie może, ani inaequalitatem natalium wnosić; y tak perpetua lege cavemus, że żadnych tytułów, ani świeższych, ani dawnieyszych używać, ani nowych upraszać nie może, ani będzie (oprocz tych ktore są w Unii przyięte).</p>
          <p class="source-translation">… we declare that, just as by the parity of law in this most free kingdom all people of the knightly estate are equal to one another, so this variety of titles cannot abolish the equality of the nobility or introduce inequality of birth; and thus by perpetual law we decree that no titles, neither more recent nor older, may be used, nor new ones sought—except those accepted in the Union.</p>
          <p class="source-citation"><strong>Event and composition:</strong> Warsaw Sejm of 1638, constitution no. 10, "On foreign titles." <strong>Witness:</strong> printed main text of the 1859 St Petersburg reprint, not an enrolled 1638 original; collated against downloaded page images. <em>Volumina legum</em>, vol. 3 (St Petersburg: Jozafat Ohryzko, 1859), printed pp. 441–442, external pp. 931–932 (Internet Archive leaves n1247–n1248). Historical spellings preserved. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>The constitution legislates an ideal: equality <em>within</em> the knightly estate, policed against foreign titles. It proves the ideal was asserted as law, not that magnates and landless nobles held equal power—patronage, office and wealth told a different story—and the exception for titles "accepted in the Union" shows the ideal's negotiated edge. A law is evidence of the norm it proclaims and, read carefully, of the practices it tries to suppress.</p>
        <div class="interpretation"><h3>How democratic was the noble republic?</h3><ul><li><strong>Participation:</strong> a large enfranchised class, real elections, negotiated taxation, local self-government.</li><li><strong>Exclusion:</strong> estate, gender, wealth and confessional boundaries kept most inhabitants outside citizenship.</li><li><strong>Comparison:</strong> judged against contemporary monarchies, the participation is remarkable—and the exclusions were the ordinary furniture of the age.</li></ul><p>"Democracy" misleads in both directions; "broad oligarchic republic" is closer and still flattens the sejmik's lived politics.</p></div>
        <div class="question-box"><strong>Workshop</strong> Compare the 1638 titles constitution with the election order of 1573 (Primary source 4). One legislates equality of status, the other discipline of assembly. What conception of liberty do they share, and what does each refuse to regulate?</div>
      </section>

      <section class="companion-section print-break" id="interregnum"><p class="section-number">04 · The first interregnum</p><h2>1572–1576: inventing elective routine under pressure</h2>
        <p class="lede dropcap">Sigismund II Augustus died childless on 7 July 1572, and the Jagiellonian dynasty ended. What followed was not anarchy but improvisation: the nobility built, in months, a working machinery for elective monarchy—confederation, convocation, election by the assembled estate, negotiated articles, coronation—then watched its first product, Henry of Valois, slip away to inherit France in June 1574.</p>
        <p>The settlement had layers. The Warsaw Confederation of January 1573 secured domestic and confessional peace while there was no king; the convocation Sejm fixed the rules of election; the election Sejm at Kamień chose Henry in May 1573 on the <em>articuli Henrico Regi oblati</em>—the Henrician Articles, sworn by every subsequent king—plus his personal <em>pacta conventa</em>. The articles made election perpetual, forbade royal nomination of a successor, required Sejm consent for war and levies, fixed regular Sejms, and seated sixteen resident senators to watch the king. They ended with a release clause: a king who violated his sworn articles freed his subjects from obedience.</p>
        <blockquote class="source-excerpt" id="excerpt-henrician"><p class="source-label">Primary source 3 · Henry's oath, Paris, 10 September 1573</p>
          <p class="source-original" lang="la">pacemque et tranquilitatem inter dissidentes de religione tuebor, manutenebo, nec ullo modo vel jurisdictione nostra, vel officiorum nostrorum et Statuum quorumvis authoritate quempiam affici opprimique causa religionis permittam, nec ipse afficiam, nec opprimam. […] et si (quod absit) in aliquibus juramentum meum violavero, nullam mihi incolae Regni omniumque Dominiorum uniuscujusque gentis, obedientiam praestare debebunt. Imo ipso facto eos ab omni fide, obedientia Regi debita liberos facio.</p>
          <p class="source-translation">And I shall protect and maintain peace and tranquillity among the dissenters in religion, and I shall not permit anyone to be injured or oppressed on account of religion, in any way, whether by our jurisdiction or by the authority of our officials or of any estates; nor shall I myself injure or oppress [anyone]. […] And if (which God forbid) I should in any respect violate my oath, the inhabitants of the Kingdom and of all the dominions of each people shall owe me no obedience. Rather, by that very act I make them free from all the faith and obedience owed to the king.</p>
          <p class="source-citation"><strong>Event and composition:</strong> oath sworn by the elected king in Paris, 10 September 1573, incorporating the estates' interpretation of the obedience clause. <strong>Witness:</strong> printed main text of the 1859 reprint, collated against the downloaded image; the 1573 diplomatic originals were not independently collated. <em>Volumina legum</em>, vol. 2, printed p. 135, external pp. 863–864 (Internet Archive leaf n445), running heads <em>FORMA JURAMENTI</em> / <em>CONFIRMATIO IURIUM HENRICI REGIS A. 1573</em>. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>The oath is the candidate's undertaking, drafted by the estates: evidence of constitutional claims at the moment of election, not of later enforcement. The release clause is conditional—violation of sworn articles—not a general licence for rebellion, and its beneficiaries were the enfranchised estates. Henry chafed at Polish forms and left. The 1575 election chose Anna Jagiellon and, as her consort and real executive, Stephen Báthory of Transylvania; Gdańsk refused him, was beaten in the field, and bought its way back through negotiation—a pattern of coerced bargaining the interregnum had made thinkable.</p>
        <div class="interpretation"><h3>A constitution in a crisis, or a crisis made constitutional?</h3><p>Some historians read 1573 as the noble republic's creative founding, others as the institutionalization of royal weakness. The documents support a narrower claim: the estates converted an emergency into a repeatable procedure, and procedure into a bargaining position every king had to accept before ruling.</p></div>
        <div class="question-box"><strong>Document comparison</strong> The Warsaw Confederation, the Henrician Articles and the pacta conventa are often blurred into one "election settlement." Assign each of the following to its proper document: confessional peacekeeping; free election in perpetuity; the candidate's personal money promises. Why does the distinction matter for what each can prove?</div>
      </section>

      <section class="companion-section" id="confederation"><p class="section-number">05 · Confessional peace</p><h2>The Warsaw Confederation: a major guarantee with estate-shaped edges</h2>
        <p class="lede">On 28 January 1573, with no king on the throne and the news of St Bartholomew's Day moving through Europe, the assembled estates swore to keep the peace across religious difference. The Warsaw Confederation is justly famous—in a decade of religious war, a political nation legislated restraint—and routinely overclaimed into modern religious freedom. The act's own text refuses that reading.</p>
        <blockquote class="source-excerpt" id="excerpt-confederation"><p class="source-label">Primary source 4 · the Confederation oath and its limiting clause</p>
          <p class="source-original" lang="pl">A iż Rzeczypospolitey naszey iest dissidium niemałe in causa religionis christianae, zabiegaiąc temu, aby się z tey przyczyny między ludźmi sedycya iaka szkodliwa nie wszczęła, ktorą po inszych Krolestwach iasnie widzimy, obiecuiemy to sobie spolnie, pro nobis, et successoribus nostris, in perpetuum, sub vinculo juramenti, fide, honore, et conscientijs nostris, iż ktorzy iesteśmy dissidentes de religione pokoy między sobą zachować a dla rożney wiary y odmiany w kościelech, krwie nie przelewać, ani się penować, confiscatione bonorum, poczciwością, carceribus et exilio, y zwierzchności żadney, ani urzędowi, do takowego progressu żadnym sposobem nie pomagać: y owszem gdzieby ią kto przelewać chciał, ex ista causa zastawiać się o to wszyscy będziem powinni, choćby też za pretextem dekretu, abo za postępkiem iakim sądowym, kto to czynić chciał. […] Wszakże przez tę Konfederacyą naszę, zwierzchności żadney nad poddanymi ich, tak panow duchownych, iako y świeckich, nie deroguiemy, y posłuszeństwa żadnego poddanych przeciwko panom ich nie psuiemy, y owszem ieśliby takowa licencya gdzie była sub praetextu religionis, tedy iako zawsze było, będzie wolno y teraz każdemu panu poddanego swego nieposłusznego, tam in spiritualibus, quam in saecularibus, podług rozumienia swego skarać.</p>
          <p class="source-translation">And since there is no small dissension in our Commonwealth concerning the Christian religion, in order to prevent any harmful sedition arising among people from that cause—which we plainly see in other kingdoms—we promise jointly, for ourselves and our successors in perpetuity, under the bond of our oath, faith, honour and consciences, that those of us who are dissenters in religion will preserve peace among ourselves and will not shed blood because of different faith and variation in the churches, nor punish by confiscation of goods, loss of honour, imprisonment or exile; nor will we assist any authority or office in such a proceeding. Rather, wherever anyone wished to shed blood for this cause, we shall all be obliged to oppose it, even if someone wished to act under the pretext of a decree or some judicial proceeding. […] Nevertheless, by this our Confederation we do not derogate any authority of lords, spiritual or secular, over their subjects, and we do not break any obedience of subjects toward their lords; rather, if any such licence occurred anywhere under the pretext of religion, then, as has always been the case, every lord shall be free now to punish his disobedient subject, in spiritual as in secular matters, according to his own understanding.</p>
          <p class="source-citation"><strong>Event:</strong> Warsaw, 28 January 1573. <strong>Witness:</strong> printed main text of the 1859 reprint, collated against the downloaded image; the underlying diplomatic originals and their variants were not independently collated. <em>Volumina legum</em>, vol. 2, printed p. 124, external pp. 841–843 (Internet Archive leaves n434–n435), heading <em>CONFOEDERATIO GENERALIS WARSAVIENSIS</em>. Historical spellings <em>iest, spolnie, pokoy, rożney</em> preserved. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>The two halves belong together. The oath binds the swearers—nobles, and through them the political nation—to refuse confessional violence even when dressed as law; the limiting clause secures lordly jurisdiction over subjects, putting a peasant's "religious licence" against a lord outside the peace. The Confederation was simultaneously a real constraint on confessional persecution among the estates and a confirmation of coercive hierarchy within them. "Dissenters in religion" meant the Christian confessions represented among the political nation; the act did not legislate for Jews, Muslims or the unenfranchised as political claimants.</p>
        <figure><img loading="lazy" width="700" height="417" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Akt_Konfederacji_Warszawskiej.jpg?width=1400" alt="Wide parchment sheet covered in close handwriting, with a dense band of more than two hundred red, dark, and pale pendant seals clustered along its lower edge"><figcaption><strong>Peace as a material object</strong><p>The 1573 Act of the Warsaw Confederation, with its dense array of appended seals. The surviving document is not suitable for close transcription.</p><p class="figure-meta">28 January 1573, AGAD, Warsaw · contemporary document · public domain · <a href="https://commons.wikimedia.org/wiki/File:Akt_Konfederacji_Warszawskiej.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>Enforcement varied by reign and region. The Confederation did not prevent the later erosion of Protestant access to office or local violence, nor did it prevent the Commonwealth from remaining, by contemporary European standards, a place of unusual confessional coexistence. The right frame is neither "oasis" nor "failure" but a bounded, contested, estate-based peace whose terms the actors kept renegotiating.</p>
        <div class="interpretation"><h3>Tolerance without equality</h3><p>Apply four separate tests—legal protection, freedom of worship, access to office, everyday security—and the Confederation scores differently on each. Collapsing them into "tolerance" is how a bounded political guarantee becomes a national fairy tale.</p></div>
        <div class="question-box"><strong>Close reading</strong> In the limiting clause, who is the grammatical subject who may punish, and who is the object? What work is <em>sub praetextu religionis</em> doing? Draft the one-sentence claim this clause can support and the one-sentence claim it forbids.</div>
      </section>
      <section class="companion-section print-break" id="bathory"><p class="section-number">06 · A working king</p><h2>Stephen Báthory: reform through war and bargaining, 1576–1586</h2>
        <p class="lede dropcap">Stephen Báthory is often filed as the Commonwealth's last great king; the filing is not wrong so much as incomplete. He was an elected foreign prince ruling through instruments he had sworn before arrival, and his decade shows what the system could do when an able king worked with it—and what it cost to keep the bargain funded.</p>
        <p>His instruments were characteristic. The Gdańsk war ended not with destruction but with the Karnkowski Statutes: a fine, submission and confirmed privileges. The Crown and Lithuanian tribunals of 1578 and 1581 created elected noble appellate courts; the Vilnius academy, founded in 1579, anchored Catholic renewal; infantry reforms—the "chosen" levy from royal estates—widened the army's base. Each measure extended royal capacity by extending, not overriding, estate institutions.</p>
        <p>The Livonian War of 1579–1582 was his largest undertaking: campaigns recovered Polotsk and Velizh and besieged Pskov before the truce of Yam Zapolsky (1582), mediated by the papal envoy Antonio Possevino, secured Livonia. Victory depended on Sejm taxation negotiated campaign by campaign; a king who could not tax at will had to make war legible as the republic's own interest.</p>
        <blockquote class="source-excerpt" id="excerpt-election"><p class="source-label">Primary source 5 · free election in perpetuity, Henrician Articles, article 1</p>
          <p class="source-original" lang="pl">A My ustawiamy, y za prawa wieczne mieć chcemy, iż za żywota naszego, My y Potomkowie nasi Krolowie Polscy, y ciż Wielkie Xiążęta Litewskie, Ruskie, Pruskie, Mazowieckie, Żmudzkie, Kijowskie, Wołyńskie, Podlaskie, Inflantckie, y innych Państw nie mamy mianować, ani obierać, ani obierania iakiego składać żadnym sposobem, ani kształtem wymyślonym, Krola na Państwo, sukcessora naszego, wsadzać. A to dla tego, aby zawzdy wiecznemi czasy po ześciu naszym, y Potomkow naszych, wolne obieranie Krola zostawało wszem Stanom Koronnym. Dla czego y tytułu Haeredis używać nie mamy, ani Potomkowie nasi Krolowie Polscy.</p>
          <p class="source-translation">We establish and wish to hold it as perpetual law: during our life neither we nor our successors—the kings of Poland and likewise grand dukes of Lithuania, Ruthenia, Prussia, Mazovia, Samogitia, Kyiv, Volhynia, Podlasie, Livonia and the other dominions—shall nominate, choose or arrange by any manner or invented form the election of a king to the realm, installing our successor. This is so that, for all future time after our death and that of our successors, the free election of the king shall remain with all the estates of the Crown. Therefore neither we nor our successors, the kings of Poland, shall use the title "heir."</p>
          <p class="source-citation"><strong>Composition/event distinction:</strong> the articles were formulated in the first interregnum and election of 1573; the displayed printed witness is Stephen Báthory's confirmation issued in 1576. <strong>Witness:</strong> printed main text of the 1859 reprint, collated against the downloaded image. <em>Volumina legum</em>, vol. 2, printed p. 150, external pp. 896–897 (Internet Archive leaf n460), heading <em>Literae confirmationis articulorum Henrico Regi antea oblatorum</em>. Historical spellings <em>Xiążęta, Krolowie, sukcessora, ześciu</em> preserved. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>The composite titulature matters: one elected person held Crown and Grand Duchy as distinct dignities in a single act. "All the estates of the Crown" is estate language, not universal suffrage; the ban on the title "heir" writes the electoral principle into dynastic grammar—the crown would never be property. Báthory swore these articles and governed within them; his effectiveness came from using the system's levers, not escaping them.</p>
        <figure><img loading="lazy" width="481" height="911" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Kober_Stephen_Bathory.jpg?width=1000" alt="Full-length portrait of a bearded man standing against a dark background, wearing a long rust-red garment, dark fur cap, pale yellow boots, and a sword at his side"><figcaption><strong>The king as the court presented him</strong><p>Stephen Báthory by Martin Kober (1583). Court image-making, not a neutral record of rule.</p><p class="figure-meta">Martin Kober, 1583, Missionary Fathers Museum, Kraków · contemporary portrait · public domain · <a href="https://commons.wikimedia.org/wiki/File:Kober_Stephen_Bathory.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Strong king, strong system, or both?</h3><p>Older narratives treat Báthory as proof the Commonwealth needed strong monarchs; republican readings note his strength was exercised through tribunals, Sejm consent and negotiated settlements. The documents support a combined claim: the elective system could empower an effective ruler precisely because it disciplined him.</p></div>
        <div class="question-box"><strong>Governance audit</strong> List Báthory's major measures and mark each as extending royal capacity, extending estate institutions, or both. What does the pattern suggest about where "strength" lived in this polity?</div>
      </section>

      <section class="companion-section" id="orders"><p class="section-number">07 · Society</p><h2>Social orders and unequal lives</h2>
        <p class="lede">The Commonwealth's inhabitants were sorted by law and custom into estates whose boundaries structured nearly everything: who could vote, hold office, own land, bear which arms, sue in which court. The sorting was never total—people moved, bargained, converted, served, fled and bought their way across lines—but the lines were real, and they drew the map of who the Commonwealth's liberty was for.</p>
        <p>Below the magnates, the mass of the nobility ranged from comfortable landholders to the <em>gołota</em>—landless nobles whose votes and swords made them clients. Townspeople governed markets and guilds under municipal law but were mostly excluded from the political nation. Peasants—the large majority—owed labour, dues and obedience within their lords' jurisdiction, though conditions varied sharply by region and flight, negotiation and village custom gave labour a bargaining history legal categories miss.</p>
        <p>Outside the standard grid stood mobile and corporate communities. Jews lived under royal and town privileges, organized in kahals with their own courts, working as traders, craftspeople, physicians, leaseholders and estate managers—indispensable to the magnate economy and exposed to its resentments. Armenians in Lviv kept their church and law while trading east; Lipka Tatars held land for military service and maintained Islam; Scots peddled and settled by the thousand; Roma, Mennonite settlers, Italian architects and German printers occupied niches "a Catholic noble republic" does not describe.</p>
        <p>Women's position crossed every estate. Noble women managed estates during husbands' campaigns, held dowers, litigated and ran patronage networks; Anna Jagiellon was co-elected in 1575. Urban widows continued workshops and sued in town courts. Peasant women's labour underwrote the entire structure and appears mainly through dues and inventories. The archive's silence is graded: queens richly, townswomen intermittently, village women mostly when a lord's accounts required it.</p>
        <div class="caution"><strong>Reading estate evidence.</strong> A law describes the order it wants; a court case describes a conflict; an inventory describes possessions; a privilege describes a claim. None describes a typical life. Social history begins when these genres are read against each other.</div>
        <div class="interpretation"><h3>Hierarchy with doors</h3><p>The estate system was both rigid and porous: conversion, ennoblement, marriage, military service and commerce moved individuals across boundaries while leaving them intact. Rigidity explains the system's durability; porosity explains why it rarely needed total violence. The Commonwealth shows both at once.</p></div>
        <div class="question-box"><strong>Perspective exercise</strong> Choose five inhabitants of one town around 1600—noble leaseholder, Jewish trader, Lutheran artisan, peasant migrant, magnate's client. For each, name one right they hold, one court that would hear them, one tax they pay, and one door that is closed to them.</div>
      </section>

      <section class="companion-section" id="grain"><p class="section-number">08 · Economy</p><h2>Land, labour, credit and the Baltic grain route</h2>
        <p class="lede dropcap">Each autumn, rafts and barges of rye and wheat moved down the Vistula toward Gdańsk, where Dutch hulls waited. The Baltic grain trade tied the Commonwealth to western Europe's cities and made estate owners rich. It also stood at the centre of the period's hardest social question: how export demand and noble power together intensified the coercive labour regime of the folwark.</p>
        <p>The mechanism had two hands. On the market side, western demand raised grain prices and made demesne export production profitable; on the power side, noble jurisdiction restricted peasant mobility and labour dues (<em>pańszczyzna</em>) rose toward, in heavy regions, most of the working week. The classic "second serfdom" thesis connected the two directly—eastern coercion answered western demand—but later research complicates the arrow: regional variation was extreme, labour services rose in places with little export access, demography mattered, and peasants bargained and fled. The folwark was an institution of power before it was a business.</p>
        <figure><img loading="lazy" width="468" height="322" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Vistula_grain_transport.jpg?width=1400" alt="River scene with low cargo barges and timber rafts crowded with workers and goods, moving across broad water toward a busy distant shore"><figcaption><strong>Export as a contemporary imagined it</strong><p>Barges and rafts on the Vistula by Isaak van den Blocke (1608), part of a Gdańsk civic allegory. Contemporary representation, not a quantitative record of trade or labour.</p><p class="figure-meta">Isaak van den Blocke, 1608 · contemporary allegorical-economic scene · public domain · <a href="https://commons.wikimedia.org/wiki/File:Vistula_grain_transport.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>The profits were socially lopsided by design. Noble and royal immunities kept much of the trade's fiscal yield out of the treasury—the 1638 customs constitution in §16 shows the Sejm asserting a claim while shielding noble and Prussian exemptions. Handling towns grew rich; competing towns were squeezed; peasant households carried the labour and the harvest risk. Mikołaj Malinowski's quantitative work places Commonwealth real wages on a diverging downward path against the west—evidence that export prosperity and popular living standards could move in opposite directions.</p>
        <p>Credit tied the system together: magnates borrowed against future harvests, Gdańsk and Amsterdam merchants advanced money on grain not yet cut, Jewish leaseholders and factors managed dues and estate income. When war or harvest failure broke the chain, the costs landed first on those who could not pass them on.</p>
        <div class="interpretation"><h3>Was there a "second serfdom"?</h3><ul><li><strong>Export-coercion:</strong> western demand made coercive demesne farming profitable and powered its expansion.</li><li><strong>Power-first:</strong> noble jurisdiction and weak peasant protection made coercion available; the market decided where it paid.</li><li><strong>Regional:</strong> answers differ between Royal Prussia, Mazovia, Greater Poland and the Ruthenian southeast—a national average is precisely what the evidence forbids.</li></ul></div>
        <div class="question-box"><strong>Evidence question</strong> A port register shows grain exports rising. What further records—manorial accounts, court registers, price series, village inventories—would you need to show who produced the surplus, at what labour cost, and with what effect on peasant consumption?</div>
      </section>

      <section class="companion-section print-break" id="gdansk"><p class="section-number">09 · A city in the republic</p><h2>Royal Prussia and Gdańsk: a port within, not an appendage</h2>
        <p class="lede">Royal Prussia had joined the Crown in 1466 as a privileged province with its own estates, laws and identity—Prussian, German-speaking in its cities, Catholic and increasingly Lutheran. Gdańsk, its greatest city, was one of northern Europe's major ports, rich enough to fight a king and connected enough to make fighting it expensive.</p>
        <p>The relationship was loyalty negotiated through privilege. Gdańsk resisted Báthory's election in 1576, was defeated at the city's approaches, and settled in 1577 for a fine and confirmed liberties—the republic's characteristic exchange of submission for law. The city then served as the Commonwealth's commercial lung and most reliable fiscal contributor while guarding exemptions that frustrated every treasury. Karin Friedrich's work shows a province that thought of itself as the Commonwealth's conscience: Prussian liberty as the purest form of general liberty.</p>
        <blockquote class="source-excerpt" id="excerpt-customs"><p class="source-label">Primary source 6 · the Sejm on Baltic customs and Prussian privilege, 1638</p>
          <p class="source-original" lang="pl">… chcąc ius maris Baltici od Przodkow naszych Krolow Polskich, y W. X. Lit., zawżdy w całości conservare, do skutku przywiesć, Kommissarzow z oboyga narodow, authoritate Seymu naznaczamy … A ponieważ obywatele stanu szlacheckiego Woiewodztw Pruskich, przykładem idąc wszystkiey Korony, y W. X. Lit. boni publici causa konsens swoy ochotnie na cła portowe dali: y dla tego konfirmuiąc im priuilegium incorporationis reciproca sponsionis, y insze wszystkie dawne, quibus, hactenus gaudebant, legitime nadanych, przywileie deklaruiemy, że iako totż hujus Regni nobilitati, tak y im świeżo ustawione cła portowe cum immunitatibus, ktore ich liberos ab omni exactione czynią, a pogotowiu w inszych punktach w pomienionych przywileiach wyrażonych, nie mogą derogare.</p>
          <p class="source-translation">… wishing to preserve in its entirety the right over the Baltic Sea [handed down] from our predecessors, the kings of Poland and grand dukes of Lithuania, and to bring it into effect, by the Sejm's authority we appoint commissioners of both nations … And since the inhabitants of the noble estate of the Prussian palatinates, following the example of the whole Crown and the Grand Duchy of Lithuania, willingly gave their consent to the port customs for the sake of the public good, therefore, confirming for them the privilege of incorporation by reciprocal promise and all other old privileges lawfully granted which they have hitherto enjoyed, we declare that the newly established port customs cannot derogate either from the immunities of the nobility of this kingdom—which make them free from every exaction—or from the other points expressed in the said privileges.</p>
          <p class="source-citation"><strong>Event and composition:</strong> Warsaw Sejm of 1638, constitution no. 9, "On sea customs." <strong>Witness:</strong> printed main text of the 1859 reprint, collated against the downloaded image. <em>Volumina legum</em>, vol. 3, printed p. 441, external p. 930 (Internet Archive leaf n1247). Historical spellings <em>zawżdy, konsens, priuilegium, czynią</em> preserved. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>The constitution performs the Commonwealth's fiscal dilemma in a single text: it asserts a royal <em>ius maris Baltici</em> and appoints commissioners to make customs real—then confirms they cannot touch noble immunities or Prussian privileges. Claim and limits are enacted together. This is evidence for negotiated fiscal practice and for the republic's self-image as Christendom's <em>antemurale</em>, not for actual customs revenue or maritime power.</p>
        <div class="interpretation"><h3>City-state, province or port?</h3><p>Gdańsk was at once a self-governing civic community, a Royal Prussian estate with provincial loyalties, and the Commonwealth's gate to the Baltic. Each identity supplied language for different disputes—against kings, for the republic, against the nobility's trade privileges, for the province. The city's history in this period is the art of using all three.</p></div>
        <div class="question-box"><strong>Source prompt</strong> In the customs constitution, identify every clause that extends state power and every clause that limits it. Which side gets more words, and what does that distribution tell you about where the authors expected resistance?</div>
      </section>

      <section class="companion-section" id="communities"><p class="section-number">10 · Legal pluralism</p><h2>Plural communities and plural law</h2>
        <p class="lede dropcap">The Commonwealth governed difference institutionally. Jewish kahals ran courts, welfare and taxation under royal privilege; Armenians judged their own cases in Lviv; Lipka Tatars held land by military service and kept their mosques; Karaites, Mennonites, Scots and Orthodox brotherhoods lived within a lattice of privileges and jurisdictions. The system protected communities—and priced the protection.</p>
        <p>Jewish communal life reached a distinctive institutional height. The Council of Four Lands (<em>Va'ad Arba Aratsot</em>), emerging from the 1580s, coordinated taxation and representation across the Crown's kahals, with a Lithuanian counterpart; Hebrew printing flourished in Kraków and Lublin. At the same time Jews were excluded from citizenship, confined by town privileges and <em>de non tolerandis Judaeis</em> clauses, subjected to blood-libel accusations, and bound into the magnate economy as leaseholders and estate managers—positions that made them visible agents of an unpopular system. Autonomy and vulnerability were the same settlement's two faces.</p>
        <figure><img loading="lazy" width="1136" height="814" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Synagogue_Zamosc_2011_-_inside1.JPG?width=1400" alt="Bright vaulted synagogue interior after restoration, with pale walls, broad arches, decorative plasterwork, windows, and an open central floor used as an exhibition space"><figcaption><strong>An anchor for urban Jewish life—with a restoration caveat</strong><p>Restored interior of the Zamość Synagogue (2011). The building anchors discussion of Jewish urban life; the photograph is a modern interior, not an unchanged period room.</p><p class="figure-meta">MaKa~commonswiki, April 2011 · modern photograph of restored fabric · CC BY-SA 4.0 · <a href="https://commons.wikimedia.org/wiki/File:Synagogue_Zamosc_2011_-_inside1.JPG">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>Legal pluralism had no principle of equality underneath it. Privileges were grants—revocable and uneven; the same community could be protected in one town and expelled from another. What the system supplied was predictability of a limited kind: communities knew which court, charter and patron to approach, and invested heavily in all three. That is a mode of government, not a synonym for security.</p>
        <div class="interpretation"><h3>Autonomy or inequality?</h3><p>Corporate privilege defended communal institutions—worship, courts, schools, charity—and simultaneously hardened the boundary that kept communities outside the political nation. Read protection and subordination from the same document: a royal privilege to a kahal proves both that the community could organize and that its standing depended on a grant no kahal could legislate.</p></div>
        <div class="question-box"><strong>Jurisdiction mapping</strong> For a lease dispute, a sabbath-violation accusation, an inheritance and an assault in one town, identify which court—kahal, municipal, castle, church, magnate's—would claim jurisdiction for a Jewish artisan, an Armenian merchant and a Catholic noble. Where do the maps overlap, and who chooses between them?</div>
      </section>

      <section class="companion-section" id="brest"><p class="section-number">11 · Churches</p><h2>Reformation, Catholic renewal and the Union of Brest</h2>
        <p class="lede">By 1569 the Commonwealth contained Europe's most varied confessional landscape: Latin Catholics, Orthodox in the Ruthenian lands, Lutherans in Royal Prussia, Reformed and Bohemian Brethren congregations under noble patronage, anti-Trinitarians whose Racovian academy became a European byword, alongside Jews, Muslims, Armenians and Karaites. The following half-century changed the balance—not by mass conversion but by institutional competition.</p>
        <p>Catholic renewal worked through schools, printing and patronage: Jesuit colleges trained noble elites, Báthory's Vilnius university anchored the order in the Grand Duchy, bishops reformed clergy along Tridentine lines. Protestantism, divided among its own confessions and dependent on noble patrons, slowly yielded the initiative. By the 1620s the political nation's confessional profile had shifted decisively toward Catholicism.</p>
        <p>The Orthodox Church of the Ruthenian lands faced its own crisis: lax episcopal discipline, laity organized in brotherhoods (<em>bratstva</em>) running schools and presses, and distant Constantinopolitan oversight. Into this came the project of church union—communion with Rome while retaining the Byzantine rite—negotiated by bishops with royal support and proclaimed at the Brest synod of 1596. Bishops who accepted became the Uniate (later Greek Catholic) Church; those who refused, backed by brotherhoods, nobles like Konstantyn Ostrogski, lower clergy and Cossacks, reconstituted an Orthodox hierarchy in 1620–1621. One church became two, and the division mapped onto estate, region, language and politics without ever coinciding with any single one.</p>
        <figure><img loading="lazy" width="800" height="1100" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/%D0%A3%D1%81%D0%BF%D0%B5%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D1%86%D0%B5%D1%80%D0%BA%D0%BE%D0%B2%D1%8C_%D0%B2_%D0%9B%D1%8C%D0%B2%D0%BE%D0%B2.jpg?width=1000" alt="Street-level view of an Eastern Christian church complex beneath a blue sky, with a green-domed chapel and a tall square bell tower of stone and brick rising above surrounding buildings"><figcaption><strong>Brotherhood stone in Lviv</strong><p>The Dormition Church and Korniakt Tower in Lviv (2011). A modern view of a preserved and altered monument; visible fabric cannot be projected unchanged into the early seventeenth century.</p><p class="figure-meta">Petar Milošević, 22 July 2011 · modern photograph of surviving fabric · CC BY-SA 3.0 · <a href="https://commons.wikimedia.org/wiki/File:%D0%A3%D1%81%D0%BF%D0%B5%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D1%86%D0%B5%D1%80%D0%BA%D0%BE%D0%B2%D1%8C_%D0%B2_%D0%9B%D1%8C%D0%B2%D0%BE%D0%B2.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>This reader quotes no Brest text: no original-language edition of the union articles could be collated to this series' standard. The historiographical caution matters as much as the textual one: "reunion," "conversion," "apostasy" and "defence of Rus' tradition" are the actors' own fighting words. Brest can be read as Catholic triumph, Orthodox catastrophe, Ruthenian bid for equal standing within Latin Christendom, or royal administrative project; the evidence supports a dispute in which all four claims were made, by name, by participants.</p>
        <div class="interpretation"><h3>Reunion, conversion or fracture?</h3><p>Map the positions: Rome read reconciliation of the schism; Uniate bishops read legitimate continuity of their church under new communion; Orthodox writers read betrayal and coercion; the crown read administrative simplification; brotherhoods read lay guardianship of the faith. The event's meaning was itself the battlefield.</p></div>
        <div class="question-box"><strong>Four-test audit</strong> Apply the four tests from §5—legal protection, worship, office, everyday security—to Orthodox nobles before 1596, Uniate priests after 1596, anti-Trinitarians in 1600, and a Jewish community throughout. Where does the Confederation's framework hold, and where has the confessional landscape moved beneath it?</div>
      </section>
      <section class="companion-section print-break" id="neighbourhood"><p class="section-number">12 · The urban scale</p><h2>Living difference: Vilnius, Lviv and the neighbourhood scale</h2>
        <p class="lede dropcap">Confessional and legal pluralism was not an abstraction on a map; it was the street you lived on. David Frick's microhistory of seventeenth-century Vilnius reconstructs a city where Catholic, Orthodox, Uniate, Lutheran, Calvinist, Jewish and Muslim neighbours married, traded, sued, buried and fought within walking distance. Difference was managed house by house—and so was conflict.</p>
        <p>Vilnius was the Grand Duchy's most layered city: Ruthenian and Polish print, the Jesuit university beside Orthodox brotherhood schools, Lipka Tatar villages at its edge, a Jewish quarter under kahal governance. Lviv performed a similar density for the Crown's Ruthenian lands: Armenian, Latin and Orthodox jurisdictions, a powerful brotherhood beside the Dormition church, merchant courts moving between languages within a single ledger. These cities were not islands of cosmopolitanism; they were the Commonwealth's ordinary urban form, working through proximity what the constitution only sketched.</p>
        <p>Coexistence had rhythms and limits. Mixed marriages required confessional negotiation; funerals processed through streets watched by other rites; epidemics and wartime requisitions tested every boundary at once. Frick's lesson is methodological as much as local: the archive of coexistence is litigation and property record, not professions of tolerance, and it shows people using institutions to live with difference they did not have to love.</p>
        <div class="interpretation"><h3>Neighbourliness as evidence</h3><p>A shared well, a disputed wall and a joint fair tell different truths about pluralism than a confederation's oath. Neither scale replaces the other: the oath without the street is ideology; the street without the oath is anecdote. The Commonwealth's religious history has to be written at both resolutions simultaneously.</p></div>
        <div class="question-box"><strong>Microhistory brief</strong> Pick one Vilnius street corner in 1630. List every institution—parish, brotherhood, kahal, guild, court, school—within a ten-minute walk, and one dispute each could generate. What does the density itself explain?</div>
      </section>

      <section class="companion-section" id="vasa"><p class="section-number">13 · A Swedish king in Kraków</p><h2>Sigismund III Vasa: dynasty, confession and constitutional conflict, 1587–1632</h2>
        <p class="lede">The election of 1587 split the political nation between the Habsburg Maximilian and Sigismund of Sweden, son of John III Vasa and the Jagiellonian Catherine. Sigismund won the field at Byczyna and ruled the Commonwealth for forty-five years—while inheriting the Swedish crown in 1592 and losing effective control of Sweden by 1599. The double kingship dragged the Commonwealth into a Vasa civil war and kept a dynastic claim alive at the centre of its foreign policy for decades.</p>
        <p>Sigismund was devoutly Catholic at a court identified with Catholic renewal. Suspicions that he plotted <em>absolutum dominium</em> fed the rokosz of Mikołaj Zebrzydowski (1606–1609), the estate's legal theory made armed—a confederated rising claiming the king had violated his sworn articles. The rebels demanded confirmation of liberties and accountability for ministers; the king defended his prerogative; the Sejm eventually mediated. Nobody won cleanly, which was the point: the system absorbed an armed constitutional strike without either abolishing kingship or letting it grow.</p>
        <figure><img loading="lazy" width="1150" height="1543" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Sigismund_III_of_Poland-Lithuania_and_Sweden_%28Martin_Kober%29.jpg?width=1000" alt="Three-quarter-length portrait of a man in black clothing and cap, a large white pleated ruff, and a spotted white fur-lined mantle, standing before red drapery"><figcaption><strong>Dynastic rank as costume</strong><p>Sigismund III Vasa by Martin Kober, c. 1590. Dynastic image-making, not a record of a specific act.</p><p class="figure-meta">Martin Kober, c. 1590, Kunsthistorisches Museum, Vienna · contemporary portrait · public domain · <a href="https://commons.wikimedia.org/wiki/File:Sigismund_III_of_Poland-Lithuania_and_Sweden_(Martin_Kober).jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>The reign's achievements were real: the Commonwealth took Smolensk in 1611, and a Polish-held garrison briefly occupied the Kremlin in 1610–1612. The truce of Deulino (1618) carried the Commonwealth to its greatest territorial extent. Yet the same decades hardened the confessional establishment, left the Cossack register unresolved, and spent political capital on a Swedish claim most of the nation did not share. Sigismund's fidelity to dynasty and church was sincere; sincerity is no defence against the charge that both pulled policy away from the republic's negotiated centre.</p>
        <div class="interpretation"><h3>Order versus anarchy—or two republican languages?</h3><p>Royal propaganda framed the rokosz as rebellion against lawful authority; rebel articles framed it as liberty's self-defence under the 1573 settlement. Both sides quoted the same constitution. The conflict is better read as an argument inside one political language than as law fighting chaos.</p></div>
        <div class="question-box"><strong>Classify the claims</strong> Take a royal justification and a rokosz article and sort every grievance as legal, religious, fiscal or personal. Which categories dominate each side, and what does the sorting reveal about what each thought the constitution was for?</div>
      </section>

      <section class="companion-section" id="north"><p class="section-number">14 · Northern war</p><h2>Sweden, Livonia and Muscovy: the northern and eastern theatres</h2>
        <p class="lede dropcap">Livonia—roughly modern Latvia and Estonia—was the Baltic's contested margin, claimed in pieces by the Commonwealth, Sweden and Muscovy. Control meant tolls, grain routes and strategic depth; war there was almost continuous from 1600 to 1629 and taught the Commonwealth both its military strengths and their fiscal limits.</p>
        <p>The Swedish war of 1600–1611 opened with Sigismund's attempt to use Livonia to recover his Swedish throne; the political nation funded it fitfully, suspecting a dynastic war dressed as a common one. At Kircholm in 1605 the Lithuanian hetman Jan Karol Chodkiewicz, outnumbered roughly three to one, destroyed the Swedish army with massed hussar charges. The war ended in stalemate because victories could not be converted into occupation without money, and money required Sejms.</p>
        <figure><img loading="lazy" width="1986" height="1200" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Pieter_Snayers_-_Battle_of_Kircholm%2C_1605.jpg?width=1400" alt="Wide panoramic battle painting with massed cavalry and infantry formations spread across an open landscape, smoke rising from the foreground fighting and distant troops extending toward the horizon"><figcaption><strong>Victory, painted two decades on</strong><p>Pieter Snayers's 1620s panorama of the 1605 Battle of Kircholm. A commemorative, not tactical, representation.</p><p class="figure-meta">Pieter Snayers, 1620s · near-contemporary retrospective painting · public domain · <a href="https://commons.wikimedia.org/wiki/File:Pieter_Snayers_-_Battle_of_Kircholm,_1605.jpg">Wikimedia Commons</a>.</p></figcaption></figure>
        <p>The eastern theatre brought the deepest intervention: the Commonwealth supported the False Dmitrys, then intervened directly; the Smolensk siege of 1609–1611 and the Klushino victory of 1610 briefly made a Vasa tsardom conceivable. It failed on religion, legitimacy and logistics, and the Romanov restoration turned the humiliation into founding memory. Deulino (1618) kept Smolensk and Chernihiv—maximum extent—but Gustavus Adolphus took most of Livonia in the 1620s, and the truces of Altmark (1629) and Stuhmsdorf (1635) confirmed the loss while opening Prussian ports to Swedish tolls. The balance sheet was double: prestige and territory in the east, erosion in the Baltic, and a fiscal structure strained by both.</p>
        <div class="interpretation"><h3>Winning battles, losing wars?</h3><p>Kircholm and Klushino show tactical excellence; Altmark shows strategic deficit. The gap between them is the fiscal-military question in its purest form: the Commonwealth could produce superb cavalry faster than it could produce reliable pay, and in long wars pay wins.</p></div>
        <div class="question-box"><strong>Campaign ledger</strong> For one campaign—Polotsk 1579, Kircholm 1605 or Smolensk 1609—reconstruct who voted the money, who supplied the troops, who profited from the outcome and who paid for the failure. Where in the chain does the "Commonwealth" as an actor actually appear?</div>
      </section>

      <section class="companion-section print-break" id="southeast"><p class="section-number">15 · The steppe frontier</p><h2>The Ottoman frontier: diplomacy, raiding and Khotyn</h2>
        <p class="lede">The Commonwealth's southeast faced the greatest military power of the age and its most mobile auxiliary. Ottoman diplomacy and Crimean Tatar raiding structured life from Podolia to the Dnipro: tribute and truce between courts, slave-raiding and counter-raiding across the frontier. This was managed hostility, not crusade, and both sides understood the rules they kept breaking.</p>
        <p>The frontier's economy was violence. Tatar war bands (<em>czambuły</em>) took captives by the tens of thousands; defence ran through border fortresses, registered Cossacks and magnate retainers; ransoming captives became an institution with its own brokers. The steppe was a zone of contact—trade, intelligence, defection—in which the Zaporozhian Cossacks were simultaneously the Commonwealth's buffer and its problem.</p>
        <p>When war came to the field, it came large. At Cecora (Țuțora) in 1620 the hetman Stanisław Żółkiewski, deserted by most of his army, died in catastrophic defeat. The Ottoman response brought Sultan Osman II himself to Khotyn (Chocim) in 1621, where Chodkiewicz's fortified camp, reinforced by Petro Sahaidachny's Cossacks, held the Ottoman army through September until negotiation ended the campaign. Chodkiewicz died in the camp; Osman was deposed by his own janissaries. Khotyn entered Commonwealth memory as Christendom's shield-wall and Ottoman memory as a lesson in overreach; both memories are evidence about 1621 and about the remembering.</p>
        <div class="interpretation"><h3>Bulwark rhetoric, frontier practice</h3><p>The <em>antemurale christianitatis</em>—the bulwark of Christendom—was the republic's favourite self-description, printed into constitutions like the 1638 customs law. Frontier practice was less chivalric: truces bought with gifts, raiding tolerated by both sides until it wasn't, Cossack campaigns to the Black Sea celebrated and disowned in the same Sejm. The rhetoric and the practice are both real; confusing them is how the frontier becomes myth.</p></div>
        <div class="question-box"><strong>Frontier simulation</strong> Negotiate a one-year settlement among the Commonwealth court, the Crown hetman, GDL senators, Ottoman diplomats, the Crimean khan, the Cossack host and the Moldavian ruler. Each delegation must name one actor it cannot fully control. What breaks first?</div>
      </section>

      <section class="companion-section" id="fiscal"><p class="section-number">16 · War and money</p><h2>The fiscal-military bargain: formidable forces, fragile payment</h2>
        <p class="lede dropcap">The Commonwealth fielded some of Europe's most effective cavalry and most inventive light forces—and paid for them with a fiscal system designed to make permanent taxation nearly impossible. Understanding why requires no theory of national fecklessness: the system worked as the enfranchised estate intended, and its intentions were the problem.</p>
        <p>The army had layers. The <em>pospolite ruszenie</em>, the general levy of the nobility, was by this period a declining instrument—expensive to call, reluctant to serve far or long, its terms fixed by the Henrician Articles. The professional core was the <em>wojsko kwarciane</em>, paid from the <em>kwarta</em>, a fixed share of royal-domain revenues: small, excellent, chronically under strength. Around it stood magnate retinues, hired infantry and artillery, the registered Cossacks and frontier garrisons. Total war meant assembling all of these, each with its own paymaster.</p>
        <p>Taxation was negotiated per campaign: the Sejm voted the <em>pobór</em> and other levies for stated purposes and durations, sejmiks assessed and often resisted, and the Crown and Lithuanian treasuries collected separately and ran separate debts. Noble estates enjoyed broad immunities—recall the 1638 customs law's shielding clauses—so the fiscal base shrank as military costs grew. Unpaid armies confederated, occupying estates until paid. The system's legitimacy was high and its yield low, and that combination, not any single veto, was the Commonwealth's structural military problem in this period.</p>
        <blockquote class="source-excerpt" id="excerpt-election-order"><p class="source-label">Primary source 7 · discipline of the assembled estate, election order of 1573</p>
          <p class="source-original" lang="pl">Aby się każdy tak na stanowiskach swoich, iako w mieście, tak na przedmieściu, a pogotowiu na tych mieyscach, gdzie się Woiewodztwa do namiotow swych zieżdżaią, y tam gdzie IchMość ze wszystkim Rycerstwem do rady zasiadaią; także y w potykaniu ieden drugiego w drodze, namiocie, spokoynie ieden przeciw drugiemu zachował: a owszem żeby się zwad ieden z drugim strzegł, także tumultow, rozruchow, sedycyi, aby żaden czynić, ani do nich przyczyny dawać nie śmiał.</p>
          <p class="source-translation">That everyone, both in their assigned quarters in the city and in the suburbs, and especially in those places where the palatinates gather to their tents and where their lordships sit in council with all the knighthood—and likewise in encounters on the road and in the camp—should conduct themselves peacefully one toward another; rather, each should avoid quarrels with another, and no one should dare to cause tumults, disturbances or sedition, nor give occasion for them.</p>
          <p class="source-citation"><strong>Event and composition:</strong> order for the general election Sejm, issued by the councillors and knighthood near Warsaw at Kamień, 6 April 1573. <strong>Witness:</strong> printed main text of the 1859 reprint, collated against the downloaded image. <em>Volumina legum</em>, vol. 2, printed p. 125, external p. 844 (Internet Archive leaf n435), clause 2, heading <em>PORZĄDEK NA SEYMIE WALNYM</em>. Historical spellings <em>mieyscach, zieżdżaią, tumultow</em> preserved. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>The election order belongs beside the Confederation: one secured confessional peace, the other the physical peace of an armed mass electorate. Tens of thousands of armed nobles choosing a king required rules about weapons, quarters, traffic and quarrels—down to bridge-crossing hours and confiscated drink carts. The order is evidence that the political nation understood its own assembly as a security problem, and that armed presence was the normal condition of noble politics. The same armed capacity, underpaid and uncommanded, later turned soldiers' confederations into the republic's fiscal police.</p>
        <div class="interpretation"><h3>Weak state or strong society?</h3><p>Fiscal historians describe an under-powered centre; political historians describe an unusually empowered political class. Both describe the same ledger from different sides. The interesting question is not why the centre failed to extract, but why the estate preferred a republic it could not cheaply defend.</p></div>
        <div class="question-box"><strong>Budget workshop</strong> You are the Crown treasurer in 1620. List your three largest revenue claims and the legal obstacle attached to each. Then propose one reform and name the political price of proposing it.</div>
      </section>

      <section class="companion-section print-break" id="magnates"><p class="section-number">17 · The top of the estate</p><h2>Magnates, clients and local politics: domination without omnipotence</h2>
        <p class="lede">Above the mass of the nobility stood a thin stratum of magnate families—Radziwiłł, Zamoyski, Ostrogski, Zbaraski, Wiśniowiecki, Lubomirski, Chodkiewicz—whose latifundia, offices and retinues made them powers beside the king. In the Grand Duchy their position was older and grander; in the Crown their rise is one of the period's central social facts.</p>
        <p>A magnate's power was a network, not a title. Senatorial offices brought precedence; starosties brought royal revenue and jurisdiction; marriages bound kin; credit bound everyone else; clients—lesser nobles holding the patron's land, offices or protection—voted in sejmiks as directed more often than the ideal of noble independence admits. Antoni Mączak reads this as a political system, not corruption: where the state is thin, government runs through personal bonds, and the magnate household is infrastructure.</p>
        <p>Domination had limits: sejmiks could defy patrons, royal favour could build counter-clients, confessional choices split families, the tribunals gave middling nobles venues magnates could not wholly control, and the greatest fortunes carried the greatest debts. Jan Zamoyski—chancellor, hetman, founder of Zamość—could oppose kings and win elections, yet even he worked through sejmik and Sejm. The magnate question is not whether they ruled but how much of the republic's business had to pass through them; the answer varies by region and decade.</p>
        <div class="interpretation"><h3>Oligarchy inside a republic?</h3><p>The formal equality of the 1638 titles constitution and the practical inequality of the clientage system are not contradictions but layers: the law forbade rank, the market for protection created it. Reading magnate power as simply the republic's failure misses how much of its capacity—armies raised, towns founded, churches built—was magnate work.</p></div>
        <div class="question-box"><strong>Patronage network analysis</strong> Diagram one magnate household: offices, kin, credit, confessional patronage, clients, towns, military retainers. In 200 words, mark where reciprocal exchange becomes coercion—and say what evidence could tell the difference.</div>
      </section>
      <section class="companion-section" id="culture"><p class="section-number">18 · Culture</p><h2>Schools, print, language, art and Sarmatian self-fashioning</h2>
        <p class="lede dropcap">The Commonwealth's high culture was as plural as its society and as unequal in its reach. Jesuit and brotherhood schools taught in Latin, Polish and Ruthenian; presses in Kraków, Vilnius, Lviv, Zamość and Raków produced everything from statutes to anti-Trinitarian theology; a political nation trained on Cicero read its own republic through Roman categories. Culture was one of the estate's ways of knowing itself.</p>
        <p>"Sarmatism" names the nobility's self-fashioning: the genealogical fiction of descent from ancient Sarmatian warriors, and the material style—forelocks, the <em>żupan</em> and <em>kontusz</em>, sabres, Persian and Turkish textiles, lavish funerals with coffin portraits. Tomasz Grusiecki warns against reading these imports as passive "oriental influence": Ottoman and Persian goods were actively collected, adapted and made local. Sarmatism was not a timeless national essence but a changing political and material culture, younger in 1600 than its mythology claimed and different in meaning in 1640 than in 1580.</p>
        <p>Language marked every boundary and crossed it: Latin governed law, scholarship and diplomacy; Polish expanded as the Crown's language of politics and print; Ruthenian chancery and literary traditions continued in the Grand Duchy and brotherhood schools; German, Italian, Yiddish, Armenian, Tatar and Lithuanian organized urban and confessional life. Print made the estate's politics public in a new key—Sejm diaries, polemics, funeral sermons, rokosz pamphlets circulating among readers trained to argue back. A culture of print helped create the political nation it described.</p>
        <div class="interpretation"><h3>Costume as constitution?</h3><p>Reading Sarmatian dress and funerary ritual as ideology reveals the estate's self-image: warrior liberty, equality within the brotherhood, distance from both court fashion and burgher sobriety. Reading the same objects as commerce reveals the trade routes and workshops that produced the image. Neither reading is complete alone; the kontusz is simultaneously politics and textile.</p></div>
        <div class="question-box"><strong>Object biography</strong> Trace one object—a kontusz sash, a printed statute, a coffin portrait, a sabre—through makers, materials, scripts, owners and later museum labels. Identify one "national" label that obscures the object's actual circulation.</div>
      </section>

      <section class="companion-section print-break" id="cossacks"><p class="section-number">19 · The unsolved question</p><h2>The Cossack question and the remaking of the Ukrainian frontier</h2>
        <p class="lede">South and east of the settled palatinates, in the Dnipro corridor and the lands beyond its rapids, grew a military community the Commonwealth could neither do without nor fit into its estate order. The Zaporozhian Cossacks—free frontiersmen living by war, trade and raid—defended the steppe margin, served in its wars and demanded a place in its law. The republic's repeated answer was to register a few, use them, and refuse the rest. The refusal is the prehistory of 1648.</p>
        <p>The register was the system's core bargain: a fixed number of Cossacks—6,000 in the 1620s, briefly 40,000 after Khotyn, cut again—received pay, privileges and recognized status; those outside it remained, in law, peasants. Magnate colonization pressed from the other side: great estates spread through the Kyiv and Bratslav palatinates, bringing folwark labour, Jewish lease-management and Orthodox dispossession into regions the Cossacks regarded as their own. After Brest most Cossacks stood with Orthodoxy, and their petitions made church, status and liberty one demand.</p>
        <p>Uprisings punctuated the decades—Kosiński 1591–1593, Nalyvaiko 1594–1596, Żmailo 1625, Pavliuk 1637, Ostrzanin and Hunia 1638. Each was suppressed; each settlement cut the register and tightened control. The Sejm's 1638 Ordinance of the Registered Host is the system speaking at its most confident.</p>
        <blockquote class="source-excerpt" id="excerpt-ordinance"><p class="source-label">Primary source 8 · the victorious Sejm abolishes Cossack self-government, 1638</p>
          <p class="source-original" lang="pl">Lubo to iest nasze unicum w sprawowaniu Państw tych desiderium szukać takich okazyi, w ktorychby doznawali zawsze wierni poddani nasi Regiam nostram clementiam; lecz iż swawola Kozacka tak się bardzo wyuzdała, że też uskramiaiąc ią, przyszło woyska nasze y Rzpltey przeciwko nim ruszyć, y manus z nimi conserere, a za zdarzeniem Boskim, iako wszystkich woysk Zastępow Pana, pogromiwszy ie y poraziwszy, y od Rzpltey imminens periculum odwrociwszy, wszelkie ich dawne iurisdikcye, starszeństwa, prerogatywy, dochody y insze decora przez wierne posługi ich od Przodkow naszych nabyte; a teraz przez tę rebellią stracone, perpetuis temporibus im odeymuiemy, chcąc mieć tych, ktorych fortuna belli żywych seruavit, za w chłopy obrocone pospolstwo.</p>
          <p class="source-translation">Although our single desire in governing these dominions is to seek such occasions on which our faithful subjects may always experience our royal clemency, nevertheless Cossack licence became so unrestrained that, in curbing it, we had to move our armies and those of the Commonwealth against them and join battle. By divine providence—of the Lord of all hosts—having defeated and routed them and turned aside the imminent danger from the Commonwealth, we take away from them for all time all their former jurisdictions, seniorities, prerogatives, revenues and other honours acquired through their faithful services but now lost through this rebellion, intending to regard those whom the fortune of war preserved alive as common people turned into peasants.</p>
          <p class="source-citation"><strong>Event and composition:</strong> enacted by the Warsaw Sejm in 1638 after the suppression of the 1637–1638 uprisings. <strong>Witness:</strong> printed main text of the 1859 reprint, collated against the downloaded image; the enrolled 1638 constitution was not independently collated. <em>Volumina legum</em>, vol. 3, printed p. 440, external p. 928 (Internet Archive leaf n1246), heading <em>Ordynacya woyska Zaporowskiego Regestrowego</em>. Historical spellings <em>swawola, iurisdikcye, odeymuiemy</em> preserved. <a href="https://archive.org/details/volumina-legum">Internet Archive item</a>.</p>
        </blockquote>
        <p>This is the victor's voice. <em>Swawola</em> (licence, wilfulness), <em>rebellia</em> and "turned into peasants" describe the state's imposed hierarchy, not Cossack self-understanding; the same host whose jurisdictions the law abolished had been the Commonwealth's indispensable frontier arm for two generations. The Ordinance proves what the Sejm intended in 1638; it cannot prove the intention workable, just or even enforced—and ten years later it was none of the three. The register's reduction, Commonwealth commissioners over the host and the prohibition of sea campaigns removed the buffer's reason to be loyal while leaving its military capacity intact.</p>
        <div class="interpretation"><h3>Status problem or national awakening?</h3><p>Cossack petitions before 1648 speak the language of estate, service and liberty: ancient rights, registered status, noble equality. Later national histories—Ukrainian above all, but also Polish and Russian—read a national programme backward into them. The documents support a cumulative status conflict inside the Commonwealth's own categories; what 1648 made of that conflict is a question the next chapter must answer, not this one.</p></div>
        <div class="question-box"><strong>Petition memorandum</strong> Advise the Sejm in 1638. Address separately: register size, pay, jurisdiction, Orthodox institutions, peasant flight, Ottoman diplomacy. For each option, state who bears the cost—and then explain why the settlement you just designed was not tried.</div>
      </section>

      <section class="companion-section" id="golden-peace"><p class="section-number">20 · The calm before</p><h2>Władysław IV and the "golden peace" of the 1630s</h2>
        <p class="lede dropcap">The election of 1632 was the Commonwealth's smoothest: Władysław Vasa, chosen without serious rival, confirmed every liberty and even secured limited rights for the Orthodox hierarchy—the "pacification of the Greek faith" that briefly legalized a church Brest had outlawed. The 1630s that followed look, in retrospect, like a final flowering: peace with Muscovy at Polyanovka (1634), a long truce with the Ottomans, relative quiet on the steppe, a confident Sejm legislating customs, titles and army matters in 1638.</p>
        <p>Władysław governed as a soldier-king who had learned his father's limits. He courted the Cossacks, planned a Baltic fleet, dreamed—dangerously—of an anti-Ottoman crusade that would raise his authority on Cossack bayonets. The political nation watched him with the trained suspicion of 1573: fleet funds were granted and withdrawn, crusade plans met a wall of sejmik refusal, and the king's Cossack sympathies were noted and discounted. The "golden peace" was real, and it rested on nobody having to pay for a war.</p>
        <p>Underneath, the unsolved questions aged: the fiscal system still could not fund standing defence, magnate colonization of the southeast continued, the 1638 Ordinance stood unrepealed, the Orthodox settlement of 1632 remained partial. None of this made an explosion necessary; all of it made the republic's room for manoeuvre narrower than its confidence suggested.</p>
        <div class="interpretation"><h3>Indian summer or structural calm?</h3><p>Read forward from 1638, the decade shows a functioning republic managing its frontiers. Read backward from 1648, the same decade shows every fuse laid. Both readings are true, and the discipline of this chapter is to keep them separate: the evidence of 1638 does not contain the knowledge of 1648.</p></div>
        <div class="question-box"><strong>Contingency tree</strong> Beginning in 1646, construct three branches using only information then available: the king's secret Cossack contacts, the Ottoman truce, the magnate settlement of the southeast. Add Khmelnytsky's Tatar alliance, the early battles and Władysław's death one at a time; mark when each outcome becomes more or less likely.</div>
      </section>

      <section class="companion-section print-break" id="sources"><p class="section-number">21 · Conclusion and documentation</p><h2>1648: an open ending, and what the record can bear</h2>
        <p class="lede dropcap">In the spring of 1648 Bohdan Khmelnytsky—a registered Cossack officer with a private grievance and a long public one against the settlement of 1638—made alliance with the Crimean khan, destroyed the Commonwealth's advance armies at Zhovti Vody and Korsun, and turned a frontier dispute into a general upheaval. Władysław IV died in May, leaving the throne empty at the moment of crisis. The uprising's course belongs to the next chapter; this one ends at the door, deliberately.</p>
        <p>What had the Commonwealth become in eighty years? A political nation that elected its kings and governed through sejmik and Sejm had sustained broad participation, a famous confessional peace and a distinctive republican language—while narrowing its confessional establishment, excluding towns, intensifying peasant subjection and refusing to make room for the frontier community it depended on. The texts show both faces: the Confederation's oath and its limiting clause; free election in perpetuity and an electorate of one estate; equality of nobles legislated while clientage worked; a customs law asserting the state's claim while shielding the exemptions that empty it; an Ordinance solving the Cossack question by abolishing it. Liberty for whom? For the enfranchised, at a price others paid.</p>
        <h3>Interpretation workshop</h3>
        <p><strong>1. One document, one claim.</strong> Choose one of the eight excerpts. Identify issuer, event, composition and witness. Write the single sentence it can prove, then a second beginning "It cannot prove…"—noting who is grammatically bound and who is outside the text.</p>
        <p><strong>2. Liberty audit.</strong> Take the 1638 titles constitution and the 1638 Cossack Ordinance, enacted in the same Sejm. One legislates equality inside an estate; the other legislates a community out of its status. What conception of the republic lets both pass in the same month?</p>
        <p><strong>3. The bounded peace.</strong> Using the Confederation and its limiting clause, evaluate the claim "the Commonwealth had religious toleration." Replace the verb "had" with a precise statement of who was protected, from what, by whom, and where the protection stopped.</p>
        <p><strong>4. Image criticism.</strong> Compare Grodziecki's 1573 map, the 1619 reconstruction map, the Warsaw Confederation parchment and Snayers's Kircholm. Classify maker, date, audience and relation to the event. State one claim each image supports and one attractive claim it does not.</p>
        <p><strong>5. Final synthesis.</strong> Answer in 250 words: "The Commonwealth's pluralism was a mode of government, not a synonym for equality." Use one constitutional text, one economic record or image, one minority institution and the Cossack Ordinance. The best answers show pluralism working and costing at the same time.</p>
        <figure data-kind="map"><img loading="lazy" width="1996" height="1558" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Polish-Lithuanian_Commonwealth_in_1619.PNG?width=1400" alt="Colour-coded modern map of the Polish–Lithuanian Commonwealth and neighbouring states in 1619, with the Commonwealth's internal regions outlined and labelled and a legend at upper right"><figcaption><strong>Maximum extent, drawn centuries later</strong><p>Modern reconstruction of the Commonwealth in 1619, after the Truce of Deulino. Use for geographic orientation, not as a contemporary survey.</p><p class="figure-meta">Mathiasrex, based on layers by Halibutt, 2009 · modern reconstruction · CC BY 3.0 · <a href="https://commons.wikimedia.org/wiki/File:Polish-Lithuanian_Commonwealth_in_1619.PNG">Wikimedia Commons</a>.</p></figcaption></figure>
        <h3>Primary texts and documentary editions</h3>
        <ol class="bibliography">
          <li class="bibliography-entry"><em>Volumina legum: przedruk zbioru praw staraniem XX. Pijarów w Warszawie, od roku 1732 do roku 1782, wydanego</em>, vols. 2–3 (St Petersburg: Jozafat Ohryzko, 1859). The working edition for six excerpts in this reader; each excerpt was manually collated against downloaded page images from the Internet Archive scan. The reprint's main text is used as found; its underlying diplomatic witnesses are not independently collated, and the reader's citations say so.</li>
          <li class="bibliography-entry">Stanisław Kutrzeba and Władysław Semkowicz, eds., <em>Akta unji Polski z Litwą, 1385–1791</em> (Kraków: PAU, 1932). Source of the Lublin Crown act, no. 148, collated for the Chapter 3 companion against the public scan.</li>
          <li class="bibliography-entry">The Third Lithuanian Statute (1588), consulted through its early printed form (Vilnius University Library copy). Not quoted in this reader: no collated transcription to the required standard could be produced. Readers should approach it through the critical editions of the Ruthenian text and their modern translations, used witness by witness.</li>
          <li class="bibliography-entry">The Union of Brest acts and counter-acts (1595–1596), discussed without quotation for the same reason; approach through the documentary editions of the uniate and orthodox synodal acts, read as adversarial pairs.</li>
          <li class="bibliography-entry"><em>Akta sejmikowe</em> and <em>diariusze sejmowe</em> (sejmik and Sejm records) for the interval between legislation and practice; royal privileges to kahals, Armenian communities and Tatar settlements in the archival editions of the Metryka Koronna and Metryka Litewska series.</li>
        </ol>
            <h3>Primary sources and editions</h3>
        <p class="bibliography-note">The eight quoted excerpts are from the 1859 <em>Volumina legum</em> reprint (Vols. 2–3), except source 4 (Henrician oath) collated against the 1932 <em>Akta unji Polski z Litwą</em>. The 1588 Lithuanian Statute and the Union of Brest acts are discussed but not quoted because no collated transcription to this series' standard could be produced.</p>

        <h3>Selected modern scholarship</h3>
        <ol class="bibliography">
          <li class="bibliography-entry">Urszula Augustyniak, <em>History of the Polish-Lithuanian Commonwealth: State–Society–Culture</em> (Peter Lang, 2015). Best English-accessible synthesis.</li>
          <li class="bibliography-entry">Robert I. Frost, <em>The Oxford History of Poland-Lithuania</em>, vol. 1, <em>The Making of the Polish-Lithuanian Union, 1385–1569</em> (OUP, 2015). Essential background to 1569.</li>
          <li class="bibliography-entry">Daniel Stone, <em>The Polish-Lithuanian State, 1386–1795</em> (University of Washington Press, 2001). Compact constitutional baseline.</li>
          <li class="bibliography-entry">Anna Grześkowiak-Krwawicz, <em>The Political Discourse of the Polish-Lithuanian Commonwealth</em> (Routledge, 2021).</li>
          <li class="bibliography-entry">Dorota Pietrzyk-Reeves, <em>Polish Republican Discourse in the Sixteenth Century</em> (CUP, 2020).</li>
          <li class="bibliography-entry">Henryk Wisner, <em>Rzeczpospolita Wazów</em>, vol. 1 (Neriton/IH PAN, 2002). Specialist synthesis of the Vasa reigns.</li>
          <li class="bibliography-entry">Zigmantas Kiaupa et al., <em>The History of Lithuania before 1795</em> (Lithuanian Institute of History, 2000). Corrective to Crown-centred narration.</li>
          <li class="bibliography-entry">David Frick, <em>Kith, Kin, and Neighbors</em> (Cornell, 2013). Microhistory of seventeenth-century Vilnius.</li>
          <li class="bibliography-entry">Karin Friedrich, <em>The Other Prussia</em> (CUP, 2000). Royal Prussian identity and Gdańsk.</li>
          <li class="bibliography-entry">Maria Bogucka, <em>Baltic Commerce and Urban Society</em> (Ashgate, 2003).</li>
          <li class="bibliography-entry">Maria Bogucka, <em>Women in Early Modern Polish Society</em> (Ashgate, 2004).</li>
          <li class="bibliography-entry">Mikołaj Malinowski, "Little Divergence Revisited," <em>European Review of Economic History</em> 20, no. 3 (2016): 345–367.</li>
          <li class="bibliography-entry">Antoni Mączak, <em>Unequal Friendship</em> (Peter Lang, 1990). Patronage as political system.</li>
          <li class="bibliography-entry">Tomasz Grusiecki, <em>Transcultural Things and the Spectre of Orientalism</em> (Manchester, 2023).</li>
          <li class="bibliography-entry">Magda Teter, <em>Jews and Heretics in Catholic Poland</em> (CUP, 2006).</li>
          <li class="bibliography-entry">Gershon David Hundert, <em>Jews in Poland-Lithuania in the Eighteenth Century</em> (California, 2004).</li>
          <li class="bibliography-entry">Borys A. Gudziak, <em>Crisis and Reform</em> (HURI, 1998). Standard study of the Union of Brest.</li>
          <li class="bibliography-entry">Serhii Plokhy, <em>The Cossacks and Religion in Early Modern Ukraine</em> (OUP, 2001).</li>
          <li class="bibliography-entry">Brian Davies, <em>Warfare, State and Society on the Black Sea Steppe</em> (Routledge, 2007).</li>
          <li class="bibliography-entry">Dariusz Kołodziejczyk, <em>Ottoman–Polish Diplomatic Relations</em> (Brill, 2000).</li>
          <li class="bibliography-entry">Robert I. Frost, <em>The Northern Wars</em> (Longman, 2000).</li>
          <li class="bibliography-entry">Andrzej Sulima Kamiński, <em>Republic vs. Autocracy</em> (HURI, 1993).</li>
        </ol>

        <div class="caution"><strong>Publication boundary.</strong> The eight quoted originals preserve their named edition witnesses: six from the 1859 <em>Volumina legum</em> reprint, one from its facing election-order text, one from the 1932 <em>Akta unji</em>. All are public domain; every English rendering here is independent. The 1588 Statute and the Brest acts are discussed but not quoted because collated transcriptions to this series' standard could not be produced; that refusal is part of the edition's method.</div>

