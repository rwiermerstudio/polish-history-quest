    stabilized and modernized the economy while imposing unemployment and unequal
    regional costs.`,`Early reforms raised living standards evenly across regions
    and occupations while avoiding persistent unemployment.`,`It produced only decline
    and no later growth.`,`It left prices and ownership entirely unchanged.`],0,`Poland’s
    long-run economic performance was strong, but aggregate success does not erase
    closures, insecurity and the political geography created by uneven transition.`),i(`How
    has EU membership affected Poland?`,[`It expanded mobility, investment and shared
    regulation while generating real debates over sovereignty and standards.`,`It
    transferred most domestic electoral authority to European Union institutions.`,`Rapid
