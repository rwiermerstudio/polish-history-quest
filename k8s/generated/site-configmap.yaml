    </head>
    <body id="top">
    <a class="skip-link" href="#content">Skip to the companion text</a>
    <header class="reader-bar">
      <a href="./">← Polish History Quest</a>
      <span>Chapter 2 companion · 1138–1385</span>
      <nav class="reader-actions" aria-label="Companion navigation"><a href="#contents">Contents</a><a href="#sources">Sources &amp; reading</a><span>Print: Ctrl/⌘ + P</span></nav>
