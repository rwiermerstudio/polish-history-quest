        <meta name="description" content="Polish History Quest: an interactive browser game for adults learning the big arcs of Polish history." />
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23c1121f'/%3E%3Cpath d='M16 44h32L38 31l7-11-13 6-13-6 7 11z' fill='white'/%3E%3C/svg%3E" />
        <title>Polish History Quest</title>
        <script type="module">
    (function(){let e=document.createElement(`link`).relList;if(e&&e.supports&&e.supports(`modulepreload`))return;for(let e of document.querySelectorAll(`link[rel="modulepreload"]`))n(e);new MutationObserver(e=>{for(let t of e)if(t.type===`childList`)for(let e of t.addedNodes)e.tagName===`LINK`&&e.rel===`modulepreload`&&n(e)}).observe(document,{childList:!0,subtree:!0});function t(e){let t={};return e.integrity&&(t.integrity=e.integrity),e.referrerPolicy&&(t.referrerPolicy=e.referrerPolicy),e.crossOrigin===`use-credentials`?t.credentials=`include`:e.crossOrigin===`anonymous`?t.credentials=`omit`:t.credentials=`same-origin`,t}function n(e){if(e.ep)return;e.ep=!0;let n=t(e);fetch(e.href,n)}})();var e=new Map([[`It created universal literacy and democratic citizenship immediately.`,`It immediately extended literacy and equal political rights to every inhabitant.`],[`It ended all conflict with the Holy Roman Empire permanently.`,`It placed the Piast realm permanently under imperial military protection.`],[`It proved that every later Polish border already existed in 966.`,`It fixed the realm’s borders in the form they retained through the Middle Ages.`],[`He accepted direct rule by Kievan Rus.`,`He accepted permanent political subordination to Emperor Otto III.`],[`He abolished dynastic monarchy in favour of an elected parliament.`,`He replaced dynastic succession with regular election by the nobility.`],[`He was isolated from European politics.`,`He relied on military conquest and avoided ecclesiastical diplomacy.`],[`A colony founded by the Roman Empire.`,`A unified tribal federation already governed from Kraków before the Piasts.`],[`They were twentieth-century communist forgeries.`,`They were neutral administrative records produced without dynastic patronage.`],[`It introduced communism into medieval Europe.`,`It remained only a missionary body and never built a territorial state.`],[`Lithuania converted to Buddhism.`,`Lithuania became a Catholic kingdom directly governed from Kraków.`],[`The Ottoman sultan became king of Poland.`,`The Prussian duchy passed directly to the Habsburg monarchy.`],[`He served as Ottoman grand vizier.`,`He worked chiefly at the royal court in Kraków rather than in Royal Prussia.`],[`It was only a dispute over royal clothing.`,`It was principally a dynastic succession dispute without a social or confessional dimension.`],[`It occurred entirely in France.`,`It was confined to a short military revolt around Warsaw.`],[`Restore pagan monarchy.`,`Restore the pre-1772 political system without changing royal or urban powers.`],[`Transfer Poland to the United States.`,`Replace the Commonwealth with a centralized republic modelled directly on revolutionary France.`],[`Whether Poland should colonize South America.`,`Whether diplomatic reliance on France could substitute for organization inside the partitioned lands.`],[`It transferred all villages to Napoleon.`,`It restored noble control by reversing emancipation throughout the partitioning empires.`],[`As the beginning of the medieval Piast dynasty.`,`As the moment the Versailles settlement fixed all of Poland’s borders.`],[`As the day Poland joined the European Union.`,`As the date the Treaty of Riga established the eastern frontier.`],[`They disagreed only about musical education.`,`They differed mainly over tactics while sharing the same centralized ethnic model.`],[`Both wanted Poland to become an Ottoman province.`,`Both regarded federation with Lithuania and Ukraine as the only viable eastern policy.`],[`No one in the region spoke a language.`,`Language boundaries aligned closely enough with settlement to make borders straightforward.`],[`The Versailles Conference prohibited maps.`,`The peace conference consistently prioritized local plebiscites over strategic considerations.`],[`Poland had no towns or railways.`,`The partitioning empires had administered all three regions through identical institutions.`],[`A restoration of medieval elective monarchy.`,`A fully fascist one-party state that abolished elections immediately in 1926.`],[`There were no Polish speakers.`,`Minorities were present mainly as recent immigrants without established regional communities.`],[`The camps were built by the pre-war Polish parliament.`,`The term is accurate because geographical location determines state responsibility.`],[`No killing centres existed in occupied Poland.`,`All German killing centres were located inside Germany’s pre-war borders.`],[`Germany won the war.`,`The Western Allies restored the pre-1939 eastern border but chose a communist cabinet.`],[`Poland immediately joined NATO.`,`Poland left the Warsaw Pact and adopted competitive elections in 1956.`],[`The monarchy was restored.`,`A coalition government ended the communist party’s monopoly on power.`],[`It was built by Napoleon as a naval base.`,`It was an inherited pre-war industrial city only lightly altered by communist planning.`],[`Poland had already become an EU member.`,`Western governments made recognition conditional on an immediate transfer of power.`],[`The monarchy returned by invasion.`,`The communist leadership collapsed before negotiations and transferred power without elections.`]]),t=(t,n,r,i)=>{let a=n.map(t=>e.get(t)||t),o=[...t].reduce((e,t)=>(e+t.charCodeAt(0))%a.length,0);return{prompt:t,options:a.slice(o).concat(a.slice(0,o)),answer:(r-o+a.length)%a.length,explanation:i}},n=(e,t,n)=>({kind:e,title:t,body:n}),r=[{id:`lands-before-poland`,startYear:500,endYear:1138,years:`c. 500–1138`,title:`Before Poland and the Piast monarchy`,key:`State formation joined local societies to Latin Christian Europe.`,summary:`Slavic settlement, Piast expansion, Christianization and the first monarchy created a durable political centre, but not yet a modern nation-state.`,sections:[n(`context`,`Land, settlement and early power`,`The Vistula and Oder basins connected the Baltic coast with Central European trade routes. West Slavic communities farmed, traded amber, salt, furs and enslaved people, and organized around fortified settlements known as grody. Archaeology reveals regional networks rather than a single timeless Polish tribe. During the tenth century the Piast dynasty expanded from Greater Poland, absorbing or subordinating neighbouring communities and building a stronger military-fiscal court.`),n(`events`,`Baptism, crown and political survival`,`Mieszko I accepted Latin Christianity in 966, probably through his marriage to the Bohemian princess Dobrawa. The decision brought clergy, writing, diplomatic recognition and protection against claims that pagan lands could simply be conquered for conversion. Bolesław I Chrobry hosted Emperor Otto III at Gniezno in 1000 and was crowned king in 1025. Rebellions and dynastic crises followed; the monarchy was repeatedly rebuilt, showing both its fragility and its institutional value.`),n(`international`,`Between empire, papacy, Bohemia and Rus`,`Early Piast rulers operated in a competitive zone between the Holy Roman Empire, Bohemia, Kievan Rus and Baltic peoples. They alternated warfare, tribute and marriage diplomacy rather than pursuing permanent national alliances. The Congress of Gniezno linked the cult of the murdered missionary Adalbert with an independent church structure. Poland belonged to Latin Christianity, while nearby Rus followed Byzantine Christianity; that civilizational distinction mattered, but frontier societies remained connected by trade and family ties.`),n(`culture`,`Artifacts: Gniezno doors and the Gallus chronicle`,`The bronze Gniezno Doors, made in the twelfth century, narrate the life of Saint Adalbert like a visual storyboard and show how rulers used sacred art to legitimize power. The anonymous chronicler called Gallus Anonymus celebrated the Piast dynasty while offering moral lessons about good rule. Modern images of Mieszko and Bolesław—on banknotes, monuments and school walls—are later reconstructions, useful reminders that medieval statehood is remembered through objects and narratives created long after the events.`)],actors:[{name:`Mieszko I`,role:`Piast ruler who consolidated a regional state and adopted Latin Christianity, using marriage, warfare and diplomacy to secure his position.`},{name:`Bolesław I Chrobry`,role:`Mieszko’s son, an ambitious warrior and diplomat whose coronation in 1025 made royal status a recurring Polish political aspiration.`},{name:`Saint Adalbert (Wojciech)`,role:`Missionary killed in Prussia whose relics and cult strengthened Gniezno as a religious and political centre.`}],quiz:[t(`Why do historians treat the baptism of Mieszko I in 966 as politically important without calling it the birth of a modern nation?`,[`It integrated a Piast realm into Latin Christian institutions while identities and borders remained fluid.`,`It created universal literacy and democratic citizenship immediately.`,`It ended all conflict with the Holy Roman Empire permanently.`,`It proved that every later Polish border already existed in 966.`],0,`Christianization brought clergy, writing and diplomatic legitimacy to a developing Piast polity. Medieval dynastic rule, however, was not the same as modern national sovereignty or citizenship.`),t(`What does the Congress of Gniezno in 1000 best illustrate about Bolesław Chrobry’s position?`,[`He was isolated from European politics.`,`He combined the cult of Saint Adalbert with diplomacy toward Emperor Otto III and an independent church structure.`,`He accepted direct rule by Kievan Rus.`,`He abolished dynastic monarchy in favour of an elected parliament.`],1,`The meeting connected sacred prestige, imperial diplomacy and ecclesiastical organization. It elevated Bolesław without turning Poland into a modern independent state in the present-day sense.`),t(`Which statement most accurately describes the population of the early Piast realm?`,[`A culturally uniform nation with fixed borders.`,`A network of communities gradually brought under a dynasty through forts, tribute, warfare and negotiation.`,`A colony founded by the Roman Empire.`,`A society cut off from Baltic and Central European exchange.`],1,`Archaeology points to diverse regional communities and active exchange. Piast state formation was an uneven process of consolidation, not the expression of an already unified modern nation.`),t(`Why should chronicles such as Gallus Anonymus be read critically?`,[`They contain no useful information.`,`They were written to praise rulers and teach political morality, so evidence and literary purpose must be considered together.`,`They were twentieth-century communist forgeries.`,`They report only archaeological measurements.`],1,`Medieval chronicles are indispensable but purposeful narratives. Their authors selected and shaped events to legitimize dynasties and present models of good and bad rulership.`)]},{id:`fragmentation-reunification`,startYear:1138,endYear:1385,years:`1138–1385`,title:`Fragmentation, towns and a reunited kingdom`,key:`Political division coincided with economic and institutional growth.`,summary:`Competing Piast duchies, German-law towns, Mongol invasion and reunification under late Piast kings reshaped medieval Poland.`,sections:[n(`context`,`The seniorate and regional duchies`,`Bolesław III Krzywousty’s 1138 succession arrangement divided rule among his sons while reserving senior authority in Kraków. Instead of preventing conflict, it encouraged rival Piast duchies in Silesia, Mazovia, Greater Poland and elsewhere. Political fragmentation did not mean social collapse. Dukes founded towns, attracted settlers, endowed monasteries and competed for revenue. Regional differences deepened, and some Piast branches became closely tied to Bohemia and the German-speaking world.`),n(`events`,`Mongol shock, urban growth and reunification`,`Mongol forces defeated a regional army at Legnica in 1241 and devastated parts of southern Poland, though they did not establish permanent rule. During the same centuries, towns received charters based on Magdeburg law, giving burghers defined courts and obligations. German-speaking migration was significant but mixed with local populations and other groups. Władysław Łokietek reunited a core kingdom and was crowned in 1320; Casimir III then strengthened law, castles, administration and Kraków University.`),n(`international`,`Bohemia, Hungary, the Teutonic Order and Lithuania`,`Polish rulers faced a strong Bohemian crown, negotiated with Hungary and contested Pomerelia with the Teutonic Order, a crusading military order that built its own Baltic state. To the east, Lithuania expanded over many Rus lands and remained a major non-Christian power until the late fourteenth century. The extinction of the main Piast royal line in 1370 led to Angevin rule from Hungary, illustrating how dynastic succession linked kingdoms across Central Europe.`),n(`culture`,`Artifacts: Kraków, Kazimierz and the university`,`Casimir III is remembered by the saying that he “found Poland wooden and left it stone,” an exaggeration that captures his reputation for construction and state-building. He founded Kazimierz beside Kraków and issued protections for Jewish communities, while Jewish migration created centres of learning and commerce. Kraków University, founded in 1364 and later renewed by Jadwiga, became a durable institution. Gothic churches, town squares and castle networks still make this period visible in the contemporary landscape.`)],actors:[{name:`Casimir III the Great`,role:`The last main-line Piast king, remembered for legal, administrative, educational and defensive consolidation rather than spectacular conquest.`},{name:`Władysław Łokietek`,role:`Piast duke who rebuilt a core Polish kingdom after fragmentation and restored royal coronation in Kraków in 1320.`},{name:`Urban settlers and Jewish communities`,role:`Diverse newcomers and local inhabitants whose law, trade, crafts and scholarship transformed medieval towns and royal revenues.`}],quiz:[t(`How can the era after 1138 be described without reducing it to simple decline?`,[`Political fragmentation accompanied urban, legal and economic development in competing duchies.`,`All government and trade disappeared for two centuries.`,`The territory became a single province of France.`,`Fragmentation immediately created modern federal democracy.`],0,`Rival Piast rulers weakened unity but also competed to found towns, monasteries and markets. Political division and institutional development occurred at the same time.`),t(`What was one major effect of town charters based on Magdeburg law?`,[`They gave towns defined courts, offices and obligations within a feudal order.`,`They ended monarchy and serfdom everywhere.`,`They required every inhabitant to speak German.`,`They placed towns under Mongol administration.`],0,`Charters organized urban self-government and legal relations. They travelled across linguistic boundaries and did not make every town ethnically or politically identical.`),t(`Why was the Teutonic Order a lasting geopolitical challenge?`,[`It formed a territorial crusading state on the Baltic and contested access to Pomerelia.`,`It was a Polish peasant union.`,`It ruled Hungary from Kraków.`,`It introduced communism into medieval Europe.`],0,`The Order combined religious mission with state-building and military power. Conflict over Baltic territories became central to Polish and Lithuanian diplomacy.`),t(`What makes Casimir III’s reputation as a state-builder plausible?`,[`His reign combined legal codification, castles, royal administration and a university foundation.`,`He personally invented Gothic architecture.`,`He conquered all of Europe.`,`He ruled after the partitions of the eighteenth century.`],0,`The familiar proverb about wood and stone is not literal, but it reflects a reign associated with durable administrative, legal, educational and architectural projects.`)]},{id:`jagiellonian-union`,startYear:1385,endYear:1569,years:`1385–1569`,title:`The Jagiellonian union and a Baltic–Black Sea world`,key:`Dynastic union created a vast, plural political space.`,summary:`The Polish-Lithuanian connection, conflict with the Teutonic Order, Renaissance culture and noble power produced a major European monarchy.`,sections:[n(`context`,`Why Poland and Lithuania joined`,`The 1385 agreement at Krewo linked Jadwiga—crowned rex, or king, of Poland—with Jogaila, grand duke of Lithuania, who was baptized as Władysław Jagiełło. Poland gained a powerful partner against the Teutonic Order; Lithuania gained a route to Christian recognition while resisting pressure from the Order and Moscow. The union was not a Polish annexation of a single nation. Lithuania retained institutions and ruled large Orthodox Rus territories populated by ancestors of modern Belarusians and Ukrainians.`),n(`events`,`Grunwald, privileges and parliamentary politics`,`Polish-Lithuanian forces defeated the Teutonic Order at Grunwald/Tannenberg in 1410, although the subsequent peace did not destroy the Order. Jagiellonian rulers also governed Bohemia and Hungary for a time. At home, kings granted privileges to the szlachta, the legally defined nobility, in exchange for taxation and military cooperation. The Nihil Novi act of 1505 strengthened the principle that major legislation required agreement of the Sejm, creating a broad noble political nation while excluding most inhabitants.`),n(`international`,`Ottomans, Habsburgs, Muscovy and the Baltic`,`The Jagiellonian sphere sat between the rising Habsburg and Ottoman empires, Muscovy’s expansion, Baltic commerce and the steppe frontier. The 1525 Prussian Homage secularized the Teutonic state in Prussia as a hereditary duchy held as a Polish fief—an arrangement with major later consequences when Brandenburg and Prussia united. Muscovite-Lithuanian wars shifted eastern borders, while Crimean Tatar raids and Ottoman power shaped the southern frontier.`),n(`culture`,`Artifacts: Wawel Renaissance and Copernicus`,`Royal patronage transformed Wawel Castle into a Renaissance residence, and Queen Bona Sforza brought Italian court connections as well as a formidable political reputation. Nicolaus Copernicus, a canon in Royal Prussia, published a heliocentric model that belonged to a European republic of letters rather than a narrow national story. The Jagiellonian University, printed books and multilingual cities such as Kraków, Lviv and Vilnius show a world where Latin, Polish, Ruthenian, German, Yiddish and other languages overlapped.`)],actors:[{name:`Jadwiga and Władysław Jagiełło`,role:`Royal partners whose marriage and conversion created a durable Polish-Lithuanian dynastic union with distinct institutions and shared strategic interests.`},{name:`Nicolaus Copernicus`,role:`Astronomer and church administrator from Royal Prussia whose heliocentric work connected the region to Europe’s scientific transformation.`},{name:`The szlachta`,role:`A numerous and internally unequal nobility that won political privileges and built parliamentary institutions while keeping peasants and townspeople outside its full citizenship.`}],quiz:[t(`Which interpretation best explains the Polish-Lithuanian union begun in 1385?`,[`A negotiated dynastic alliance serving different Polish and Lithuanian interests, not an instant unitary nation-state.`,`A simple Polish conquest that abolished Lithuania immediately.`,`A colonial project organized by France.`,`An alliance created only to promote heliocentrism.`],0,`The partners had overlapping but distinct interests. Lithuania retained laws, offices and territory, while the relationship evolved through negotiation and conflict over generations.`),t(`Why is the 1505 Nihil Novi act important but not equivalent to modern democracy?`,[`It strengthened parliamentary consent among nobles while most inhabitants lacked political rights.`,`It granted universal adult suffrage.`,`It replaced the king with a communist party.`,`It made every town an independent republic.`],0,`Nihil Novi constrained unilateral royal legislation and empowered the Sejm, but the political nation was the nobility, not the entire population.`),t(`What long-term issue was embedded in the Prussian Homage of 1525?`,[`A secular Prussian duchy became a Polish fief but later joined Brandenburg and grew into a powerful rival.`,`The Ottoman sultan became king of Poland.`,`Lithuania converted to Buddhism.`,`The Teutonic Order conquered Moscow.`],0,`The settlement appeared to secure Polish overlordship, yet dynastic developments helped create Brandenburg-Prussia, one of the states that later partitioned Poland.`),t(`Why is Copernicus a useful figure for understanding the period’s identity?`,[`His life crossed local, Prussian, Polish, Latin-Christian and European scholarly worlds that do not map neatly onto modern nationality.`,`He wrote exclusively as a twentieth-century Polish nationalist.`,`He served as Ottoman grand vizier.`,`He had no connection to institutions in Royal Prussia.`],0,`Early modern identities were layered. Copernicus can be situated in several political, linguistic and intellectual contexts without forcing him into one modern category.`)]},{id:`commonwealth`,startYear:1569,endYear:1648,years:`1569–1648`,title:`The Commonwealth: liberty, diversity and inequality`,key:`A federated republic of nobles combined pluralism with deep social hierarchy.`,summary:`The Union of Lublin, elected kings, religious diversity, eastward colonization and serfdom defined the Commonwealth’s “golden age” and its contradictions.`,sections:[n(`context`,`A republic under an elected king`,`The Union of Lublin in 1569 created the Polish-Lithuanian Commonwealth, with a shared elected monarch and parliament but separate armies, treasuries and offices. The szlachta celebrated “Golden Liberty”: legal equality within their estate, free royal elections and resistance to absolute monarchy. Noble citizens could debate policy across a huge territory. Yet burghers had limited influence, peasants faced expanding labour obligations, and political equality among nobles coexisted with enormous differences in wealth and power.`),n(`society`,`Faiths, languages, estates and serfdom`,`The Commonwealth included Catholics, Orthodox Christians, Protestants, Jews, Muslims and Armenians, as well as Polish, Lithuanian, Ruthenian, German, Yiddish and Tatar speakers. The Warsaw Confederation of 1573 offered an important guarantee of religious peace among nobles, although toleration was incomplete and later narrowed. Grain exports through Gdańsk enriched landowners and tied the economy to western markets, while folwark estates increased serfdom and labour burdens on peasants.`),n(`international`,`Elections, dynastic wars and frontier politics`,`Foreign dynasties competed in royal elections. Under the Vasa kings, conflicts with Sweden, Muscovy and the Ottoman sphere intertwined with ambitions around the Baltic and succession. The Commonwealth briefly occupied Moscow during Russia’s Time of Troubles but could not turn military opportunity into stable domination. On the southeastern border, Cossack communities defended and raided the steppe frontier while seeking status and autonomy, creating tensions with magnates and the state.`),n(`culture`,`Artifacts: Sarmatism, printing and the synagogue world`,`Noble culture developed the idea of Sarmatism, imagining the szlachta as descendants of ancient warriors. Distinctive kontusz clothing and coffin portraits projected honour and lineage, while political speeches celebrated liberty. Jewish self-government and yeshivas made the Commonwealth a major centre of Jewish life. Baroque churches, Orthodox brotherhoods, mosques of the Lipka Tatars and printed polemics reveal both plural creativity and competition. Contemporary historical festivals often revive noble costume but can obscure peasant labour and non-noble lives.`)],actors:[{name:`Anna Jagiellon and elected monarchs`,role:`Figures through whom dynastic continuity gave way to a system in which nobles elected kings and imposed contractual conditions on royal power.`},{name:`Jan Zamoyski`,role:`Chancellor, military commander and magnate who embodied both republican rhetoric and the extraordinary private power of elite noble families.`},{name:`Peasants, burghers and religious minorities`,role:`The majority whose labour, trade and institutions sustained the Commonwealth but whose rights differed sharply from noble political liberty.`}],quiz:[t(`What was the central contradiction of “Golden Liberty” in the Commonwealth?`,[`It protected extensive noble participation while most peasants, townspeople and minorities lacked equal political power.`,`It was a system of universal voting with no social hierarchy.`,`It abolished private landownership.`,`It gave the Ottoman sultan control of the Sejm.`],0,`The Commonwealth offered unusual constitutional participation to a large noble estate, but this freedom rested within a hierarchical society and an economy increasingly dependent on serf labour.`),t(`How should the Warsaw Confederation of 1573 be understood?`,[`As an important elite guarantee of religious peace that did not produce complete modern equality or permanent tolerance.`,`As the beginning of compulsory atheism.`,`As a ban on all Protestant and Orthodox worship.`,`As a treaty ending the First World War.`],0,`The Confederation was significant in a Europe of religious warfare, but its scope, enforcement and beneficiaries were limited by estate and changing political conditions.`),t(`Why did Gdańsk and Baltic grain exports matter for social relations?`,[`Western demand enriched estate owners and encouraged folwark production and heavier peasant labour duties.`,`They made farming irrelevant to the economy.`,`They ended connections with Amsterdam and other western ports.`,`They transferred all land to urban guilds.`],0,`The export economy connected the Commonwealth to western markets. Its benefits were uneven and helped entrench a manorial system based on serf labour.`),t(`What did Cossack tensions reveal before 1648?`,[`Frontier military communities sought recognition and autonomy while magnate expansion and state policy constrained them.`,`The Commonwealth had no eastern frontier.`,`Cossacks were a Swedish royal dynasty.`,`All Cossacks already held equal seats in the Polish Senate.`],0,`Cossacks were vital frontier actors but their political and social status remained contested. Those tensions contributed to the great uprising beginning in 1648.`)]},{id:`crisis-reform`,startYear:1648,endYear:1795,years:`1648–1795`,title:`Wars, political paralysis and the reform struggle`,key:`Seventeenth-century devastation and eighteenth-century dependency produced reform—too late to prevent partition.`,summary:`Cossack revolt, Swedish invasion, Ottoman wars, magnate politics, Enlightenment reform and neighbouring empires transformed and finally destroyed the Commonwealth.`,sections:[n(`events`,`The uprising, Deluge and demographic disaster`,`Bohdan Khmelnytsky’s 1648 Cossack uprising, supported by Crimean Tatars and fuelled by social, religious and political grievances, shattered Commonwealth authority in Ukraine. It became a civil, social and confessional war involving Cossacks, Ruthenian peasants and clergy, Commonwealth armies and townspeople; Polish nobles and Jewish communities suffered massacres, while reprisals and campaigning harmed wider civilian populations. War with Muscovy followed. The Swedish invasion of 1655–1660, remembered as the Deluge, brought occupation, looting and destruction. Later wars with the Ottoman Empire and internal conflicts compounded demographic and economic loss, although Jan III Sobieski’s victory at Vienna in 1683 became an enduring heroic image.`),n(`context`,`Liberum veto and the magnate republic`,`The Sejm’s unanimity principle and liberum veto were intended to protect political consent, but repeated disruption made taxation, military reform and administration difficult. Powerful magnate networks used clients and private resources, while foreign powers learned to influence elections and parliamentary sessions. The system did not collapse because Poles were uniquely incapable of government; institutions designed for negotiated consensus faced social inequality, elite obstruction and neighbours developing larger standing armies and centralized fiscal states.`),n(`international`,`Russia, Prussia and Austria reshape the region`,`By the eighteenth century Russia treated the Commonwealth as a protectorate, while Prussia and Austria pursued territorial interests. The Great Northern War devastated Polish lands even though the Commonwealth was not a main belligerent. The First Partition in 1772 removed territory but also energized reformers. The Four-Year Sejm and Constitution of 3 May 1791 attempted a stronger constitutional monarchy, broader urban rights and more effective government. Russia backed the Targowica Confederation; defeat led to further partitions and Kościuszko’s 1794 uprising.`),n(`culture`,`Artifacts: Constitution, Enlightenment theatre and contested memory`,`The 3 May Constitution is celebrated as a pioneering modern constitution, but it was also a pragmatic reform of an existing estate society, not universal democracy. Stanisław August Poniatowski sponsored Thursday Dinners, art, education and the National Theatre while remaining politically dependent on Catherine II. Jan Matejko’s later paintings turned constitutional and military scenes into a national visual canon. Today 3 May is a public holiday, and debates continue over whether the Commonwealth fell mainly through internal dysfunction or aggressive neighbours—the strongest explanations combine both.`)],actors:[{name:`Bohdan Khmelnytsky`,role:`Cossack leader whose uprising joined demands for status and Orthodox rights with social violence and a geopolitical turn toward Muscovy.`},{name:`Stanisław August Poniatowski`,role:`Last king, Enlightenment patron and reform supporter whose dependence on Russia and choices during partition remain contested.`},{name:`Tadeusz Kościuszko`,role:`Veteran of the American Revolution who led the 1794 uprising and tried to connect national resistance with limited relief for peasants.`}],quiz:[t(`Why is the Khmelnytsky uprising difficult to fit into a single national story?`,[`It combined Cossack autonomy, Orthodox grievances, social conflict, great-power politics and violence against several civilian groups.`,`It was only a dispute over royal clothing.`,`It occurred entirely in France.`,`It had no connection to Ukraine or Muscovy.`],0,`The uprising can be remembered as liberation, civil war, social revolt and catastrophe depending on community and perspective. A responsible account keeps those dimensions together.`),t(`What is the most balanced explanation of the Commonwealth’s eighteenth-century weakness?`,[`Institutional obstruction and social inequality interacted with sustained intervention by stronger neighbouring states.`,`One defective parliamentary rule alone explains everything.`,`Foreign aggression alone mattered and domestic institutions were irrelevant.`,`The population lost interest in all political reform.`],0,`Internal and external causes reinforced each other. Weak fiscal and military capacity invited intervention, while intervention protected arrangements that blocked effective reform.`),t(`What did the Constitution of 3 May 1791 attempt to do?`,[`Create more effective constitutional government, limit some noble abuses and strengthen urban rights without establishing universal democracy.`,`Restore pagan monarchy.`,`Transfer Poland to the United States.`,`Abolish every social estate and grant immediate equal suffrage.`],0,`The constitution was ambitious and innovative but still rooted in eighteenth-century monarchy and social hierarchy. Its historical importance should not be confused with full modern democracy.`),t(`Why did the partitions occur despite the reform movement?`,[`Neighbouring empires used military power and allied with opponents of reform before the new system could consolidate.`,`The constitution ordered the country to disappear.`,`Kościuszko supported Prussian annexation.`,`No European power possessed a standing army.`],0,`Reform threatened the influence of Russia and some domestic elites. Military defeat, not a peaceful legal expiration, enabled the second and third partitions.`)]},{id:`partitions-napoleon`,startYear:1772,endYear:1815,years:`1772–1815`,title:`Partitions, revolution and the Napoleonic experiment`,key:`Statehood vanished, but political projects multiplied across empires and exile.`,summary:`The partitioning empires absorbed Polish lands while reformers, soldiers and peasants confronted revolution, Napoleon and competing meanings of national freedom.`,sections:[n(`context`,`Three empires, three administrative worlds`,`Russia, Prussia and Austria did not simply erase a map; they integrated millions of inhabitants into different legal, fiscal, military and educational systems. Former Commonwealth elites tried accommodation, conspiracy or cultural work. Jewish communities, peasants and townspeople experienced the transition differently from nobles. The concept of a Polish nation increasingly shifted from the institutions of the Commonwealth toward language, memory and political aspiration, but it remained contested whether the nation meant nobles alone or a broader society.`),n(`events`,`Legions and the Duchy of Warsaw`,`Polish Legions fought alongside revolutionary and Napoleonic France, inspiring the song that became today’s national anthem: “Poland Is Not Yet Lost.” Napoleon created the Duchy of Warsaw in 1807 from Prussian partition lands and expanded it in 1809. Its constitution introduced legal equality and the Napoleonic Code, while formally ending personal serfdom; economic dependence and land relations still limited peasant freedom. Polish troops followed Napoleon to disastrous campaigns, including Spain and Russia.`),n(`international`,`Revolutionary Europe and the Congress of Vienna`,`The French Revolution and Napoleonic wars transformed ideas of citizenship, law and mass armies across Europe. Polish hopes depended on a French emperor pursuing his own strategic goals, not a promise of unconditional restoration. Napoleon’s defeat allowed Russia, Prussia and Austria to redesign Europe at Vienna in 1815. A reduced Kingdom of Poland was linked to the Russian tsar, Kraków became a free city, and Prussia and Austria retained large Polish-speaking populations.`),n(`culture`,`Artifact: the anthem and the memory of lost statehood`,`Józef Wybicki’s 1797 legion song, later the national anthem, expressed a striking idea: political community could survive even when the state did not. The opening line is often mistranslated as “Poland is not yet lost”; more literally, Poland “has not yet perished” as long as people live and act. Napoleon became a romantic symbol in Polish culture, including in Adam Mickiewicz’s later epic Pan Tadeusz, but the human cost of fighting for imperial France complicates that legend.`)],actors:[{name:`Józef Wybicki and the Polish Legions`,role:`Political activists and soldiers who linked national survival to armed service in revolutionary Europe and produced the future anthem.`},{name:`Napoleon Bonaparte`,role:`French emperor who created a limited Polish state for strategic purposes, enabling reform while demanding troops and resources.`},{name:`Peasants under reform`,role:`The majority whose formal legal status changed under the Napoleonic Code but whose access to land and practical autonomy remained constrained.`}],quiz:[t(`What made the partitions transformative beyond the loss of sovereignty?`,[`People entered three different imperial systems, reshaping law, education, economy and political identity.`,`All inhabitants moved to France.`,`The same administration continued unchanged everywhere.`,`Language and religion immediately disappeared.`],0,`The three empires governed differently. Those divergent experiences later influenced regional development and strategies of resistance or accommodation.`),t(`How should the Duchy of Warsaw be assessed?`,[`As a reforming but dependent Napoleonic state that revived institutions without full sovereign freedom.`,`As the complete restoration of the 1772 Commonwealth.`,`As a Russian colony created in 1815.`,`As a medieval crusading order.`],0,`The Duchy introduced significant legal change and Polish administration, but its borders, diplomacy, military burden and survival depended on Napoleon.`),t(`What did the Napoleonic end of personal serfdom fail to guarantee?`,[`That peasants would receive land and full economic independence.`,`That nobles could own estates.`,`That French law would exist.`,`That armies would recruit soldiers.`],0,`Legal personal freedom did not automatically redistribute land or remove material dependence. Social emancipation was a longer and uneven process.`),t(`Why is the national anthem a key cultural artifact of the partition era?`,[`It defines national persistence through collective action even without an existing state.`,`It celebrates permanent partition rule.`,`It was composed for the medieval battle of Grunwald.`,`It rejects every connection to European politics.`],0,`The anthem captures a modernizing idea of nationhood: political identity and hope could outlive institutions and territorial sovereignty.`)]},{id:`long-nineteenth-century`,startYear:1815,endYear:1914,years:`1815–1914`,title:`Uprisings, organic work and modern society`,key:`National resistance shifted between insurrection, culture, economic development and mass politics.`,summary:`The November and January Uprisings, imperial repression, emancipation, industrialization and new political movements turned a noble cause into competing mass national projects.`,sections:[n(`context`,`Insurrection and repression`,`The November Uprising of 1830–1831 began among officer cadets in Warsaw and became a war against Russia, but divided leadership and military defeat ended the constitutional autonomy of Congress Poland. The January Uprising of 1863–1864 relied on guerrilla warfare and an underground state; Russia responded with executions, exile and intensified integration. Romantic memory honoured sacrifice, yet critics asked whether repeated uprisings wasted lives without preparing society, a debate that still shapes Polish political language.`),n(`society`,`Emancipation, cities and “organic work”`,`The partitioning states abolished serfdom at different times, and the 1863 uprising pushed Russia to emancipate peasants in Congress Poland on terms designed to weaken noble leadership. Łódź became a textile metropolis with Polish, Jewish, German and Russian inhabitants; Upper Silesia developed heavy industry; Galicia remained poor but gained political autonomy under Austria. Positivists promoted education, cooperatives, science and economic organization—“organic work”—as a way to strengthen society without immediate insurrection.`),n(`international`,`Nationalism in an age of empires`,`Polish activists belonged to a Europe of liberal revolution, imperial rivalry and new national movements. Exiles in the Great Emigration debated aristocratic, democratic and socialist futures from Paris and elsewhere. Prussian Germanization, Russian Russification and Austrian autonomy produced distinct strategies. Modern Lithuanian, Ukrainian, Belarusian and Jewish movements also grew on former Commonwealth lands, challenging the assumption that restoration of a historical Poland would automatically satisfy all peoples who lived there.`),n(`culture`,`Artifacts: Mickiewicz, Chopin, Matejko and industrial fiction`,`Adam Mickiewicz’s poetry turned exile and failed uprising into a powerful national mythology; Frédéric Chopin’s music connected cosmopolitan forms with Polish dances; Jan Matejko painted monumental historical scenes that many people now “remember” as if they were photographs. Later, Bolesław Prus and Eliza Orzeszkowa explored urban capitalism, social reform and Jewish-Polish relations. Władysław Reymont’s The Promised Land portrays industrial Łódź as creative, brutal and multinational—far from a purely rural national story.`)],actors:[{name:`Adam Mickiewicz`,role:`Exiled Romantic poet whose works made suffering, mission and cultural survival central to nineteenth-century Polish identity.`},{name:`Aleksander Wielopolski`,role:`Conservative reformer who sought limited modernization under Russian rule; his conscription policy helped trigger the January Uprising.`},{name:`Industrial workers and peasants`,role:`Newly politicized social groups whose economic interests helped generate socialist, peasant, nationalist and religious movements beyond noble patriotism.`}],quiz:[t(`What strategic debate followed the failed nineteenth-century uprisings?`,[`Whether national goals required repeated armed revolt or long-term social, educational and economic organization.`,`Whether Poland should colonize South America.`,`Whether medieval kings should be elected retroactively.`,`Whether factories should replace every farm immediately.`],0,`Romantic insurrection and positivist “organic work” became competing but sometimes overlapping traditions of political action.`),t(`How did peasant emancipation affect national politics?`,[`It weakened noble control and made the inclusion of peasants essential to any mass national movement.`,`It restored serfdom everywhere.`,`It had no effect because peasants were already equal voters.`,`It transferred all villages to Napoleon.`],0,`Emancipation changed legal and economic relations unevenly. Political movements increasingly had to address land, education, religion and peasant interests.`),t(`Why did competing Lithuanian, Ukrainian and Jewish movements complicate restoration plans?`,[`Former Commonwealth lands contained peoples developing distinct modern identities and political claims.`,`They all supported identical borders and institutions.`,`They existed only outside Europe.`,`They rejected literacy and political organization.`],0,`The Commonwealth’s historical pluralism did not translate automatically into agreement on a new state. Modern national projects often claimed the same territories differently.`),t(`What can cultural works reveal that a list of uprisings cannot?`,[`How exile, industrialization, class, gender and memory shaped lived experience and national imagination.`,`Only the exact number of soldiers in each battle.`,`That social change stopped after 1815.`,`That all writers held the same political views.`],0,`Literature, music and painting helped create emotional communities while also exposing tensions that political chronologies can miss.`)]},{id:`war-and-independence`,startYear:1914,endYear:1921,years:`1914–1921`,title:`World war, revolution and recovered independence`,key:`Imperial collapse opened a state-building opportunity that required diplomacy, mobilization and war.`,summary:`Poles fought in opposing imperial armies, rival leaders pursued different strategies, and the new republic struggled to define borders and citizenship.`,sections:[n(`context`,`A war fought through Polish lands`,`In 1914 Polish territories belonged to Russia, Germany and Austria-Hungary, so Poles were conscripted into opposing armies. Occupation, requisition, refugees and destruction transformed daily life. Józef Piłsudski formed Legions aligned initially with Austria-Hungary, hoping war among the partitioning powers would create an opening. Roman Dmowski pursued the Entente and diplomatic recognition. Their rivalry represented different visions of nation and strategy rather than a simple division between patriot and traitor.`),n(`events`,`November 1918 and the struggle for borders`,`Imperial collapse allowed Polish institutions to take power in late 1918, with Piłsudski becoming chief of state. Independence was a process, not a single ceremonial moment. Fighting occurred over Greater Poland, eastern Galicia, Silesia, Vilnius and the former imperial borderlands. In October 1920 General Lucjan Żeligowski, acting with Piłsudski’s covert approval, seized Vilnius/Wilno from Lithuanian control; its later incorporation into Poland ruptured Polish-Lithuanian relations and remains central to Lithuanian memory. The Polish-Soviet War culminated in the 1920 Battle of Warsaw and ended with the Treaty of Riga in 1921, which divided Belarusian and Ukrainian lands between Poland and Soviet republics.`),n(`international`,`Versailles, self-determination and rival maps`,`US President Woodrow Wilson endorsed an independent Poland with access to the sea, but “self-determination” was difficult in ethnically mixed regions. The Versailles system created new states while leaving large minorities on all sides of borders. Piłsudski imagined a federation of eastern peoples that could resist Russia; Dmowski preferred a more centralized nation-state with an assimilable non-Polish population. Neither vision fully matched local preferences, especially among Ukrainians and Lithuanians.`),n(`culture`,`Artifacts: independence symbols and the “Miracle on the Vistula”`,`The white eagle, anthem and 11 November holiday condensed a complicated process into shared symbols. The phrase “Miracle on the Vistula” framed the Battle of Warsaw as providential rescue, while military historians emphasize intelligence, logistics, command and Soviet errors. Independence posters depict soldiers, mothers and allegorical Poland; they reveal how gender and sacrifice were mobilized. Contemporary annual marches on 11 November show that the meaning of patriotism and the ownership of national symbols remain politically contested.`)],actors:[{name:`Józef Piłsudski`,role:`Legion leader and chief of state who favoured a multiethnic federal strategy in the east and built authority through military and revolutionary networks.`},{name:`Roman Dmowski`,role:`National Democratic leader and diplomat at Versailles who promoted an ethnically more homogeneous, centralized Polish nation-state.`},{name:`Ignacy Jan Paderewski`,role:`World-famous pianist and statesman whose international prestige helped advocate Polish independence and bridge diplomacy with domestic politics.`}],quiz:[t(`Why did Polish soldiers fight on opposing sides during the First World War?`,[`Polish lands were divided among empires whose armies fought one another.`,`Poland had declared war on itself.`,`No Polish political movements existed.`,`They were all mercenaries without conscription.`],0,`The partitions placed inhabitants under Russian, German and Austro-Hungarian rule. Wartime loyalties and strategies were shaped by those imperial structures.`),t(`What is the best way to understand 11 November 1918?`,[`As a useful symbol within a longer process of institutional transfer, diplomacy and border wars.`,`As the date every border was peacefully settled.`,`As the beginning of the medieval Piast dynasty.`,`As the day Poland joined the European Union.`],0,`The date marks Piłsudski’s assumption of authority and the wider collapse of empires, but state formation continued through political negotiation and armed conflict.`),t(`How did Piłsudski and Dmowski differ most clearly?`,[`They promoted different geopolitical and national models: federation versus a more centralized nation-state.`,`One supported independence and the other supported permanent partition.`,`They disagreed only about musical education.`,`Both wanted Poland to become an Ottoman province.`],0,`Both sought independence, but their ideas about eastern neighbours, ethnicity, citizenship and foreign alignment differed substantially.`),t(`Why was self-determination difficult to apply in Central and Eastern Europe?`,[`Populations were intermingled, historical borders overlapped and groups claimed the same cities and regions.`,`No one in the region spoke a language.`,`Every village was ethnically identical.`,`The Versailles Conference prohibited maps.`],0,`New borders could not place every national group inside a homogeneous state. Minority questions and competing historical claims remained central.`)]},{id:`second-republic`,startYear:1921,endYear:1939,years:`1921–1939`,title:`The Second Republic: democracy, modernization and division`,key:`Reunification and modernization coexisted with authoritarian rule, inequality and minority conflict.`,summary:`A new state integrated three imperial legacies, built institutions and culture, and struggled with economic crisis, political violence and a diverse population.`,sections:[n(`context`,`Building one state from three partitions`,`The republic inherited different currencies, rail gauges, laws, school systems and bureaucratic traditions. It also faced war damage, inflation and sharp regional inequality. The 1921 constitution created parliamentary government and broad suffrage, including women’s voting rights granted in 1918. Political parties represented social class, religion, region and competing national visions. The state expanded schooling and administration, but poverty and limited capacity made integration slow.`),n(`events`,`May Coup and Sanacja rule`,`Unstable coalitions, the assassination of President Gabriel Narutowicz in 1922 and social conflict weakened trust in parliamentary politics. In May 1926 Piłsudski led a military coup, promising moral “sanation” of public life. Elections and opposition continued but under increasing pressure; opponents were imprisoned at Brest, and the 1935 constitution strengthened the presidency. The regime was authoritarian rather than fully totalitarian, a distinction that should not hide political repression.`),n(`society`,`Minorities, economy and modernization`,`About one-third of citizens belonged to minorities, including Ukrainians, Jews, Belarusians and Germans. Policies ranged from accommodation to assimilation and discrimination. The state’s 1930 “pacification” in eastern Galicia used searches, arrests and collective penalties after sabotage by the Organization of Ukrainian Nationalists; OUN militants also committed political assassinations. Ukrainian institutions faced restrictions, while Belarusian political representation remained weak and Belarusian schooling and organizations were curtailed. The Great Depression hit rural areas severely. Eugeniusz Kwiatkowski promoted the port of Gdynia and the Central Industrial Region, symbols of modernization. Jewish Warsaw, Ukrainian Lviv, Polish Kraków and mixed small towns produced vibrant cultures alongside growing antisemitism and national polarization.`),n(`international`,`Between revisionist neighbours and fragile alliances`,`The Versailles settlement gave Poland alliances with France and Romania but left difficult relations with both Germany and the Soviet Union. The 1932 non-aggression pact with Moscow and the 1934 declaration with Berlin were attempts to gain time rather than ideological alignment. Poland rejected Soviet transit proposals and German demands over Gdańsk and an extraterritorial route in 1939. British and French guarantees strengthened resolve but could not provide immediate military relief when Germany attacked.`),n(`culture`,`Artifacts: Gdynia, radio, film and interwar literature`,`Modernist Gdynia presented a young state facing the Baltic, while radio connected citizens to national ceremonies, music and news. Writers such as Bruno Schulz, Witold Gombrowicz and Zofia Nałkowska experimented with identity, psychology and social convention; Jewish theatres and Yiddish publishing flourished. The mathematicians Marian Rejewski, Jerzy Różycki and Henryk Zygalski broke early Enigma systems before the war and shared their work with allies, an international scientific contribution often overshadowed by later British codebreaking.`)],actors:[{name:`Józef Piłsudski`,role:`Marshal whose authority helped stabilize and then constrain the republic; his 1926 coup remains central to debates over security and democracy.`},{name:`Eugeniusz Kwiatkowski`,role:`Economic planner associated with Gdynia and the Central Industrial Region, both showcases of state-led modernization.`},{name:`Minority citizens and parties`,role:`Ukrainian, Jewish, Belarusian, German and other communities who were integral to the republic yet often confronted unequal policies and competing national projects.`}],quiz:[t(`What made administrative integration unusually difficult after independence?`,[`The new state combined territories governed for generations by three different empires.`,`Poland had no towns or railways.`,`Every law was already identical.`,`The government refused to create a currency.`],0,`Legal codes, infrastructure, education and economies differed across the former partitions. Creating common institutions was a major achievement and a persistent challenge.`),t(`How should Sanacja rule after 1926 be characterized?`,[`An increasingly authoritarian system that retained some institutions and opposition but restricted fair democratic competition.`,`An uninterrupted liberal democracy with no coercion.`,`A Soviet-style one-party communist state.`,`A restoration of medieval elective monarchy.`],0,`The regime was not identical to totalitarian dictatorships, yet the coup, manipulated elections, imprisonment and the 1935 constitution substantially weakened parliamentary democracy.`),t(`Why is describing interwar Poland as ethnically homogeneous misleading?`,[`Roughly one-third of citizens belonged to minorities with distinct languages, religions and political goals.`,`There were no Polish speakers.`,`All minorities left in 1918.`,`Citizenship was limited to military officers.`],0,`The Second Republic was plural, especially in its eastern cities and countryside. That diversity enriched society but also generated conflicts over language, land and state loyalty.`),t(`What does the Polish contribution to Enigma codebreaking demonstrate?`,[`Scientific intelligence was collaborative and began before wartime work at Bletchley Park.`,`Britain received no foreign help.`,`Enigma was solved by one person after 1945.`,`Codebreaking was unrelated to mathematics.`],0,`Polish mathematicians reconstructed Enigma methods and transferred crucial knowledge to French and British allies in 1939, enabling later wartime advances.`)]},{id:`world-war-two`,startYear:1939,endYear:1945,years:`1939–1945`,title:`Occupation, Holocaust and total war`,key:`Two invasions, genocidal occupation and mass resistance destroyed the society of the Second Republic.`,summary:`Nazi Germany and the Soviet Union invaded Poland, while occupation, collaboration, resistance, the Holocaust and border change produced losses that remain central to public memory.`,sections:[n(`context`,`Invasion from west and east`,`Germany attacked on 1 September 1939; the Soviet Union invaded from the east on 17 September under the secret protocol of the Molotov–Ribbentrop Pact. Poland’s allies Britain and France declared war on Germany but did not relieve the campaign. The government continued in exile, first in France and then London. Germany annexed western territories and created the General Government; the USSR annexed the east, deported civilians and murdered thousands of Polish officers and officials at Katyń and other sites.`),n(`society`,`Occupation systems, Holocaust and ethnic violence`,`German policy sought racial transformation: terror against elites, forced labour, expulsions and mass murder. Jews were confined in ghettos and then deported to killing centres built and operated by Nazi Germany in occupied Poland. Around three million Polish Jews were murdered, alongside roughly three million non-Jewish Polish citizens. Responses ranged from rescue to indifference, blackmail and participation in violence; the 1941 murder of Jews at Jedwabne by Polish neighbours under German occupation is a named, intensively studied case that resists both collective guilt and collective exoneration. In Volhynia and Eastern Galicia in 1943–1944, OUN-UPA forces carried out massacres and ethnic cleansing of Polish civilians; Polish formations committed retaliatory killings of Ukrainian civilians. These interlocking atrocities, shaped by occupation and radical nationalism but involving local agency, remain central to Polish-Ukrainian memory disputes.`),n(`international`,`Resistance, allies and abandoned sovereignty`,`The Polish Underground State and Home Army maintained clandestine education, courts and armed resistance; communist partisans and Jewish organizations pursued different strategies. Polish forces fought with the Western Allies, and an army formed in the USSR later fought alongside the Red Army. Allied decisions at Tehran and Yalta accepted Soviet dominance and moved Poland’s borders west. The discovery of the Katyń graves deepened the break between the exile government and Stalin, while the Western alliance prioritized defeating Germany.`),n(`culture`,`Artifacts and distinct uprisings`,`The 1943 Warsaw Ghetto Uprising was a Jewish revolt against deportation and annihilation; the 1944 Warsaw Uprising was launched by the Home Army to liberate the capital before full Soviet occupation. They are different events with different contexts. Emanuel Ringelblum’s Oyneg Shabes archive preserved Jewish testimony from the ghetto. The anchor-shaped “PW” symbol represents Fighting Poland, while ruined and rebuilt Warsaw embodies both destruction and later memory politics. Films, museums and family stories continue to debate heroism, civilian cost and Polish-Jewish relations.`)],actors:[{name:`Emanuel Ringelblum and Oyneg Shabes`,role:`Historian and clandestine archivists who documented Jewish life, persecution and resistance from inside the Warsaw Ghetto.`},{name:`The Polish Underground State`,role:`A network loyal to the government-in-exile that organized administration, education, justice, intelligence and the Home Army under occupation.`},{name:`Irena Sendler and diverse rescuers`,role:`People who aided Jews despite lethal danger; their courage must be remembered without using rescue stories to obscure widespread vulnerability or hostility.`}],quiz:[t(`Why is the term “Polish death camps” historically misleading?`,[`Nazi Germany designed and operated killing centres in occupied Poland; location does not imply Polish state responsibility.`,`No killing centres existed in occupied Poland.`,`The camps were built by the pre-war Polish parliament.`,`The Soviet Union operated every German camp.`],0,`The accurate formulation is German Nazi camps in occupied Poland. The Polish state was destroyed and its citizens were subjected to occupation, though individual behaviour still ranged widely.`),t(`What distinguishes the Warsaw Ghetto Uprising from the Warsaw Uprising?`,[`The 1943 revolt was Jewish resistance within the ghetto; the 1944 uprising was led mainly by the Home Army across Warsaw.`,`They were two names for the same event.`,`Both occurred after Germany surrendered.`,`The 1943 revolt was directed by the Soviet government.`],0,`The events share a city and extraordinary courage but had distinct participants, goals, timing and circumstances. Conflating them erases important history.`),t(`How should individual behaviour toward persecuted Jews be studied?`,[`Through specific evidence recognizing rescue, indifference, coercion, blackmail and collaboration rather than a single national stereotype.`,`By assuming every person acted identically.`,`By ignoring occupation terror and antisemitism alike.`,`By treating post-war films as the only evidence.`],0,`Occupation created extreme danger but did not eliminate individual choices. Responsible history examines institutions, local contexts and testimony without collective exoneration or collective guilt.`),t(`Why did Poland’s post-war borders and government not reflect the exile government’s goals?`,[`The Red Army occupied the region and the Allied great powers accepted Soviet strategic dominance.`,`The exile government requested communist rule.`,`Germany won the war.`,`The Treaty of Riga remained unchanged by agreement of all parties.`],0,`Military power shaped diplomacy. Britain and the United States prioritized Allied unity and accepted a Soviet-backed government and westward border shift.`)]},{id:`stalinism-peoples-poland`,startYear:1945,endYear:1970,years:`1945–1970`,title:`Borders moved west: Stalinism and state socialism`,key:`A nearly homogeneous society was rebuilt under Soviet-backed authoritarian rule.`,summary:`Border shifts, population transfers, communist consolidation, Stalinist terror, industrialization and the 1956 thaw remade Poland after catastrophe.`,sections:[n(`context`,`A different country on a shifted map`,`Poland lost eastern territories to the Soviet Union and received former German lands in the west and north. German civilians first fled the advancing Red Army and were then expelled under the post-war Allied settlement; the process caused civilian suffering but followed Nazi Germany’s occupation and genocidal war, contexts that must be held together. Poles were resettled from the east. In Operation Vistula in 1947, the communist state collectively and forcibly dispersed about 140,000 Ukrainians, Lemkos and Boykos to the western and northern territories while fighting the UPA insurgency. The 1946 Kielce pogrom, in which more than forty Jews were killed, accelerated post-Holocaust Jewish flight and exposed persistent antisemitism amid post-war disorder. Holocaust, border change and forced migration ended much of the pre-war plural society. Warsaw was rebuilt, while “Recovered Territories” propaganda presented the western lands as an ancient return rather than a radical transfer.`),n(`events`,`Communist consolidation and Stalinist terror`,`A Soviet-backed coalition marginalized and destroyed independent opposition through police violence, manipulated elections and show trials. The Polish United Workers’ Party dominated the state from 1948. Security forces persecuted former underground fighters, political opponents and clergy; collectivization was attempted but most farmland remained private. Central planning accelerated heavy industry and urbanization, bringing education and jobs to many rural families while producing coercion, shortages, environmental damage and political conformity.`),n(`international`,`Soviet bloc, 1956 and limited autonomy`,`Poland joined Soviet-led institutions and had little foreign-policy autonomy. Stalin’s death and worker protests in Poznań in June 1956 opened a crisis. Władysław Gomułka returned to power promising a “Polish road to socialism,” reduced some terror and halted full collectivization while accepting one-party rule and Warsaw Pact membership. The Catholic Church retained unusual social strength, producing recurring negotiation and confrontation with the state.`),n(`culture`,`Artifacts: socialist realism, the Polish School and Nowa Huta`,`Nowa Huta, a planned steel city beside Kraków, symbolized industrial modernity and the effort to create a socialist working class; later it became a centre of Catholic and Solidarity resistance. Socialist realism briefly prescribed heroic workers and optimistic production, but the 1956 thaw enabled the Polish Film School. Directors such as Andrzej Wajda examined wartime tragedy and moral ambiguity. Posters used inventive metaphor to escape literal censorship, creating a globally admired Polish school of graphic design.`)],actors:[{name:`Bolesław Bierut`,role:`Stalinist leader under whom the party-state consolidated power, security repression intensified and Soviet political models were imposed.`},{name:`Władysław Gomułka`,role:`Communist politician imprisoned during Stalinism who returned in 1956 as a symbol of limited autonomy but later defended authoritarian rule.`},{name:`Post-war migrants and industrial workers`,role:`Millions who rebuilt cities, populated new western territories and moved from villages to factories, transforming class and regional identities.`}],quiz:[t(`What was the demographic effect of post-war border changes and violence?`,[`Poland became far more ethnically homogeneous through genocide, flight, expulsion and forced resettlement.`,`The country regained exactly its 1938 population and borders.`,`No one moved between 1945 and 1950.`,`German and Jewish populations both increased dramatically.`],0,`The Holocaust, westward border shift and population transfers transformed a historically diverse state. Homogeneity was produced by catastrophe and coercive policy, not an ancient constant.`),t(`Why did communist industrialization attract support from some citizens despite dictatorship?`,[`It offered education, urban jobs and social mobility while also imposing coercion and shortages.`,`It abolished all work.`,`It restored noble privileges.`,`It allowed free multi-party elections.`],0,`Social transformation had real beneficiaries and real costs. Recognizing mobility and welfare does not excuse police repression or lack of political freedom.`),t(`What changed in 1956 under Gomułka?`,[`The harshest Stalinist practices eased and Poland gained limited room within the Soviet bloc, but one-party rule continued.`,`Poland immediately joined NATO.`,`The monarchy was restored.`,`All censorship ended permanently.`],0,`The “thaw” mattered, yet it was a reform of state socialism rather than democratic transition. Later repression showed its limits.`),t(`Why is Nowa Huta a useful historical symbol?`,[`It moved from showcase socialist industrial city to a site of church conflict and worker opposition.`,`It was the capital of the medieval Commonwealth.`,`It remained uninhabited.`,`It was built by Napoleon as a naval base.`],0,`Nowa Huta captures post-war migration, planned industrialization, environmental cost, religious conflict and the later politicization of workers.`)]},{id:`protest-solidarity`,startYear:1968,endYear:1989,years:`1968–1989`,title:`Crisis, dissent and Solidarity`,key:`Worker protest, intellectual opposition, the Church and economic failure created a mass challenge to one-party rule.`,summary:`From 1968 and 1970 through the election of a Polish pope, Solidarity, martial law and Round Table talks, society built institutions outside the party-state.`,sections:[n(`context`,`1968, 1970 and organized opposition`,`Student protest in March 1968 met repression and an official “anti-Zionist” campaign that drove thousands of remaining Polish Jews into emigration. Price rises triggered worker protests on the Baltic coast in December 1970; security forces killed demonstrators and Edward Gierek replaced Gomułka. Foreign borrowing initially raised consumption but produced debt and shortages. After workers were beaten in 1976, intellectuals formed the Workers’ Defence Committee, linking legal aid, underground publishing and labour activism.`),n(`society`,`A pope, strikes and ten million members`,`The 1978 election of Kraków’s Cardinal Karol Wojtyła as Pope John Paul II gave millions a language of dignity and public assembly outside communist control. Strikes in summer 1980 produced the Gdańsk Agreement and the independent trade union Solidarity. Led publicly by electrician Lech Wałęsa but sustained by women organizers, regional activists and experts, Solidarity enrolled around ten million people. It was a union, civic movement and national forum containing socialists, Catholics, liberals and nationalists.`),n(`international`,`Martial law and the late Cold War`,`General Wojciech Jaruzelski imposed martial law on 13 December 1981, interned activists and crushed open organization. He later argued that this prevented Soviet intervention; historians debate the likelihood of invasion, while documents show the regime sought Soviet support and acted to preserve party rule. Solidarity survived underground with foreign broadcasting, Western sanctions, Church mediation and transnational labour support. Gorbachev’s reforms, Soviet decline and Poland’s economic crisis altered the risks by the late 1980s.`),n(`culture`,`Artifacts: the Solidarity logo, underground print and protest music`,`Jerzy Janiszewski’s red Solidarity logo makes letters resemble a tightly packed crowd, turning typography into a model of collective power. Samizdat printing, cassette recordings, church exhibitions and Orange Alternative street happenings created a counter-public sphere. Songs by Jacek Kaczmarski and films by Krzysztof Kieślowski explored responsibility, compromise and everyday absurdity. Today arguments over Wałęsa, Jaruzelski and the Church show how a shared opposition movement fragmented into rival memories after victory.`)],actors:[{name:`Anna Walentynowicz and Lech Wałęsa`,role:`Gdańsk activists whose roles in the 1980 strike symbolize both collective organization and later disputes over leadership and memory.`},{name:`Karol Wojtyła / John Paul II`,role:`Polish pope whose visits and moral language expanded public space outside the party, while his later legacy is debated in a changing society.`},{name:`Wojciech Jaruzelski`,role:`Communist general who imposed martial law, presenting it as a lesser evil while opponents view it as repression to preserve party power.`}],quiz:[t(`What made the March 1968 campaign especially damaging to post-war Jewish life?`,[`The state used antisemitic “anti-Zionist” rhetoric to purge institutions and force emigration.`,`It invited Jewish emigrants to return with full restitution.`,`It ended censorship.`,`It was directed only at foreign tourists.`],0,`The campaign combined factional party struggle, nationalist propaganda and repression. Thousands of citizens of Jewish origin were pushed out of the country.`),t(`Why was Solidarity more than a normal trade union?`,[`Its mass membership and broad networks made it a forum for civic, political and moral demands across society.`,`It represented only senior party officials.`,`It operated as a foreign army.`,`It rejected workplace issues entirely.`],0,`Solidarity grew from labour demands but became an alternative public sphere linking workers, intellectuals, farmers, students and religious communities.`),t(`How should Jaruzelski’s “lesser evil” defence of martial law be evaluated?`,[`As a contested claim requiring evidence about Soviet intentions and the regime’s own interest in preserving power.`,`As an unquestioned fact that ends historical debate.`,`As proof that no repression occurred.`,`As a policy announced by NATO.`],0,`Soviet pressure was real, but the probability of intervention and available alternatives remain debated. Internment, deaths and destruction of legal Solidarity are established facts.`),t(`Why did Round Table negotiation become possible by 1989?`,[`Economic crisis, resilient opposition, changing Soviet policy and mutual uncertainty made compromise less risky than continued deadlock.`,`The communist economy was experiencing unprecedented success.`,`Solidarity had ceased to exist entirely.`,`Poland had already become an EU member.`],0,`Neither side controlled the future. Structural crisis and a transformed international environment created space for negotiated, partly free elections.`)]},{id:`third-republic`,startYear:1989,endYear:2026,years:`1989–present`,title:`The Third Republic: democracy, markets and contested belonging`,key:`Successful integration and rising prosperity coexist with unequal transitions and fierce disputes over institutions and memory.`,summary:`Round Table elections, economic transformation, NATO and EU membership, migration and polarized democracy define contemporary Poland.`,sections:[n(`context`,`Negotiated transition and constitutional democracy`,`The Round Table talks produced partly free elections on 4 June 1989, in which opposition candidates won nearly every seat they could contest. Tadeusz Mazowiecki became the first non-communist prime minister in the Soviet bloc. Subsequent governments introduced competitive elections, local self-government and a market economy. The 1997 constitution created checks among parliament, president, courts and local authorities. Transition was peaceful compared with many historical ruptures, but former regime personnel, property and accountability remained politically divisive.`),n(`society`,`Shock therapy, winners and losers`,`Finance minister Leszek Balcerowicz’s reforms stabilized inflation and rapidly liberalized prices and trade, helping create long-term growth but also unemployment, factory closures and regional inequality. Private enterprise, consumer culture and foreign investment expanded. Millions later worked elsewhere in the European Union, while Poland increasingly became a destination for migrants, especially from Ukraine and Belarus. Demographic decline, housing, reproductive rights, secularization and the public role of the Catholic Church now shape social debate.`),n(`international`,`NATO, European Union and war next door`,`Poland joined NATO in 1999 and the European Union in 2004, anchoring itself institutionally in the West while maintaining strong concern about Russian power. EU membership brought infrastructure funds, mobility and regulatory change, but also disputes over sovereignty. Russia’s full-scale invasion of Ukraine in 2022 prompted extensive Polish military and humanitarian support and a major refugee reception, even as historical Polish-Ukrainian disputes and agricultural tensions persisted. Security policy now links memory of partitions and 1939 to contemporary choices, sometimes illuminating and sometimes oversimplifying.`),n(`culture`,`Artifacts: museums, music, film and the politics of memory`,`New museums—the Warsaw Rising Museum, POLIN Museum of the History of Polish Jews, European Solidarity Centre and Museum of the Second World War—present different ways of connecting national and transnational history. Nobel laureates Wisława Szymborska and Olga Tokarczuk use irony, memory and border-crossing to complicate heroic narratives. Film, hip-hop, video games and historical reenactment bring history to mass audiences. Disputes over judicial independence, public media, abortion law, LGBT rights and historical legislation show that democracy is an ongoing practice, not a prize permanently won in 1989.`)],actors:[{name:`Tadeusz Mazowiecki and Leszek Balcerowicz`,role:`Political and economic reformers associated with democratic government and rapid market transformation, including both growth and severe social costs.`},{name:`Post-Solidarity and post-communist parties`,role:`Rival political families that alternated in government and gradually produced today’s polarized competition over state institutions and national identity.`},{name:`Civil society and local government`,role:`Associations, municipalities, protest movements, media and volunteers that make democratic participation broader than national elections alone.`}],quiz:[t(`Why is 1989 described as a negotiated revolution?`,[`Institutions changed fundamentally through bargaining, elections and later reform rather than a single violent overthrow.`,`Nothing important changed.`,`The monarchy returned by invasion.`,`The Soviet Union annexed western Poland.`],0,`The Round Table preserved some guarantees for the old regime while opening a process that moved faster than participants expected. Continuity and transformation existed together.`),t(`What is the most balanced assessment of rapid market reform?`,[`It stabilized and modernized the economy while imposing unemployment and unequal regional costs.`,`It benefited every citizen equally from the first day.`,`It produced only decline and no later growth.`,`It left prices and ownership entirely unchanged.`],0,`Poland’s long-run economic performance was strong, but aggregate success does not erase closures, insecurity and the political geography created by uneven transition.`),t(`How has EU membership affected Poland?`,[`It expanded mobility, investment and shared regulation while generating real debates over sovereignty and standards.`,`It abolished Polish elections.`,`It ended every economic inequality.`,`It placed Poland outside European institutions.`],0,`Membership is neither total loss of sovereignty nor a solution to every problem. It creates shared rules, benefits and conflicts negotiated through domestic and European politics.`),t(`Why should historical analogy be used cautiously in contemporary security debates?`,[`Past experience can highlight risks, but different institutions, actors and conditions make exact repetition unlikely.`,`History never matters to policy.`,`Every conflict is identical to 1939.`,`Only medieval examples are legitimate.`],0,`Memories of partitions, occupation and Soviet domination shape Polish threat perception. Good analysis uses them as context rather than replacing evidence about the present.`)]}],i=[{year:966,era:`lands-before-poland`,title:`Baptism of Mieszko I`,text:`The Piast ruler joins Latin Christianity and strengthens diplomatic legitimacy.`},{year:1e3,era:`lands-before-poland`,title:`Congress of Gniezno`,text:`Otto III meets Bolesław and supports an archbishopric at Gniezno.`},{year:1025,era:`lands-before-poland`,title:`Coronation of Bolesław I`,text:`Royal coronation becomes a durable symbol of sovereign ambition.`},{year:1138,era:`fragmentation-reunification`,title:`Piast division`,text:`Bolesław III’s succession settlement begins prolonged political fragmentation.`},{year:1241,era:`fragmentation-reunification`,title:`Battle of Legnica`,text:`A Mongol army defeats regional forces during a devastating invasion.`},{year:1320,era:`fragmentation-reunification`,title:`Royal reunification`,text:`Władysław Łokietek is crowned in Kraków.`},{year:1364,era:`fragmentation-reunification`,title:`Kraków University founded`,text:`Casimir III establishes a centre of higher learning.`},{year:1385,era:`jagiellonian-union`,title:`Union of Krewo`,text:`Jadwiga and Jogaila link Poland and Lithuania through dynasty and conversion.`},{year:1410,era:`jagiellonian-union`,title:`Battle of Grunwald`,text:`Polish-Lithuanian forces defeat the Teutonic Order.`},{year:1505,era:`jagiellonian-union`,title:`Nihil Novi`,text:`Major legislation requires parliamentary consent of noble representatives.`},{year:1525,era:`jagiellonian-union`,title:`Prussian Homage`,text:`The Teutonic state in Prussia becomes a secular Polish fief.`},{year:1569,era:`commonwealth`,title:`Union of Lublin`,text:`The Polish-Lithuanian Commonwealth is established.`},{year:1573,era:`commonwealth`,title:`Warsaw Confederation`,text:`Nobles guarantee a significant measure of religious peace.`},{year:1648,era:`crisis-reform`,title:`Khmelnytsky uprising`,text:`Cossack revolt opens decades of war and social violence.`},{year:1655,era:`crisis-reform`,title:`The Swedish Deluge`,text:`Swedish occupation compounds demographic and material catastrophe.`},{year:1683,era:`crisis-reform`,title:`Relief of Vienna`,text:`Jan III Sobieski leads allied forces against the Ottoman siege.`},{year:1772,era:`partitions-napoleon`,title:`First Partition`,text:`Russia, Prussia and Austria seize Commonwealth territory.`},{year:1791,era:`crisis-reform`,title:`Constitution of 3 May`,text:`Reformers adopt a stronger constitutional order.`},{year:1794,era:`crisis-reform`,title:`Kościuszko Uprising`,text:`A final armed effort seeks to defend sovereignty and reform.`},{year:1795,era:`partitions-napoleon`,title:`Third Partition`,text:`The Commonwealth disappears as a sovereign state.`},{year:1807,era:`partitions-napoleon`,title:`Duchy of Warsaw`,text:`Napoleon creates a dependent Polish state with modernizing law.`},{year:1815,era:`long-nineteenth-century`,title:`Congress of Vienna`,text:`The partition powers reorganize Polish lands after Napoleon.`},{year:1830,era:`long-nineteenth-century`,title:`November Uprising`,text:`Military revolt becomes an unsuccessful war against Russia.`},{year:1863,era:`long-nineteenth-century`,title:`January Uprising`,text:`An underground state directs guerrilla resistance to Russian rule.`},{year:1905,era:`long-ninete