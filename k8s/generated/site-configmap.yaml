the transition before NATO and European Union accession.`}]}],o=[{id:`lublin-union`,chapterId:`commonwealth`,era:`Union parliament`,title:`A federation under pressure`,context:`The Crown and Grand Duchy face war with Muscovy. Delegates disagree over how much sovereignty a closer union should preserve.`,prompt:`What settlement will you press through the Sejm?`,options:[{label:`Negotiate shared institutions while preserving separate law and offices`,effects:{authority:8,treasury:-8,cohesion:12,liberty:6},consequence:`A workable federation gains capacity without pretending the two partners have merged into one uniform state, but parallel institutions are costly to coordinate.`},{label:`Centralize law, offices and taxation immediately under the Crown`,effects:{authority:18,treasury:10,cohesion:-22,liberty:-16},consequence:`Central capacity rises, but Lithuanian and Ruthenian elites see incorporation rather than partnership.`},{label:`Keep only the personal union and postpone reform`,effects:{authority:-10,treasury:-8,cohesion:4,liberty:8},consequence:`Autonomy is preserved, but wartime coordination and common fiscal capacity remain weak.`}]},{id:`religious-peace`,chapterId:`commonwealth`,era:`Royal interregnum`,title:`Peace without a king`,context:`Confessional wars unsettle Europe while the Commonwealth enters an interregnum with a religiously diverse nobility and cities.`,prompt:`How will you secure the election?`,options:[{label:`Declare one confession a condition of political loyalty`,effects:{authority:10,treasury:2,cohesion:-18,liberty:-24},consequence:`Uniformity appeals to some clergy and magnates but threatens dissenting nobles and towns.`},{label:`Bind electors to mutual religious peace`,effects:{authority:-4,treasury:-4,cohesion:16,liberty:18},consequence:`The compact lowers the risk of confessional civil war, though enforcement is costly and toleration remains unequal and incomplete.`},{label:`Leave every locality to settle conflict independently`,effects:{authority:-12,treasury:-4,cohesion:-8,liberty:10},consequence:`Local freedom grows, but there is no common guarantee against coercion during the interregnum.`}]},{id:`cossack-register`,chapterId:`crisis-reform`,era:`Eastern frontier`,title:`The Cossack question`,context:`Registered Cossacks seek status and pay; Orthodox communities contest religious and social subordination; magnate estates expand.`,prompt:`Which policy do you advocate before revolt becomes general war?`,options:[{label:`Use magnate forces to enforce the existing settlement`,effects:{authority:10,treasury:-4,cohesion:-24,liberty:-18},consequence:`Short-term compliance hides deeper social, religious and political conflict.`},{label:`Withdraw royal authority and let estate owners bargain separately`,effects:{authority:-18,treasury:4,cohesion:-10,liberty:6},consequence:`The centre saves money but loses leverage as local conflicts and private armies shape the frontier.`},{label:`Expand the register and negotiate representation with Orthodox elites`,effects:{authority:4,treasury:-18,cohesion:18,liberty:10},consequence:`The treasury strains, but recognition addresses political and confessional grievances instead of treating the frontier only as a security problem.`}]},{id:`fiscal-reform`,chapterId:`crisis-reform`,era:`Age of reform`,title:`A state that cannot pay`,context:`Neighbouring monarchies maintain larger standing armies. Sejm obstruction and foreign influence repeatedly block dependable taxation.`,prompt:`How will you build defensive capacity?`,options:[{label:`Give the monarch emergency taxes without oversight`,effects:{authority:24,treasury:18,cohesion:-12,liberty:-24},consequence:`Revenue arrives quickly, but opponents fear that reform has become absolutism.`},{label:`Create regular taxation with parliamentary auditing`,effects:{authority:12,treasury:22,cohesion:-8,liberty:4},consequence:`Capacity and accountability rise together, though privileged taxpayers resist the precedent and political cohesion suffers.`},{label:`Rely on temporary levies and diplomatic guarantees`,effects:{authority:-14,treasury:8,cohesion:-4,liberty:10},consequence:`Privileges remain secure while military dependence on neighbouring powers deepens.`}]},{id:`may-constitution`,chapterId:`crisis-reform`,era:`Constitutional moment`,title:`Reform under the eyes of empires`,context:`The Four-Year Sejm has an opening to reform government, but domestic opponents and neighbouring powers can intervene.`,prompt:`What constitutional coalition will you build?`,options:[{label:`Abolish every estate and proclaim immediate universal democracy`,effects:{authority:-8,treasury:-10,cohesion:-24,liberty:24},consequence:`The leap outruns the available coalition and makes foreign and domestic counter-mobilization easier.`},{label:`Abandon reform to avoid provoking Russia and Prussia`,effects:{authority:-18,treasury:-8,cohesion:2,liberty:-4},consequence:`Immediate confrontation is postponed, but institutional weakness and foreign leverage remain.`},{label:`Strengthen government and urban rights through a broad reform coalition`,effects:{authority:16,treasury:-8,cohesion:10,liberty:12},consequence:`The settlement improves capacity and citizenship while remaining an eighteenth-century constitutional monarchy, not universal democracy; implementation strains the treasury.`}]}],s=[{id:`partition-dossier`,title:`Casefile: Why did the Commonwealth disappear?`,chapterIds:[`crisis-reform`,`partitions-napoleon`],brief:`Select the three pieces of evidence most useful for testing a combined domestic-and-international explanation, then choose the strongest interpretation.`,evidence:[{id:`sejm-obstruction`,label:`Sejm records`,text:`Repeated obstruction prevented dependable taxation and military reform.`,source:`Institutional evidence`},{id:`foreign-troops`,label:`Diplomatic dispatch`,text:`Russian troops and ambassadors intervened directly in Commonwealth politics.`,source:`International evidence`},{id:`reform-reaction`,label:`Constitution and invasion`,text:`Reform in the Four-Year Sejm was followed by confederate opposition and foreign military intervention.`,source:`Causal sequence`},{id:`anthem`,label:`Later patriotic song`,text:`The anthem insists that the nation could survive without a state.`,source:`Memory evidence`},{id:`weather`,label:`Estate weather diary`,text:`Several winters brought poor local harvests.`,source:`Contextual fragment`}],correctEvidence:[`sejm-obstruction`,`foreign-troops`,`reform-reaction`],interpretations:[{text:`Institutional weakness and foreign coercion reinforced one another; neither alone explains the partitions.`,correct:!0},{text:`One parliamentary rule mechanically caused all three partitions regardless of neighbouring powers.`,correct:!1},{text:`The partitions were an uncontested modernization welcomed by Commonwealth society.`,correct:!1}]},{id:`occupation-dossier`,title:`Casefile: Responsibility under occupation`,chapterIds:[`world-war-two`],brief:`Build a precise account that names occupying regimes while preserving evidence of varied local choices.`,evidence:[{id:`german-system`,label:`Occupation decree`,text:`Nazi Germany designed the ghetto, deportation and killing-centre system in occupied Poland.`,source:`Perpetrator institution`},{id:`state-destroyed`,label:`Government record`,text:`The Polish state was dismantled; an exile government and underground institutions continued resistance.`,source:`Political context`},{id:`local-agency`,label:`Local testimony`,text:`Evidence documents rescue, indifference, blackmail and participation in violence by different individuals.`,source:`Microhistorical evidence`},{id:`camp-location`,label:`Railway map`,text:`Major killing centres stood within occupied Polish territory.`,source:`Geographic evidence`},{id:`postwar-film`,label:`Feature film`,text:`A post-war drama compresses several experiences into one fictional family.`,source:`Memory artifact`}],correctEvidence:[`german-system`,`state-destroyed