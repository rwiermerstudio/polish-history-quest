    union?`,[`Its mass membership and broad networks made it a forum for civic, political
    and moral demands across society.`,`It represented reform-minded party managers
    rather than independent workers or intellectuals.`,`It was primarily a clandestine
    political party with little involvement in workplace demands.`,`It emphasized
    electoral politics and avoided wages, safety and workplace self-management.`],0,`Solidarity
    grew from labour demands but became an alternative public sphere linking workers,
    intellectuals, farmers, students and religious communities.`),i(`How should Jaruzelski’s
    “lesser evil” defence of martial law be evaluated?`,[`As a contested claim requiring
    evidence about Soviet intentions and the regime’s own interest in preserving power.`,`As
    an unquestioned fact that ends historical debate.`,`As evidence that martial law
    relied mainly on negotiation rather than coercion.`,`As an assessment issued by
    NATO intelligence to justify intervention.`],0,`Soviet pressure was real, but
    the probability of intervention and available alternatives remain debated. Internment,
    deaths and destruction of legal Solidarity are established facts.`),i(`Why did
    Round Table negotiation become possible by 1989?`,[`Economic crisis, resilient
    opposition, changing Soviet policy and mutual uncertainty made compromise less
    risky than continued deadlock.`,`The communist economy was experiencing unprecedented
    success.`,`Its underground structures disappeared after martial law, leaving no
    organized opposition.`,`Western governments made recognition conditional on an
    immediate transfer of power.`],0,`Neither side controlled the future. Structural
    crisis and a transformed international environment created space for negotiated,
    partly free elections.`)]},{id:`third-republic`,startYear:1989,endYear:2026,years:`1989–present`,title:`The
    Third Republic: democracy, markets and contested belonging`,key:`Successful integration
    and rising prosperity coexist with unequal transitions and fierce disputes over
    institutions and memory.`,summary:`Round Table elections, economic transformation,
    NATO and EU membership, migration and polarized democracy define contemporary
    Poland.`,sections:[n(`context`,`Negotiated transition and constitutional democracy`,`The
    Round Table talks produced partly free elections on 4 June 1989, in which opposition
    candidates won nearly every seat they could contest. Tadeusz Mazowiecki became
    the first non-communist prime minister in the Soviet bloc. Subsequent governments
    introduced competitive elections, local self-government and a market economy.
    The 1997 constitution created checks among parliament, president, courts and local
    authorities. Transition was peaceful compared with many historical ruptures, but
    former regime personnel, property and accountability remained politically divisive.`),n(`society`,`Shock
    therapy, winners and losers`,`Finance minister Leszek Balcerowicz’s reforms stabilized
    inflation and rapidly liberalized prices and trade, helping create long-term growth
    but also unemployment, factory closures and regional inequality. Private enterprise,
    consumer culture and foreign investment expanded. Millions later worked elsewhere
    in the European Union, while Poland increasingly became a destination for migrants,
    especially from Ukraine and Belarus. Demographic decline, housing, reproductive
    rights, secularization and the public role of the Catholic Church now shape social
    debate.`),n(`international`,`NATO, European Union and war next door`,`Poland joined
    NATO in 1999 and the European Union in 2004, anchoring itself institutionally
    in the West while maintaining strong concern about Russian power. EU membership
    brought infrastructure funds, mobility and regulatory change, but also disputes
    over sovereignty. Russia’s full-scale invasion of Ukraine in 2022 prompted extensive
    Polish military and humanitarian support and a major refugee reception, even as
    historical Polish-Ukrainian disputes and agricultural tensions persisted. Security
    policy now links memory of partitions and 1939 to contemporary choices, sometimes
    illuminating and sometimes oversimplifying.`),n(`culture`,`Artifacts: museums,
    music, film and the politics of memory`,`New museums—the Warsaw Rising Museum,
    POLIN Museum of the History of Polish Jews, European Solidarity Centre and Museum
    of the Second World War—present different ways of connecting national and transnational
    history. Nobel laureates Wisława Szymborska and Olga Tokarczuk use irony, memory
    and border-crossing to complicate heroic narratives. Film, hip-hop, video games
    and historical reenactment bring history to mass audiences. Disputes over judicial
    independence, public media, abortion law, LGBT rights and historical legislation
    show that democracy is an ongoing practice, not a prize permanently won in 1989.`)],actors:[{name:`Tadeusz
    Mazowiecki and Leszek Balcerowicz`,role:`Political and economic reformers associated
    with democratic government and rapid market transformation, including both growth
