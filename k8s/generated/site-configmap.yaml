    <main class="companion" id="content">
      <header class="cover chapter-2-cover">
        <p class="eyebrow">Polish History Quest · In-depth companion</p>
        <h1>Fragmentation, towns and a reunited kingdom</h1>
        <p class="subtitle">Regional courts, migration, law, invasion and political reconstruction, 1138–1385</p>
        <div class="cover-meta"><span>Source-led survey</span><span>Original excerpts with new English translations</span><span>Print edition · 2026</span></div>
      </header>

      <section class="companion-section" id="contents">
        <p class="section-number">Reader guide</p>
        <h2>How to study a divided kingdom</h2>
        <p class="lede dropcap">A map of the Polish lands after 1138 looks broken into coloured pieces. That picture is useful, but it can also mislead. Bolesław III did not divide a modern nation-state into sovereign countries, and his descendants did not spend two centuries merely waiting for unity to return. They ruled overlapping inheritances within a recognised Piast political world. Their courts competed, negotiated, founded churches and towns, attracted migrants, opened forests and made law. Division weakened any one ruler’s command while creating several centres of institutional experiment.</p>
        <p>This companion therefore treats 1138–1385 as a period of transformation rather than an empty interval between two strong monarchies. Its story includes dukes and kings, but also peasants clearing land, craftspeople moving into chartered settlements, Jewish families negotiating protection, clerics preserving documents, women carrying claims between dynasties, and townspeople learning to use municipal courts. Mongol armies, Bohemian kings, Hungarian Angevins, Ruthenian princes and the Teutonic Order all shaped the region. No political history confined inside present-day borders can explain what happened.</p>
        <p>The evidence is abundant compared with the tenth century, yet still uneven. Charters record grants and desired rules more readily than everyday practice. Chronicles turn conflict into moral narrative. Saints’ lives arrange a person’s experience around sanctity. Annals compress catastrophe into one sentence. Seals, coins, buildings and excavated streets reveal institutions materially, but do not speak without comparison. Later national histories often made medieval settlement into a contest between timeless “Poles” and “Germans”; that framework must be tested against mixed households, transferable legal forms and identities that were local, dynastic, religious and linguistic at once.</p>
        <nav aria-label="Companion contents">
          <ol class="toc">
            <li><a href="#chronology"><span>Chronology and evidence</span><span>01</span></a></li>
            <li><a href="#succession"><span>The 1138 succession</span><span>02</span></a></li>
            <li><a href="#duchies"><span>Regional courts and duchies</span><span>03</span></a></li>
            <li><a href="#land"><span>Land, labour and lordship</span><span>04</span></a></li>
            <li><a href="#settlement"><span>Migration and settlement</span><span>05</span></a></li>
            <li><a href="#town-law"><span>Towns and Magdeburg law</span><span>06</span></a></li>
            <li><a href="#jewish-life"><span>Jewish communities and law</span><span>07</span></a></li>
            <li><a href="#church"><span>Church, monasteries and learning</span><span>08</span></a></li>
            <li><a href="#women"><span>Women and dynastic politics</span><span>09</span></a></li>
            <li><a href="#mongols"><span>The Mongol campaigns</span><span>10</span></a></li>
            <li><a href="#silesia"><span>Silesia and Bohemia</span><span>11</span></a></li>
            <li><a href="#baltic"><span>The Baltic and Teutonic Order</span><span>12</span></a></li>
            <li><a href="#pomerelia"><span>Pomerelia and contested rule</span><span>13</span></a></li>
            <li><a href="#reunification"><span>Routes to reunification</span><span>14</span></a></li>
            <li><a href="#lokietek"><span>Łokietek and the restored crown</span><span>15</span></a></li>
            <li><a href="#casimir"><span>Casimir III’s monarchy</span><span>16</span></a></li>
            <li><a href="#ruthenia"><span>Ruthenia and eastern expansion</span><span>17</span></a></li>
            <li><a href="#university"><span>Castles, law and university</span><span>18</span></a></li>
            <li><a href="#angevin"><span>Angevin rule and succession</span><span>19</span></a></li>
            <li><a href="#workshop"><span>Interpretation workshop</span><span>20</span></a></li>
            <li><a href="#sources"><span>Sources and further reading</span><span>21</span></a></li>
          </ol>
        </nav>
        <div class="caution"><strong>Translation note.</strong> Unless otherwise stated, English translations of medieval excerpts are newly prepared from the cited edition. Editorial supplements, normalized forms, manuscript variants and omissions are identified rather than silently absorbed into the quotation.</div>
      </section>

      <section class="companion-section print-break" id="chronology"><p class="section-number">01 · Orientation</p><h2>Chronology and uneven evidence</h2>
        <p class="lede">The period is framed by two succession arrangements: the distribution of Piast rule after Bolesław III’s death in 1138 and the negotiations that led the young ruler Jadwiga toward marriage with Jogaila in 1385. Neither date instantly created the political order later associated with it.</p>
        <table class="timeline-table"><caption>Selected chronology, 1138–1385</caption><tbody>
          <tr><th scope="row">1138</th><td>Bolesław III dies. His sons receive regional inheritances within a disputed scheme of senior authority.</td></tr>
          <tr><th scope="row">1177–1227</th><td>Repeated contests for Kraków show that seniority cannot prevent bargaining, deposition and war among Piast branches.</td></tr>
          <tr><th scope="row">1226–1230s</th><td>Konrad of Mazovia invites the Teutonic Order to fight in Prussia; papal and imperial privileges help the Order build an autonomous territorial lordship.</td></tr>
          <tr><th scope="row">1241</th><td>A Mongol army defeats Henry II’s coalition near Legnica while the larger campaign strikes Hungary.</td></tr>
          <tr><th scope="row">1257–1264</th><td>Kraków’s location charter and Bolesław the Pious’s Jewish privilege at Kalisz exemplify rulers reorganising jurisdiction and protection.</td></tr>
          <tr><th scope="row">1295–1320</th><td>Przemysł II briefly restores royal coronation; after further conflict, Władysław Łokietek is crowned in Kraków.</td></tr>
          <tr><th scope="row">1308–1309</th><td>The Teutonic Order takes Gdańsk and Pomerelia, creating a dispute fought by arms, diplomacy and legal testimony.</td></tr>
          <tr><th scope="row">1333–1370</th><td>Casimir III consolidates the monarchy, negotiates borders, expands into the Rus lands and founds a university.</td></tr>
          <tr><th scope="row">1370–1385</th><td>Angevin succession links Poland to Hungary; privileges and elite negotiation culminate in Jadwiga’s accession and the Krewo agreement.</td></tr>
        </tbody></table>
        <p>These anchors should be read alongside slower changes. Population grew unevenly; woodland was cleared; watermills multiplied; villages were resurveyed; rents increasingly supplemented labour dues; and written instruments became more common. A charter date does not identify the first inhabitants of a town or village. It marks a documented intervention—often a reorganisation of an existing settlement—whose terms could take years to realise.</p>
        <p>Survival also determines what can be known. Royal and ecclesiastical archives preserve property rights because institutions needed them. Peasant speech, domestic disagreement and seasonal movement appear mostly when they touched a lord’s court. Jewish life is often mediated by privileges granted by Christian rulers or by hostile Christian narrative. Mongol perspectives are almost absent from local Polish records. The historian must resist turning an archive of government into a complete portrait of society.</p>
        <figure data-kind="map"><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Poland%20Fragmentation%20Period%20map.jpg?width=1400" alt="Modern historical map using coloured territories to reconstruct the principal Piast duchies during the fragmentation period"><figcaption><strong>A reconstruction, not a medieval border survey</strong><p>The map helps locate regional Piast centres, but its hard lines compress zones of overlapping claim, tribute and changing possession.</p><p class="figure-meta">Modern historical map · public domain · <a href="https://commons.wikimedia.org/wiki/File:Poland_Fragmentation_Period_map.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Does “fragmentation” already decide the argument?</h3><ul><li><strong>Political reading:</strong> divided rulership reduced coordinated military and fiscal capacity and made Kraków a prize rather than an uncontested capital.</li><li><strong>Regional-development reading:</strong> competing courts accelerated foundations, settlement and local administration.</li><li><strong>Scale reading:</strong> unity and division coexisted—one Piast dynastic field contained increasingly distinct territorial principalities.</li></ul><p>The interpretations are compatible when applied to different institutions. “Fragmentation” becomes misleading only when it is made synonymous with universal decline.</p></div>
      </section>
      <section class="companion-section" id="succession"><p class="section-number">02 · Inheritance</p><h2>The settlement of 1138</h2>
        <p class="lede dropcap">Bolesław III left several sons and a political problem familiar across medieval Europe: how could a ruler provide inheritances without destroying the standing of the dynasty as a whole? Later sources describe regional portions and a senior prince associated with Kraków, but no original testament survives. The neat constitutional diagram in a textbook is therefore a reconstruction from subsequent possession and retrospective narrative.</p>
        <p>Władysław II, the eldest son, received Silesia and initially exercised senior authority. His younger half-brothers held Mazovia, western Greater Poland and the Sandomierz region under the guardianship of their mother Salomea. A central or “senioral” share is commonly reconstructed around Kraków, with control of strategically important territories intended to give the senior prince more than ceremonial precedence. Yet the boundaries, the precise rules of rotation, and even how fully Bolesław formulated a permanent seniorate remain debated.</p>
        <p>Inheritance was not a private family matter. Bishops, castellans, monastic communities and military followers possessed land, offices and expectations. Salomea maintained her own court and assembled allies. When Władysław tried to dominate his brothers, conflict ended in his exile in 1146 rather than their elimination. Emperor Conrad III’s intervention failed to restore him. The outcome showed that primogeniture, imperial support and senior title could not substitute for coalitions inside the realm.</p>
        <p>Later Piast politics repeatedly combined three principles that did not fit neatly together: seniority within the dynasty, hereditary claims to a father’s district, and political selection by powerful local elites. Kraków retained exceptional symbolic value, but possession of it could change through force and negotiation. In 1177 magnates and churchmen helped remove Mieszko III and invited Casimir II, a younger son whose place in the original settlement was uncertain. Practice rewrote theory.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Later annal memory · the death that became a constitutional turning point</p>
          <p class="source-original" lang="la">1138. Boleslaus III dictus, inclitus dux Polonorum, obiit.</p>
          <p class="source-translation">1138. Bolesław, called the third, renowned duke of the Poles, died.</p>
          <p class="source-citation">The Kraków Annal’s compact notice records Bolesław’s death, not the territorial scheme later associated with his succession settlement. August Bielowski, ed., <em>Monumenta Poloniae Historica</em> 2 (Lwów, 1872), p. 832. Bielowski printed this Kraków text beside the Traska Annal; he describes it as a fourteenth-century hand’s additions to blank spaces in the Kraków chapter codex, covering entries from 966 to 1291. It is not a contemporary obituary or the lost will itself. <a href="https://kpbc.umk.pl/dlibra/publication/10066/edition/17159/content">Consult the public-domain edition scan</a>.</p>
        </blockquote>
        <div class="caution"><strong>Source boundary.</strong> Calling the arrangement a “testament” does not mean historians possess Bolesław’s signed will. The fullest accounts are later than 1138 and reflect a world in which territorial duchies had already developed. Claims about exact clauses must be labelled reconstruction.</div>
        <div class="question-box"><strong>Discussion</strong> If a succession rule survives only through later disputes, should historians define it by the founder’s probable intention or by the political practices that participants treated as legitimate?</div>
      </section>
      <section class="companion-section" id="duchies"><p class="section-number">03 · Regional power</p><h2>Not one collapse, but several courts</h2>
        <p class="lede">By the early thirteenth century, Silesia, Mazovia, Greater Poland, Lesser Poland, Kuyavia and smaller districts had their own dynastic sequences. A duke’s authority travelled through a court of household officers, chaplains, castellans and dependants rather than a modern ministry. As inheritances subdivided, some principalities became small; nevertheless, even a small court could mint coins, issue charters and patronise religious houses.</p>
        <p>Regionalisation altered political geography. Wrocław and its surrounding Silesian lands looked toward Prague, Meissen and German-speaking regions as well as Kraków. Mazovia faced the Prussian, Yotvingian and Rus frontiers. Greater Poland’s centres at Poznań, Gniezno and Kalisz competed internally while sustaining the memory of the early monarchy. Lesser Poland benefited from Kraków’s ecclesiastical prestige and routes toward Hungary and Ruthenia. These orientations were not betrayals of a fixed national interest; they were the operating environment of territorial rulers.</p>
        <p>Dukes relied on bishops and monasteries but also quarrelled with them. Church immunity could remove estates from some ducal taxes or courts; foundations could organise settlement and memorial prayer; bishops could mediate succession or mobilise opposition. The murder of Leszek the White at Gąsawa in 1227, during a meeting of Piast rulers, exposed the dangers of personal politics. It also weakened any plausible senior authority based in Kraków. From then on, supremacy had to be assembled rather than inherited automatically.</p>
        <p>Documents reveal a changing language of territory. Rulers increasingly styled themselves dukes of Silesia, Mazovia, Kraków or Greater Poland. Seals made claims visible to people who could not read the charter beneath them. Territorial offices and communities of local knights acquired continuity even when a prince died. This was state formation at a regional scale: not bureaucratic sovereignty, but more durable relations among ruler, land, office and written right.</p>
        <div class="interpretation"><h3>Was regionalisation constructive?</h3><ul><li><strong>Older reunification narratives</strong> measured each duke by whether he advanced or delayed a restored Polish crown.</li><li><strong>Institutional approaches</strong> emphasise local courts, dioceses, towns and estates that became more organised under competing rulers.</li><li><strong>Critical synthesis</strong> recognises both costs and creativity: rivalry enabled invasion and private war while multiplying patrons and political centres.</li></ul><p>Regional development did not require contemporaries to forget a wider <em>regnum Poloniae</em>; that wider kingdom could survive as church structure, memory and claim without one effective monarch.</p></div>
      </section>
      <section class="companion-section" id="land"><p class="section-number">04 · Social foundations</p><h2>Land, labour and lordship</h2>
        <p class="lede dropcap">Most people lived from agriculture, animal husbandry, woodland and water. Political change mattered to them through rent, labour, jurisdiction, warfare and the identity of the lord who claimed dues. The twelfth and thirteenth centuries brought population growth and more intensive exploitation of land, but neither a uniform “agricultural revolution” nor a simple replacement of one population by another.</p>
        <p>Rulers transferred estates and rights to bishops, monasteries, knights and towns. A grant might include fields, woodland, mills, fishing places, market tolls and authority over inhabitants. Written immunity reduced the intervention of some ducal officials, allowing landlords to collect specified revenues or exercise courts. Such acts helped create landed lordship while preserving many layers of custom. The formula in a charter describes an intended legal relationship; disputes and later confirmations show that rights had to be enforced repeatedly.</p>
        <p>New villages were often measured in <em>łany</em>, units that allocated arable strips and calculated rent. An organiser—frequently called a <em>locator</em>—recruited inhabitants and received a larger holding, mill rights or the office of village head. “New” location might reorganise an older settlement. Some settlers came from German-speaking lands, others from nearby villages or different Piast territories. Names, legal formulas and pottery can suggest movement, but none alone proves the language or origin of every inhabitant.</p>
        <p>Watermills are a useful material index. They required capital, channels, timber, millstones and lordly permission, and they concentrated grain processing at a toll point. Three-field rotations and heavier ploughs were present in some environments, but soil and local practice varied. Archaeobotany and animal remains show diets structured by status and ecology. Famine and crop failure remain harder to map than spectacular battles because they were less likely to enter elite narrative.</p>
        <p>Freedom was graded. Some peasants owed labour; others paid rent or possessed negotiated exemptions. Enslavement had not vanished, although the organisation of dependent labour changed and Christian norms increasingly complicated the enslavement of Christians. Urban freedom did not dissolve lordship: townspeople paid rents and tolls and lived under chartered obligations. The central development was the specification of status through jurisdiction, not a single march from bondage to liberty.</p>
        <div class="question-box"><strong>Read a charter materially</strong> When a document grants “forest, waters, mills and inhabitants,” list what the lord hoped to control. Then list what the document cannot reveal about how families actually farmed, negotiated or resisted.</div>
      </section>
      <section class="companion-section" id="settlement"><p class="section-number">05 · Movement</p><h2>Migration without a national teleology</h2>
        <p class="lede">Medieval Latin documents sometimes describe settlers as <em>hospites</em>—guests—because they entered under negotiated conditions. From the twelfth century, rulers and landlords recruited people, skills and legal models from across Central Europe. German-speaking migration was substantial, especially in Silesian towns and zones of new settlement, but the process called <em>Ostsiedlung</em> was neither an ethnically uniform invasion nor a harmless technical programme without conflict.</p>
        <p>Migration connected regions. Craftspeople and merchants followed routes between Magdeburg, Halle, Meissen, Prague, Wrocław, Poznań and Kraków. Walloon, Flemish and German legal customs circulated alongside people, then were adapted locally. Cistercian monasteries belonged to transregional institutional networks. Jewish migrants arrived from western and southern regions while maintaining connections beyond any one principality. Ruthenian, Czech and Hungarian movement mattered on other frontiers. Local Slavic-speaking inhabitants also relocated into newly surveyed settlements.</p>
        <p>Language did not map cleanly onto law. A town using Magdeburg-derived procedure could contain German-, Polish- and Yiddish-speaking residents; a person with a German name might be locally born; names recorded by a Latin scribe could change form. Separate legal communities could coexist in one place, while intermarriage and bilingual practice blurred them. Over generations, some Silesian towns became predominantly German-speaking and many rural zones remained Slavic-speaking, but chronology and locality matter.</p>
        <p>Nationalist scholarship once used medieval settlement to establish prior ethnic ownership. German narratives could depict an empty or backward East civilised by colonists; Polish narratives could minimise migration or frame every legal import as cultural conquest. Both projected nineteenth- and twentieth-century conflict backward. Current work asks more precise questions: who recruited whom, which rights were offered, what landscapes changed, when language shifted, and how settlers interacted with existing communities?</p>
        <div class="interpretation"><h3>Three scales of settlement</h3><ul><li><strong>Demographic:</strong> real people moved, sometimes in organised groups and sometimes through chain migration.</li><li><strong>Legal:</strong> charters moved farther than populations; imported models were translated and modified.</li><li><strong>Environmental:</strong> clearance, drainage, mills and surveyed fields altered landscapes, whether inhabitants were newcomers or local.</li></ul><p>Keeping the scales separate prevents a legal phrase from becoming an ethnic census.</p></div>
        <div class="question-box"><strong>Discussion</strong> How can historians acknowledge coercion and ethnic hierarchy in some settlement contexts without turning every thirteenth-century migrant into an agent of a modern national project?</div>
      </section>
      <section class="companion-section" id="town-law"><p class="section-number">06 · Urban institutions</p><h2>What “German law” did—and did not—mean</h2>
        <p class="lede dropcap">A location charter did not create urban life from nothing. Kraków had long been a fortified, episcopal and commercial centre when Bolesław V and his mother Grzymisława issued the great charter of 1257 after Mongol destruction. The act reorganised space, jurisdiction, rent and government according to a model transmitted through Wrocław from Magdeburg. It offered its organisers and inhabitants defined advantages because rulers wanted people, taxable commerce and reconstruction.</p>
        <p>Magdeburg law was not one code copied identically across Europe. It was a family of legal rules, precedents and institutional relationships. A charter might establish a hereditary <em>wójt</em> or advocate, exempt inhabitants from selected ducal courts, define market and craft privileges, and grant years free of rent. Town courts then sought legal instruction from a “mother city” or from regional superior courts. Over time, locally written books, translations and judgments changed what the law meant in practice.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Charter · Kraków’s legal reorganisation, 5 June 1257</p>
          <p class="source-original" lang="la">Intendentes ergo locare civitatem in Cracovia et homines inibi de diversis climatibus congregare … eo iure eam locamus, quo Wratizlauiensis civitas est locata, ut non quod ibi fit, sed quod ad Magydburgensis civitatis ius et formam fieri debeat advertatur.</p>
          <p class="source-translation">Intending, therefore, to locate a city at Kraków and to gather people there from diverse regions … we locate it under the law by which the city of Wrocław is located—so that attention is paid not to whatever happens there, but to what ought to happen according to the law and form of the city of Magdeburg.</p>
          <p class="source-citation">Franciszek Piekosiński, ed., <em>Kodeks dyplomatyczny miasta Krakowa</em>, part 1 (Kraków, 1879), no. 1. The displayed spelling follows the edition-level archival transcription; the translation renders <em>locare</em> as a technical act, not “found from nothing.” The act names Bolesław V, Grzymisława and Kinga as issuers. <a href="https://ank.gov.pl/dokument-lokacyjny-miasta-krakowa-z-1257-r/">National Archives in Kraków: document and transcription</a>.</p>
        </blockquote>
        <p>Urban self-government remained bounded. The duke or another lord retained revenues and superior rights. Hereditary advocates could be powerful entrepreneurs rather than representatives elected by all residents. Councils often became oligarchic. Women traded, inherited and litigated but did not participate equally in office. Servants, recent migrants and inhabitants of suburbs occupied different legal positions. Clergy and Jews might answer to separate jurisdictions. A wall enclosed many statuses, not one equal citizenship.</p>
        <p>The spatial consequences were visible. Surveyors organised market squares, plots and streets; churches and defensive works anchored the plan; craft activities clustered around water and access routes. Archaeology can reveal an earlier settlement beneath a chartered grid, correcting foundation stories that begin on the parchment’s date. Fire, invasion and rebuilding altered the plan again. The surviving urban landscape is cumulative.</p>
        <div class="interpretation"><h3>Translate the label before using it</h3><ul><li><strong><em>Ius Theutonicum</em></strong> in a charter usually names a jurisdictional model, not a rule that only ethnic Germans may live there.</li><li><strong>Migration evidence</strong> may still show German-speaking recruitment, especially among early elites and craftspeople.</li><li><strong>Local adaptation</strong> explains why towns sharing a legal family developed different institutions.</li></ul><p>The safe conclusion is neither “law had nothing to do with migration” nor “law proves the whole town was German.”</p></div>
        <div class="question-box"><strong>Document workshop</strong> In a location charter, distinguish concessions designed to attract settlers from powers reserved to the ruler. Which clauses would matter most to a merchant, a craft worker, a woman inheriting property and a resident outside the walls?</div>
      </section>
      <section class="companion-section" id="jewish-life"><p class="section-number">07 · Protected difference</p><h2>Jewish communities, ducal protection and inequality</h2>
        <p class="lede">Jewish settlement in the Piast lands expanded within a Christian political order that could protect, tax and endanger it. Rulers valued commercial connections, credit and specialised services. Jewish communities sustained worship, learning, family law and transregional ties. Their security depended partly on privileges that placed them under princely protection, but a privilege was a negotiated framework, not proof of uninterrupted tolerance.</p>
        <p>Bolesław the Pious’s privilege issued at Kalisz in 1264 adapted Central European precedents. It regulated testimony, violence, pledges, courts and accusations. By requiring more than a Christian accuser’s unsupported word in certain cases and penalising attacks, the duke asserted that injuries to Jews violated his peace and revenue. Casimir III later confirmed and extended this legal tradition. The acts became important to the historical memory of Jewish life in Poland.</p>
        <p>The limits must stay visible. Protection defined Jews as a distinct group under the ruler, not as equal citizens in a modern state. Lords could impose special taxes. Christian teaching and church legislation marked religious difference; local conflict could turn to coercion. The notorious blood-libel accusation circulated in Europe despite legal attempts to constrain it. Documentary survival favours the ruler’s terms and records of dispute, while daily relations—neighbourhood exchange, shared languages, women’s work and communal negotiation—are harder to recover.</p>
        <p>Material evidence complicates narratives of isolation. Bracteate coins bearing Hebrew letters or names, produced under some twelfth- and thirteenth-century Piast rulers, connect Jewish mint workers to ducal finance. Archaeology and later urban records place Jewish quarters within commercial landscapes rather than outside society. At the same time, separate cemeteries, dietary law and communal institutions maintained boundaries essential to Jewish religious life.</p>
        <figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Polen-%20Hebr%C3%A4ische%20Brakteaten%20-%20M%C3%BCnzkabinett,%20Berlin%20-%205504302.jpg?width=1200" alt="Small thin medieval silver bracteate coin from Poland bearing a central design and a surrounding inscription in Hebrew characters"><figcaption><strong>Hebrew letters in a Piast minting world</strong><p>A thin silver bracteate catalogued by Berlin’s Münzkabinett. Such coins are material evidence of Jewish participation in ducal finance, not a complete portrait of a community.</p><p class="figure-meta">Photograph: Reinhard Saczewski, 2022; object medieval · public domain · <a href="https://commons.wikimedia.org/wiki/File:Polen-_Hebr%C3%A4ische_Brakteaten_-_M%C3%BCnzkabinett,_Berlin_-_5504302.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="caution"><strong>Memory boundary.</strong> Arthur Szyk’s celebrated twentieth-century illumination of the Kalisz Statute is a work of modern Jewish and Polish political memory, not a medieval manuscript of the 1264 act. It can illustrate reception only when captioned with that distance.</div>
        <div class="interpretation"><h3>“Paradise for Jews”?</h3><p>The later phrase <em>paradisus Iudaeorum</em> should not be projected backward as a neutral description. Comparative privileges did make parts of the Polish lands attractive and could offer meaningful security. That history coexisted with legal difference, fiscal exploitation, Christian hostility and episodes of violence. Comparative safety is not equality, and vulnerability is not the same as permanent segregation.</p></div>
      </section>
      <section class="companion-section" id="church"><p class="section-number">08 · Institutions</p><h2>Church, monasteries and written administration</h2>
        <p class="lede dropcap">The Latin Church was the most extensive institution spanning the divided principalities. The archbishopric of Gniezno and its suffragan dioceses preserved a geography of the wider Polish realm even when dukes fought. Bishops acted as landlords, advisers and political negotiators. Cathedral chapters maintained archives and elected bishops. Yet “the Church” was not one political party: prelates defended diocesan interests and could support different Piast coalitions.</p>
        <p>Monastic foundations connected local patrons to European orders. Cistercian houses organised estates and prayer networks; Premonstratensian, Benedictine and later mendicant communities shaped towns and countryside differently. Franciscans and Dominicans placed houses in growing urban centres, preached and provided burial sites. Founders expected spiritual intercession, dynastic memory and practical development. Monks did not single-handedly introduce every agricultural technique attributed to them, but their written estate management leaves unusually rich evidence.</p>
        <p>Conflict produced institutional concessions. During struggles around Leszek the White and his successors, bishops sought freedom of election, immunity and jurisdiction. Excommunication and interdict could become political weapons, while rulers continued to influence appointments. The cults of saintly women and bishops offered moral languages for judging power. Canonisation required testimony shaped by clerical procedure, turning remembered lives into evidence that must be read for both experience and institutional purpose.</p>
        <p>Written culture spread through these networks. Charters were drafted by clerics and authenticated with seals; liturgical books carried art and music; annals attached brief notices to calendars; schools trained a small literate elite. Latin connected the region internationally while vernacular languages dominated most speech. The rise of documentation does not mean government suddenly became impersonal. A parchment remained embedded in ceremonies, witnesses, relationships and the physical custody of an archive.</p>
        <div class="question-box"><strong>Archive exercise</strong> Why might a monastery preserve a boundary charter but not a peasant family’s account of the same land? How should that selection change a historian’s reconstruction?</div>
      </section>
      <section class="companion-section" id="women"><p class="section-number">09 · Households</p><h2>Women, sanctity and dynastic strategy</h2>
        <p class="lede">Dynastic politics travelled through women as well as men. Marriage joined Piast courts to Přemyslid Bohemia, Hungary, Rus, German principalities and other Piast branches. A bride brought a dowry, religious patronage, household personnel and potential claims. Widows could hold dower lands, protect a minor heir or retire to a religious house without disappearing from politics.</p>
        <p>Salomea of Berg, Bolesław III’s widow, maintained a court and defended her sons’ position after 1138. Grzymisława, a Rus princess and widow of Leszek the White, navigated rival guardianships to preserve the claims of Bolesław V. Kinga, a Hungarian princess married to Bolesław V, became a major patron and was later remembered as a saint. Jadwiga of Silesia, wife of Henry the Bearded, founded and supported Trebnitz/Trzebnica and became the centre of a powerful cult after her death.</p>
        <p>Hagiography grants unusually detailed scenes involving women, but it reorganises them around sanctity. The illustrated Hedwig Codex of 1353 was produced more than a century after the battle at which her son Henry II died. Its images reveal fourteenth-century devotion, dress and memory as much as the events of 1241. Reports of asceticism, marital chastity or miraculous care for the poor model ideal behaviour; they cannot simply be transcribed as private biography.</p>
        <figure class="portrait"><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Henryk%20II%20Pobo%C5%BCny%20(Hedwig%20Codex).jpg?width=1000" alt="Fourteenth-century manuscript miniature showing Henry II the Pious standing frontally with a sword and a shield bearing the Silesian eagle"><figcaption><strong>A son inside his mother’s saintly memory</strong><p>Henry II in the Hedwig Codex, produced in 1353. The miniature is near-medieval evidence for dynastic and devotional commemoration, not a portrait drawn from life.</p><p class="figure-meta">Unknown illuminator, Hedwig Codex, 1353 · public domain · <a href="https://commons.wikimedia.org/wiki/File:Henryk_II_Pobo%C5%BCny_(Hedwig_Codex).jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <p>Beyond courts, women brewed, traded, farmed, served, managed households and appeared in property transactions. Urban law could allow widows and daughters to inherit while placing them under gendered guardianship or evidentiary rules. Convents created spaces for elite women’s education and patronage, but admission and status were unequal. Naming queens and saints is only a beginning; the archive’s silence about most women must itself be explained.</p>
        <div class="interpretation"><h3>Agency without romance</h3><p>A woman’s successful patronage does not prove that medieval gender hierarchy was weak. Nor does hierarchy make women politically irrelevant. Agency means acting within, through and sometimes against structured constraints. Dowry, motherhood, widowhood, sanctity and household office could all become resources, though not on equal terms.</p></div>
      </section>
      <section class="companion-section print-break" id="mongols"><p class="section-number">10 · Invasion</p><h2>The Mongol campaigns and the memory of Legnica</h2>
        <p class="lede dropcap">In 1241 Mongol forces entered the fragmented Polish lands as part of a much larger westward campaign. Their principal strategic target was Hungary, where King Béla IV had received Cuman refugees. Raids through Lesser Poland and Silesia disrupted possible support for Hungary, gathered intelligence and defeated forces that assembled against them. Kraków was abandoned and burned; local armies suffered defeats before the culminating encounter near Legnica.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Near-contemporary annal · destruction and judgment</p>
          <p class="source-original" lang="la">Tarthari Cracoviam intrantes ecclesias succendunt, populum sine delectu etatis et sexus interficiunt … Tandem Zlesiam ingressi et cum duce Henrico et suo exercitu congressi, ipsum ducem et de exercitu ipsius neci plurimos addiderunt.</p>
          <p class="source-translation">The Tartars, entering Kraków, burned the churches and killed people without distinction of age or sex … At last, entering Silesia and meeting Duke Henry and his army, they killed the duke himself and very many from his army.</p>
          <p class="source-citation"><em>Annales capituli Cracoviensis</em>, in Richard Roepell and Wilhelm Arndt, eds., <em>Annales Poloniae</em> (Hanover, 1866), p. 23; the same passage is on p. 598 of <em>Monumenta Germaniae Historica, Scriptores</em> 19. The displayed <em>Tarthari</em> follows the edition. The annal continues with moralising claims about Polish greed and Mongol deceit; those judgments reveal the compiler’s Christian explanatory frame. The conventional ethnonym “Tartars” is retained only inside the translation of the source. <a href="https://commons.wikimedia.org/wiki/File:Annales_poloniae_(IA_annalespoloniae01roepgoog).pdf">Read the public-domain edition scan</a>.</p>
        </blockquote>
        <p>Henry II the Pious, duke of Silesia and son of Jadwiga, led a coalition whose exact size and composition cannot be recovered confidently. Later accounts add dramatic formations, a mysterious smoke weapon and speeches. Near-contemporary annals are much briefer. Henry was killed on 9 April, but the Mongols did not occupy Silesia. They moved south to join operations in Hungary. Their withdrawal from Europe after 1242 belonged to imperial strategy and succession, not to a Polish battlefield victory.</p>
        <p>Legnica exposed the limits of regional military coordination without proving that political fragmentation alone caused defeat. Mongol armies also crushed the more centralised Hungarian kingdom at Mohi. Their operational mobility, intelligence, discipline and feigned retreats challenged many opponents. The campaign devastated particular routes and settlements, but claims that it permanently emptied all Polish lands exaggerate uneven evidence.</p>
        <p>Memory soon acquired religious form. Henry became a defender of Christendom; his mother’s saintly biography absorbed his death into providential narrative. The Hedwig Codex’s miniatures are precious evidence for fourteenth-century commemoration, not eyewitness battlefield reportage. Much fuller fifteenth-century stories by Jan Długosz may preserve earlier material, literary invention or both. Where they exceed contemporary annals, certainty must decrease.</p>
        <figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Battle%20of%20Legnica1241-From%20Legend%20of%20Saint%20Hedwig.jpg?width=1400" alt="Illuminated manuscript scene of armoured horsemen fighting beneath banners while the severed head of Duke Henry appears on a spear"><figcaption><strong>Legnica pictured 112 years later</strong><p>The Hedwig Codex labels Henry’s fight with the Tartars at the field called Wahlstatt. Its visual detail belongs to the manuscript’s 1353 memory world, not eyewitness observation.</p><p class="figure-meta">Unknown illuminator, Hedwig Codex, 1353 · public domain · <a href="https://commons.wikimedia.org/wiki/File:Battle_of_Legnica1241-From_Legend_of_Saint_Hedwig.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Why did the Mongols turn away?</h3><ul><li><strong>Strategic explanation:</strong> the Polish operations supported the main invasion of Hungary rather than aiming at permanent Polish conquest.</li><li><strong>Imperial explanation:</strong> news of Great Khan Ögedei’s death changed the politics of the wider Mongol empire.</li><li><strong>Environmental and logistical approaches:</strong> pasture, weather, fortifications and supply affected what occupation was practical.</li></ul><p>No credible interpretation makes Henry’s defeat a hidden victory that expelled the invaders.</p></div>
        <div class="question-box"><strong>Source comparison</strong> Place a one-sentence contemporary annal beside a richly illustrated saint’s life and Długosz’s later narrative. Which questions can each answer, and what must each leave uncertain?</div>
      </section>
      <section class="companion-section" id="silesia"><p class="section-number">11 · Borderland</p><h2>Silesia between Piast memory and Bohemian allegiance</h2>
        <p class="lede">Silesia demonstrates why medieval political identity cannot be read from a modern border. Descendants of Władysław II returned from exile and divided the region among Piast lines. Their courts participated in the Polish dynastic world while developing dense relations with Bohemia, the Empire and German-speaking settlers. Wrocław became a major commercial and ecclesiastical centre; smaller duchies acquired distinct interests.</p>
        <p>Henry the Bearded and Henry II the Pious came close to assembling Silesia, Kraków and parts of Greater Poland under one rule. Henry II’s death at Legnica ended that possibility and left minor heirs. Repeated partitions followed. The resulting duchies were not powerless, but their rulers increasingly sought security and status through the Bohemian crown. Between 1327 and 1329 many Silesian dukes did homage to John of Luxembourg. Casimir III later renounced major claims in settlements with the Luxembourgs.</p>
        <p>Was Silesia thereby “lost”? The word compresses a long and uneven process into a national verdict. Feudal homage did not instantly change language, law, diocesan ties or dynastic descent. Some duchies retained Piast rulers for centuries. The Wrocław diocese remained linked to Gniezno. At the same time, Bohemian sovereignty became politically real, and German gained strength in many towns. A borderland can preserve connections while changing allegiance.</p>
        <p>Silesian architecture and documents expose layered identity. Gothic churches and town halls participated in Central European styles; ducal tombs displayed Piast eagles and local claims; Latin charters named lands through titles that changed over time. Later German and Polish national movements selected different layers as the region’s “true” history. The medieval evidence supports neither exclusive genealogy.</p>
        <div class="interpretation"><h3>Three meanings of belonging</h3><ul><li><strong>Dynastic:</strong> Silesian rulers remained branches of the Piast house.</li><li><strong>Feudal-political:</strong> many became vassals of the Bohemian crown.</li><li><strong>Cultural-social:</strong> language and settlement patterns varied between town, countryside, district and century.</li></ul><p>These meanings could diverge. Asking which one was “really” nationality imports a category the evidence cannot bear.</p></div>
      </section>
      <section class="companion-section" id="baltic"><p class="section-number">12 · Northern politics</p><h2>Prussia, mission and the Teutonic Order</h2>
        <p class="lede dropcap">Mazovian rulers faced raids and warfare along a frontier inhabited by non-Christian Prussian and Yotvingian communities. Christian mission, territorial ambition, defence and raiding were intertwined. Duke Konrad of Mazovia turned to the Teutonic Order, a military religious order established during the crusades, and offered it a base in the Chełmno region. What each party believed had been granted became a lasting dispute.</p>
        <p>The Order obtained papal and imperial documents that supported an autonomous mission territory. It conquered Prussian lands through decades of warfare, castle building, negotiated submission and settlement. Indigenous Prussians resisted in major uprisings, converted under coercive political conditions and were incorporated into a new lordship. Many survived, but their language and institutions were progressively marginalised. A history centred only on Polish–German rivalry erases them.</p>
        <p>The Order’s state was unusual but not alien to medieval state formation. Convents combined religious rule with military command; castles organised districts; towns used imported legal forms; merchants linked the lower Vistula to Baltic trade. Papal authority, imperial privilege and crusading ideology legitimised violence while also generating legal obligations that opponents could challenge. The Order’s brothers were predominantly German-speaking, but its subjects were ethnically and linguistically diverse.</p>
        <figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Malbork%20zamek%20wysoki%20i%20sredni%20(dron).jpg?width=1500" alt="Oblique aerial photograph of Malbork’s extensive red-brick High and Middle Castle complexes beside the Nogat River"><figcaption><strong>Architecture of a corporate lordship</strong><p>Malbork became the Teutonic Order’s principal residence after 1309. The surviving complex records repeated medieval building phases and later restoration, not one unaltered construction moment.</p><p class="figure-meta">Photograph: Kapitel, 2023 · CC BY-SA 4.0 · <a href="https://commons.wikimedia.org/wiki/File:Malbork_zamek_wysoki_i_sredni_(dron).jpg">Wikimedia Commons file record and attribution</a>.</p></figcaption></figure>
        <p>Relations with Piast rulers ranged from alliance to conflict. The Order could be a useful force against a shared opponent and a dangerous territorial neighbour. Its conquest redirected trade and political power at the Baltic. When it later acquired Pomerelia, the dispute was not an inevitable clash between two nations; it grew from a specific crisis of succession, intervention and contested legal title.</p>
        <div class="caution"><strong>Perspective.</strong> Medieval Christian sources call campaigns in Prussia conversion and crusade. That vocabulary records the actors’ legitimising framework, not a neutral description. Prussian communities experienced conquest, tribute, displacement and religious transformation.</div>
      </section>
      <section class="companion-section" id="pomerelia"><p class="section-number">13 · Contested coast</p><h2>Pomerelia, Gdańsk and legal argument</h2>
        <p class="lede">Pomerelia connected the Vistula trade route to the Baltic. Its Samborid dynasty balanced relations with Danish, Brandenburg, Piast and ecclesiastical powers. When the line ended in 1294, competing inheritance claims made the region central to attempts at reunification. Przemysł II incorporated it before his coronation; after his murder, Władysław Łokietek struggled to hold it against Brandenburg.</p>
        <p>In 1308 Brandenburg forces entered Gdańsk. Łokietek’s commanders sought help from the Teutonic Order. The Order expelled the Brandenburgers and then took control itself. Violence followed, but the scale and victims of the “Gdańsk massacre” remain disputed because testimony was gathered later in adversarial proceedings. Medieval and modern claims range from a targeted killing of defenders to mass slaughter of inhabitants. Certainty should follow the source, not the emotional power of the event’s later memory.</p>
        <p>In 1309 the Order purchased Brandenburg’s claim and made Pomerelia part of its expanding state. Polish rulers pursued restoration through papal courts as well as war. Witnesses in proceedings of 1320–1321 and 1339 recalled lordship, boundaries and violence decades afterward. Their testimony is invaluable, yet questioning occurred within litigation: memories were selected to prove title. Legal form did not depoliticise the dispute.</p>
        <p>Casimir III accepted a compromise in the Peace of Kalisz in 1343. He recovered Kuyavia and Dobrzyń while the Order retained Pomerelia, formally as a perpetual alms in language that allowed the Polish crown to preserve a claim. This was practical diplomacy, not satisfaction. Access to Gdańsk and the lower Vistula remained a structural issue for the later Polish–Lithuanian monarchy.</p>
        <div class="interpretation"><h3>How many people died at Gdańsk?</h3><p>The question is legitimate, but available evidence may not produce a secure number. Chronicles and trial witnesses differ in proximity, purpose and wording. A responsible account can affirm violent seizure and killings while separating that conclusion from contested totals. National commemorations that insist on one exact figure often ask the sources to serve a later political need.</p></div>
        <div class="question-box"><strong>Legal memory</strong> When a witness recalls an event twenty or thirty years later in a property trial, what makes the evidence valuable? What might litigation encourage the witness or compiler to simplify?</div>
      </section>
      <section class="companion-section print-break" id="reunification"><p class="section-number">14 · Reconstruction</p><h2>Why reunification became possible</h2>
        <p class="lede dropcap">Reunification was not the awakening of a nation that had slept since 1138. It became possible because institutions, elites and political language had changed. The idea of the kingdom survived in the Gniezno church province, saintly cults, chronicles and coronation memory. Regional knightly communities now had interests that a larger monarchy could protect, while towns and trade routes benefited from more predictable peace. Foreign claims also made a recognised crown attractive.</p>
        <p>Several rulers tried. Henry IV Probus of Wrocław controlled Kraków before dying in 1290. Przemysł II of Greater Poland joined dynastic inheritance, archiepiscopal support and Pomerelian possession. Archbishop Jakub Świnka crowned him king in Gniezno in 1295, the first royal coronation since the eleventh century. His murder in 1296 ended the reign but not the restored claim. The seal and title of a Polish king supplied a political programme others could appropriate.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Seal inscription · restoration presented as victory</p>
          <p class="source-original" lang="la">+ REDDIDIT IPSE [POTENS, DEUS?] VICTRICIA SIGNA POLONIS +</p>
          <p class="source-translation">He himself—[the Almighty? God?]—restored victorious emblems to the Poles.</p>
          <p class="source-citation">Reverse legend on Przemysł II’s royal seal attached to an act of 15 August 1295. The damaged middle word has competing restorations, including <em>potens</em> (“the Almighty”) and <em>Deus</em> (“God”), so the alternatives are bracketed rather than silently resolved. “Emblems” refers directly to the crowned eagle on the seal; modern claims that this instantaneously created a national coat of arms require additional argument. <a href="https://pamiecpolski.archiwa.gov.pl/dokument-krola-przemysla-ii/">Polish Memory of the World register: act and seal</a>.</p>
        </blockquote>
        <figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Pieczec%20panstwa%20polskiego%20(1334).jpg?width=1200" alt="Black-and-white reproduction of Casimir III’s round royal seal with an enthroned crowned ruler and a surrounding Latin legend"><figcaption><strong>Royal government made visible</strong><p>Casimir III’s majesty seal presented the king enthroned within a textual claim. This 1917 reproduction preserves documentary iconography while flattening the original seal’s material depth.</p><p class="figure-meta">Reproduction published 1917; seal dated 1334 · public domain · <a href="https://commons.wikimedia.org/wiki/File:Pieczec_panstwa_polskiego_(1334).jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <p>Wenceslaus II of Bohemia then gained Kraków and was crowned king of Poland in 1300. His rule shows that reunification need not have been led by the Piast branch later celebrated as national. Administrative officials associated with his monarchy may have strengthened cross-regional practices. Opposition, his death in 1305 and the murder of his son ended the Přemyslid project. Władysław Łokietek returned from exile into a field shaped by it.</p>
        <p>Support for unity was not universal. Local elites bargained over offices and privileges; Silesian dukes pursued Bohemian ties; towns could resist a ruler who threatened their networks. Kraków’s rebellion under the advocate Albert in 1311–1312 had social and political dimensions that later nationalist narratives reduced to German treason. Łokietek suppressed it and curtailed the hereditary advocate’s position, illustrating that royal consolidation could narrow one form of urban autonomy.</p>
        <div class="interpretation"><h3>Who “reunified Poland”?</h3><ul><li><strong>Heroic narrative:</strong> Łokietek overcame foreign and internal enemies through persistence.</li><li><strong>Long-process narrative:</strong> Przemysł II, Wenceslaus II, church leaders and regional elites all made a restored crown conceivable.</li><li><strong>Contingent narrative:</strong> deaths without heirs and shifting coalitions mattered as much as an inevitable drive to unity.</li></ul><p>Łokietek’s achievement was real, but it rested on failed projects and institutions he did not create alone.</p></div>
      </section>
      <section class="companion-section" id="lokietek"><p class="section-number">15 · Crown</p><h2>Łokietek and a kingdom with missing provinces</h2>
        <p class="lede">Władysław Łokietek’s coronation with his wife Jadwiga in Kraków in 1320 restored durable royal succession, but not the borders of the early Piast realm. He controlled Lesser Poland, much of Greater Poland and Kuyavia. The Teutonic Order held Pomerelia; Mazovia remained under its own Piast dukes; most Silesian rulers moved toward Bohemian vassalage. A kingdom could be symbolically whole while territorially incomplete.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Annal · authority compressed into one sentence</p>
          <p class="source-original" lang="la">1320. Dux Wladislaus dictus Lokethk coronatur in Cracovia auctoritate domini pape in regnum Polonie per Yanislaum archiepiscopum Gnezdnensem.</p>
          <p class="source-translation">1320. Duke Władysław, called Łokietek, is crowned at Kraków, by the authority of the lord pope, into the kingdom of Poland by Janisław, archbishop of Gniezno.</p>
          <p class="source-citation"><em>Rocznik Sędziwoja</em>, in Bielowski, ed., <em>Monumenta Poloniae Historica</em> 2, p. 880. The wording joins papal authority, Gniezno’s archbishop and Kraków’s place in one formula. It does not establish exact territorial control. The annal survives in Sędziwój of Czechło’s fifteenth-century codex and is evidence of later medieval transmission, not an eyewitness coronation programme. <a href="https://kpbc.umk.pl/dlibra/publication/10066/edition/17159/content">Consult the public-domain edition scan</a>.</p>
        </blockquote>
        <p>The choice of Kraków mattered. Earlier royal coronations had been associated with Gniezno. Papal consent was cautious because John of Luxembourg claimed the Polish title through the Přemyslids. A coronation in Kraków allowed a practical assertion without resolving every legal objection. Wawel’s cathedral, royal tombs and treasury then became central to monarchical memory.</p>
        <p>Łokietek governed through personal alliances, offices, assemblies and war. His daughter Elizabeth married Charles Robert of Hungary, creating the Angevin connection that later determined succession. He allied with Lithuania through his son Casimir’s marriage to Aldona-Anna. Against the Teutonic Order, legal complaints alternated with campaigning. The battle of Płowce in 1331 was tactically inconclusive but became a memory of resistance.</p>
        <p>Restored monarchy brought coercion as well as order. The suppression of Kraków’s revolt, seizure of opponents’ property and distribution of office rewarded loyalists. Royal justice remained negotiated and regionally variable. Historians should not confuse the existence of a king with a centralised state. The crown offered a durable centre from which later rulers could build.</p>
        <div class="question-box"><strong>Map exercise</strong> Shade the territories Łokietek actually ruled in 1320, then outline lands claimed through the title “king of Poland.” What does the gap reveal about medieval sovereignty?</div>
      </section>
      <section class="companion-section" id="casimir"><p class="section-number">16 · Government</p><h2>Casimir III: negotiation, law and royal reach</h2>
        <p class="lede dropcap">Casimir III inherited war, disputed titles and a monarchy with modest resources. His later epithet “the Great” reflects a successful reign, but the proverb that he found Poland wooden and left it stone is a later summary, not a contemporary audit. His state-building relied less on uninterrupted conquest than on settlements, travel, courts, revenue and carefully staged royal authority.</p>
        <p>Casimir settled with John of Luxembourg at Trenčín and Visegrád, trading claims so that the Bohemian king renounced the Polish royal title while Casimir accepted the political direction of Silesia. The Peace of Kalisz ended immediate war with the Teutonic Order and restored Kuyavia and Dobrzyń, though not Pomerelia. Such compromises could be attacked as surrender; they also gave the king room to consolidate.</p>
        <p>Royal castles, officials and courts expanded practical reach. Casimir travelled rather than ruling from one permanent capital. Starostas represented royal authority in important territories; the crown recovered or reorganised some domains; mining and tolls supplied revenue. Coinage supported exchange and royal representation. None of these measures created uniform administration. Noble, ecclesiastical, urban and local jurisdictions remained powerful.</p>
        <p>The statutes associated with Greater and Lesser Poland are often called a codification. They recorded and shaped legal norms concerning courts, crime, property and status, but survive in later manuscript traditions and were not one modern nationwide code promulgated at a single moment. Variants matter. Their significance lies in the crown’s claim to articulate law across regions while acknowledging different customs.</p>
        <div class="interpretation"><h3>“Peasant king” or elite monarch?</h3><p>Later tradition praised Casimir for protecting peasants from lords. Some legal provisions did regulate abuse and royal courts could offer leverage. Yet his monarchy rested on hierarchy, lordship and extraction. The affectionate label describes a remembered ideal more securely than a programme of social equality.</p></div>
      </section>
      <section class="companion-section" id="ruthenia"><p class="section-number">17 · East</p><h2>Ruthenia, conquest and plural rule</h2>
        <p class="lede">After the death of Boleslav-Yuri II of Galicia in 1340, Casimir intervened in the struggle over the Rus principality of Galicia–Volhynia. Poland, Lithuania, Hungary, local boyars and the Mongol-backed political order all had interests. Campaigns and agreements brought Halych/Galicia and parts of Volhynia under Casimir’s authority, although boundaries and control changed. Calling this simply “reunion” assumes a prior national possession that medieval actors did not share.</p>
        <p>The acquired lands were predominantly Ruthenian-speaking and Orthodox Christian, with Armenian, Jewish, Latin Christian and other communities in towns and trade networks. Local elites, law and church structures could not simply be replaced. Casimir adopted the title lord or king of Rus, confirmed rights and founded Latin institutions alongside existing Orthodox ones. Lviv/Lwów/Lviv became an important centre whose changing names reflect its layered histories.</p>
        <p>Expansion brought resources and routes toward the Black Sea, but also obligations and conflict. Fortifications, officials and settlement tied the region to the crown. Latin Christian narratives could frame eastern policy through confessional difference; practical rule required accommodation. The papacy’s hopes, Hungary’s claims and Lithuania’s expansion ensured that sovereignty remained contested.</p>
        <p>Modern Polish and Ukrainian national histories have sometimes treated medieval Rus as inherited national territory. A source-critical account begins with the principality’s own society and the multiplicity of claims. Casimir’s conquest was a major extension of the Polish crown, not the recovery of an ethnically Polish province. Its consequences belong to Polish, Ukrainian, Belarusian, Lithuanian, Jewish, Armenian and wider Central European histories.</p>
        <figure data-kind="map"><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Poland%201341%20map.jpg?width=1400" alt="Modern historical map of Central and Eastern Europe around 1341 marking the Polish kingdom, neighbouring duchies and contested Ruthenian lands"><figcaption><strong>A snapshot inside a moving frontier</strong><p>This modern map orients the reader around the early years of Casimir’s Rus intervention. It should not turn changing campaigns, claims and local allegiances into settled borders.</p><p class="figure-meta">Modern historical map · public domain · <a href="https://commons.wikimedia.org/wiki/File:Poland_1341_map.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>Incorporation or composite rule?</h3><ul><li><strong>Administrative emphasis</strong> traces royal castles, officials and Latin foundations that integrated the territory.</li><li><strong>Local-continuity emphasis</strong> highlights Ruthenian elites, Orthodox institutions and legal practices that persisted.</li><li><strong>Frontier emphasis</strong> treats control as negotiated and military, varying by place and year.</li></ul><p>A composite model best explains how expansion could be politically consequential without immediate cultural uniformity.</p></div>
      </section>
      <section class="companion-section" id="university"><p class="section-number">18 · Durable projects</p><h2>Castles, money, Kazimierz and a university</h2>
        <p class="lede dropcap">Casimir’s reputation is built partly from visible things: stone castles, fortified towns, seals and foundations. The crown supported defensive sites along important routes, but “Casimir’s castles” are not all wholly his creations and many were rebuilt later. Architecture must be dated wall by wall. Even so, investment in masonry expressed and enabled royal presence.</p>
        <p>In 1335 Casimir founded the town of Kazimierz beside Kraków, with its own market, walls and government. The foundation reorganised a populated landscape that included Christian and, later more prominently, Jewish institutions. Separate municipal identity lasted for centuries. Royal policy used towns as fiscal, defensive and political tools while urban communities pursued their own interests.</p>
        <div class="figure-grid"><figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/St.%20Florian%20Gate%20(9159007938).jpg?width=1000" alt="Modern street-level photograph looking through Kraków’s tall stone-and-brick Gothic Florian Gate beneath its pointed arch"><figcaption><strong>A surviving gate, repeatedly altered</strong><p>Florian Gate formed part of Kraków’s late medieval defences. Its present appearance includes later changes and modern conservation.</p><p class="figure-meta">Jorge Láscar, 2012 · CC BY 2.0 · <a href="https://commons.wikimedia.org/wiki/File:St._Florian_Gate_(9159007938).jpg">Commons record</a>.</p></figcaption></figure><figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Krakow%20Kazimierz%20IMG%207491%20Ratusz%20kazimierski%20-%20Plac%20Wolnica%201.jpg?width=1000" alt="Modern photograph of the pale masonry former Kazimierz town hall standing on Kraków’s broad Wolnica Square"><figcaption><strong>Municipal identity in the built landscape</strong><p>The former Kazimierz town hall represents a separate urban corporation founded in 1335; the visible building reflects later rebuilding.</p><p class="figure-meta">Bjoertvedt, 2018 · CC BY-SA 4.0 · <a href="https://commons.wikimedia.org/wiki/File:Krakow_Kazimierz_IMG_7491_Ratusz_kazimierski_-_Plac_Wolnica_1.jpg">Commons record</a>.</p></figcaption></figure></div>
        <p>The foundation charter of 1364 proposed a <em>studium generale</em> in Kraków, with particular strength in law and medicine. Its model owed much to Bologna. The university required papal approval, teachers, finance, housing and students; it did not immediately become the continuous institution celebrated today. After Casimir’s death it declined and was refounded under Jadwiga and Jagiełło. The first foundation still reveals a monarchy seeking trained lawyers and international prestige.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Foundation charter · a place where general study may flourish</p>
          <p class="source-original" lang="la">Proinde Nos Kazimirus dei gratia rex Polonie … in Cracouia ciuitate nostra locum, ubi studium vigeat generale in qualibet licita facultate … constituendum et ordinandum duximus.</p>
          <p class="source-translation">Therefore we, Casimir by the grace of God king of Poland … have determined to establish and organise in our city of Kraków a place where a general course of study may flourish in every permitted faculty.</p>
          <p class="source-citation">Casimir III’s foundation act, 12 May 1364, in Żegota Pauli, ed., <em>Kodeks dyplomatyczny Uniwersytetu Krakowskiego</em> 1 (Kraków, 1870), no. 1, pp. 60–61. The excerpt gives the institution’s intended scope; papal approval, teaching and later continuity require separate evidence. The displayed orthography follows the edition rather than silently classical Latin. <a href="https://jbc.bj.uj.edu.pl/Content/948033/NDIGCZAS102384_4_004.pdf">Digitised study reproducing the act</a>.</p>
        </blockquote>
        <p>Education was not suddenly opened to the whole population. Latin literacy, prior schooling, gender and resources restricted access. A university served church and government as well as inquiry. Its corporate privileges protected scholars and defined jurisdiction, producing another legal community within the city. The institution’s interrupted beginning is more informative than a myth of effortless progress.</p>
        <div class="question-box"><strong>Institution test</strong> What is needed for a chartered university to become an operating university? Separate legal foundation, people, finance, buildings and continuity; then ask which forms of evidence demonstrate each.</div>
      </section>
      <section class="companion-section" id="angevin"><p class="section-number">19 · Succession</p><h2>Angevin rule and the road to 1385</h2>
        <p class="lede">Casimir III had no surviving legitimate son. Earlier agreements made his nephew Louis of Anjou, king of Hungary, the successor in 1370. This was not foreign occupation replacing a national dynasty; it was medieval dynastic politics, though Louis’s priorities and absence created conflict. His mother Elizabeth, Casimir’s sister, governed in Poland for periods, and regional elites negotiated the terms on which succession would continue.</p>
        <p>The privilege issued at Koszyce in 1374 sought acceptance of one of Louis’s daughters. It reduced a principal noble land tax to two groschen per hide and promised compensation for service abroad, among other concessions. The act is often placed at the beginning of noble privilege. It mattered, but did not instantly create the later Commonwealth constitution. It was a bargain over uncertain succession between a king and an already organised political elite.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Fiscal bargain · what remained payable</p>
          <p class="source-original" lang="la">Sed hiis tantum volumus esse contenti, quod duo grossi usualis monete … de quolibet manso vel sorte locatis et possessis, singulis annis nobis et nostris successoribus … in signum summi dominii et recognicionem corone regni Polonie exsolvantur.</p>
          <p class="source-translation">But we wish to be content only with this: that two groschen of current money … from every settled and possessed hide or holding shall be paid each year to us and our successors … as a sign of supreme lordship and recognition of the crown of the Kingdom of Poland.</p>
          <p class="source-citation">Louis’s Koszyce privilege, 17 September 1374, Ignacy Zakrzewski, ed., <em>Kodeks dyplomatyczny Wielkopolski</em> 3 (Poznań, 1879), no. 1709, pp. 425–427. The displayed text follows that edition; compare Jacek S. Matuszewski, <em>Przywileje i polityka podatkowa Ludwika Węgierskiego w Polsce</em> (Łódź, 1983), p. 37, whose quotation has variant or modernised forms. Ellipses omit the coin valuation and payment date, not a contrary condition. The taxable unit was land held by peasants on noble estates; the political concession therefore had social effects beyond the nobles who negotiated it. <a href="https://www.wbc.poznan.pl/Content/20085/kw_03.html">Consult the institutional transcription of the edition</a>.</p>
        </blockquote>
        <p>After Louis died in 1382, civil conflict and negotiation ended with his younger daughter Jadwiga crowned in Kraków in 1384 as <em>rex</em>—king—of Poland. The masculine title expressed the office she held, not a disguise of her sex. Her planned Habsburg marriage was rejected by leading lords as they explored an alliance with Lithuania. Jadwiga was young, but later accounts that make her a passive child erase the legal and religious importance of her consent and queenship.</p>
        <p>At Krewo in 1385, Jogaila promised baptism, marriage, compensation and a relationship between his Lithuanian and Rus lands and the Polish crown expressed through the disputed Latin verb <em>applicare</em>. The act was a set of prenuptial commitments, not yet the constitution of a single state. It opens Chapter 3 because implementation transformed both partners through decades of negotiation.</p>
        <blockquote class="source-excerpt">
          <p class="source-label">Prenuptial commitment · one consequential verb</p>
          <p class="source-original" lang="la">Demum etiam Jagalo dux saepedictus promittit terras suas Litvaniae et Rusiae coronae regni Poloniae perpetuo applicare.</p>
          <p class="source-translation">Finally, the aforementioned Duke Jogaila also promises perpetually to <em>applicare</em>—attach, apply or join—his lands of Lithuania and Rus to the crown of the Kingdom of Poland.</p>
          <p class="source-citation"><em>Akta unji Polski z Litwą, 1385–1791</em>, ed. Stanisław Kutrzeba and Władysław Semkowicz (Kraków, 1932), no. 1, pp. 1–3, at p. 2. The translation deliberately leaves <em>applicare</em> visible because “incorporate” would decide a historiographical dispute inside the quotation. The parchment is an issued commitment associated with negotiations, not a later narrative chronicle. <a href="https://commons.wikimedia.org/wiki/File:Union_of_Krewo.jpg">Inspect the document image</a>.</p>
        </blockquote>
        <figure><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Union%20of%20Krewo.jpg?width=1200" alt="Photographic reproduction of the small 1385 Latin parchment known as the Krewo Act with folds, stains and hanging seal cords"><figcaption><strong>A compact document with a long afterlife</strong><p>The Krewo Act records Jogaila’s commitments before marriage. Its worn parchment is primary evidence; the later label “union” can make the agreement appear more constitutionally complete than it was.</p><p class="figure-meta">Latin parchment, 14 August 1385 · public domain · <a href="https://commons.wikimedia.org/wiki/File:Union_of_Krewo.jpg">Wikimedia Commons file record</a>.</p></figcaption></figure>
        <div class="interpretation"><h3>What did <em>applicare</em> promise?</h3><ul><li><strong>Incorporation reading:</strong> Jogaila offered to attach Lithuania to the Polish crown.</li><li><strong>Dynastic-union reading:</strong> the clause expressed a prospective relationship whose institutions remained to be negotiated.</li><li><strong>Rhetorical reading:</strong> deliberate breadth helped different parties accept an agreement before practical terms existed.</li></ul><p>Later political developments cannot simply be read backward into one verb.</p></div>
      </section>
      <section class="companion-section" id="workshop"><p class="section-number">20 · Historical method</p><h2>Interpretation workshop</h2>
        <p class="lede dropcap">A strong interpretation does more than select a hero or villain. It identifies the scale of the claim, names the evidence and states what would change the conclusion. Use the problems below to practise moving from source to argument.</p>
        <h3>Problem 1: division and growth</h3><p>Construct one argument that fragmentation weakened collective defence and another that ducal competition promoted foundations and settlement. Do not average them into vagueness. Specify the institution—army, town, monastery, court or trade route—and the period. A conclusion may be negative at one scale and positive at another.</p>
        <h3>Problem 2: migration and language</h3><p>Given a Latin charter granting German law, a street plan, personal names and ceramic finds, rank what each can establish about legal affiliation, geographic origin and spoken language. Identify the inferential step that would be required to turn any one item into an ethnic count.</p>
        <h3>Problem 3: memory after violence</h3><p>Compare a brief annal of the Mongol invasion with a saint’s life written for Henry II’s mother and a fifteenth-century chronicle. Build a claim about the battle using only their shared minimum, then explain what the later details reveal about memory even if they cannot establish tactics.</p>
        <h3>Problem 4: law and lived protection</h3><p>Read a protective privilege for Jews twice: first as enforceable legal language, then as evidence that the protected group faced recognisable danger. Neither reading cancels the other. List what court records or communal sources would be needed to test implementation.</p>
        <h3>Problem 5: restored kingdom</h3><p>Decide whether 1295, 1300 or 1320 is the strongest date for the restoration of kingship. Define the criterion before choosing: first coronation, territorial reach, dynastic continuity or later endurance. Different criteria can produce different defensible answers.</p>
        <dl class="glossary"><dt>Immunity</dt><dd>A grant limiting specified public officials or dues on an estate; not general independence from all authority.</dd><dt>Location</dt><dd>Legal and spatial organisation or reorganisation of a town or village under defined terms.</dd><dt>Seniorate</dt><dd>The reconstructed principle that the senior Piast held pre-eminent authority and a central share after 1138.</dd><dt><em>Hospes</em></dt><dd>Literally a guest; in settlement documents, a newcomer or settler received under negotiated conditions.</dd><dt>Hagiography</dt><dd>Writing about saints shaped by devotional and exemplary purposes.</dd><dt>Composite monarchy</dt><dd>Rule over territories retaining different laws, elites and institutions under one dynastic centre.</dd></dl>
        <div class="question-box"><strong>Final synthesis</strong> Write 150 words answering: “Did political fragmentation delay or enable the later kingdom?” Use at least one charter, one narrative source and one material object, and include one sentence defining the limit of your evidence.</div>
      </section>
      <section class="companion-section print-break" id="sources"><p class="section-number">21 · Documentation</p><h2>Sources, notes and further literature</h2>
        <p class="lede">The editions below are the textual base for displayed excerpts and source notes. A medieval “primary source” is contemporary or part of medieval reception; it is not automatically accurate or neutral. Page and item references belong to the named edition, not to a silently modernised online transcription.</p>
        <h3>Primary texts and documentary editions</h3>
        <ol class="bibliography">
          <li class="bibliography-entry">August Bielowski, ed., <em>Monumenta Poloniae Historica</em>, vol. 2 (Lwów, 1872), including the Traska and Kraków annals. Later compilations preserve short notices whose manuscript relationships must be considered.</li>
          <li class="bibliography-entry">Brygida Kürbis, ed., <em>Chronica Poloniae Maioris</em>, MPH new series 8 (Warsaw, 1970). The work’s authorship and date of compilation or redaction remain disputed: proposals range from a late-thirteenth- or early-fourteenth-century formation to substantial later-fourteenth-century compilation. It is useful for dynastic memory, not a surviving 1138 testament.</li>
          <li class="bibliography-entry">Franciszek Piekosiński, ed., <em>Kodeks dyplomatyczny miasta Krakowa, 1257–1506</em>, part 1 (Kraków, 1879), no. 1, the Kraków location charter.</li>
          <li class="bibliography-entry"><em>Kodeks dyplomatyczny Wielkopolski</em>, vol. 1 (Poznań, 1877), no. 605, the Kalisz Jewish privilege. The act belongs to a family of Central European privileges and survives through documentary transmission.</li>
          <li class="bibliography-entry">Colmar annals and Polish annal notices in nineteenth-century critical editions for the 1241 Mongol campaign; each displayed passage identifies the exact edition and page rather than conflating later Długosz detail with near-contemporary evidence.</li>
          <li class="bibliography-entry">Helena Chłopocka, ed., <em>Lites ac res gestae inter Polonos Ordinemque Cruciferorum</em>, new edition, vol. 1, <em>Causa Junivladislaviae et Brestiae-Cuiaviae anno 1320–1321 acta</em> (Wrocław: Zakład Narodowy im. Ossolińskich, 1970); later volumes contain the 1339 proceedings.</li>
          <li class="bibliography-entry">Antoni Zygmunt Helcel, ed., <em>Starodawne prawa polskiego pomniki</em>, vol. 1 (Warsaw–Kraków, 1856), for manuscript traditions of the statutes associated with Casimir III.</li>
          <li class="bibliography-entry">Żegota Pauli, ed., <em>Kodeks dyplomatyczny Uniwersytetu Krakowskiego</em>, vol. 1 (Kraków, 1870), no. 1, Casimir III’s university foundation charter of 1364.</li>
          <li class="bibliography-entry">Ignacy Zakrzewski, ed., <em>Kodeks dyplomatyczny Wielkopolski</em>, vol. 3 (Poznań, 1879), no. 1709, pp. 425–427, the Koszyce privilege.</li>
          <li class="bibliography-entry">Stanisław Kutrzeba and Władysław Semkowicz, eds., <em>Akta unji Polski z Litwą, 1385–1791</em> (Kraków, 1932), no. 1, the Krewo Act. Consult the archival image alongside the printed text.</li>
        </ol>
        <h3>Modern scholarship and further reading</h3>
        <ol class="bibliography">
          <li class="bibliography-entry">Nora Berend, Przemysław Urbańczyk and Przemysław Wiszewski, <em>Central Europe in the High Middle Ages: Bohemia, Hungary and Poland, c. 900–c. 1300</em> (Cambridge University Press, 2013).</li>
          <li class="bibliography-entry">Paul W. Knoll, <em>The Rise of the Polish Monarchy: Piast Poland in East Central Europe, 1320–1370</em> (University of Chicago Press, 1972).</li>
          <li class="bibliography-entry">Piotr Górecki, <em>Economy, Society, and Lordship in Medieval Poland, 1100–1250</em> (Holmes &amp; Meier, 1992).</li>
          <li class="bibliography-entry">Piotr Górecki, <em>Parishes, Tithes and Society in Earlier Medieval Poland, c. 1100–c. 1250</em> (American Philosophical Society, 1993).</li>
          <li class="bibliography-entry">Piotr Górecki, <em>Local Society in Transition: A Lower Silesian County, 1150–1250</em> (Pontifical Institute of Mediaeval Studies, 1979).</li>
          <li class="bibliography-entry">Przemysław Wiszewski, <em>Domus Bolezlai: Values and Social Identity in Dynastic Traditions of Medieval Poland (c. 966–1138)</em> (Brill, 2010), especially the inheritance of Piast memory after 1138.</li>
          <li class="bibliography-entry">Robert Bartlett, <em>The Making of Europe: Conquest, Colonization and Cultural Change, 950–1350</em> (Princeton University Press, 1993), used critically for comparative expansion and settlement.</li>
          <li class="bibliography-entry">Jan M. Piskorski, ed., <em>Historiographical Approaches to Medieval Colonization of East Central Europe</em> (East European Monographs, 2002).</li>
          <li class="bibliography-entry">Maciej Mikuła, <em>Municipal Magdeburg Law (Ius municipale Magdeburgense) in Late Medieval Poland: A Study on the Evolution and Adaptation of Law</em> (Brill, 2021), open access.</li>
          <li class="bibliography-entry">Hanna Zaremska, <em>Jews in Medieval Poland: The Kraków Jewry and Beyond</em>, trans. Irena Węgrzyn (The Littman Library of Jewish Civilization, 2016).</li>
          <li class="bibliography-entry">Marcin Wodziński, <em>Historical Atlas of Hasidism</em> (Princeton University Press, 2018), for later spatial history; do not project its early-modern and modern patterns into the thirteenth century.</li>
          <li class="bibliography-entry">Peter Jackson, <em>The Mongols and the West, 1221–1410</em>, 2nd ed. (Routledge, 2018).</li>
          <li class="bibliography-entry">Peter Jackson, <em>The Mongols and the Islamic World: From Conquest to Conversion</em> (Yale University Press, 2017), for the empire beyond the European campaign.</li>
          <li class="bibliography-entry">Eric Christiansen, <em>The Northern Crusades</em>, 2nd ed. (Penguin, 1997).</li>
          <li class="bibliography-entry">Aleksander Pluskowski, <em>The Archaeology of the Prussian Crusade: Holy War and Colonisation</em> (Routledge, 2013).</li>
          <li class="bibliography-entry">Darius von Güttner-Sporzyński, <em>Poland, Holy War, and the Piast Monarchy, 1100–1230</em> (Brepols, 2014).</li>
          <li class="bibliography-entry">Alan V. Murray, ed., <em>The North-Eastern Frontiers of Medieval Europe: The Expansion of Latin Christendom in the Baltic Lands</em> (Ashgate, 2014).</li>
          <li class="bibliography-entry">S. C. Rowell, <em>Lithuania Ascending: A Pagan Empire within East-Central Europe, 1295–1345</em> (Cambridge University Press, 1994).</li>
          <li class="bibliography-entry">Robert I. Frost, <em>The Oxford History of Poland-Lithuania</em>, vol. 1, <em>The Making of the Polish-Lithuanian Union, 1385–1569</em> (Oxford University Press, 2015), beginning with a close reading of Krewo.</li>
          <li class="bibliography-entry">Daniel Stone, <em>The Polish-Lithuanian State, 1386–1795</em> (University of Washington Press, 2001), a concise bridge into Chapter 3.</li>
          <li class="bibliography-entry">Maria Bogucka and Henryk Samsonowicz, <em>A Republic of Nobles: Studies in Polish History to 1864</em> (Cambridge University Press, 1982), for a broad institutional synthesis whose periodisation should be compared with newer work.</li>
          <li class="bibliography-entry">Benedykt Zientara, <em>Henryk Brodaty i jego czasy</em>, 3rd ed. (Trio, 2006), a major Polish study of Henry the Bearded and Silesian transformation.</li>
          <li class="bibliography-entry">Gerard Labuda, <em>Studia nad początkami państwa polskiego</em>, vol. 2 (Wydawnictwo Naukowe UAM, 1988), for the transition from early monarchy to the divided polity.</li>
          <li class="bibliography-entry">Jerzy Wyrozumski, <em>Kazimierz Wielki</em> (Ossolineum, 1982; later editions), a foundational Polish biography to place beside institutional studies.</li>
          <li class="bibliography-entry">Jerzy Lukowski and Hubert Zawadzki, <em>A Concise History of Poland</em>, 3rd ed. (Cambridge University Press, 2019), for orientation rather than source-level adjudication.</li>
          <li class="bibliography-entry">Patrice M. Dabrowski, <em>Poland: The First Thousand Years</em> (Northern Illinois University Press, 2014), a readable synthesis attentive to later historical memory.</li>
          <li class="bibliography-entry">Norman Davies, <em>God’s Playground: A History of Poland</em>, vol. 1, revised ed. (Columbia University Press, 2005), influential synthesis to be checked against specialist medieval scholarship.</li>
          <li class="bibliography-entry">Paul Milliman, <em>“The Slippery Memory of Men”: The Place of Pomerania in the Medieval Kingdom of Poland</em> (Brill, 2013), on litigation, memory and contested coastal belonging.</li>
          <li class="bibliography-entry">Grischa Vercamer, <em>Hochmittelalterliche Herrschaftspraxis im Spiegel der Geschichtsschreibung</em> (Harrassowitz, 2016), comparing rulership and historiography in Poland and the Empire.</li>
          <li class="bibliography-entry">Florin Curta, ed., <em>East Central and Eastern Europe in the Early Middle Ages</em> (University of Michigan Press, 2005), for regional methods and the longer archaeological background.</li>
        </ol>
        <p class="page-note">Media are loaded from Commons at reading time. Captions distinguish medieval object, later reproduction, modern photograph and historical reconstruction. If images are unavailable, the narrative and source analysis remain complete.</p>
