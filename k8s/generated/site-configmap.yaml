    (function(){let e=document.createElement(`link`).relList;if(e&&e.supports&&e.supports(`modulepreload`))return;for(let e of document.querySelectorAll(`link[rel="modulepreload"]`))n(e);new MutationObserver(e=>{for(let t of e)if(t.type===`childList`)for(let e of t.addedNodes)e.tagName===`LINK`&&e.rel===`modulepreload`&&n(e)}).observe(document,{childList:!0,subtree:!0});function t(e){let t={};return e.integrity&&(t.integrity=e.integrity),e.referrerPolicy&&(t.referrerPolicy=e.referrerPolicy),e.crossOrigin===`use-credentials`?t.credentials=`include`:e.crossOrigin===`anonymous`?t.credentials=`omit`:t.credentials=`same-origin`,t}function n(e){if(e.ep)return;e.ep=!0;let n=t(e);fetch(e.href,n)}})();var e=`polish-history-quest-progress-v1`,t=[{id:`origins`,years:`966–1385`,title:`Origins and Piast Poland`,key:`Christianization made Poland legible to Latin Europe.`,text:`The conventional starting point is 966, when Duke Mieszko I accepted Christianity. This did not instantly create a modern nation, but it placed the Piast realm into the diplomatic, religious and written world of Latin Christendom.`,question:`Why is 966 usually treated as a turning point?`,options:[`It marks Poland joining Latin Christendom`,`It was the first partition of Poland`,`It was the start of communist rule`],answer:0},{id:`commonwealth`,years:`1385–1795`,title:`Jagiellonian Union and Commonwealth`,key:`A huge elective monarchy with a powerful noble political culture.`,text:`The Polish-Lithuanian union grew into one of early modern Europe’s largest states. Its political system gave unusual rights to the nobility, while its religious and ethnic diversity made it very different from later nation-states.`,question:`What made the Commonwealth unusual?`,options:[`It was an elective, multi-ethnic noble republic/monarchy`,`It was ruled from Moscow`,`It had no cities or trade`],answer:0},{id:`partitions`,years:`1772–1918`,title:`Partitions and life without a state`,key:`Poland disappeared from the map but not from culture or politics.`,text:`In 1772, 1793 and 1795 Russia, Prussia and Austria partitioned the Commonwealth. For 123 years there was no sovereign Polish state, yet language, culture, uprisings and social institutions kept political identity alive.`,question:`Which powers partitioned Poland?`,options:[`Russia, Prussia and Austria`,`France, Spain and Britain`,`Sweden, Denmark and Norway`],answer:0},{id:`rebirth`,years:`1918–1939`,title:`Second Republic`,key:`Independence returned, but borders, minorities and institutions were hard problems.`,text:`After the First World War Poland returned as an independent state. The Second Republic faced border wars, economic reconstruction, ethnic diversity and competing visions of democracy and authority.`,question:`What happened in 1918?`,options:[`Poland regained independence`,`Poland joined the EU`,`The Warsaw Uprising began`],answer:0},{id:`war`,years:`1939–1945`,title:`War, occupation and destruction`,key:`Nazi and Soviet occupations devastated Polish society, including the Holocaust.`,text:`Germany and the Soviet Union invaded in 1939. Occupation brought terror, forced labour, mass murder, the Holocaust, resistance, and the destruction of Warsaw after the 1944 uprising.`,question:`What best describes wartime Poland?`,options:[`Dual occupation, resistance, genocide and enormous destruction`,`A neutral country untouched by war`,`A colonial empire overseas`],answer:0},{id:`solidarity`,years:`1945–2004`,title:`Communism, Solidarity and Europe`,key:`Civic resistance helped move Poland from Soviet-bloc rule to democratic Europe.`,text:`After 1945 Poland became a communist state in the Soviet sphere. Economic frustration, the Catholic Church, workers’ activism and the Solidarity movement helped force negotiated transition in 1989. Poland joined NATO in 1999 and the EU in 2004.`,question:`Why is Solidarity important?`,options:[`It was a mass social movement that challenged communist rule`,`It was a medieval dynasty`,`It was one of the partitioning empires`],answer:0}],n=[{year:966,era:`origins`,title:`Baptism of Mieszko I`,text:`A symbolic beginning of Polish statehood in Latin Christian Europe.`},{year:1025,era:`origins`,title:`Coronation of Bolesław I`,text:`Royal authority strengthened the Piast realm.`},{year:1385,era:`commonwealth`,title:`Union of Krewo`,text:`Dynastic union links Poland and Lithuania.`},{year:1569,era:`commonwealth`,title:`Union of Lublin`,text:`Creates the Polish-Lithuanian Commonwealth.`},{year:1683,era:`commonwealth`,title:`Relief of Vienna`,text:`Jan III Sobieski helps defeat the Ottoman siege.`},{year:1772,era:`partitions`,title:`First Partition`,text:`Russia, Prussia and Austria seize Commonwealth territory.`},{year:1791,era:`partitions`,title:`Constitution of 3 May`,text:`A major reform attempt, often called Europe’s first modern written constitution.`},{year:1795,era:`partitions`,title:`Third Partition`,text:`The Polish-Lithuanian Commonwealth disappears from the map.`},{year:1918,era:`rebirth`,title:`Independence restored`,text:`Poland re-emerges after the First World War.`},{year:1920,era:`rebirth`,title:`Battle of Warsaw`,text:`Poland defeats the Red Army near Warsaw.`},{year:1939,era:`war`,title:`Invasion and occupation`,text:`Germany and the Soviet Union invade Poland.`},{year:1943,era:`war`,title:`Warsaw Ghetto Uprising`,text:`Jewish resistance against Nazi deportation and extermination.`},{year:1944,era:`war`,title:`Warsaw Uprising`,text:`The Home Army attempts to liberate Warsaw before Soviet arrival.`},{year:1980,era:`solidarity`,title:`Solidarity founded`,text:`A trade union becomes a mass civic movement.`},{year:1989,era:`solidarity`,title:`Round Table and elections`,text:`Negotiated transition begins the end of communist rule.`},{year:2004,era:`solidarity`,title:`EU accession`,text:`Poland joins the European Union.`}],r=[[`Commonwealth`,`Polish-Lithuanian elective state`],[`Partitions`,`Division by neighbouring empires`],[`Solidarity`,`Independe