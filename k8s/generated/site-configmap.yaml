    for steel production.`,`It remained a model planning project with little migration
    or later political activity.`,`It was an inherited pre-war industrial city only
    lightly altered by communist planning.`],0,`Nowa Huta captures post-war migration,
    planned industrialization, environmental cost, religious conflict and the later
    politicization of workers.`)]},{id:`protest-solidarity`,startYear:1968,endYear:1989,years:`1968–1989`,title:`Crisis,
    dissent and Solidarity`,key:`Worker protest, intellectual opposition, the Church
    and economic failure created a mass challenge to one-party rule.`,summary:`From
    1968 and 1970 through the election of a Polish pope, Solidarity, martial law and
    Round Table talks, society built institutions outside the party-state.`,sections:[n(`context`,`1968,
    1970 and organized opposition`,`Student protest in March 1968 met repression and
    an official “anti-Zionist” campaign that drove thousands of remaining Polish Jews
    into emigration. Price rises triggered worker protests on the Baltic coast in
    December 1970; security forces killed demonstrators and Edward Gierek replaced
    Gomułka. Foreign borrowing initially raised consumption but produced debt and
    shortages. After workers were beaten in 1976, intellectuals formed the Workers’
    Defence Committee, linking legal aid, underground publishing and labour activism.`),n(`society`,`A
    pope, strikes and ten million members`,`The 1978 election of Kraków’s Cardinal
    Karol Wojtyła as Pope John Paul II gave millions a language of dignity and public
    assembly outside communist control. Strikes in summer 1980 produced the Gdańsk
    Agreement and the independent trade union Solidarity. Led publicly by electrician
    Lech Wałęsa but sustained by women organizers, regional activists and experts,
    Solidarity enrolled around ten million people. It was a union, civic movement
    and national forum containing socialists, Catholics, liberals and nationalists.`),n(`international`,`Martial
    law and the late Cold War`,`General Wojciech Jaruzelski imposed martial law on
    13 December 1981, interned activists and crushed open organization. He later argued
    that this prevented Soviet intervention; historians debate the likelihood of invasion,
    while documents show the regime sought Soviet support and acted to preserve party
    rule. Solidarity survived underground with foreign broadcasting, Western sanctions,
    Church mediation and transnational labour support. Gorbachev’s reforms, Soviet
    decline and Poland’s economic crisis altered the risks by the late 1980s.`),n(`culture`,`Artifacts:
    the Solidarity logo, underground print and protest music`,`Jerzy Janiszewski’s
    red Solidarity logo makes letters resemble a tightly packed crowd, turning typography
    into a model of collective power. Samizdat printing, cassette recordings, church
    exhibitions and Orange Alternative street happenings created a counter-public
    sphere. Songs by Jacek Kaczmarski and films by Krzysztof Kieślowski explored responsibility,
    compromise and everyday absurdity. Today arguments over Wałęsa, Jaruzelski and
    the Church show how a shared opposition movement fragmented into rival memories
    after victory.`)],actors:[{name:`Anna Walentynowicz and Lech Wałęsa`,role:`Gdańsk
    activists whose roles in the 1980 strike symbolize both collective organization
    and later disputes over leadership and memory.`},{name:`Karol Wojtyła / John Paul
    II`,role:`Polish pope whose visits and moral language expanded public space outside
    the party, while his later legacy is debated in a changing society.`},{name:`Wojciech
    Jaruzelski`,role:`Communist general who imposed martial law, presenting it as
    a lesser evil while opponents view it as repression to preserve party power.`}],quiz:[i(`What
    made the March 1968 campaign especially damaging to post-war Jewish life?`,[`The
    state used antisemitic “anti-Zionist” rhetoric to purge institutions and force
    emigration.`,`It invited Jewish emigrants to return with full restitution.`,`It
    replaced censorship with voluntary newsroom rules while retaining one-party media
    ownership.`,`It targeted Zionist organizations while leaving Polish citizens of
    Jewish origin unaffected.`],0,`The campaign combined factional party struggle,
    nationalist propaganda and repression. Thousands of citizens of Jewish origin
