apiVersion: apps/v1
kind: Deployment
metadata:
  name: polish-history-quest
  namespace: polish-history-quest
  labels:
    app.kubernetes.io/name: polish-history-quest
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: polish-history-quest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: polish-history-quest
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site
          projected:
            sources:
              - configMap:
                  name: polish-history-site
              - configMap: { name: polish-history-companion-1 }
              - configMap: { name: polish-history-companion-2 }
              - configMap: { name: polish-history-companion-3, optional: true }
              - configMap: { name: polish-history-companion-4, optional: true }
              - configMap: { name: polish-history-companion-5, optional: true }
              - configMap: { name: polish-history-companion-6, optional: true }
              - configMap: { name: polish-history-companion-7, optional: true }
              - configMap: { name: polish-history-companion-8, optional: true }
              - configMap: { name: polish-history-companion-9, optional: true }
              - configMap: { name: polish-history-companion-10, optional: true }
              - configMap: { name: polish-history-companion-11, optional: true }
              - configMap: { name: polish-history-companion-12, optional: true }
              - configMap: { name: polish-history-companion-13, optional: true }
