apiVersion: apps/v1
kind: Deployment
metadata:
  name: polish-history-quest
  namespace: polish-history-quest
  labels:
    app.kubernetes.io/name: polish-history-quest
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: polish-history-quest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: polish-history-quest
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site
          configMap:
            name: polish-history-site
